<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma progression</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#f1f5f9;
padding:20px;
color:#0f172a;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:white;
border-radius:24px;
padding:24px;
margin:0 auto 20px auto;
max-width:700px;
box-shadow:0 10px 30px rgba(15,23,42,.08);
}

.progressCircle{
width:220px;
height:220px;
margin:10px auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:54px;
font-weight:800;
position:relative;
background:#e5e7eb;
}

.progressCircle::before{
content:"";
position:absolute;
width:165px;
height:165px;
border-radius:50%;
background:white;
}

.progressValue{
position:relative;
z-index:2;
}

.programmeNom{
font-size:26px;
font-weight:700;
text-align:center;
margin-top:10px;
}

.programmeInfo{
text-align:center;
font-size:18px;
color:#64748b;
margin-top:8px;
}

.chartContainer{
height:240px;
display:flex;
justify-content:center;
align-items:center;
}

.messageTitle{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.messageText{
font-size:18px;
text-align:center;
color:#475569;
}

canvas{
width:100%;
max-width:100%;
}

button{
width:100%;
max-width:700px;
display:block;
margin:auto;
padding:14px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.loader{
text-align:center;
padding:40px;
font-size:18px;
}

</style>
</head>

<body>

<h1>📈 Ma progression</h1>

<div style="
max-width:700px;
margin:0 auto 20px auto;
">
<select
id="programmeSelect"
style="
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #cbd5e1;
font-size:16px;
font-weight:600;
">
</select>
</div>

<div id="content" class="loader">
Chargement...
</div>

<button onclick="goBack()">
⬅ Retour
</button>

<script type="module">

import {
loadProgramsFromCloud
}
from "./exercises/js/cloud.js";

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient")
||
localStorage.getItem("currentPatient")
||
"";

const content =
document.getElementById("content");

function goBack(){

if(patient){

window.location =
"index.html?patient="
+ patient;

}else{

history.back();

}

}

window.goBack = goBack;

init();

async function init(){

const all =
await loadProgramsFromCloud();

console.log("PATIENT URL =", patient);

console.table(
all.map(p=>({
nom:p.nom,
programmeNom:p.programmeNom,
patient:p.patient,
patientId:p.patientId,
categorie:p.categorie,
type:p.type
}))
);

const kine =
all.filter(p=>{

const cat =
(
p.categorie
||
""
).toLowerCase();

const pid =
(
p.patientId
||
""
).toLowerCase();

return (
(
cat === "kine"
||
cat === "course"
)
&&
(
pid.includes(patient.toLowerCase())
||
patient.toLowerCase().includes(pid)
)
);

});

console.log(
"PROGRAMMES KINE TROUVÉS =",
kine.length,
kine
);

console.table(
kine.map(p=>({
nom:p.nom,
terminee:p.terminee,
dateValidation:p.dateValidation,
eva:p.eva,
programmeId:p.programmeId,
firebaseId:p.firebaseId
}))
);



if(!kine.length){

content.innerHTML = `
<div class="card">
<div class="messageTitle">
🏆 Aucun programme actif
</div>
<div class="messageText">
Aucun programme de rééducation trouvé.
</div>
</div>
`;

return;
}

const groupes = {};

kine.forEach(p=>{

if(!p.programmeId) return;

if(!groupes[p.programmeId]){
groupes[p.programmeId]=[];
}

groupes[p.programmeId].push(p);

});

const programmes =
Object.values(groupes);

const select =
document.getElementById(
"programmeSelect"
);

select.innerHTML =
programmes.map(g=>{

const total = g.length;

const faites =
g.filter(s=>s.terminee).length;

const pct =
Math.round(
(faites*100)/total
);

let icone = "📋";

if(g[0].categorie === "course"){
icone = "🏃";
}

if(g[0].categorie === "kine"){
icone = "🩺";
}

const badge =
pct >= 100
? " ✅"
: ` (${pct}%)`;

return `
<option value="${g[0].programmeId}">
${icone} ${g[0].programmeNom || g[0].nom}${badge}
</option>
`;

}).join("");

function renderProgramme(programmeId){

const programme =
programmes.find(
g => g[0].programmeId === programmeId
);

if(!programme) return;

const total =
programme.length;

const faites =
programme.filter(
s => s.terminee
).length;

const pourcentage =
Math.round(
(faites*100)/total
);

const nom =
programme[0].programmeNom
||
programme[0].nom
||
"Rééducation";

const evaData =
programme
.filter(
s => s.terminee
&& s.eva != null
)
.map(
s => Number(s.eva)
)
.filter(
v => !isNaN(v)
);

let message =
`👏 Vous avez réalisé ${faites} séance${faites>1?"s":""}.`;

if(pourcentage >= 100){

message =
"🏆 Félicitations, programme terminé !";

}

let boutonBilan = "";

if(pourcentage >= 100){

const evaMoyenne =
evaData.length
? (
evaData.reduce((a,b)=>a+b,0)
/
evaData.length
).toFixed(1)
: "-";

const historique =
programme
.filter(s => s.terminee)
.map(s => {

const date =
s.dateValidation
? new Date(s.dateValidation)
.toLocaleDateString("fr-FR")
: "-";

return `${date} • ${s.nom} • EVA ${s.eva ?? "-"} /10`;

})
.join("\n");

boutonBilan = `
<button
style="
background:#16a34a;
margin-top:15px;
"
onclick="sendProgrammeReport(
'${nom}',
${faites},
${total},
'${evaMoyenne}',
'${historique.replace(/\n/g,'\\n')}',
'${patient}'
)">
📤 Envoyer mon bilan à mon kinésithérapeute
</button>
`;
}

if(evaData.length >= 2){

const debut =
evaData[0];

const actuel =
evaData[evaData.length-1];

const gain =
debut - actuel;

if(gain > 0){

if(pourcentage >= 100){

message =
`🏆 Programme terminé !<br><br>
📉 Votre douleur a diminué de ${gain} point${gain>1?"s":""}.`;

}else{

message =
`📉 Votre douleur a diminué de ${gain} point${gain>1?"s":""}.`;

}

}

}

const titreGraphique =
programme[0].categorie === "course"
? "🏃 Évolution du ressenti"
: "😊 Évolution de la douleur";

content.innerHTML = `

<div class="card">

<div
class="progressCircle"
id="circle"
>

<div class="progressValue">
${pourcentage}%
</div>

</div>

<div class="programmeNom">
${programme[0].categorie==="course" ? "🏃" : "🩺"} ${nom}
</div>

<div class="programmeInfo">
${faites} séances réalisées sur ${total}
</div>

</div>

<div class="card">

<h3 style="text-align:center">
${titreGraphique}
</h3>

<div class="chartContainer">
<canvas id="evaChart"></canvas>
</div>

</div>

<div class="card">

<div class="messageTitle">
👏 Progression
</div>

<div class="messageText">
${message}
</div>

${boutonBilan}
</div>
`;

const circle =
document.getElementById(
"circle"
);

const angle =
(pourcentage/100)*360;

circle.style.background =
`conic-gradient(
#16a34a 0deg,
#16a34a ${angle}deg,
#e5e7eb ${angle}deg,
#e5e7eb 360deg
)`;

const evaSeances =
programme
.filter(
s => s.terminee &&
s.eva != null
)
.sort((a,b)=>{

if(a.nom && b.nom){
return a.nom.localeCompare(
b.nom,
undefined,
{numeric:true}
);
}

return 0;

});

drawEva(evaSeances);

}

select.onchange = () => {
renderProgramme(
select.value
);
};

renderProgramme(
programmes[0][0].programmeId
);

}

function drawEva(seances){

const canvas =
document.getElementById(
"evaChart"
);

if(!canvas) return;

const ctx =
canvas.getContext("2d");

const rect =
canvas.parentElement.getBoundingClientRect();

const w = canvas.width = Math.floor(rect.width);
const h = canvas.height = 260;

ctx.clearRect(0,0,w,h);

// Axe EVA

ctx.strokeStyle = "#cbd5e1";
ctx.lineWidth = 1;

for(let i=0;i<=10;i+=2){

const y =
h - 20 - (i/10)*(h-40);

ctx.beginPath();
ctx.moveTo(25,y);
ctx.lineTo(w-10,y);
ctx.stroke();

ctx.fillStyle = "#64748b";
ctx.font = "12px sans-serif";

ctx.fillText(
i,
5,
y+4
);

}

const evaData =
seances.map(
s => Number(s.eva || 0)
);

ctx.beginPath();

evaData.forEach((eva,i)=>{

const x =
(i/(evaData.length-1 || 1))
* (w-50)
+ 35;

const y =
h - 20 - (eva/10)*(h-40);

if(i===0){
ctx.moveTo(x,y);
}else{
ctx.lineTo(x,y);
}

});

ctx.strokeStyle="#16a34a";
ctx.lineWidth=3;
ctx.stroke();

evaData.forEach((eva,i)=>{

const x =
(i/(evaData.length-1 || 1))
* (w-50)
+ 35;

const y =
h - 20 - (eva/10)*(h-40);

ctx.beginPath();
ctx.arc(x,y,6,0,Math.PI*2);
ctx.fillStyle="#16a34a";
ctx.fill();

ctx.fillStyle="#111827";
ctx.font="14px sans-serif";

if(seances.length <= 15){

ctx.fillText(
eva,
x-4,
y-10
);

}

});

const labels =
seances.map(
s => s.nom
);

const step =
labels.length > 20
? 4
: labels.length > 10
? 2
: 1;

labels.forEach((label,i)=>{

if(i % step !== 0) return;

const x =
(i/(labels.length-1 || 1))
* (w-50)
+ 35;

ctx.fillStyle = "#475569";
ctx.font = "11px sans-serif";

ctx.fillText(
label,
x - 10,
h - 5
);

});

}

window.sendProgrammeReport = function(
programmeNom,
faites,
total,
evaMoyenne,
historique,
patientNom
){

const nomPatient =
(patient || patientNom || "")
.replace(/_/g," ")
.replace(/\b\w/g, l => l.toUpperCase());

const remarques = prompt(
"Souhaitez-vous ajouter une remarque pour votre kinésithérapeute ?"
) || "";

const sujet =
`Programme terminé - ${programmeNom}`;

const message =
`Bonjour Gabriel,

Je vous informe avoir terminé mon programme :

${programmeNom}

✅ Séances réalisées : ${faites}/${total}
🩹 EVA moyenne : ${evaMoyenne}/10

📅 Historique des séances

${historique}

📝 REMARQUES

${remarques || "Aucune remarque"}

Cordialement,

${nomPatient}`;

window.location =
`mailto:kine.laveau@gmail.com?subject=${encodeURIComponent(sujet)}&body=${encodeURIComponent(message)}`;

}

</script>

</body>
