<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MusiMix</title>

<style>
:root{
--bg:#111;
--panel:#181818;
--line:#2a2a2a;
--text:#fff;
--muted:#aaa;
--accent:#ffd166;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,sans-serif;
background:var(--bg);
color:var(--text);
}

.topbar{
position:sticky;
top:0;
z-index:50;
display:flex;
gap:8px;
align-items:center;
padding:12px;
background:#111;
border-bottom:1px solid var(--line);
overflow:auto;
}

.topbar button{
white-space:nowrap;
}

.layout{
display:grid;
grid-template-columns:280px 1fr;
min-height:100vh;
}

.sidebar{
background:#0f0f0f;
padding:18px;
border-right:1px solid var(--line);
}

.main{
padding:0;
}

.header{
padding:18px 24px;
border-bottom:1px solid var(--line);
}

h1{
margin:0;
font-size:1.7rem;
}

.meta{
margin-top:6px;
color:var(--muted);
}

.lyrics{
padding:30px;
font-size:1.5rem;
line-height:1.45;
}

.line{
margin-bottom:14px;
white-space:nowrap;
}

.segment{
display:inline-block;
vertical-align:top;
white-space:pre;
}

.chord{
display:block;
font-weight:700;
font-size:.78em;
color:var(--accent);
line-height:1;
margin-bottom:2px;
}

.word{
display:block;
white-space:pre;
}

.section{
margin-top:28px;
margin-bottom:16px;
font-size:1rem;
font-weight:700;
color:#9a9a9a;
text-transform:uppercase;
letter-spacing:.08em;
}

.slider-wrap{
margin-bottom:26px;
}

label{
display:block;
margin-bottom:8px;
font-size:.95rem;
}

input[type=range]{
width:100%;
}

button{
background:#242424;
color:white;
border:none;
padding:10px 14px;
border-radius:12px;
font-size:1rem;
cursor:pointer;
}

.song-item{
padding:10px;
background:#1e1e1e;
border-radius:10px;
margin-top:10px;
font-size:.95rem;
}

@media(max-width:900px){
.layout{
grid-template-columns:1fr;
}
.sidebar{
border-right:none;
border-bottom:1px solid var(--line);
}
}
</style>
</head>
<body>

<div class="topbar">
<button onclick="togglePlay()">▶︎ Play / Pause</button>
<button onclick="toggleScroll()">⇅ AutoScroll</button>
<button onclick="changeScrollSpeed(-0.2)">🐢</button>
<button onclick="changeScrollSpeed(0.2)">🐇</button>
<button onclick="transpose(-1)">♭</button>
<button onclick="transpose(1)">♯</button>
<button onclick="changeFont(-0.1)">A−</button>
<button onclick="changeFont(0.1)">A+</button>
<button onclick="document.getElementById('bundleInput').click()">➕ Ajouter morceau</button>
<input id="bundleInput" hidden type="file" multiple accept=".mp3,.cho,.chopro,.txt" onchange="loadBundle(event)">
</div>

<div class="layout">

<aside class="sidebar">

<div class="slider-wrap">
<label>🎤 Voix</label>
<input type="range" min="0" max="1" step="0.01" value="1" oninput="vocals.volume=this.value">
</div>

<div class="slider-wrap">
<label>🎵 Instrumental</label>
<input type="range" min="0" max="1" step="0.01" value="1" oninput="instr.volume=this.value">
</div>

<div id="library"></div>

</aside>

<main class="main">

<div class="header">
<h1 id="title">MusiMix</h1>
<div class="meta" id="meta">Ajoute un morceau</div>
</div>

<div id="lyrics" class="lyrics"></div>

</main>
</div>

<audio id="vocals"></audio>
<audio id="instr"></audio>

<script>
const vocals=document.getElementById('vocals');
const instr=document.getElementById('instr');
const lyrics=document.getElementById('lyrics');

let parsedSong=[];
let semitoneShift=0;
let fontSize=1.5;
let scrolling=false;
let scrollTimer=null;
let scrollSpeed=1;

const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function togglePlay(){
if(vocals.paused){
instr.currentTime=vocals.currentTime;
vocals.play();
instr.play();
}else{
vocals.pause();
instr.pause();
}
}

function toggleScroll(){
scrolling=!scrolling;
if(scrolling){
scrollTimer=setInterval(()=>window.scrollBy(0,1),80/scrollSpeed);
}else{
clearInterval(scrollTimer);
}
}

function changeScrollSpeed(v){
scrollSpeed=Math.max(.4,Math.min(4,scrollSpeed+v));
}

function changeFont(v){
fontSize=Math.max(.8,Math.min(2.8,fontSize+v));
lyrics.style.fontSize=fontSize+'rem';
}

function transpose(v){
semitoneShift+=v;
renderSong();
}

function shiftChord(chord,shift){
const m=chord.match(/^([A-G](#|b)?)(.*)$/);
if(!m) return chord;
let i=NOTES.indexOf(m[1].replace('Bb','A#'));
if(i<0) return chord;
return NOTES[(i+shift+12)%12]+m[3];
}

function loadBundle(e){
const files=[...e.target.files];

const cho=files.find(f=>/\.(cho|chopro|txt)$/i.test(f.name));
const vocal=files.find(f=>f.name.toLowerCase().includes('vocals'));
const instrumental=files.find(f=>f.name.toLowerCase().includes('instrumental'));

if(vocal) vocals.src=URL.createObjectURL(vocal);
if(instrumental) instr.src=URL.createObjectURL(instrumental);

if(cho){
const r=new FileReader();
r.onload=(ev)=>parseChordPro(ev.target.result);
r.readAsText(cho);
}

saveToLibrary(files);
}

function saveToLibrary(files){
let lib=JSON.parse(localStorage.getItem('musimix-library')||'[]');
lib.push(files.map(f=>f.name));
localStorage.setItem('musimix-library',JSON.stringify(lib));
renderLibrary();
}

function renderLibrary(){
const lib=JSON.parse(localStorage.getItem('musimix-library')||'[]');
document.getElementById('library').innerHTML=
lib.map(song=>`<div class="song-item">🎵 ${song[0]}</div>`).join('');
}

function parseChordPro(text){
parsedSong=[];

let title='',artist='',key='',capo='';
const lines=text.split(/\r?\n/);

for(let line of lines){

if(line.startsWith('{title:')){title=line.slice(7,-1).trim();continue;}
if(line.startsWith('{artist:')){artist=line.slice(8,-1).trim();continue;}
if(line.startsWith('{key:')){key=line.slice(5,-1).trim();continue;}
if(line.startsWith('{capo:')){capo=line.slice(6,-1).trim();continue;}

if(line.startsWith('{comment:')){
parsedSong.push({type:'section',text:line.replace('{comment:','').replace('}','').trim()});
continue;
}

if(line.startsWith('{')) continue;

parsedSong.push({type:'line',text:line});
}

document.getElementById('title').textContent=title||'MusiMix';
document.getElementById('meta').textContent=
[artist,key&&`Tonalité ${key}`,capo&&`Capodastre ${capo}`]
.filter(Boolean)
.join(' • ');

renderSong();
}

function renderSong(){

lyrics.innerHTML='';

parsedSong.forEach(item=>{

if(item.type==='section'){
lyrics.innerHTML+=`<div class="section">${item.text}</div>`;
return;
}

if(!item.text.trim()){
lyrics.innerHTML+='<br>';
return;
}

let line=document.createElement('div');
line.className='line';

const regex=/\[(.*?)\]([^\[]*)/g;
let m;

while((m=regex.exec(item.text))!==null){

let chord=shiftChord(m[1],semitoneShift);
let word=m[2]||' ';

let seg=document.createElement('span');
seg.className='segment';

seg.innerHTML=
'<span class="chord">'+chord+'</span>'+
'<span class="word">'+word+'</span>';

line.appendChild(seg);
}

if(line.innerHTML===''){
line.textContent=item.text;
}

lyrics.appendChild(line);

});
}

renderLibrary();
</script>

</body>
</html>
