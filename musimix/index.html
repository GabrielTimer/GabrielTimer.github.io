<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MusiMix</title>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="chords.js"></script>

<style>
:root{
--bg:#111;
--panel:#181818;
--line:#2a2a2a;
--text:#fff;
--muted:#aaa;
--accent:#ffd166;
}
*{box-sizing:border-box}
body{margin:0;background:#111;color:#fff;font-family:Arial,sans-serif}
.topbar{
position:sticky;
top:0;
z-index:60;
display:flex;
gap:8px;
padding:10px;
background:#111;
border-bottom:1px solid #2a2a2a;
overflow:auto;
}
button{
background:#242424;
color:white;
border:none;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
white-space:nowrap
}
.layout{
display:grid;
grid-template-columns:320px 1fr
}
.sidebar{
position:sticky;
top:58px;
height:calc(100vh - 58px);
overflow-y:auto;
overflow-x:hidden;
padding:20px;
background:#0d0d0d;
border-right:1px solid #2a2a2a;
align-self:start;
}

#mixer{
position:sticky;
top:0;
z-index:40;
background:#0d0d0d;
padding-bottom:12px;
margin-bottom:12px;
}

#waveform{
position:sticky;
top:0;
z-index:41;
background:#0d0d0d;
}

.main{min-height:100vh}
.header{padding:20px;border-bottom:1px solid #2a2a2a}
.meta{color:#aaa;margin-top:4px}
.lyrics{padding:30px;font-size:1.5rem;line-height:1.45}
.line{margin-bottom:12px;white-space:normal;overflow-wrap:anywhere}
.segment{display:inline-block;vertical-align:top;white-space:pre}
.chord{display:block;font-size:.8em;font-weight:700;color:#ffd166;line-height:1}
.word{display:block;white-space:pre-wrap}
.section{margin:28px 0 14px;font-size:1rem;font-weight:700;color:#9a9a9a;text-transform:uppercase}
canvas{
width:100%;
height:80px;
background:#151515;
border-radius:12px;
margin-bottom:20px
}
.slider-wrap{
display:flex;
align-items:center;
gap:12px;
margin-bottom:14px
}
.slider-wrap label{
width:72px;
margin:0;
font-size:.95rem
}
.slider-wrap input[type=range]{
flex:1;
accent-color:#20b8d6
}
.track-btn{
padding:4px 8px;
border-radius:8px;
font-size:.8rem
}
.track-btn.active{
background:#20b8d6;
color:#000
}
.song-item{
padding:12px;
background:#1d1d1d;
border-radius:10px;
margin-top:12px;
font-size:.95rem;
cursor:pointer
}

@media(max-width:900px){

  .layout{
    grid-template-columns:1fr;
  }

  /* masque la waveform sur mobile */
  #waveform{
    display:none;
  }

  .sidebar{
    position:sticky;
    top:58px;
    z-index:55;
    height:auto;
    max-height:45vh;
    overflow:auto;
    border-right:none;
    border-bottom:1px solid #2a2a2a;
  }

  #mixer{
    position:sticky;
    top:0;
    z-index:56;
    background:#0d0d0d;
  }

}


.instrument-switch{
display:flex;
gap:8px;
margin-top:12px;
margin-bottom:14px;
flex-wrap:wrap;
}
#chord-bar{
display:flex;
gap:12px;
overflow-x:auto;
padding-bottom:8px;
}
.chord-item{
position:relative;
background:#1f1f1f;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-weight:700;
color:#ffd166;
}
#chord-popup{
position:fixed;
z-index:99999;
background:#fff;
color:#111;
border-radius:12px;
padding:12px;
box-shadow:0 12px 30px rgba(0,0,0,.28);
min-width:160px;
}

#toggleMixerBtn{
  display:none;
}

@media(max-width:900px){

  #toggleMixerBtn{
    display:block;
    width:100%;
    margin-bottom:12px;
    background:#1c1c1c;
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:12px;
    font-size:15px;
  }

  #mobileMixerPanel{
    display:none;
  }

  #mobileMixerPanel.open{
    display:block;
  }
}

.popup-inner{text-align:center;}

</style>
</head>
<body>

<div class="topbar">
<button onclick="togglePlay()">▶ / ⏸</button>
<button onclick="changeScrollSpeed(-0.3)">🐢</button>
<button onclick="changeScrollSpeed(0.3)">🐇</button>
<button onclick="transpose(-1)">♭</button>
<button onclick="transpose(1)">♯</button>
<button onclick="changeFont(-0.1)">A−</button>
<button onclick="changeFont(0.1)">A+</button>
<button onclick="document.getElementById('zipInput').click()">➕ Ajouter ZIP</button>
<input hidden id="zipInput" type="file" accept=".zip" onchange="loadZip(event)">
</div>

<div class="layout">

<aside class="sidebar">

<button id="toggleMixerBtn" onclick="toggleMixerPanel()">▼ Pistes</button>

<div id="mobileMixerPanel" class="open">
  <canvas id="waveform"></canvas>
  <div id="mixer"></div>
</div>

</aside>

<main class="main">
<div class="header">
<h1 id="title">MusiMix</h1>
<div class="meta" id="meta"></div>

<div class="instrument-switch">
<button onclick="switchInstrument('guitar')">🎸 Guitare</button>
<button onclick="switchInstrument('piano')">🎹 Piano</button>
</div>

<div id="chord-bar"></div>

</div>
<div class="lyrics" id="lyrics"></div>
</main>

</div>

<script>
let parsedSong=[]
let scrollSpeed=1
let scrollTimer=null
let fontSize=1.5
let semitoneShift=0
let library=[]
let tracks={}
let soloTrackName=null

const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B']

function audioExt(name){
return /\.(mp3|wav|flac)$/i.test(name)
}

function getStemType(name){
const n=name.toLowerCase()
if(n.includes('(vocals)')) return '🎤 Voix'
if(n.includes('(drums)')) return '🥁 Drums'
if(n.includes('(bass)')) return '🎸 Bass'
if(n.includes('(guitar)')) return '🎸 Guitar'
if(n.includes('(piano)')) return '🎹 Piano'
if(n.includes('(other)')) return '🎵 Other'
if(n.includes('instrumental')) return '🎵 Instrumental'
return null
}

function togglePlay(){
const arr=Object.values(tracks)
if(!arr.length)return

if(arr[0].paused){
const t=arr[0].currentTime
arr.forEach(a=>{a.currentTime=t;a.play()})
startScroll()
}else{
arr.forEach(a=>a.pause())
stopScroll()
}
}

function startScroll(){
stopScroll()
scrollTimer=setInterval(()=>window.scrollBy(0,1),80/scrollSpeed)
}

function stopScroll(){
clearInterval(scrollTimer)
}

function changeScrollSpeed(v){
scrollSpeed=Math.max(.3,Math.min(4,scrollSpeed+v))
if(Object.values(tracks)[0] && !Object.values(tracks)[0].paused) startScroll()
}

function changeFont(v){
fontSize=Math.max(.9,Math.min(3,fontSize+v))
document.getElementById('lyrics').style.fontSize=fontSize+'rem'
}

function transpose(v){
  semitoneShift += v
  renderSong()
}

function shiftChord(chord,s){

  const flatMap={
    'A#':'Bb',
    'C#':'Db',
    'D#':'Eb',
    'F#':'Gb',
    'G#':'Ab'
  };

  const m=chord.match(/^([A-G](#|b)?)(.*)$/)
  if(!m)return chord

  let root=m[1].replace('Bb','A#')
  let i=NOTES.indexOf(root)

  if(i<0)return chord

  let shifted=NOTES[(i+s+12)%12]

  if(flatMap[shifted]) shifted=flatMap[shifted]

  return shifted+m[3]
}

async function loadZip(e){
const file=e.target.files[0]
if(!file)return
const zip=await JSZip.loadAsync(file)

tracks={}
let choFile=null

for(const name in zip.files){

if(name.endsWith('.cho')) choFile=name

if(audioExt(name)){
const stem=getStemType(name)
if(stem){
const blob=await zip.files[name].async('blob')
tracks[stem]=new Audio(URL.createObjectURL(blob))
}
}
}

if(choFile){
const txt=await zip.files[choFile].async('string')
await loadChordDatabase()
parseChordPro(txt)
}

library.push(file.name)
renderLibrary()
renderMixer()
drawWaveform()
}

function renderMixer(){
const mixer=document.getElementById('mixer')
mixer.innerHTML=''

Object.entries(tracks).forEach(([name,audio])=>{

const row=document.createElement('div')
row.className='slider-wrap'

row.innerHTML=`
<label>${name}</label>
<input type="range" min="0" max="1" step="0.01" value="${audio.volume||1}">
<button class="track-btn">S</button>
<button class="track-btn">M</button>
`

const slider=row.querySelector('input')
slider.oninput=()=>audio.volume=slider.value

const [soloBtn,muteBtn]=row.querySelectorAll('button')

soloBtn.onclick=()=>{
soloTrackName=(soloTrackName===name)?null:name
Object.entries(tracks).forEach(([n,a])=>{
a.muted=soloTrackName ? n!==soloTrackName : false
})
renderMixer()
}

muteBtn.onclick=()=>{
audio.muted=!audio.muted
muteBtn.classList.toggle('active',audio.muted)
}

if(soloTrackName===name) soloBtn.classList.add('active')
if(audio.muted) muteBtn.classList.add('active')

mixer.appendChild(row)
})
}


function parseChordPro(text){
parsedSong=[]
let title='',artist='',key='',capo=''

text.split(/\r?\n/).forEach(line=>{

if(line.startsWith('{title:')){title=line.slice(7,-1).trim();return}
if(line.startsWith('{artist:')){artist=line.slice(8,-1).trim();return}
if(line.startsWith('{key:')){key=line.slice(5,-1).trim();return}
if(line.startsWith('{capo:')){capo=line.slice(6,-1).trim();return}

if(line.startsWith('{comment:')){
parsedSong.push({type:'section',text:line.replace('{comment:','').replace('}','').trim()})
return
}

if(line.startsWith('{')) return
parsedSong.push({type:'line',text:line})
})

document.getElementById('title').textContent=title||'MusiMix'
document.getElementById('meta').textContent=
[artist,key&&'Tonalité '+key,capo&&'Capodastre '+capo].filter(Boolean).join(' • ')

window.currentChords = extractChordsFromCho(text)
renderChordBar(window.currentChords)

renderSong()
}

function renderSong(){
const lyrics=document.getElementById('lyrics')
lyrics.innerHTML=''

parsedSong.forEach(item=>{

if(item.type==='section'){
lyrics.innerHTML+=`<div class="section">${item.text}</div>`
return
}

const line=document.createElement('div')
line.className='line'
const parts=item.text.split(/(\[.*?\])/g)

parts.forEach(part=>{

if(!part)return

if(part.startsWith('[')&&part.endsWith(']')){
const chord=part.slice(1,-1)

line.innerHTML+=`
<span class="segment">
<span class="chord">${shiftChord(chord,semitoneShift)}</span>
<span class="word">&nbsp;</span>
</span>`
}else{
line.innerHTML+=`
<span class="segment">
<span class="chord">&nbsp;</span>
<span class="word">${part}</span>
</span>`
}
})

lyrics.appendChild(line)
})
}

function drawWaveform(){

  const c=document.getElementById('waveform')
  const ctx=c.getContext('2d')

  c.width=800
  c.height=80

  ctx.clearRect(0,0,c.width,c.height)

  ctx.strokeStyle='#2d7cff'
  ctx.lineWidth=2

  for(let x=0;x<c.width;x+=3){

    const center=40

    const h=
      8+
      Math.sin(x*0.02)*10+
      Math.random()*18

    ctx.beginPath()
    ctx.moveTo(x,center-h)
    ctx.lineTo(x,center+h)
    ctx.stroke()
  }
}

function renderLibrary(){
  // volontairement vide : on masque le nom du ZIP
}

function toggleMixerPanel(){
  const panel = document.getElementById('mobileMixerPanel');
  const btn = document.getElementById('toggleMixerBtn');

  panel.classList.toggle('open');

  const isOpen = panel.classList.contains('open');

  localStorage.setItem('mixerPanelOpen', isOpen ? '1' : '0');

  btn.textContent = isOpen
    ? '▲ Masquer pistes'
    : '▼ Pistes';
}

window.addEventListener('load',()=>{

  const panel=document.getElementById('mobileMixerPanel');
  const btn=document.getElementById('toggleMixerBtn');

  const saved=localStorage.getItem('mixerPanelOpen');

  if(saved==='0'){
    panel.classList.remove('open');
    btn.textContent='▼ Pistes';
  }else{
    panel.classList.add('open');
    btn.textContent='▲ Masquer pistes';
  }

});

</script>

</body>
</html>
