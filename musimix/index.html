<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MusiMix</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:#fff;
padding-bottom:180px;
}

.header{
padding:16px;
border-bottom:1px solid #333;
position:sticky;
top:0;
background:#111;
z-index:10;
}

h1{margin:0}
.meta{color:#aaa;margin-top:4px}

.toolbar{
padding:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button,input{
border:none;
border-radius:10px;
padding:12px;
font-size:1rem;
}

button{
background:#242424;
color:white;
cursor:pointer;
}

.lyrics{
padding:20px;
font-size:1.45rem;
line-height:1.45;
}

.line{margin-bottom:14px}
.segment{
display:inline-block;
vertical-align:top;
white-space:pre;
}
.chord{
display:block;
color:#ffd166;
font-weight:700;
font-size:.8em;
}
.word{
display:block;
white-space:pre;
}

.library{
padding:0 20px 20px;
}

.song-item{
padding:10px;
background:#1d1d1d;
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
}

.controls{
position:fixed;
bottom:0;
left:0;
right:0;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
padding:12px;
background:#111;
border-top:1px solid #333;
}
</style>
</head>
<body>

<div class="header">
<h1 id="title">MusiMix</h1>
<div id="meta" class="meta">Charge un morceau</div>
</div>

<div class="toolbar">
<input type="file" accept=".cho,.chopro,.txt" onchange="loadChordFile(event)">
<button onclick="document.getElementById('bundleInput').click()">➕ Ajouter morceau</button>
<input id="bundleInput" type="file" multiple accept=".mp3,.cho,.chopro,.txt" hidden onchange="loadBundle(event)">
</div>

<div id="library" class="library"></div>
<div id="lyrics" class="lyrics"></div>

<audio id="vocals"></audio>
<audio id="instr"></audio>

<div class="controls">
<button onclick="togglePlay()">▶︎ / ⏸</button>
<button onclick="changeVocals(-0.1)">🎤 −</button>
<button onclick="changeVocals(0.1)">🎤 +</button>

<button onclick="changeInstr(-0.1)">🎵 −</button>
<button onclick="changeInstr(0.1)">🎵 +</button>
<button onclick="toggleScroll()">⇅ Scroll</button>

<button onclick="changeScrollSpeed(-0.2)">🐢 −</button>
<button onclick="changeScrollSpeed(0.2)">🐇 +</button>
<button onclick="transpose(-1)">♭ -1</button>

<button onclick="transpose(1)">♯ +1</button>
<button onclick="changeFont(-0.1)">A−</button>
<button onclick="changeFont(0.1)">A+</button>
</div>

<script>
let parsedSong=[];
let semitoneShift=0;
let fontSize=1.45;
let scrolling=false;
let scrollTimer;
let scrollSpeed=1;

const vocals=document.getElementById('vocals');
const instr=document.getElementById('instr');
const lyrics=document.getElementById('lyrics');

const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function togglePlay(){
if(vocals.paused){
instr.currentTime=vocals.currentTime;
vocals.play();
instr.play();
}else{
vocals.pause();
instr.pause();
}
}

function changeVocals(v){
vocals.volume=Math.max(0,Math.min(1,vocals.volume+v));
}

function changeInstr(v){
instr.volume=Math.max(0,Math.min(1,instr.volume+v));
}

function toggleScroll(){
scrolling=!scrolling;
if(scrolling){
scrollTimer=setInterval(()=>window.scrollBy(0,1),80/scrollSpeed);
}else{
clearInterval(scrollTimer);
}
}

function changeScrollSpeed(v){
scrollSpeed=Math.max(.4,Math.min(4,scrollSpeed+v));
}

function changeFont(v){
fontSize=Math.max(.8,Math.min(2.6,fontSize+v));
lyrics.style.fontSize=fontSize+'rem';
}

function transpose(v){
semitoneShift+=v;
renderSong();
}

function shiftChord(chord,shift){
const m=chord.match(/^([A-G](#|b)?)(.*)$/);
if(!m) return chord;
let i=NOTES.indexOf(m[1].replace('Bb','A#'));
if(i<0) return chord;
return NOTES[(i+shift+12)%12]+m[3];
}

function loadChordFile(e){
const file=e.target.files[0];
if(!file) return;
const r=new FileReader();
r.onload=ev=>parseChordPro(ev.target.result);
r.readAsText(file);
}

function loadBundle(e){
const files=[...e.target.files];

let cho=files.find(f=>f.name.match(/\.(cho|chopro|txt)$/i));
let v=files.find(f=>f.name.toLowerCase().includes('vocals'));
let i=files.find(f=>f.name.toLowerCase().includes('instrumental'));

if(cho){
const r=new FileReader();
r.onload=ev=>parseChordPro(ev.target.result);
r.readAsText(cho);
}

if(v) vocals.src=URL.createObjectURL(v);
if(i) instr.src=URL.createObjectURL(i);

saveSongToLibrary(files);
}

function saveSongToLibrary(files){
let lib=JSON.parse(localStorage.getItem('musimix-library')||'[]');
lib.push(files.map(f=>f.name));
localStorage.setItem('musimix-library',JSON.stringify(lib));
renderLibrary();
}

function renderLibrary(){
const lib=JSON.parse(localStorage.getItem('musimix-library')||'[]');
document.getElementById('library').innerHTML=
lib.map(song=>`<div class="song-item">🎵 ${song[0]}</div>`).join('');
}

function parseChordPro(text){
const lines=text.split(/\r?\n/);
parsedSong=[];
let title='',artist='',key='',capo='';

for(let line of lines){

if(line.startsWith('{title:')){title=line.slice(7,-1).trim();continue;}
if(line.startsWith('{artist:')){artist=line.slice(8,-1).trim();continue;}
if(line.startsWith('{key:')){key=line.slice(5,-1).trim();continue;}
if(line.startsWith('{capo:')){capo=line.slice(6,-1).trim();continue;}

if(line.startsWith('{comment:')){
parsedSong.push({type:'section',text:line.replace('{comment:','').replace('}','').trim()});
continue;
}

if(line.startsWith('{')) continue;

parsedSong.push({type:'line',text:line});
}

document.getElementById('title').textContent=title||'MusiMix';
document.getElementById('meta').textContent=
[artist,key&&`Tonalité ${key}`,capo&&`Capodastre ${capo}`].filter(Boolean).join(' • ');

renderSong();
}

function renderSong(){
lyrics.innerHTML='';

parsedSong.forEach(item=>{

if(item.type==='section'){
lyrics.innerHTML+=`<h3>${item.text}</h3>`;
return;
}

let line=document.createElement('div');
line.className='line';

const regex=/\[(.*?)\]([^\[]*)/g;
let m;

while((m=regex.exec(item.text))){
let seg=document.createElement('span');
seg.className='segment';

seg.innerHTML=
`<span class="chord">${shiftChord(m[1],semitoneShift)}</span>
<span class="word">${m[2]}</span>`;

line.appendChild(seg);
}

if(line.innerHTML==='') line.textContent=item.text;

lyrics.appendChild(line);

});
}

renderLibrary();
</script>

</body>
</html>
