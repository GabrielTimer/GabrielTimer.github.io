<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MusiMix</title>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="chords.js"></script>

<style>
:root{
--bg:#111;
--panel:#181818;
--line:#2a2a2a;
--text:#fff;
--muted:#aaa;
--accent:#ffd166;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial,sans-serif;

  overscroll-behavior-y:none;
}

.lyrics{
  padding:30px;
  font-size:1.5rem;
  line-height:1.45;

  overscroll-behavior:contain;
  -webkit-overflow-scrolling:auto;
}
.topbar{
position:sticky;
top:0;
z-index:60;
display:flex;
gap:8px;
padding:10px;
background:#111;
border-bottom:1px solid #2a2a2a;
overflow:auto;
}
button{
background:#242424;
color:white;
border:none;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
white-space:nowrap
}
.layout{
display:grid;
grid-template-columns:320px 8px 1fr;
}
.sidebar{
position:sticky;
top:58px;
height:calc(100vh - 58px);
overflow-y:auto;
overflow-x:hidden;
padding:20px;
background:#0d0d0d;
border-right:1px solid #2a2a2a;
align-self:start;
}

#mixer{
position:sticky;
top:0;
z-index:40;
background:#0d0d0d;
padding-bottom:12px;
margin-bottom:12px;
}

#waveform{
display:none;
}

.main{min-height:100vh}
.header{
position:sticky;
top:58px;
z-index:45;

padding:20px;

background:rgba(17,17,17,.92);
backdrop-filter:blur(10px);

border-bottom:1px solid #2a2a2a;
}
.meta{color:#aaa;margin-top:4px}
.lyrics{padding:30px;font-size:1.5rem;line-height:1.45}
.line{margin-bottom:12px;white-space:normal;overflow-wrap:anywhere}
.segment{display:inline-block;vertical-align:top;white-space:pre}
.chord{display:block;font-size:.8em;font-weight:700;color:#ffd166;line-height:1}
.word{display:block;white-space:pre-wrap}
.section{margin:28px 0 14px;font-size:1rem;font-weight:700;color:#9a9a9a;text-transform:uppercase}
canvas{
width:100%;
height:80px;
background:#151515;
border-radius:12px;
margin-bottom:20px
}
.slider-wrap{
display:flex;
align-items:center;
gap:12px;
margin-bottom:14px
}
.slider-wrap label{
width:72px;
margin:0;
font-size:.95rem
}
.slider-wrap input[type=range]{
flex:1;
accent-color:#20b8d6
}
.track-btn{
padding:4px 8px;
border-radius:8px;
font-size:.8rem
}
.track-btn.active{
background:#20b8d6;
color:#000
}
.song-item{
padding:12px;
background:#1d1d1d;
border-radius:10px;
margin-top:12px;
font-size:.95rem;
cursor:pointer
}

#resizeHandle{
width:8px;
cursor:col-resize;
background:#171717;
border-left:1px solid #2a2a2a;
border-right:1px solid #2a2a2a;
position:relative;
transition:background .15s;
}

#resizeHandle:hover{
background:#2a2a2a;
}

#resizeHandle::after{
content:'';
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:4px;
height:44px;
border-radius:999px;
background:#3a3a3a;
}

@media(max-width:900px){
  #resizeHandle{
    display:none;
  }
}

#studio-panel{
margin-top:12px;
background:#111;
border-radius:12px;
overflow:hidden;
}

#studio-toolbar{
display:flex;
gap:10px;
align-items:center;
padding:10px;
background:#171717;
border-bottom:1px solid #2a2a2a;
flex-wrap:wrap;
}

#studioTrackSelect{
background:#242424;
color:#fff;
border:none;
padding:8px 12px;
border-radius:10px;
}

#studioTimeline{
width:100%;
height:180px;
display:block;
background:#0d0d0d;
cursor:pointer;
touch-action:none;
}

@media(max-width:900px){

  .layout{
    grid-template-columns:1fr;
  }

  /* masque la waveform sur mobile */
  #waveform{
    display:none;
  }

  .sidebar{
    position:sticky;
    top:58px;
    z-index:55;
    height:auto;
    max-height:45vh;
    overflow:auto;
    border-right:none;
    border-bottom:1px solid #2a2a2a;
  }

  #mixer{
    position:sticky;
    top:0;
    z-index:56;
    background:#0d0d0d;
  }

}


.instrument-switch{
display:flex;
gap:8px;
margin-top:12px;
margin-bottom:14px;
flex-wrap:wrap;
}
#chord-bar{
display:flex;
gap:12px;
overflow-x:auto;
padding-bottom:8px;
}
.chord-item{
position:relative;
background:#1f1f1f;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-weight:700;
color:#ffd166;
}
#chord-popup{
position:fixed;
z-index:99999;
background:#fff;
color:#111;
border-radius:12px;
padding:12px;
box-shadow:0 12px 30px rgba(0,0,0,.28);
min-width:160px;
}

#toggleMixerBtn{
  display:none;
}

#toggleHeaderBtn{
position:absolute;
top:8px;
right:12px;

width:32px;
height:32px;

padding:0;

border-radius:999px;

font-size:16px;
line-height:1;

background:#1d1d1d;
color:#fff;

z-index:60;
}

.header.collapsed{
padding-top:10px;
padding-bottom:10px;
}

.header.collapsed .meta,
.header.collapsed .instrument-switch,
.header.collapsed #chord-bar{
display:none;
}

.header.collapsed h1{
font-size:1.2rem;
margin:0;
}

@media(max-width:900px){

  #toggleMixerBtn{
    display:block;
    width:100%;
    margin-bottom:12px;
    background:#1c1c1c;
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:12px;
    font-size:15px;
  }

  #mobileMixerPanel{
    display:none;
  }

  #mobileMixerPanel.open{
    display:block;
  }
}

.active-lyric{
background:rgba(255,209,102,.18);
border-radius:8px;
transition:.2s;
}

.popup-inner{text-align:center;}
#library-panel{
margin-top:18px;
padding-top:14px;
border-top:1px solid #2a2a2a;
}

#library-search{
width:100%;
padding:10px 12px;
border-radius:10px;
border:none;
background:#1a1a1a;
color:#fff;
margin-bottom:12px;
}

.library-song{
display:flex;
align-items:center;
justify-content:space-between;
gap:8px;
padding:10px;
background:#171717;
border-radius:10px;
margin-bottom:8px;
}

.library-song-name{
flex:1;
cursor:pointer;
font-size:.92rem;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.library-actions{
display:flex;
gap:6px;
}

.icon-btn{
padding:6px 8px;
font-size:14px;
border-radius:8px;
background:#242424;
}

</style>
</head>
<body>

<div class="topbar">
<button onclick="togglePlay()">▶ / ⏸</button>
<button onclick="restartFromBeginning()">⏮ Début</button>
<button onclick="changeScrollSpeed(-0.3)">🐢</button>
<button onclick="changeScrollSpeed(0.3)">🐇</button>
<button onclick="transpose(-1)">♭</button>
<button onclick="transpose(1)">♯</button>
<button onclick="changeFont(-0.1)">A−</button>
<button onclick="changeFont(0.1)">A+</button>
<button onclick="document.getElementById('zipInput').click()">➕ Ajouter ZIP</button>
<button onclick="document.getElementById('filesInput').click()">
  📂 Ajouter fichiers
</button>

<input
  hidden
  id="filesInput"
  type="file"
  multiple
  accept=".cho,.lrc,.mp3,.wav,.flac"
  onchange="loadFiles(event)"
>
<button id="syncBtn" onclick="toggleSyncMode()">
🎯 Sync Lyrics
</button>
<button onclick="exportLrc()">
💾 Export LRC
</button>
<input hidden id="zipInput" type="file" accept=".zip" onchange="loadZip(event)">
</div>

<div class="layout">

<aside class="sidebar">

<button id="toggleMixerBtn" onclick="toggleMixerPanel()">▼ Pistes</button>

<div id="mobileMixerPanel" class="open">
  <canvas id="waveform"></canvas>
  <div id="mixer"></div>
<div id="studio-panel">
  <div id="studio-toolbar">
    <select id="studioTrackSelect"></select>
    <button onclick="toggleStudioView()">☰ Toutes les pistes</button>
    <span id="studioTime">0:00 / 0:00</span>
  </div>

  <canvas id="studioTimeline"></canvas>
</div>
</div>

<div id="library-panel">
  <input
    id="library-search"
    placeholder="🔍 Rechercher..."
    oninput="renderLibrary()"
  >
  <div id="library-list"></div>
</div>

</aside>
<div id="resizeHandle"></div>
<main class="main">
<div class="header">
<button id="toggleHeaderBtn" onclick="toggleHeaderPanel()">
  ▲
</button>
<h1 id="title">MusiMix</h1>
<div class="meta" id="meta"></div>

<div class="instrument-switch">
<button onclick="switchInstrument('guitar')">🎸 Guitare</button>
<button onclick="switchInstrument('piano')">🎹 Piano</button>
</div>

<div id="chord-bar"></div>

</div>
<div class="lyrics" id="lyrics"></div>
</main>

</div>

<script>
let parsedSong=[]
let scrollSpeed=1
let scrollTimer=null
let fontSize=1.5
let semitoneShift=0
let library=[]
let musicDB=null
let tracks={}
let waveformCache={}
let studioTrack=null
let studioShowAll=false
let studioDragging=false
let studioAnimation=null
let studioListenersInitialized=false
let soloTrackName=null
let currentSongKey=''
let lyricSyncData=[]
let syncMode=false

const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B']

function audioExt(name){
return /\.(mp3|wav|flac)$/i.test(name)
}

function getStemType(name){
const n=name.toLowerCase()
if(n.includes('(vocals)')) return '🎤 Voix'
if(n.includes('(drums)')) return '🥁 Drums'
if(n.includes('(bass)')) return '🎸 Bass'
if(n.includes('(guitar)')) return '🎸 Guitar'
if(n.includes('(piano)')) return '🎹 Piano'
if(n.includes('(other)')) return '🎵 Other'
if(n.includes('instrumental')) return '🎵 Instrumental'
return null
}

function restartFromBeginning(){

  const arr=Object.values(tracks);
  if(!arr.length) return;

  arr.forEach(a=>{
    a.pause();
    a.currentTime=0;
  });

  stopScroll();

  window.scrollTo({
    top:0,
    behavior:'smooth'
  });

  drawStudioTimeline();
  updateLyricsSync();
}


function togglePlay(){
const arr=Object.values(tracks)
if(!arr.length)return

if(arr[0].paused){
const t=arr[0].currentTime
arr.forEach(a=>{a.currentTime=t;a.play()})
if(!lyricSyncData.length){
  startScroll();
}
}else{
arr.forEach(a=>a.pause())
stopScroll()
}
}

function startScroll(){

  if(lyricSyncData.length){
    stopScroll();
    return;
  }

  stopScroll();

  scrollTimer=setInterval(
    ()=>window.scrollBy(0,1),
    80/scrollSpeed
  );
}

function stopScroll(){
clearInterval(scrollTimer)
}

function changeScrollSpeed(v){
scrollSpeed=Math.max(.3,Math.min(4,scrollSpeed+v))
if(Object.values(tracks)[0] && !Object.values(tracks)[0].paused) startScroll()
}

function changeFont(v){
fontSize=Math.max(.9,Math.min(3,fontSize+v))
document.getElementById('lyrics').style.fontSize=fontSize+'rem'
}

function transpose(v){
  semitoneShift += v
  renderSong()
}

function initLibraryDB(){
  return new Promise((resolve,reject)=>{

    const request=indexedDB.open('musimix-library',1)

    request.onupgradeneeded=e=>{
      musicDB=e.target.result
      musicDB.createObjectStore('songs',{keyPath:'name'})
    }

    request.onsuccess=e=>{
      musicDB=e.target.result
      resolve()
    }

    request.onerror=reject
  })
}

function saveSongToDB(file,favorite=false){
  return new Promise(resolve=>{
    const tx=musicDB.transaction('songs','readwrite')

    tx.objectStore('songs').put({
      name:file.name,
      file:file,
      favorite:favorite
    })

    tx.oncomplete=()=>resolve()
  })
}

async function loadZipFile(file){

currentSongKey=file.name
loadLyricSync()

const zip=await JSZip.loadAsync(file)

tracks={}
let choFile=null
let lrcFile=null

for(const name in zip.files){

if(name.endsWith('.lrc')) lrcFile=name

if(name.endsWith('.cho')) choFile=name

if(audioExt(name)){
const stem=getStemType(name)
if(stem){
const blob=await zip.files[name].async('blob')
tracks[stem]=new Audio(URL.createObjectURL(blob))
}
}
}

if(choFile){
const txt=await zip.files[choFile].async('string')
await loadChordDatabase()
parseChordPro(txt)
if(lrcFile){
  const lrcText=
    await zip.files[lrcFile].async('string');
  parseLrc(lrcText);
}
}

await buildStudioWaveforms()
initStudioTimeline()
renderMixer()
drawWaveform()
}

function getSongsFromDB(){
  return new Promise(resolve=>{
    const tx=musicDB.transaction('songs','readonly')
    const req=tx.objectStore('songs').getAll()
    req.onsuccess=()=>resolve(req.result||[])
  })
}

function deleteSong(name){

  const tx=musicDB.transaction('songs','readonly')

  const req=tx.objectStore('songs').get(name)

  req.onsuccess=()=>{

    const song=req.result
    if(!song) return

    if(song.favorite){

      const ok=confirm(
        `Supprimer "${name}" des favoris ?`
      )

      if(!ok) return
    }

    const delTx=musicDB.transaction('songs','readwrite')

    delTx.objectStore('songs').delete(name)

    delTx.oncomplete=()=>renderLibrary()

  }
}

async function toggleFavorite(name){
  const songs=await getSongsFromDB()
  const song=songs.find(s=>s.name===name)
  if(!song)return

  song.favorite=!song.favorite

  await saveSongToDB(song.file,song.favorite)
  renderLibrary()
}

async function openSongFromLibrary(name){
  const songs=await getSongsFromDB()
  const song=songs.find(s=>s.name===name)
  if(song) loadZipFile(song.file)
}

function shiftChord(chord,s){

  const flatMap={
    'A#':'Bb',
    'C#':'Db',
    'D#':'Eb',
    'F#':'Gb',
    'G#':'Ab'
  };

  const m=chord.match(/^([A-G](#|b)?)(.*)$/)
  if(!m)return chord

  let root=m[1].replace('Bb','A#')
  let i=NOTES.indexOf(root)

  if(i<0)return chord

  let shifted=NOTES[(i+s+12)%12]

  if(flatMap[shifted]) shifted=flatMap[shifted]

  return shifted+m[3]
}

async function loadZip(e){
const file=e.target.files[0]
currentSongKey=file.name
loadLyricSync()
if(!file)return
const zip=await JSZip.loadAsync(file)
currentSongKey=file.name

tracks={}
let choFile=null
let lrcFile=null

for(const name in zip.files){

if(name.endsWith('.lrc')) lrcFile=name

if(name.endsWith('.cho')) choFile=name

if(audioExt(name)){
const stem=getStemType(name)
if(stem){
const blob=await zip.files[name].async('blob')
tracks[stem]=new Audio(URL.createObjectURL(blob))
}
}
}

if(choFile){
const txt=await zip.files[choFile].async('string')
await loadChordDatabase()
parseChordPro(txt)
if(lrcFile){
  const lrcText=
    await zip.files[lrcFile].async('string');
  parseLrc(lrcText);
}
}

await buildStudioWaveforms()
initStudioTimeline()
await saveSongToDB(file)
renderLibrary()
renderMixer()
drawWaveform()
}

async function loadFiles(e){

  const files=[...e.target.files];
  if(!files.length) return;

  tracks={};

  let choFile=null;
  let lrcFile=null;

  currentSongKey=
    files[0].name.split('.')[0];

  loadLyricSync();

  for(const file of files){

    const name=file.name.toLowerCase();

    if(name.endsWith('.cho')){
      choFile=file;
    }

    else if(name.endsWith('.lrc')){
      lrcFile=file;
    }

    else if(audioExt(name)){

      const stem=getStemType(name);

      if(stem){
        tracks[stem]=new Audio(
          URL.createObjectURL(file)
        );
      }
    }
  }

  if(choFile){
    const txt=await choFile.text();

    await loadChordDatabase();
    parseChordPro(txt);
  }

  if(lrcFile){
    const lrcText=await lrcFile.text();
    parseLrc(lrcText);
  }

  await buildStudioWaveforms();
  initStudioTimeline();
  renderMixer();
  drawWaveform();
}

function getTrackCustomName(trackName){

  if(!currentSongKey) return trackName

  const key=`trackNames_${currentSongKey}`

  const saved=
    JSON.parse(localStorage.getItem(key)||'{}')

  return saved[trackName] || trackName
}

function renameTrack(trackName){

  if(!currentSongKey) return

  const current=getTrackCustomName(trackName)

  const newName=prompt(
    'Renommer la piste :',
    current
  )

  if(newName===null) return

  const key=`trackNames_${currentSongKey}`

  const saved=
    JSON.parse(localStorage.getItem(key)||'{}')

  saved[trackName]=newName.trim() || trackName

  localStorage.setItem(
    key,
    JSON.stringify(saved)
  )

  renderMixer()
  drawStudioTimeline()
  initStudioTimeline()
}

function toggleSyncMode(){

  syncMode=!syncMode

  document.getElementById('syncBtn').textContent=
    syncMode
      ? '🔴 Sync en cours'
      : '🎯 Sync Lyrics'

  if(syncMode){
    lyricSyncData=[]
  }else{
    saveLyricSync()
  }
}

function markCurrentLyric(){

  if(!syncMode) return

  const first=Object.values(tracks)[0]
  if(!first) return

  const lines=[
    ...document.querySelectorAll('.lyrics-line')
  ]

  const nextIndex=lyricSyncData.length

  if(!lines[nextIndex]) return

  lyricSyncData.push({
    time:first.currentTime,
    line:nextIndex
  })

  saveLyricSync()
}

function saveLyricSync(){

  if(!currentSongKey) return

  localStorage.setItem(
    'lyricsSync_'+currentSongKey,
    JSON.stringify(lyricSyncData)
  )
}

function loadLyricSync(){

  if(!currentSongKey) return

  lyricSyncData=
    JSON.parse(
      localStorage.getItem(
        'lyricsSync_'+currentSongKey
      ) || '[]'
    )
}

function updateLyricsSync(){

  if(!lyricSyncData.length) return;

document.getElementById('studioTime').textContent =
  'LRC ' + lyricSyncData.length;

  const first=Object.values(tracks)[0];
  if(!first) return;

  if(!first.paused){
    stopScroll();
  }

  const t=first.currentTime

  let activeLine=0

  lyricSyncData.forEach(item=>{
    if(t>=item.time){
      activeLine=item.line
    }
  })

  const lines=[
    ...document.querySelectorAll('.lyrics-line')
  ]

  lines.forEach(l=>{
    l.classList.remove('active-lyric')
  })

if(lines[activeLine]){

  const current = lyricSyncData.find(
    x => x.line === activeLine
  );

  const next = lyricSyncData.find(
    x => x.line === activeLine + 1
  );

  let progress = 0;

  if(current && next){

    progress =
      (t - current.time) /
      (next.time - current.time);

    progress=Math.max(
      0,
      Math.min(1,progress)
    );

progress =
  progress * progress * (3 - 2 * progress);
  }

  const currentEl=lines[activeLine];

  const nextEl=
    lines[activeLine+1] || currentEl;

  const y1=currentEl.offsetTop;
  const y2=nextEl.offsetTop;

  const targetY=
    y1 + ((y2-y1)*progress);

if(window.innerWidth <= 900){

  const offset = 140;

  window.scrollTo({
    top: targetY - offset,
    behavior:'instant'
  });

}
else{

  window.scrollTo({
    top:
      targetY - window.innerHeight*0.35,
    behavior:'auto'
  });

}
  currentEl.classList.add('active-lyric');
}
}

function parseLrc(text){

  const lines=text.split(/\r?\n/);

  lyricSyncData=[];

  lines.forEach(line=>{

    const match=line.match(
      /^\[(\d+):(\d+\.\d+)\](.*)$/
    );

    if(!match) return;

    const min=parseInt(match[1]);
    const sec=parseFloat(match[2]);

    const time=(min*60)+sec;

    const lyric=match[3].trim();

    const lyricLines=[
      ...document.querySelectorAll('.lyrics-line')
    ];

    const index=lyricLines.findIndex(
      el=>el.innerText.trim()===lyric
    );

    if(index>=0){
      lyricSyncData.push({
        time,
        line:index
      });
    }

  });

alert('LRC chargé : ' + lyricSyncData.length);
  saveLyricSync();
}

function exportLrc(){

  if(!lyricSyncData.length){
    alert('Aucune sync à exporter');
    return;
  }

  const lyricLines=[
    ...document.querySelectorAll('.lyrics-line')
  ];

  let lrc='';

  lyricSyncData.forEach(item=>{

    const line=
      lyricLines[item.line]
      ?.innerText
      ?.trim();

    if(!line) return;

    const min=Math.floor(item.time/60);
    const sec=(item.time%60)
      .toFixed(2)
      .padStart(5,'0');

    lrc+=`[${
      String(min).padStart(2,'0')
    }:${sec}]${line}\n`;
  });

  const blob=new Blob(
    [lrc],
    {type:'text/plain'}
  );

  const a=document.createElement('a');

  a.href=URL.createObjectURL(blob);

  a.download=
    currentSongKey
      .replace('.zip','')
      +'.lrc';

  a.click();
}

function renderMixer(){
const mixer=document.getElementById('mixer')
mixer.innerHTML=''

Object.entries(tracks).forEach(([name,audio])=>{

const row=document.createElement('div')
row.className='slider-wrap'

row.innerHTML=`
<label
  ondblclick="renameTrack('${name}')"
  title="Double clic pour renommer"
>
${getTrackCustomName(name)}
</label>
<input type="range" min="0" max="1" step="0.01" value="${audio.volume||1}">
<button class="track-btn">S</button>
<button class="track-btn">M</button>
`

const slider=row.querySelector('input')
slider.oninput=()=>audio.volume=slider.value

const [soloBtn,muteBtn]=row.querySelectorAll('button')

soloBtn.onclick=()=>{
soloTrackName=(soloTrackName===name)?null:name
Object.entries(tracks).forEach(([n,a])=>{
a.muted=soloTrackName ? n!==soloTrackName : false
})
renderMixer()
}

muteBtn.onclick=()=>{
audio.muted=!audio.muted
muteBtn.classList.toggle('active',audio.muted)
}

if(soloTrackName===name) soloBtn.classList.add('active')
if(audio.muted) muteBtn.classList.add('active')

mixer.appendChild(row)
})
}


function parseChordPro(text){
parsedSong=[]
let title='',artist='',key='',capo=''

text.split(/\r?\n/).forEach(line=>{

if(line.startsWith('{title:')){title=line.slice(7,-1).trim();return}
if(line.startsWith('{artist:')){artist=line.slice(8,-1).trim();return}
if(line.startsWith('{key:')){key=line.slice(5,-1).trim();return}
if(line.startsWith('{capo:')){capo=line.slice(6,-1).trim();return}

if(line.startsWith('{comment:')){
parsedSong.push({type:'section',text:line.replace('{comment:','').replace('}','').trim()})
return
}

if(line.startsWith('{')) return
parsedSong.push({type:'line',text:line})
})

document.getElementById('title').textContent=title||'MusiMix'
document.getElementById('meta').textContent=
[artist,key&&'Tonalité '+key,capo&&'Capodastre '+capo].filter(Boolean).join(' • ')

window.currentChords = extractChordsFromCho(text)
renderChordBar(window.currentChords)

renderSong()
}

function renderSong(){
const lyrics=document.getElementById('lyrics')
lyrics.innerHTML=''

parsedSong.forEach(item=>{

if(item.type==='section'){
lyrics.innerHTML+=`<div class="section">${item.text}</div>`
return
}

const line=document.createElement('div')
line.className='line lyrics-line'
const parts=item.text.split(/(\[.*?\])/g)

parts.forEach(part=>{

if(!part)return

if(part.startsWith('[')&&part.endsWith(']')){
const chord=part.slice(1,-1)

line.innerHTML+=`
<span class="segment">
<span class="chord">${shiftChord(chord,semitoneShift)}</span>
<span class="word">&nbsp;</span>
</span>`
}else{
line.innerHTML+=`
<span class="segment">
<span class="chord">&nbsp;</span>
<span class="word">${part}</span>
</span>`
}
})

lyrics.appendChild(line)
})
}

function drawWaveform(){

  const c=document.getElementById('waveform')
  const ctx=c.getContext('2d')

  c.width=800
  c.height=80

  ctx.clearRect(0,0,c.width,c.height)

  ctx.strokeStyle='#2d7cff'
  ctx.lineWidth=2

  for(let x=0;x<c.width;x+=3){

    const center=40

    const h=
      8+
      Math.sin(x*0.02)*10+
      Math.random()*18

    ctx.beginPath()
    ctx.moveTo(x,center-h)
    ctx.lineTo(x,center+h)
    ctx.stroke()
  }
}

async function renderLibrary(){

const list=document.getElementById('library-list')
if(!list)return

let songs=await getSongsFromDB()

const q=document
.getElementById('library-search')
.value
.toLowerCase()

if(q){
songs=songs.filter(s=>

)

songs.sort((a,b)=>{

if(a.favorite && !b.favorite) return -1
if(!a.favorite && b.favorite) return 1

return a.name.localeCompare(

const STUDIO_COLORS={
  '🎤 Voix':'#ffd166',
  '🥁 Drums':'#ef476f',
  '🎸 Bass':'#06d6a0',
  '🎸 Guitar':'#118ab2',
  '🎹 Piano':'#9b5de5',
  '🎵 Other':'#8d99ae',
  '🎵 Instrumental':'#8d99ae'
};

async function buildStudioWaveforms(){

  waveformCache={};

  const audioContext=new (
    window.AudioContext||
    window.webkitAudioContext
  )();

  for(const [name,audio] of Object.entries(tracks)){

    try{

      const response=await fetch(audio.src);
      const arrayBuffer=await response.arrayBuffer();
      const decoded=await audioContext.decodeAudioData(arrayBuffer);

      const raw=decoded.getChannelData(0);

      const samples=1200;
      const block=Math.floor(raw.length/samples);

      const peaks=[];

      for(let i=0;i<samples;i++){

        let sum=0;

        for(let j=0;j<block;j++){
          sum+=Math.abs(raw[(i*block)+j]||0);
        }

        peaks.push(sum/block);
      }

      waveformCache[name]=peaks;

    }catch(err){
      console.warn('Waveform error:',name,err);
    }
  }

  studioTrack=
    tracks['🎤 Voix']
    ? '🎤 Voix'
    : Object.keys(tracks)[0];

}

function initStudioTimeline(){

  const canvas=document.getElementById('studioTimeline');
  const select=document.getElementById('studioTrackSelect');

  if(!canvas || !select) return;

  select.innerHTML='';

  Object.keys(tracks).forEach(name=>{

    const option=document.createElement('option');
    option.value=name;
    option.textContent=name;

    if(name===studioTrack){
      option.selected=true;
    }

    select.appendChild(option);
  });

  select.onchange=e=>{
    studioTrack=e.target.value;
    drawStudioTimeline();
  };

  if(!studioListenersInitialized){

    canvas.addEventListener('click',e=>{
      studioSeek(e);
    });

    canvas.addEventListener('pointerdown',()=>{
      studioDragging=true;
    });

    canvas.addEventListener('pointermove',e=>{
      if(studioDragging){
        studioSeek(e);
      }
    });

    window.addEventListener('pointerup',()=>{
      studioDragging=false;
    });

    studioListenersInitialized=true;
  }

  startStudioAnimation();
}

function toggleStudioView(){
  studioShowAll=!studioShowAll;
  drawStudioTimeline();
}

function studioSeek(e){

  const canvas=document.getElementById('studioTimeline');
  const rect=canvas.getBoundingClientRect();

  const x=e.clientX-rect.left;
  const ratio=x/canvas.width;

  const first=Object.values(tracks)[0];
  if(!first || !first.duration) return;

  const time=ratio*first.duration;

  Object.values(tracks).forEach(a=>{
    a.currentTime=time;
    a.play();
  });

if(!lyricSyncData.length){
    startScroll();
  }

}

function startStudioAnimation(){

  cancelAnimationFrame(studioAnimation);

  function animate(){

    drawStudioTimeline();
    updateLyricsSync();

    studioAnimation=requestAnimationFrame(animate);
  }

  animate();
}

function drawStudioTimeline(){

  const canvas=document.getElementById('studioTimeline');
  if(!canvas) return;

  const ctx=canvas.getContext('2d');

  const isMobile=window.innerWidth<900;

  const visibleTracks=studioShowAll
    ? Object.keys(waveformCache)
    : [studioTrack];

  const trackHeight=isMobile?90:52;

  canvas.width=canvas.clientWidth;
  canvas.height=Math.max(
    120,
    visibleTracks.length*trackHeight
  );

  ctx.clearRect(0,0,canvas.width,canvas.height);

  visibleTracks.forEach((name,index)=>{

    const data=waveformCache[name];
    if(!data) return;

    const y=index*trackHeight;
    const mid=y+trackHeight/2;

    ctx.strokeStyle=
      STUDIO_COLORS[name] || '#999';

    ctx.lineWidth=1;

    data.forEach((v,i)=>{

      const x=(i/data.length)*canvas.width;
      const h=v*(trackHeight*0.85);

      ctx.beginPath();
      ctx.moveTo(x,mid-h/2);
      ctx.lineTo(x,mid+h/2);
      ctx.stroke();
    });

    ctx.fillStyle='#fff';
    ctx.font='12px Arial';
    ctx.fillText(
  getTrackCustomName(name),
  8,
  y+14
);
  });

  const first=Object.values(tracks)[0];

  if(first && first.duration){

    const ratio=first.currentTime/first.duration;
    const x=ratio*canvas.width;

    ctx.strokeStyle='#ffffff';
    ctx.lineWidth=2;

    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();

    document.getElementById('studioTime').textContent=
      formatTime(first.currentTime)
      +' / '+
      formatTime(first.duration);
  }
}

function formatTime(sec){

  if(!sec) return '0:00';

  const m=Math.floor(sec/60);
  const s=Math.floor(sec%60);

  return m+':'+String(s).padStart(2,'0');
}

let isResizing=false;

function initResizableLayout(){

  if(window.innerWidth<900) return;

  const layout=document.querySelector('.layout');
  const handle=document.getElementById('resizeHandle');

  if(!layout || !handle) return;

  const saved=
    localStorage.getItem('musimixSidebarWidth');

  if(saved){
    layout.style.gridTemplateColumns=
      `${saved}px 8px 1fr`;
  }

  handle.addEventListener('pointerdown',()=>{
    isResizing=true;
    document.body.style.cursor='col-resize';
  });

  window.addEventListener('pointermove',e=>{

    if(!isResizing) return;

    const min=220;
    const max=window.innerWidth*0.65;

    let leftWidth=e.clientX;

    leftWidth=Math.max(min,leftWidth);
    leftWidth=Math.min(max,leftWidth);

    layout.style.gridTemplateColumns=
      `${leftWidth}px 8px 1fr`;

    localStorage.setItem(
      'musimixSidebarWidth',
      leftWidth
    );

    drawStudioTimeline();
  });

  window.addEventListener('pointerup',()=>{
    isResizing=false;
    document.body.style.cursor='';
  });
}

function toggleHeaderPanel(){

  const header=document.querySelector('.header');
  const btn=document.getElementById('toggleHeaderBtn');

  if(!header) return;

  header.classList.toggle('collapsed');

  const collapsed=
    header.classList.contains('collapsed');

  btn.textContent=
    collapsed ? '▼' : '▲';

  localStorage.setItem(
    'musimixHeaderCollapsed',
    collapsed ? '1' : '0'
  );
}
