<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MusiMix</title>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>
:root{
--bg:#111;
--panel:#181818;
--line:#2a2a2a;
--text:#fff;
--muted:#aaa;
--accent:#ffd166;
}

*{box-sizing:border-box}
body{
margin:0;
background:var(--bg);
color:white;
font-family:Arial;
}

.topbar{
position:sticky;
top:0;
z-index:50;
display:flex;
gap:8px;
padding:10px;
background:#111;
border-bottom:1px solid #333;
overflow:auto;
}

button{
background:#242424;
color:white;
border:none;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
}

.layout{
display:grid;
grid-template-columns:280px 1fr;
}

.sidebar{
position:sticky;
top:58px;
height:calc(100vh - 58px);
overflow:auto;
padding:20px;
background:#0e0e0e;
border-right:1px solid #2a2a2a;
}

.main{
min-height:100vh;
}

.header{
padding:20px;
border-bottom:1px solid #2a2a2a;
}

.meta{color:#aaa}

.lyrics{
padding:30px;
font-size:1.5rem;
line-height:1.45;
}

.line{margin-bottom:12px}
.segment{
display:inline-block;
vertical-align:top;
white-space:pre;
}
.chord{
display:block;
color:#ffd166;
font-weight:700;
font-size:.8em;
}
.word{
display:block;
white-space:pre;
}

.section{
margin:30px 0 12px;
font-weight:700;
color:#999;
text-transform:uppercase;
}

.song-item{
padding:10px;
background:#1d1d1d;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

canvas{
width:100%;
height:80px;
background:#141414;
border-radius:10px;
margin-bottom:18px;
}

@media(max-width:900px){
.layout{grid-template-columns:1fr}
.sidebar{
position:relative;
height:auto;
top:0;
}
}
</style>
</head>
<body>

<div class="topbar">
<button onclick="togglePlay()">▶︎ / ⏸</button>
<button onclick="changeScrollSpeed(-0.3)">🐢</button>
<button onclick="changeScrollSpeed(0.3)">🐇</button>
<button onclick="transpose(-1)">♭</button>
<button onclick="transpose(1)">♯</button>
<button onclick="changeFont(-0.1)">A−</button>
<button onclick="changeFont(0.1)">A+</button>
<button onclick="document.getElementById('zipInput').click()">➕ Ajouter ZIP</button>
<input hidden id="zipInput" type="file" accept=".zip" onchange="loadZip(event)">
</div>

<div class="layout">

<aside class="sidebar">

<canvas id="waveform"></canvas>

<label>🎤 Voix</label>
<input type="range" min="0" max="1" step="0.01" value="1"
oninput="vocals.volume=this.value">

<br><br>

<label>🎵 Instrumental</label>
<input type="range" min="0" max="1" step="0.01" value="1"
oninput="instr.volume=this.value">

<div id="library"></div>

</aside>

<main class="main">

<div class="header">
<h1 id="title">MusiMix</h1>
<div id="meta" class="meta"></div>
</div>

<div id="lyrics" class="lyrics"></div>

</main>
</div>

<audio id="vocals"></audio>
<audio id="instr"></audio>

<script>
const vocals=document.getElementById('vocals');
const instr=document.getElementById('instr');

let parsedSong=[];
let library=[];
let scrollSpeed=1;
let scrollTimer=null;
let scrolling=false;
let fontSize=1.5;
let semitoneShift=0;
let currentSong=null;

const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function togglePlay(){

if(vocals.paused){

instr.currentTime=vocals.currentTime;

vocals.play();
instr.play();

startScroll();

}else{

vocals.pause();
instr.pause();

stopScroll();
}
}

function startScroll(){
stopScroll();
scrolling=true;
scrollTimer=setInterval(()=>{
window.scrollBy(0,1);
},80/scrollSpeed);
}

function stopScroll(){
scrolling=false;
clearInterval(scrollTimer);
}

function changeScrollSpeed(v){
scrollSpeed=Math.max(.3,Math.min(4,scrollSpeed+v));

if(scrolling){
startScroll();
}
}

function changeFont(v){
fontSize=Math.max(.8,Math.min(3,fontSize+v));
document.getElementById('lyrics').style.fontSize=fontSize+'rem';
}

function transpose(v){
semitoneShift+=v;
renderSong();
}

function shiftChord(chord,s){
const m=chord.match(/^([A-G](#|b)?)(.*)$/);
if(!m)return chord;

let i=NOTES.indexOf(m[1].replace('Bb','A#'));
if(i<0)return chord;

return NOTES[(i+s+12)%12]+m[3];
}

async function loadZip(e){

const file=e.target.files[0];
if(!file)return;

const zip=await JSZip.loadAsync(file);

let choFile=null;
let vocalsFile=null;
let instrFile=null;

for(const name in zip.files){

if(name.endsWith('.cho')) choFile=name;
if(name.toLowerCase().includes('vocals')) vocalsFile=name;
if(name.toLowerCase().includes('instrumental')) instrFile=name;
}

if(choFile){
const txt=await zip.files[choFile].async('string');
parseChordPro(txt);
}

if(vocalsFile){
const blob=await zip.files[vocalsFile].async('blob');
vocals.src=URL.createObjectURL(blob);
}

if(instrFile){
const blob=await zip.files[instrFile].async('blob');
instr.src=URL.createObjectURL(blob);
}

library.push({
name:file.name,
zip:file
});

saveLibrary();
renderLibrary();
drawWaveform();
}

function saveLibrary(){
localStorage.setItem(
'musimix-library',
JSON.stringify(
library.map(s=>s.name)
)
);
}

function renderLibrary(){

document.getElementById('library').innerHTML=
library.map((song,i)=>
`<div class="song-item">${song.name}</div>`
).join('');
}

function parseChordPro(text){

parsedSong=[];

let title='',artist='',key='',capo='';

text.split(/\r?\n/).forEach(line=>{

if(line.startsWith('{title:')){
title=line.slice(7,-1).trim();return;
}

if(line.startsWith('{artist:')){
artist=line.slice(8,-1).trim();return;
}

if(line.startsWith('{key:')){
key=line.slice(5,-1).trim();return;
}

if(line.startsWith('{capo:')){
capo=line.slice(6,-1).trim();return;
}

if(line.startsWith('{comment:')){
parsedSong.push({
type:'section',
text:line.replace('{comment:','').replace('}','').trim()
});
return;
}

if(line.startsWith('{')) return;

parsedSong.push({
type:'line',
text:line
});

});

document.getElementById('title').textContent=title;
document.getElementById('meta').textContent=
[artist,key&&'Tonalité '+key,capo&&'Capodastre '+capo]
.filter(Boolean)
.join(' • ');

renderSong();
}

function renderSong(){

const lyrics=document.getElementById('lyrics');
lyrics.innerHTML='';

parsedSong.forEach(item=>{

if(item.type==='section'){
lyrics.innerHTML+=
'<div class="section">'+item.text+'</div>';
return;
}

let line=document.createElement('div');
line.className='line';

const regex=/\[(.*?)\]([^\[]*)/g;
let m;

while((m=regex.exec(item.text))!==null){

let chord=shiftChord(m[1],semitoneShift);

line.innerHTML+=
'<span class="segment">'+
'<span class="chord">'+chord+'</span>'+
'<span class="word">'+m[2]+'</span>'+
'</span>';
}

lyrics.appendChild(line);
});
}

function drawWaveform(){

const c=document.getElementById('waveform');
const ctx=c.getContext('2d');

c.width=800;
c.height=80;

ctx.clearRect(0,0,c.width,c.height);

ctx.strokeStyle='#4a90e2';
ctx.lineWidth=1;

ctx.beginPath();

for(let x=0;x<c.width;x+=3){
let h=Math.random()*60;
ctx.moveTo(x,40-h/2);
ctx.lineTo(x,40+h/2);
}

ctx.stroke();
}
</script>
</body>
</html>
