<script>
let parsedSong=[]
let scrollSpeed=1
let scrollTimer=null
let fontSize=1.5
let semitoneShift=0
let library=[]
let musicDB=null
let tracks={}
let waveformCache={}
let studioTrack=null
let studioShowAll=false
let studioDragging=false
let studioAnimation=null
let studioListenersInitialized=false
let soloTrackName=null
let currentSongKey=''
let lyricSyncData=[]
let syncMode=false

const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B']

function audioExt(name){
return /\.(mp3|wav|flac)$/i.test(name)
}

function getStemType(name){
const n=name.toLowerCase()
if(n.includes('(vocals)')) return '🎤 Voix'
if(n.includes('(drums)')) return '🥁 Drums'
if(n.includes('(bass)')) return '🎸 Bass'
if(n.includes('(guitar)')) return '🎸 Guitar'
if(n.includes('(piano)')) return '🎹 Piano'
if(n.includes('(other)')) return '🎵 Other'
if(n.includes('instrumental')) return '🎵 Instrumental'
return null
}

function restartFromBeginning(){

  const arr=Object.values(tracks);
  if(!arr.length) return;

  arr.forEach(a=>{
    a.pause();
    a.currentTime=0;
  });

  stopScroll();

  window.scrollTo({
    top:0,
    behavior:'smooth'
  });

  drawStudioTimeline();
  updateLyricsSync();
}


function togglePlay(){
const arr=Object.values(tracks)
if(!arr.length)return

if(arr[0].paused){
const t=arr[0].currentTime
arr.forEach(a=>{a.currentTime=t;a.play()})
if(!lyricSyncData.length){
  startScroll();
}
}else{
arr.forEach(a=>a.pause())
stopScroll()
}
}

function startScroll(){

  if(lyricSyncData.length){
    stopScroll();
    return;
  }

  stopScroll();

  scrollTimer=setInterval(
    ()=>window.scrollBy(0,1),
    80/scrollSpeed
  );
}

function stopScroll(){
clearInterval(scrollTimer)
}

function changeScrollSpeed(v){
scrollSpeed=Math.max(.3,Math.min(4,scrollSpeed+v))
if(Object.values(tracks)[0] && !Object.values(tracks)[0].paused) startScroll()
}

function changeFont(v){
fontSize=Math.max(.9,Math.min(3,fontSize+v))
document.getElementById('lyrics').style.fontSize=fontSize+'rem'
}

function transpose(v){
  semitoneShift += v
  renderSong()
}

function initLibraryDB(){
  return new Promise((resolve,reject)=>{

    const request=indexedDB.open('musimix-library',1)

    request.onupgradeneeded=e=>{
      musicDB=e.target.result
      musicDB.createObjectStore('songs',{keyPath:'name'})
    }

    request.onsuccess=e=>{
      musicDB=e.target.result
      resolve()
    }

    request.onerror=reject
  })
}

function saveSongToDB(file,favorite=false){
  return new Promise(resolve=>{
    const tx=musicDB.transaction('songs','readwrite')

    tx.objectStore('songs').put({
      name:file.name,
      file:file,
      favorite:favorite
    })

    tx.oncomplete=()=>resolve()
  })
}

async function loadZipFile(file){

currentSongKey=file.name
loadLyricSync()

const zip=await JSZip.loadAsync(file)

tracks={}
let choFile=null
let lrcFile=null

for(const name in zip.files){

if(name.endsWith('.lrc')) lrcFile=name

if(name.endsWith('.cho')) choFile=name

if(audioExt(name)){
const stem=getStemType(name)
if(stem){
const blob=await zip.files[name].async('blob')
tracks[stem]=new Audio(URL.createObjectURL(blob))
}
}
}

if(choFile){
const txt=await zip.files[choFile].async('string')
await loadChordDatabase()
parseChordPro(txt)
if(lrcFile){
  const lrcText=
    await zip.files[lrcFile].async('string');

  parseLrc(lrcText);
}
}

await buildStudioWaveforms()
initStudioTimeline()
renderMixer()
drawWaveform()
}

function getSongsFromDB(){
  return new Promise(resolve=>{
    const tx=musicDB.transaction('songs','readonly')
    const req=tx.objectStore('songs').getAll()
    req.onsuccess=()=>resolve(req.result||[])
  })
}

function deleteSong(name){

  const tx=musicDB.transaction('songs','readonly')

  const req=tx.objectStore('songs').get(name)

  req.onsuccess=()=>{

    const song=req.result
    if(!song) return

    if(song.favorite){

      const ok=confirm(
        `Supprimer "${name}" des favoris ?`
      )

      if(!ok) return
    }

    const delTx=musicDB.transaction('songs','readwrite')

    delTx.objectStore('songs').delete(name)

    delTx.oncomplete=()=>renderLibrary()

  }
}

async function toggleFavorite(name){
  const songs=await getSongsFromDB()
  const song=songs.find(s=>s.name===name)
  if(!song)return

  song.favorite=!song.favorite

  await saveSongToDB(song.file,song.favorite)
  renderLibrary()
}

async function openSongFromLibrary(name){
  const songs=await getSongsFromDB()
  const song=songs.find(s=>s.name===name)
  if(song) loadZipFile(song.file)
}

function shiftChord(chord,s){

  const flatMap={
    'A#':'Bb',
    'C#':'Db',
    'D#':'Eb',
    'F#':'Gb',
    'G#':'Ab'
  };

  const m=chord.match(/^([A-G](#|b)?)(.*)$/)
  if(!m)return chord

  let root=m[1].replace('Bb','A#')
  let i=NOTES.indexOf(root)

  if(i<0)return chord

  let shifted=NOTES[(i+s+12)%12]

  if(flatMap[shifted]) shifted=flatMap[shifted]

  return shifted+m[3]
}

async function loadZip(e){
const file=e.target.files[0]
currentSongKey=file.name
loadLyricSync()
if(!file)return
const zip=await JSZip.loadAsync(file)
currentSongKey=file.name

tracks={}
let choFile=null
let lrcFile=null

for(const name in zip.files){

if(name.endsWith('.lrc')) lrcFile=name


if(name.endsWith('.cho')) choFile=name

if(audioExt(name)){
const stem=getStemType(name)
if(stem){
const blob=await zip.files[name].async('blob')
tracks[stem]=new Audio(URL.createObjectURL(blob))
}
}
}

if(choFile){
const txt=await zip.files[choFile].async('string')
await loadChordDatabase()
parseChordPro(txt)
if(lrcFile){
  const lrcText=
    await zip.files[lrcFile].async('string');

  parseLrc(lrcText);
}
}

await buildStudioWaveforms()
initStudioTimeline()
await saveSongToDB(file)
renderLibrary()
renderMixer()
drawWaveform()
}

async function loadFiles(e){

  const files=[...e.target.files];
  if(!files.length) return;

  tracks={};

  let choFile=null;
  let lrcFile=null;

  currentSongKey=
    files[0].name.split('.')[0];

  loadLyricSync();

  for(const file of files){

    const name=file.name.toLowerCase();

    if(name.endsWith('.cho')){
      choFile=file;
    }

    else if(name.endsWith('.lrc')){
      lrcFile=file;
    }

    else if(audioExt(name)){

      const stem=getStemType(name);

      if(stem){
        tracks[stem]=new Audio(
          URL.createObjectURL(file)
        );
      }
    }
  }

  if(choFile){
    const txt=await choFile.text();

    await loadChordDatabase();
    parseChordPro(txt);
  }

  if(lrcFile){
    const lrcText=await lrcFile.text();
    parseLrc(lrcText);
  }

  await buildStudioWaveforms();
  initStudioTimeline();
  renderMixer();
  drawWaveform();
}

function getTrackCustomName(trackName){

  if(!currentSongKey) return trackName

  const key=`trackNames_${currentSongKey}`

  const saved=
    JSON.parse(localStorage.getItem(key)||'{}')

  return saved[trackName] || trackName
}

function renameTrack(trackName){

  if(!currentSongKey) return

  const current=getTrackCustomName(trackName)

  const newName=prompt(
    'Renommer la piste :',
    current
  )

  if(newName===null) return

  const key=`trackNames_${currentSongKey}`

  const saved=
    JSON.parse(localStorage.getItem(key)||'{}')

  saved[trackName]=newName.trim() || trackName

  localStorage.setItem(
    key,
    JSON.stringify(saved)
  )

  renderMixer()
  drawStudioTimeline()
  initStudioTimeline()
}

function toggleSyncMode(){

  syncMode=!syncMode

  document.getElementById('syncBtn').textContent=
    syncMode
      ? '🔴 Sync en cours'
      : '🎯 Sync Lyrics'

  if(syncMode){
    lyricSyncData=[]
  }else{
    saveLyricSync()
  }
}

function markCurrentLyric(){

  if(!syncMode) return

  const first=Object.values(tracks)[0]
  if(!first) return

  const lines=[
    ...document.querySelectorAll('.lyrics-line')
  ]

  const nextIndex=lyricSyncData.length

  if(!lines[nextIndex]) return

  lyricSyncData.push({
    time:first.currentTime,
    line:nextIndex
  })

  saveLyricSync()
}

function saveLyricSync(){

  if(!currentSongKey) return

  localStorage.setItem(
    'lyricsSync_'+currentSongKey,
    JSON.stringify(lyricSyncData)
  )
}

function loadLyricSync(){

  if(!currentSongKey) return

  lyricSyncData=
    JSON.parse(
      localStorage.getItem(
        'lyricsSync_'+currentSongKey
      ) || '[]'
    )
}

function updateLyricsSync(){

  if(!lyricSyncData.length) return;

document.getElementById('studioTime').textContent =
  'LRC ' + lyricSyncData.length;

  const first=Object.values(tracks)[0];
  if(!first) return;

  if(!first.paused){
    stopScroll();
  }

  const t=first.currentTime

  let activeLine=0

  lyricSyncData.forEach(item=>{
    if(t>=item.time){
      activeLine=item.line
    }
  })

  const lines=[
    ...document.querySelectorAll('.lyrics-line')
  ]

  lines.forEach(l=>{
    l.classList.remove('active-lyric')
  })

if(lines[activeLine]){

  const current = lyricSyncData.find(
    x => x.line === activeLine
  );

  const next = lyricSyncData.find(
    x => x.line === activeLine + 1
  );

  let progress = 0;

  if(current && next){

    progress =
      (t - current.time) /
      (next.time - current.time);

    progress=Math.max(
      0,
      Math.min(1,progress)
    );

progress =
  progress * progress * (3 - 2 * progress);
  }

  const currentEl=lines[activeLine];

  const nextEl=
    lines[activeLine+1] || currentEl;

  const y1=currentEl.offsetTop;
  const y2=nextEl.offsetTop;

  const targetY=
    y1 + ((y2-y1)*progress);

if(window.innerWidth <= 900){

  const offset = 220;

  window.scrollTo({
    top: targetY - offset,
    behavior:'instant'
  });

}
else{

  window.scrollTo({
    top:
      targetY - window.innerHeight*0.35,
    behavior:'auto'
  });

}
  currentEl.classList.add('active-lyric');
}
}

function parseLrc(text){

  const lines=text.split(/\r?\n/);

  lyricSyncData=[];
let lastIndex = -1;
  lines.forEach(line=>{

    const match=line.match(
      /^\[(\d+):(\d+\.\d+)\](.*)$/
    );

    if(!match) return;

    const min=parseInt(match[1]);
    const sec=parseFloat(match[2]);

    const time=(min*60)+sec;

const lyric = match[3]
  .replace(/\u00A0/g,' ')
  .replace(/\s+/g,' ')
  .trim();

if(!lyric){
  lyricSyncData.push({
    time,
    line:0
  });
  return;
}

const lyricLines=[
  ...document.querySelectorAll('.lyrics-line')
];

const normalize = s =>
  s
    .replace(/\u00A0/g,' ')
    .replace(/\s+/g,' ')
    .trim();

const target = normalize(lyric);

const index = lyricLines.findIndex(
  (el,i) =>
    i > lastIndex &&
    normalize(el.innerText).includes(target)
);

    if(index>=0){
lastIndex = index;
      lyricSyncData.push({
        time,
        line:index
      });
    }

  });
console.log('LRC brut :', lines.length);
console.log('LRC matché :', lyricSyncData.length);
alert('LRC chargé : ' + lyricSyncData.length);
  saveLyricSync();
}

function exportLrc(){

  if(!lyricSyncData.length){
    alert('Aucune sync à exporter');
    return;
  }

  const lyricLines=[
    ...document.querySelectorAll('.lyrics-line')
  ];

  let lrc='';

  lyricSyncData.forEach(item=>{

    const line=
      lyricLines[item.line]
      ?.innerText
      ?.trim();

    if(!line) return;

    const min=Math.floor(item.time/60);
    const sec=(item.time%60)
      .toFixed(2)
      .padStart(5,'0');

    lrc+=`[${
      String(min).padStart(2,'0')
    }:${sec}]${line}\n`;
  });

  const blob=new Blob(
    [lrc],
    {type:'text/plain'}
  );

  const a=document.createElement('a');

  a.href=URL.createObjectURL(blob);

  a.download=
    currentSongKey
      .replace('.zip','')
      +'.lrc';

  a.click();
}

function renderMixer(){
const mixer=document.getElementById('mixer')
mixer.innerHTML=''

Object.entries(tracks).forEach(([name,audio])=>{

const row=document.createElement('div')
row.className='slider-wrap'

row.innerHTML=`
<label
  ondblclick="renameTrack('${name}')"
  title="Double clic pour renommer"
>
${getTrackCustomName(name)}
</label>
<input type="range" min="0" max="1" step="0.01" value="${audio.volume||1}">
<button class="track-btn">S</button>
<button class="track-btn">M</button>
`

const slider=row.querySelector('input')
slider.oninput=()=>audio.volume=slider.value

const [soloBtn,muteBtn]=row.querySelectorAll('button')

soloBtn.onclick=()=>{
soloTrackName=(soloTrackName===name)?null:name
Object.entries(tracks).forEach(([n,a])=>{
a.muted=soloTrackName ? n!==soloTrackName : false
})
renderMixer()
}

muteBtn.onclick=()=>{
audio.muted=!audio.muted
muteBtn.classList.toggle('active',audio.muted)
}

if(soloTrackName===name) soloBtn.classList.add('active')
if(audio.muted) muteBtn.classList.add('active')

mixer.appendChild(row)
})

if(window.innerWidth <= 900){

  const mobileMixer =
    document.getElementById(
      'header-mixer-mobile'
    );

  if(mobileMixer){
    mobileMixer.innerHTML = '';
    mobileMixer.appendChild(
      mixer.cloneNode(true)
    );
  }
}
}

function parseChordPro(text){
parsedSong=[]
let title='',artist='',key='',capo=''

text.split(/\r?\n/).forEach(line=>{

if(line.startsWith('{title:')){title=line.slice(7,-1).trim();return}
if(line.startsWith('{artist:')){artist=line.slice(8,-1).trim();return}
if(line.startsWith('{key:')){key=line.slice(5,-1).trim();return}
if(line.startsWith('{capo:')){capo=line.slice(6,-1).trim();return}

if(line.startsWith('{comment:')){
parsedSong.push({type:'section',text:line.replace('{comment:','').replace('}','').trim()})
return
}

if(line.startsWith('{')) return
parsedSong.push({type:'line',text:line})
})

document.getElementById('title').textContent=title||'MusiMix'
document.getElementById('meta').textContent=
[artist,key&&'Tonalité '+key,capo&&'Capodastre '+capo].filter(Boolean).join(' • ')

window.currentChords = extractChordsFromCho(text)
renderChordBar(window.currentChords)

renderSong()
}

function renderSong(){
const lyrics=document.getElementById('lyrics')
lyrics.innerHTML=''

parsedSong.forEach(item=>{

if(item.type==='section'){
lyrics.innerHTML+=`<div class="section">${item.text}</div>`
return
}

const line=document.createElement('div')
line.className='line lyrics-line'
const parts=item.text.split(/(\[.*?\])/g)

parts.forEach(part=>{

if(!part)return

if(part.startsWith('[')&&part.endsWith(']')){
const chord=part.slice(1,-1)

line.innerHTML+=`
<span class="segment">
<span class="chord">${shiftChord(chord,semitoneShift)}</span>
<span class="word">&nbsp;</span>
</span>`
}else{
line.innerHTML+=`
<span class="segment">
<span class="chord">&nbsp;</span>
<span class="word">${part}</span>
</span>`
}
})

lyrics.appendChild(line)
})
}

function drawWaveform(){

  const c=document.getElementById('waveform')
  const ctx=c.getContext('2d')

  c.width=800
  c.height=80

  ctx.clearRect(0,0,c.width,c.height)

  ctx.strokeStyle='#2d7cff'
  ctx.lineWidth=2

  for(let x=0;x<c.width;x+=3){

    const center=40

    const h=
      8+
      Math.sin(x*0.02)*10+
      Math.random()*18

    ctx.beginPath()
    ctx.moveTo(x,center-h)
    ctx.lineTo(x,center+h)
    ctx.stroke()
  }
}

const STUDIO_COLORS={
  '🎤 Voix':'#ffd166',
  '🥁 Drums':'#ef476f',
  '🎸 Bass':'#06d6a0',
  '🎸 Guitar':'#118ab2',
  '🎹 Piano':'#9b5de5',
  '🎵 Other':'#8d99ae',
  '🎵 Instrumental':'#8d99ae'
};

async function buildStudioWaveforms(){

  waveformCache={};

  const audioContext=new (
    window.AudioContext||
    window.webkitAudioContext
  )();

  for(const [name,audio] of Object.entries(tracks)){

    try{

      const response=await fetch(audio.src);
      const arrayBuffer=await response.arrayBuffer();
      const decoded=await audioContext.decodeAudioData(arrayBuffer);

      const raw=decoded.getChannelData(0);

      const samples=1200;
      const block=Math.floor(raw.length/samples);

      const peaks=[];

      for(let i=0;i<samples;i++){

        let sum=0;

        for(let j=0;j<block;j++){
          sum+=Math.abs(raw[(i*block)+j]||0);
        }

        peaks.push(sum/block);
      }

      waveformCache[name]=peaks;

    }catch(err){
      console.warn('Waveform error:',name,err);
    }
  }

  studioTrack=
    tracks['🎤 Voix']
    ? '🎤 Voix'
    : Object.keys(tracks)[0];

}

function initStudioTimeline(){

  const canvas=document.getElementById('studioTimeline');
  const select=document.getElementById('studioTrackSelect');

  if(!canvas || !select) return;

  select.innerHTML='';

  Object.keys(tracks).forEach(name=>{

    const option=document.createElement('option');
    option.value=name;
    option.textContent=name;

    if(name===studioTrack){
      option.selected=true;
    }

    select.appendChild(option);
  });

  select.onchange=e=>{
    studioTrack=e.target.value;
    drawStudioTimeline();
  };

  if(!studioListenersInitialized){

    canvas.addEventListener('click',e=>{
      studioSeek(e);
    });

    canvas.addEventListener('pointerdown',()=>{
      studioDragging=true;
    });

    canvas.addEventListener('pointermove',e=>{
      if(studioDragging){
        studioSeek(e);
      }
    });

    window.addEventListener('pointerup',()=>{
      studioDragging=false;
    });

    studioListenersInitialized=true;
  }

  startStudioAnimation();
}

function toggleStudioView(){
  studioShowAll=!studioShowAll;
  drawStudioTimeline();
}

function studioSeek(e){

  const canvas=document.getElementById('studioTimeline');
  const rect=canvas.getBoundingClientRect();

  const x=e.clientX-rect.left;
  const ratio=x/canvas.width;

  const first=Object.values(tracks)[0];
  if(!first || !first.duration) return;

  const time=ratio*first.duration;

  Object.values(tracks).forEach(a=>{
    a.currentTime=time;
    a.play();
  });

if(!lyricSyncData.length){
    startScroll();
  }

}

function startStudioAnimation(){

  cancelAnimationFrame(studioAnimation);

  function animate(){

    drawStudioTimeline();
    updateLyricsSync();

    studioAnimation=requestAnimationFrame(animate);
  }

  animate();
}

function drawStudioTimeline(){

  const canvas=document.getElementById('studioTimeline');
  if(!canvas) return;

  const ctx=canvas.getContext('2d');

  const isMobile=window.innerWidth<900;

  const visibleTracks=studioShowAll
    ? Object.keys(waveformCache)
    : [studioTrack];

  const trackHeight=isMobile?90:52;

  canvas.width=canvas.clientWidth;
  canvas.height=Math.max(
    120,
    visibleTracks.length*trackHeight
  );

  ctx.clearRect(0,0,canvas.width,canvas.height);

  visibleTracks.forEach((name,index)=>{

    const data=waveformCache[name];
    if(!data) return;

    const y=index*trackHeight;
    const mid=y+trackHeight/2;

    ctx.strokeStyle=
      STUDIO_COLORS[name] || '#999';

    ctx.lineWidth=1;

    data.forEach((v,i)=>{

      const x=(i/data.length)*canvas.width;
      const h=v*(trackHeight*0.85);

      ctx.beginPath();
      ctx.moveTo(x,mid-h/2);
      ctx.lineTo(x,mid+h/2);
      ctx.stroke();
    });

    ctx.fillStyle='#fff';
    ctx.font='12px Arial';
    ctx.fillText(
  getTrackCustomName(name),
  8,
  y+14
);
  });

  const first=Object.values(tracks)[0];

  if(first && first.duration){

    const ratio=first.currentTime/first.duration;
    const x=ratio*canvas.width;

    ctx.strokeStyle='#ffffff';
    ctx.lineWidth=2;

    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();

    document.getElementById('studioTime').textContent=
      formatTime(first.currentTime)
      +' / '+
      formatTime(first.duration);
  }
}

function formatTime(sec){

  if(!sec) return '0:00';

  const m=Math.floor(sec/60);
  const s=Math.floor(sec%60);

  return m+':'+String(s).padStart(2,'0');
}

let isResizing=false;

function initResizableLayout(){

  if(window.innerWidth<900) return;

  const layout=document.querySelector('.layout');
  const handle=document.getElementById('resizeHandle');

  if(!layout || !handle) return;

  const saved=
    localStorage.getItem('musimixSidebarWidth');

  if(saved){
    layout.style.gridTemplateColumns=
      `${saved}px 8px 1fr`;
  }

  handle.addEventListener('pointerdown',()=>{
    isResizing=true;
    document.body.style.cursor='col-resize';
  });

  window.addEventListener('pointermove',e=>{

    if(!isResizing) return;

    const min=220;
    const max=window.innerWidth*0.65;

    let leftWidth=e.clientX;

    leftWidth=Math.max(min,leftWidth);
    leftWidth=Math.min(max,leftWidth);

    layout.style.gridTemplateColumns=
      `${leftWidth}px 8px 1fr`;

    localStorage.setItem(
      'musimixSidebarWidth',
      leftWidth
    );

    drawStudioTimeline();
  });

  window.addEventListener('pointerup',()=>{
    isResizing=false;
    document.body.style.cursor='';
  });
}

async function exportChordPdf(){

  if (!window.jspdf?.jsPDF){
    alert('jsPDF non chargé');
    return;
  }

  const pdf = new window.jspdf.jsPDF('p','mm','a4');

  const W = 210;
  const H = 297;
  const M = 20;

  let y = 24;

  const title =
    document.getElementById('title')?.textContent || 'MusiMix';

  const meta =
    document.getElementById('meta')?.textContent || '';

  const songLines =
    parsedSong.filter(
      item => item.type === 'section' || item.type === 'line'
    );

  function pageBreak(space=12){
    if(y + space > H - 20){
      pdf.addPage();
      y = 24;
    }
  }

  /* Header */
  pdf.setFillColor(255,255,255);
  pdf.rect(0,0,W,H,'F');

  pdf.setFont('times','bold');
  pdf.setFontSize(24);
  pdf.setTextColor(20);
  pdf.text(title,W/2,y,{align:'center'});

  y += 8;

  pdf.setFont('helvetica','normal');
  pdf.setFontSize(10);
  pdf.setTextColor(110);
  pdf.text(meta,W/2,y,{align:'center'});

  y += 8;
  pdf.line(M,y,W-M,y);
  y += 12;

  /* Song */
  for(const item of songLines){

    if(item.type === 'section'){
      pageBreak(12);

      pdf.setFont('helvetica','bold');
      pdf.setFontSize(10);
      pdf.setTextColor(90);

      pdf.text(
        item.text.toUpperCase(),
        M,
        y
      );

      y += 10;
      continue;
    }

    if(!item.text?.trim()){
      y += 5;
      continue;
    }

    const parts = item.text.split(/(\[.*?\])/g);

    let x = M;

    pdf.setFont('helvetica','bold');
    pdf.setFontSize(11);
    pdf.setTextColor(30);

    parts.forEach(part=>{

      if(!part) return;

      if(
        part.startsWith('[') &&
        part.endsWith(']')
      ){
        const chord = shiftChord(
          part.slice(1,-1),
          semitoneShift
        );

        pdf.text(chord,x,y);

      }else{
        x += pdf.getTextWidth(part)+4;
      }
    });

    y += 5;

    x = M;

    pdf.setFont('times','normal');
    pdf.setFontSize(12);
    pdf.setTextColor(20);

    parts.forEach(part=>{

      if(!part) return;

      if(
        !part.startsWith('[')
      ){
        pdf.text(part,x,y);
        x += pdf.getTextWidth(part)+4;
      }
    });

    y += 9;
    pageBreak(10);
  }

  /* page accords simple */
  if(window.currentChords?.length){

    pdf.addPage();

    y = 24;

    pdf.setFont('helvetica','bold');
    pdf.setFontSize(16);

    pdf.text(
      'Accords',
      W/2,
      y,
      {align:'center'}
    );

    y += 18;

    pdf.setFontSize(12);
    pdf.setTextColor(30);

    const txt =
      window.currentChords.join('   •   ');

    const split =
      pdf.splitTextToSize(
        txt,
        W - (M*2)
      );

    pdf.text(
      split,
      M,
      y
    );
  }

  pdf.save(
    `${title}.pdf`
  );
}
