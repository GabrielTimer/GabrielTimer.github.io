<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:100%;
max-width:380px;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
padding:10px;
box-sizing:border-box;
}

/* INFOS */
.infoBox{
text-align:center;
height:60px;
display:flex;
flex-direction:column;
justify-content:center;
}

/* IMAGE */
#img{
width:100%;
max-height:150px;
object-fit:contain;
border-radius:10px;
}

/* 🔥 ZONE TIMER FIXE (corrigé) */
.timerZone{
height:200px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:10px;
}

.circleWrap{
position:relative;
width:160px;
height:160px;
}

#timer{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:bold;
}

/* 🔥 BARRE ESPACÉE */
.barContainer{
width:100%;
height:8px;
background:rgba(255,255,255,0.2);
border-radius:10px;
margin-top:10px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
}

/* BOUTONS */
.buttons{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}

button{
height:45px;
border:none;
border-radius:10px;
color:white;
font-size:14px;
cursor:pointer;
}

.pause{background:#ff9800;}
.next{background:#4caf50;}
.sound{background:#607d8b;}
.back{background:#0e8f9b;}

/* CONFETTIS */
.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh) rotate(360deg);}
}

/* FIN */
#endScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1b5e20;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:22px;
text-align:center;
}
</style>
</head>

<body onclick="enableFullScreen()">

<div class="container" id="main">

<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>

<img id="img">

<div class="timerZone">
<div class="circleWrap">
<svg width="160" height="160">
<circle cx="80" cy="80" r="70" stroke="rgba(255,255,255,0.2)" stroke-width="10" fill="none"/>
<circle id="progressCircle"
cx="80" cy="80" r="70"
stroke="#00e5ff"
stroke-width="10"
fill="none"
transform="rotate(-90 80 80)"
stroke-dasharray="440"
stroke-dashoffset="440"/>
</svg>
<div id="timer">0</div>
</div>
</div>

<div class="barContainer"><div id="bar"></div></div>

<div class="buttons">
<button id="pauseBtn" class="pause" onclick="togglePause()">⏸ Pause</button>
<button class="next" onclick="nextExercise()">⏭ Exercice</button>
<button id="soundBtn" class="sound" onclick="toggleSound()">🔊 Son</button>
<button class="back" onclick="back()">⚙️ Réglages</button>
</div>

</div>

<div id="endScreen">
<div>🎉 Bravo ! 🎉</div>
<div>👏 Avec les félicitations du kiné 👍</div>
</div>

<script>

/* (TON JS IDENTIQUE — NE RIEN CHANGER) */

</script>

</body>
</html>
