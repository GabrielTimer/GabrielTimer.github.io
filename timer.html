<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>

body{
margin:0;
background:#f1f5f9;
color:#0f172a;
font-family:-apple-system, BlinkMacSystemFont,"Segoe UI",sans-serif;
height:100dvh;
overflow:hidden;
transition:background 0.3s;
}

.container{
width:100%;
height:100%;
display:flex;
flex-direction:column;
padding:10px;
box-sizing:border-box;
}

.inner{
max-width:420px;
width:100%;
margin:auto;
display:flex;
flex-direction:column;
height:100%;
}

.header{
text-align:center;
margin-bottom:5px;
}

.logo{
width:60px;
}

/* IMAGE */

.image-container{

height:32vh;

display:flex;
align-items:center;
justify-content:center;

position:relative;

width:100%;

}

#img{
max-width:85vw;
max-height:30vh;

width:320px;
min-height:180px;

height:auto;
object-fit:contain;
margin:0;
display:none;
border-radius:16px;
background:white;
}

/* BOUTON CONSEIL */

#floatingConseilBtn{

position:absolute;
transition:0.2s;

right:8px;
left:auto;
top:50%;

transform:translateY(-50%);

width:48px;
height:48px;

border-radius:50%;
border:none;

background:white;

font-size:22px;

cursor:pointer;

box-shadow:0 4px 14px rgba(0,0,0,0.25);

z-index:10;

display:flex;
align-items:center;
justify-content:center;

}

#floatingConseilBtn:hover{
transform:translateY(-50%) scale(1.12);
}

#hoverConseil{

position:absolute;

right:60px;
left:auto;
top:50%;

opacity:0;
transition:0.2s;

transform:translateY(-50%);

background:white;
color:#111;

padding:14px 18px;

border-radius:14px;

font-size:16px;
font-weight:600;

max-width:240px;

box-shadow:0 6px 18px rgba(0,0,0,0.25);

display:none;

z-index:20;

}

/* OVERLAY CONSEIL */

#conseilOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
display:none;
z-index:9999;
padding:20px;
box-sizing:border-box;
}

.overlayContent{
display:flex;
padding-top:60px;
gap:24px;
align-items:center;
justify-content:center;
height:100%;
}

#overlayImg{
max-width:55vw;
max-height:85vh;
object-fit:contain;
border-radius:20px;
background:white;
padding:10px;
}

#overlayText{
background:white;
color:#111;
padding:28px;
border-radius:20px;
font-size:28px;
font-weight:600;
line-height:1.5;
max-width:32vw;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

#closeConseil{
position:absolute;
top:20px;
right:20px;
width:52px;
height:52px;
border-radius:50%;
border:none;
background:white;
font-size:24px;
cursor:pointer;
}

/* TIMER */

.timerZone{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:240px;
}

.circleWrap{
position:relative;
width:190px;
height:190px;
cursor:pointer;
}

#timer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.timerLabel{
font-size:14px;
opacity:0.8;
}

.timerValue{
font-size:46px;
font-weight:bold;
}

#playIcon{
font-size:30px;
margin-top:5px;
}

.infoBottom{
text-align:center;
margin-top:16px;
font-size:22px;
font-weight:700;
line-height:1.4;
}

.circleWrap:hover #playIcon{
transform:scale(1.2);
}

.circleWrap:active #playIcon{
transform:scale(0.9);
}

@keyframes pulse{
0%{transform:scale(1);opacity:1;}
50%{transform:scale(1.3);opacity:0.6;}
100%{transform:scale(1);opacity:1;}
}

.pulse{
animation:pulse 0.9s infinite;
}

.bottomFixed{
position:sticky;
bottom:0;
padding-top:10px;
background:inherit;
}

.barContainer{
height:6px;
background:rgba(255,255,255,0.2);
border-radius:10px;
margin-bottom:6px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
}

#totalTime{
font-size:12px;
margin-bottom:4px;
text-align:center;
opacity:0.8;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
}

button{
height:40px;
border:none;
border-radius:12px;
background:#e2e8f0;
color:#0f172a;
font-size:13px;
font-weight:600;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

button:active{
transform:scale(0.95);
}

/* MOBILE */

@media(max-width:900px){

.overlayContent{

flex-direction:column;

justify-content:center;
align-items:center;

gap:18px;

padding-top:30px;
padding-bottom:30px;

}

#overlayImg{

max-width:92vw;
max-height:52vh;

border-radius:18px;

}

#overlayText{

max-width:90vw;

font-size:18px;
line-height:1.45;

padding:22px;

text-align:center;

}

#closeConseil{

top:12px;
right:12px;

width:44px;
height:44px;

font-size:20px;

}

}

</style>
</head>

<body>

<div class="container">
<div class="inner">

<div class="header">
<img src="logo.png" class="logo">
</div>

<div class="image-container">

<img id="img">

<button id="floatingConseilBtn">💡</button>
<div id="hoverConseil"></div>

</div>

<div class="timerZone">

<div class="circleWrap" onclick="togglePause()">

<svg viewBox="0 0 100 100">

<circle
cx="50"
cy="50"
r="45"
stroke="rgba(255,255,255,0.2)"
stroke-width="6"
fill="none"
/>

<circle
id="progressCircle"
cx="50"
cy="50"
r="45"
stroke="#00e5ff"
stroke-width="6"
fill="none"
transform="rotate(-90 50 50)"
/>

</svg>

<div id="timer">

<div class="timerLabel">PRÉPAREZ VOUS</div>

<div class="timerValue" id="timerValue">0</div>

<div id="playIcon">⏸</div>

</div>

</div>

<div class="infoBottom">

<div id="exoInfo"></div>

<div id="repInfo"></div>

<div id="serieInfo"></div>

</div>

</div>

<div class="bottomFixed">

<div id="totalTime"></div>

<div class="barContainer">
<div id="bar"></div>
</div>

<div class="buttons">

<button id="soundBtn" onclick="toggleSound()">🔊 Son</button>

<button onclick="skipExo()">⏭</button>

<button onclick="back()">⚙️</button>

</div>

</div>

</div>
</div>

<!-- OVERLAY CONSEIL -->

<div id="conseilOverlay">

<button id="closeConseil">✖</button>

<div class="overlayContent">

<img id="overlayImg">

<div id="overlayText"></div>

</div>

</div>

<script>
const VERSION = "1.2";

/* ===== CODE ORIGINAL ===== */

let p =
JSON.parse(localStorage.getItem("programme_temp")) ||
JSON.parse(localStorage.getItem("patho_data"));

if(!p){
window.location="config.html?v="+VERSION;
}
if(!p){
window.location="config.html?v="+VERSION;
}

const timerLabel = document.querySelector(".timerLabel");

const img = document.getElementById("img");

let exIndex=0;
let repIndex=1;
let serieIndex=1;

let phase="prep";

let PREP_TIME=3;

let t=PREP_TIME;
let totalTimePhase=PREP_TIME;

let paused=false;
let soundOn=true;

let totalSessionTime=0;
let remainingTime=0;

let lastImage="";

let radius=45;
let circumference=2*Math.PI*radius;

progressCircle.style.strokeDasharray=circumference;

/* TOTAL */

function computeTotal(){

totalSessionTime=0;

p.exercices.forEach((exo,index)=>{

for(let r=0;r<exo.reps;r++){

totalSessionTime+=exo.ex;

let isLastExo=index===p.exercices.length-1;
let isLastRep=r===exo.reps-1;

if(!(isLastExo && isLastRep)){
totalSessionTime+=exo.repos;
}

}

});

totalSessionTime*=p.series;
totalSessionTime+=PREP_TIME;

remainingTime=totalSessionTime;

}

computeTotal();

/* TIME */

function formatTime(s){

let m=Math.floor(s/60);

return m+":"+(s%60<10?"0":"")+s%60;

}

function updateTotal(){

totalTime.innerText="Durée : "+formatTime(remainingTime);

}

updateTotal();

/* AUDIO */

function beep(){

if(!soundOn)return;

let ctx=new AudioContext();

let o=ctx.createOscillator();

o.frequency.value=800;

o.connect(ctx.destination);

o.start();

setTimeout(()=>o.stop(),150);

}

function speak(t){

if(!soundOn)return;

let u=new SpeechSynthesisUtterance(t);

u.lang="fr-FR";

speechSynthesis.speak(u);

}

function toggleSound(){

soundOn=!soundOn;

soundBtn.innerHTML = soundOn ? "🔊 Son" : "🔇 Muet";

}

/* PAUSE */

function togglePause(){

paused=!paused;

let icon=document.getElementById("playIcon");

if(paused){

icon.innerText="▶️";
icon.classList.add("pulse");

}else{

icon.innerText="⏸";
icon.classList.remove("pulse");

}

}

/* CONSEIL */

const overlay = document.getElementById("conseilOverlay");
const hoverBox =
document.getElementById("hoverConseil");

const conseilBtn =
document.getElementById("floatingConseilBtn");

conseilBtn.onmouseenter = ()=>{

let exo = p.exercices[exIndex];

hoverBox.innerHTML =
exo.conseil || "Aucun conseil";

hoverBox.style.display="block";
setTimeout(()=>hoverBox.style.opacity="1",10);

};

conseilBtn.onmouseleave = ()=>{

hoverBox.style.opacity="0";
setTimeout(()=>hoverBox.style.display="none",200);

};

document.getElementById("floatingConseilBtn").onclick = ()=>{

paused = true;

let icon=document.getElementById("playIcon");

icon.innerText="▶️";
icon.classList.add("pulse");

let exo = p.exercices[exIndex];

document.getElementById("overlayImg").src = img.src;

document.getElementById("overlayText").innerHTML =
exo.conseil || "Aucun conseil disponible";

overlay.style.display = "block";

};

document.getElementById("closeConseil").onclick = ()=>{

overlay.style.display = "none";

};

/* UPDATE */

function update(){

let progress = 1 - (t / totalTimePhase);

progressCircle.style.strokeDashoffset =
circumference * progress;

/* COULEURS */

if(phase==="prep"){
document.body.style.background="#f1f5f9";
document.body.style.color="#0f172a";
}

if(phase==="ex"){
document.body.style.background="#ef4444";
document.body.style.color="#ffffff";
}

if(phase==="repos"){
document.body.style.background="#2563eb";
document.body.style.color="#ffffff";
}

timerValue.innerText=t;

if(phase==="prep") timerLabel.innerText="PRÉPAREZ VOUS";
if(phase==="ex") timerLabel.innerText="EXERCICE";
if(phase==="repos") timerLabel.innerText="REPOS";

bar.style.width=
((totalSessionTime-remainingTime)/totalSessionTime*100)+"%";

let exo=p.exercices[exIndex];

exoInfo.innerText=exo.nom;
repInfo.innerText="Rép "+repIndex+"/"+exo.reps;
serieInfo.innerText="Série "+serieIndex+"/"+p.series;

if(exo.image){

img.style.display = "block";

if(lastImage !== exo.image){

img.src = exo.image + "?v=" + Date.now();

lastImage = exo.image;

}

}else{

img.style.display = "none";

}
}

/* SAFE */

function recomputeRemainingTime(){

let time = 0;

for(let s = serieIndex - 1; s < p.series; s++){

for(let e = (s === serieIndex - 1 ? exIndex : 0);
e < p.exercices.length;
e++){

let exo = p.exercices[e];

let startRep =
(s === serieIndex - 1 && e === exIndex)
? repIndex
: 1;

for(let r = startRep; r <= exo.reps; r++){

time += exo.ex;

let isLastSerie = s === p.series - 1;
let isLastExo = e === p.exercices.length - 1;
let isLastRep = r === exo.reps;

if(!(isLastSerie && isLastExo && isLastRep)){
time += exo.repos;
}

}

}

}

remainingTime = time + t;

updateTotal();

}

/* SKIP */

function skipExo(){

repIndex=1;

exIndex++;

if(exIndex>=p.exercices.length){

exIndex=0;

serieIndex++;

}

if(serieIndex>p.series){

window.location="fin.html?v="+VERSION;

return;

}

phase="ex";

t=p.exercices[exIndex].ex;

totalTimePhase=t;

recomputeRemainingTime();

update();

}

/* NEXT */

function next(){

let exo=p.exercices[exIndex];

if(phase==="prep"){

phase="ex";

t=exo.ex;

totalTimePhase=exo.ex;

beep();

update();

return;

}

if(phase==="ex"){

phase="repos";

t=exo.repos;

totalTimePhase=exo.repos;

speak("repos");

update();

return;

}

phase="ex";

t=exo.ex;

totalTimePhase=exo.ex;

beep();

repIndex++;

if(repIndex>exo.reps){

repIndex=1;

exIndex++;

if(exIndex>=p.exercices.length){

exIndex=0;

serieIndex++;

}

}

update();

}

/* LOOP */

function loop(){

if(paused)return;

t--;

remainingTime = Math.max(0, remainingTime - 1);

if(remainingTime <= 0){

window.location="fin.html";

return;

}

updateTotal();

if(t<=0){

next();

}else{

update();

}

}

function back(){

localStorage.removeItem("programme_temp");

window.location="config.html";

}

update();

setInterval(loop,1000);

</script>

</body>
</html>
