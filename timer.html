<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
display:flex;
flex-direction:column;
gap:20px;
}

button{
padding:15px;
border:none;
border-radius:10px;
cursor:pointer;
}

.start{background:#0e8f9b;color:white;}
</style>
</head>

<body>

<div class="container">

<h2 id="status">Chargement...</h2>

<button class="start" onclick="start()">▶ Lancer séance</button>

</div>

<script>

/* 🔥 RECUPERATION DATA */

let patient = localStorage.getItem("patient_actuel");

let data = null;

if(patient && localStorage.getItem(patient)){
data = JSON.parse(localStorage.getItem(patient)).programme;
}else{
data = JSON.parse(localStorage.getItem("programme_temp"));
}

/* SI RIEN → MESSAGE */
if(!data){
document.getElementById("status").innerText = "⚠️ Aucun programme trouvé";
}else{
document.getElementById("status").innerText = "Programme chargé ✔";
}

/* DEMARRAGE */
function start(){

if(!data){
alert("Aucun programme !");
window.location="config.html";
return;
}

alert("Timer OK (prochaine étape = remettre ton vrai timer)");

}

</script>

</body>
</html>
