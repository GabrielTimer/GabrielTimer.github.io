<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CONTAINER FIXE */
.container{
width:100%;
max-width:380px;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
padding:10px;
box-sizing:border-box;
}

/* INFOS */
.infoBox{
text-align:center;
height:60px;
display:flex;
flex-direction:column;
justify-content:center;
}

.infoBox div{
font-size:16px;
}

/* IMAGE (SEULE CHOSE VARIABLE) */
#img{
width:100%;
max-height:160px;
object-fit:contain;
border-radius:10px;
}

/* ZONE TIMER FIXE */
.timerZone{
height:180px;
display:flex;
align-items:center;
justify-content:center;
}

/* CERCLE PARFAITEMENT CENTRÉ */
.circleWrap{
position:relative;
width:160px;
height:160px;
}

.circleWrap svg{
position:absolute;
top:0;
left:0;
}

#timer{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:bold;
}

/* BARRE FIXE */
.barContainer{
width:100%;
height:8px;
background:rgba(255,255,255,0.2);
border-radius:10px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
}

/* BOUTONS FIXES */
.buttons{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}

button{
height:45px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:14px;
color:white;
}

.pause{background:#ff9800;}
.next{background:#4caf50;}
.sound{background:#607d8b;}
.back{background:#0e8f9b;}

</style>
</head>

<body>

<div class="container">

<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>

<img id="img">

<div class="timerZone">
<div class="circleWrap">
<svg width="160" height="160">
<circle cx="80" cy="80" r="70" stroke="rgba(255,255,255,0.2)" stroke-width="10" fill="none"/>
<circle id="progressCircle"
cx="80" cy="80" r="70"
stroke="#00e5ff"
stroke-width="10"
fill="none"
stroke-linecap="round"
transform="rotate(-90 80 80)"
stroke-dasharray="440"
stroke-dashoffset="440"/>
</svg>
<div id="timer">0</div>
</div>
</div>

<div class="barContainer"><div id="bar"></div></div>

<div class="buttons">
<button id="pauseBtn" class="pause" onclick="togglePause()">⏸ Pause</button>
<button class="next" onclick="nextExercise()">⏭ Exercice</button>
<button id="soundBtn" class="sound" onclick="toggleSound()">🔊 Son</button>
<button class="back" onclick="back()">⚙️ Réglages</button>
</div>

</div>

<script>

let data = localStorage.getItem("programme_temp");
let p = JSON.parse(data);

let exIndex = 0;
let repIndex = 1;
let serieIndex = 1;

let phase="prep";
let t=3, totalTime=3;
let paused=false;
let finished=false;

/* IMAGE */
function updateImage(){
let patho = localStorage.getItem("pathologie");

if(patho==="epaule" && phase==="ex"){
img.src = "tendinitedelacoiffe"+(exIndex+1)+".jpg";
}else{
img.src="";
}
}

/* INFOS */
function updateInfos(){
exoInfo.innerText = "Exercice " + (exIndex+1) + " / " + p.exercices.length;
repInfo.innerText = "Rép " + repIndex + " / " + p.reps;
serieInfo.innerText = "Série " + serieIndex + " / " + p.series;
}

/* CERCLE */
function updateCircle(){
let percent = t/totalTime;
progressCircle.style.strokeDashoffset = 440*(1-percent);
}

/* BARRE */
function updateBar(){
let total = p.series * p.exercices.length * p.reps;
let current =
(serieIndex-1)*p.exercices.length*p.reps +
(exIndex)*p.reps +
(repIndex-1);

bar.style.width = (current/total)*100+"%";
}

/* UPDATE */
function update(){
if(finished) return;
timer.innerText = t;
updateCircle();
updateBar();
updateImage();
updateInfos();
}

/* LOGIQUE */
function next(){

if(finished) return;

if(phase==="prep"){
phase="ex";
t=p.tempsEx;
totalTime=p.tempsEx;
return;
}

if(phase==="ex"){
phase="repos";
t=p.tempsRepos;
totalTime=p.tempsRepos;
return;
}

repIndex++;

if(repIndex > p.reps){
repIndex = 1;
exIndex++;

if(exIndex >= p.exercices.length){
exIndex = 0;
serieIndex++;

if(serieIndex > p.series){
finished=true;
timer.innerText="👍";
return;
}
}
}

phase="ex";
t=p.tempsEx;
totalTime=p.tempsEx;
}

/* EXO SUIVANT */
function nextExercise(){

if(finished) return;

repIndex = 1;
exIndex++;

if(exIndex >= p.exercices.length){
exIndex = 0;
serieIndex++;

if(serieIndex > p.series){
finished=true;
timer.innerText="👍";
return;
}
}

phase="ex";
t=p.tempsEx;
totalTime=p.tempsEx;

update();
}

/* CONTROLES */
function togglePause(){
paused=!paused;
pauseBtn.innerText = paused?"▶ Reprendre":"⏸ Pause";
}

function toggleSound(){}

function loop(){
if(paused || finished) return;
t--;
update();
if(t<=0) next();
}

function back(){
window.location="config.html";
}

/* INIT */
update();
setInterval(loop,1000);

</script>

</body>
</html>
