<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

h1{font-size:30px;}
h2{font-size:20px;}

.timer{
font-size:90px;
margin:20px;
}

img{
max-width:250px;
margin:20px;
}

button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:10px;
font-size:16px;
}

.pause{background:#ff9800;}
.back{background:#0e8f9b;}
</style>
</head>

<body>

<h1 id="phase"></h1>
<h2 id="name"></h2>
<h3 id="info"></h3>

<img id="img" src="">

<div class="timer" id="timer"></div>

<button class="pause" onclick="pause()">Pause</button>
<button class="back" onclick="back()">Réglages</button>

<script>

// 🔴 sécurité
if(!localStorage.getItem("programme_temp") && !localStorage.getItem("currentUser")){
    window.location="index.html";
}

let data = localStorage.getItem("programme_temp");

if(!data){
let u = localStorage.getItem("currentUser");
if(u) data = localStorage.getItem("programme_"+u);
}

let p = JSON.parse(data);

let i=0;
let rep=1;
let serie=1;
let phase="ex";
let t=p.tempsEx;
let paused=false;

function update(){

timer.innerText = t;

name.innerText = phase==="ex" ? p.exercices[i] : "Repos";
phaseEl.innerText = phase==="ex" ? "Exercice" : "Repos";
info.innerText = "Série "+serie+" | Rép "+rep;

/* image */
if(phase==="ex"){
img.src="./tendinitedelacoiffe"+(i+1)+".jpg";
img.style.display="block";
}else{
img.style.display="none";
}
}

function next(){

if(phase==="ex"){
phase="repos";
t=p.tempsRepos;
document.body.style.background="#b71c1c";
}
else{
phase="ex";
i++;

if(i>=p.exercices.length){
i=0;
rep++;
if(rep>p.reps){
rep=1;
serie++;
}
}

if(serie>p.series){
phaseEl.innerText="Terminé 🎉";
timer.innerText="";
img.style.display="none";
return;
}

t=p.tempsEx;
document.body.style.background="#1b5e20";
}

update();
}

function loop(){
if(paused) return;

t--;
update();

if(t<=0) next();
}

function pause(){
paused=!paused;
}

function back(){
window.location="config.html";
}

let timer=document.getElementById("timer");
let phaseEl=document.getElementById("phase");

update();
setInterval(loop,1000);

</script>

</body>
</html>
