<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
height:100dvh;
overflow:hidden;
transition:background 0.4s;
padding-bottom:env(safe-area-inset-bottom);
}

/* HEADER */
.header{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
box-sizing:border-box;
flex-shrink:0;
}

.infoBox{
display:flex;
flex-direction:column;
font-size:18px;
font-weight:bold;
}

.logo{
width:80px;
filter:drop-shadow(0 0 6px rgba(255,255,255,0.6));
}

/* CONTAINER */
.container{
width:100%;
max-width:380px;
height:100dvh;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:10px;
box-sizing:border-box;
}

/* IMAGE */
#img{
width:100%;
max-height:150px;
object-fit:contain;
flex-shrink:0;
}

/* TIMER */
.timerZone{
flex-grow:1;
display:flex;
align-items:center;
justify-content:center;
}

.circleWrap{
position:relative;
width:200px;
height:200px;
}

#timer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:2px;
width:100%;
text-align:center;
}

.timerLabel{
font-size:14px;
white-space:nowrap;
}

.timerValue{
font-size:48px;
font-weight:bold;
line-height:1;
transition:transform 0.15s;
}

.tick{
transform:scale(1.15);
}

/* BAS */
.bottomBlock{
width:100%;
flex-shrink:0;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
margin-top:5px;
}

#totalTime{
font-size:14px;
}

.barContainer{
width:100%;
height:6px;
background:rgba(255,255,255,0.2);
border-radius:10px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
}

/* BOUTONS */
.buttons{
width:100%;
flex-shrink:0;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:8px;
}

button{
height:42px;
border:none;
border-radius:10px;
color:white;
font-size:14px;
}

.pause{background:#ff9800;}
.next{background:#4caf50;}
.sound{background:#607d8b;}
.back{background:#0e8f9b;}

/* MOBILE */
@media (max-width:600px){

.circleWrap{
width:150px;
height:150px;
}

.timerValue{
font-size:34px;
}

#img{
max-height:120px;
}

button{
height:34px;
font-size:12px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>
<img src="logo.png" class="logo">
</div>

<img id="img">

<div class="timerZone">
<div class="circleWrap">

<svg viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45" stroke="rgba(255,255,255,0.2)" stroke-width="6" fill="none"/>
<circle id="progressCircle"
cx="50" cy="50" r="45"
stroke="#00e5ff"
stroke-width="6"
fill="none"
transform="rotate(-90 50 50)"/>
</svg>

<div id="timer">
<div class="timerLabel">PRÉPAREZ VOUS</div>
<div class="timerValue" id="timerValue">0</div>
</div>

</div>
</div>

<div class="bottomBlock">
<div id="totalTime"></div>
<div class="barContainer"><div id="bar"></div></div>
</div>

<div class="buttons">
<button onclick="togglePause()">⏸ Pause</button>
<button onclick="nextExercise()">⏭ Exercice</button>
<button onclick="toggleSound()">🔊 Son</button>
<button onclick="back()">⚙️ Réglages</button>
</div>

</div>

<script>

/* PROGRAMME */
let p = JSON.parse(localStorage.getItem("programme_temp"));
if(!p){window.location="config.html?v="+Date.now();}

/* VARIABLES */
let exIndex=0, repIndex=1, serieIndex=1;
let phase="prep";
let t=3, totalTimePhase=3;
let paused=false;
let soundOn=true;

let totalSessionTime=0;
let elapsedTime=0;

/* CERCLE */
let radius = 45;
let circumference = 2 * Math.PI * radius;
progressCircle.style.strokeDasharray = circumference;
progressCircle.style.strokeDashoffset = circumference;

/* CALCUL */
function computeTotal(){
p.exercices.forEach(exo=>{
totalSessionTime += (exo.ex + exo.repos) * exo.reps;
});
totalSessionTime *= p.series;
let last = p.exercices[p.exercices.length-1];
totalSessionTime -= last.repos;
}
computeTotal();

function formatTime(sec){
let m = Math.floor(sec/60);
let s = sec%60;
return m+":"+(s<10?"0"+s:s);
}

totalTime.innerText = "Durée de ma séance : " + formatTime(totalSessionTime);

/* 🔊 SON */
function beep(){
if(!soundOn) return;
let ctx = new (window.AudioContext || window.webkitAudioContext)();
let o = ctx.createOscillator();
o.frequency.value = 800;
o.connect(ctx.destination);
o.start();
setTimeout(()=>o.stop(),150);
}

function speak(text){
if(!soundOn) return;
let u = new SpeechSynthesisUtterance(text);
u.lang="fr-FR";
speechSynthesis.speak(u);
}

function toggleSound(){
soundOn = !soundOn;
}

/* UPDATE */
function update(){
let exo = p.exercices[exIndex];

progressCircle.style.strokeDashoffset = circumference * (t/totalTimePhase);
bar.style.width = (elapsedTime/totalSessionTime*100)+"%";

/* ANIMATION */
timerValue.classList.add("tick");
setTimeout(()=>timerValue.classList.remove("tick"),120);

timerValue.innerText = t;

/* TEXTE */
if(phase==="prep") timer.querySelector(".timerLabel").innerText="PRÉPAREZ VOUS";
if(phase==="ex") timer.querySelector(".timerLabel").innerText="EXERCICE";
if(phase==="repos") timer.querySelector(".timerLabel").innerText="REPOS";

/* COULEURS */
if(phase==="prep") document.body.style.background="#1b5e20";
if(phase==="ex") document.body.style.background="#b71c1c";
if(phase==="repos") document.body.style.background="#0d47a1";

/* INFOS */
exoInfo.innerText=exo.nom;
repInfo.innerText="Rép "+repIndex+"/"+exo.reps;
serieInfo.innerText="Série "+serieIndex+"/"+p.series;

let patho=localStorage.getItem("pathologie");
img.src=(patho && phase==="ex")?"images/"+patho+"/ex"+(exIndex+1)+".jpg":"";
}

/* LOGIQUE */
function next(){
let exo = p.exercices[exIndex];

if(phase==="prep"){
phase="ex";
t=exo.ex;
totalTimePhase=exo.ex;
beep();
return;
}

if(phase==="ex"){
phase="repos";
t=exo.repos;
totalTimePhase=exo.repos;
speak("repos");
return;
}

phase="ex";
t=exo.ex;
totalTimePhase=exo.ex;
beep();

repIndex++;

if(repIndex>exo.reps){
repIndex=1;
exIndex++;
if(exIndex>=p.exercices.length){
exIndex=0;
serieIndex++;
}
}
}

/* CONTROLES */
function togglePause(){paused=!paused;}
function nextExercise(){repIndex=1;exIndex++;phase="ex";}
function back(){window.location="config.html";}

/* LOOP */
function loop(){
if(paused) return;
t--;
elapsedTime++;
update();
if(t<=0) next();
}

update();
setInterval(loop,1000);

</script>

</body>
</html>
