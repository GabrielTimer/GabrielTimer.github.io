<script>

/* RECUP */
let p = JSON.parse(localStorage.getItem("programme_temp"));
if(!p){
location="config.html?v="+Date.now();
}

/* VOIX */
function speak(t){
let u=new SpeechSynthesisUtterance(t);
u.lang="fr-FR";
speechSynthesis.speak(u);
}

/* BEEP */
function beep(){
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.frequency.value=800;
o.connect(ctx.destination);
o.start();
setTimeout(()=>o.stop(),150);
}

let phase="prep",t=3;

/* LOOP */
setInterval(()=>{
t--;

if(phase==="prep"){
timer.innerHTML="PRÉPAREZ-VOUS<br>"+t;
if(t===0){phase="ex";t=20;beep();}
}

else if(phase==="ex"){
timer.innerHTML="EXERCICE<br>"+t;
if(t===0){phase="repos";t=15;speak("repos");}
}

else if(phase==="repos"){
timer.innerHTML="REPOS<br>"+t;
if(t===0){phase="ex";t=20;beep();}
}

},1000);

function back(){
window.location="config.html?v="+Date.now();
}

</script>
