<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
transition:background 0.4s;
}

/* 🔥 HEADER DANS LE FLUX (FIX) */
.header{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
box-sizing:border-box;
}

/* INFOS */
.infoBox{
display:flex;
flex-direction:column;
font-size:18px;
font-weight:bold;
line-height:1.2;
}

/* LOGO */
.logo{
width:80px;
filter:drop-shadow(0 0 6px rgba(255,255,255,0.6));
}

/* CONTENEUR */
.container{
width:100%;
max-width:380px;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-around; /* 🔥 FIX IMPORTANT */
align-items:center;
padding:10px;
box-sizing:border-box;
}

/* IMAGE */
#img{
width:100%;
max-height:180px;
object-fit:contain;
}

/* TIMER */
.timerZone{
display:flex;
align-items:center;
justify-content:center;
}

.circleWrap{
position:relative;
width:160px;
height:160px;
}

#timer{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:2px;
}

.timerLabel{
font-size:14px;
white-space:nowrap;
}

.timerValue{
font-size:44px;
font-weight:bold;
}

/* BAS */
.bottomBlock{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
}

.barContainer{
width:100%;
height:6px;
background:rgba(255,255,255,0.2);
border-radius:10px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
}

#totalTime{
font-size:15px;
}

/* BOUTONS */
.buttons{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

button{
height:45px;
border:none;
border-radius:10px;
color:white;
font-size:14px;
cursor:pointer;
}

.pause{background:#ff9800;}
.next{background:#4caf50;}
.sound{background:#607d8b;}
.back{background:#0e8f9b;}

/* 📱 MOBILE */
@media (max-width:600px){

.container{
height:100dvh;
}

.infoBox{
font-size:15px;
}

.logo{
width:65px;
}

#img{
max-height:130px;
}

.circleWrap{
width:110px;
height:110px;
}

.timerValue{
font-size:30px;
}

button{
height:34px;
font-size:12px;
}

}
</style>
</head>

<body>

<div class="container" id="main">

<!-- HEADER DANS LE FLUX -->
<div class="header">
<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>
<img src="logo.png" class="logo">
</div>

<img id="img">

<div class="timerZone">
<div class="circleWrap">

<svg viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45" stroke="rgba(255,255,255,0.2)" stroke-width="6" fill="none"/>
<circle id="progressCircle"
cx="50" cy="50" r="45"
stroke="#00e5ff"
stroke-width="6"
fill="none"
transform="rotate(-90 50 50)"/>
</svg>

<div id="timer">
<div class="timerLabel">PRÉPAREZ VOUS</div>
<div class="timerValue" id="timerValue">0</div>
</div>

</div>
</div>

<div class="bottomBlock">
<div id="totalTime"></div>
<div class="barContainer"><div id="bar"></div></div>
</div>

<div class="buttons">
<button id="pauseBtn" class="pause" onclick="togglePause()">⏸ Pause</button>
<button class="next" onclick="nextExercise()">⏭ Exercice</button>
<button id="soundBtn" class="sound" onclick="toggleSound()">🔊 Son</button>
<button class="back" onclick="back()">⚙️ Réglages</button>
</div>

</div>

<script>

/* JS IDENTIQUE */

let p = JSON.parse(localStorage.getItem("programme_temp"));
if(!p){window.location="config.html?v="+Date.now();}

let exIndex=0, repIndex=1, serieIndex=1;
let phase="prep";
let t=3, totalTimePhase=3;
let paused=false;

let totalSessionTime=0;
let elapsedTime=0;

let radius = 45;
let circumference = 2 * Math.PI * radius;
progressCircle.style.strokeDasharray = circumference;
progressCircle.style.strokeDashoffset = circumference;

function computeTotal(){
p.exercices.forEach(exo=>{
totalSessionTime += (exo.ex + exo.repos) * exo.reps;
});
totalSessionTime *= p.series;
let last = p.exercices[p.exercices.length-1];
totalSessionTime -= last.repos;
}
computeTotal();

function formatTime(sec){
let m = Math.floor(sec/60);
let s = sec%60;
return m+":"+(s<10?"0"+s:s);
}

totalTime.innerText = "Durée de ma séance : " + formatTime(totalSessionTime);

function update(){

let exo = p.exercices[exIndex];

let progressPhase = 1 - (t / totalTimePhase);
progressCircle.style.strokeDashoffset = circumference * (1 - progressPhase);

let progress = elapsedTime / totalSessionTime;
bar.style.width = (progress*100)+"%";

timerValue.innerText = t;

if(phase==="prep") timer.querySelector(".timerLabel").innerText="PRÉPAREZ VOUS";
if(phase==="ex") timer.querySelector(".timerLabel").innerText="EXERCICE";
if(phase==="repos") timer.querySelector(".timerLabel").innerText="REPOS";

if(phase==="prep") document.body.style.background="#1b5e20";
if(phase==="ex") document.body.style.background="#b71c1c";
if(phase==="repos") document.body.style.background="#0d47a1";

exoInfo.innerText=exo.nom;
repInfo.innerText="Rép "+repIndex+"/"+exo.reps;
serieInfo.innerText="Série "+serieIndex+"/"+p.series;

let patho=localStorage.getItem("pathologie");
img.src=(patho && phase==="ex")?"images/"+patho+"/ex"+(exIndex+1)+".jpg":"";
}

function next(){
let exo = p.exercices[exIndex];

if(phase==="prep"){phase="ex";t=exo.ex;totalTimePhase=exo.ex;return;}
if(phase==="ex"){phase="repos";t=exo.repos;totalTimePhase=exo.repos;return;}

phase="ex";t=exo.ex;totalTimePhase=exo.ex;
repIndex++;

if(repIndex>exo.reps){
repIndex=1;
exIndex++;
if(exIndex>=p.exercices.length){
exIndex=0;
serieIndex++;
}
}
}

function togglePause(){paused=!paused;}
function toggleSound(){}
function nextExercise(){repIndex=1;exIndex++;phase="ex";}

function loop(){
if(paused) return;
t--;
elapsedTime++;
update();
if(t<=0) next();
}

update();
setInterval(loop,1000);

</script>

</body>
</html>
