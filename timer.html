<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* LAYOUT */
.container{
display:flex;
gap:40px;
align-items:center;
max-width:900px;
width:95%;
}

.left{flex:1;}
.right{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
}

/* CERCLE */
.circleWrap{
position:relative;
width:180px;
height:180px;
}

.circleWrap svg{
position:absolute;
top:0;
left:0;
}

#timer{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
font-weight:bold;
}

/* BARRE */
.barContainer{
width:220px;
height:10px;
background:rgba(255,255,255,0.2);
border-radius:10px;
margin-top:20px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
transition:0.3s;
}

/* TEXTE */
h1{margin:0;}
h2{margin:5px 0;}
h3{margin:5px 0;opacity:0.8;}

/* BOUTONS */
button{
padding:12px 20px;
margin:6px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
opacity:0.9;
}

button:active{
transform:scale(0.95);
}

.pause{background:#ff9800;}
.next{background:#4caf50;}
.back{background:#0e8f9b;}

@media(max-width:800px){
.container{flex-direction:column;}
.left{text-align:center;}
}
</style>
</head>

<body>

<div class="container">

<div class="left">
<h1 id="phase"></h1>
<h2 id="name"></h2>
<h3 id="info"></h3>
</div>

<div class="right">

<div class="circleWrap">
<svg width="180" height="180">
<circle cx="90" cy="90" r="80"
stroke="rgba(255,255,255,0.2)"
stroke-width="10"
fill="none"/>

<circle id="progressCircle"
cx="90" cy="90" r="80"
stroke="#00e5ff"
stroke-width="10"
fill="none"
stroke-linecap="round"
transform="rotate(-90 90 90)"
stroke-dasharray="502"
stroke-dashoffset="502"/>
</svg>

<div id="timer">0</div>
</div>

<div class="barContainer">
<div id="bar"></div>
</div>

<button id="pauseBtn" class="pause" onclick="togglePause()">⏸ Pause</button>
<button class="next" onclick="nextManual()">⏭ Exercice suivant</button>
<button class="back" onclick="back()">⚙️ Réglages</button>

</div>

</div>

<script>

/* 🔐 sécurité */
if(!localStorage.getItem("programme_temp") && !localStorage.getItem("currentUser")){
window.location="index.html";
}

let data = localStorage.getItem("programme_temp");

if(!data){
let u = localStorage.getItem("currentUser");
if(u) data = localStorage.getItem("programme_"+u);
}

let p = JSON.parse(data);

/* VARIABLES */
let i=0, rep=1, serie=1;
let phase="prep";
let t=3;
let totalTime=3;
let paused=false;

/* 🔊 VOIX */
function speak(text){
let msg = new SpeechSynthesisUtterance(text);
msg.lang="fr-FR";
speechSynthesis.speak(msg);
}

/* 🔵 CERCLE */
function updateCircle(){
let percent = t / totalTime;
let offset = 502 * (1 - percent);
document.getElementById("progressCircle").style.strokeDashoffset = offset;
}

/* 🔵 BARRE */
function updateBar(){
let total = p.exercices.length * p.reps * p.series;
let current = (serie-1)*p.reps*p.exercices.length + (rep-1)*p.exercices.length + i;
let percent = (current / total) * 100;
document.getElementById("bar").style.width = percent + "%";
}

/* 🔄 UPDATE UI */
function update(){

document.getElementById("timer").innerText = t;

if(phase==="prep"){
phaseEl.innerText="Préparation";
name.innerText="3...2...1...";
}
else{
name.innerText = phase==="ex"?p.exercices[i]:"Repos";
phaseEl.innerText = phase==="ex"?"Exercice":"Repos";
}

info.innerText="Série "+serie+" | Rép "+rep;

updateCircle();
updateBar();
}

/* 🔄 LOGIQUE */
function next(){

if(phase==="prep"){
speak("C'est parti");
phase="ex";
t=p.tempsEx;
totalTime=p.tempsEx;
return;
}

if(phase==="ex"){
speak("Repos");
phase="repos";
t=p.tempsRepos;
totalTime=p.tempsRepos;
}
else{
phase="ex";
i++;

if(i>=p.exercices.length){
i=0;
rep++;
if(rep>p.reps){
rep=1;
serie++;
}
}

if(serie>p.series){
phaseEl.innerText="Terminé 🎉";
document.getElementById("timer").innerText="";
return;
}

speak("Exercice suivant");
t=p.tempsEx;
totalTime=p.tempsEx;
}
}

/* ⏭ MANUEL */
function nextManual(){
next();
update();
}

/* ⏸ PAUSE / REPRENDRE */
function togglePause(){

paused = !paused;

let btn = document.getElementById("pauseBtn");

if(paused){
btn.innerText = "▶ Reprendre";
btn.style.background = "#4caf50";
phaseEl.innerText = "⏸ En pause";
}else{
btn.innerText = "⏸ Pause";
btn.style.background = "#ff9800";
}
}

/* ⏱ LOOP */
function loop(){
if(paused) return;

t--;
update();

if(t<=0) next();
}

/* 🔙 RETOUR */
function back(){
window.location="config.html";
}

/* INIT */
let phaseEl=document.getElementById("phase");
let name=document.getElementById("name");
let info=document.getElementById("info");

update();
setInterval(loop,1000);

</script>

</body>
</html>
