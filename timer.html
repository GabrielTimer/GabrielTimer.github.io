<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
transition:background 0.3s;
}

.logo{
position:fixed;
top:10px;
right:10px;
width:45px;
opacity:0.8;
}

.container{
width:100%;
max-width:380px;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
padding:10px;
box-sizing:border-box;
}

.infoBox{
text-align:center;
height:60px;
display:flex;
flex-direction:column;
justify-content:center;
}

#img{
width:100%;
max-height:130px;
object-fit:contain;
}

.timerZone{
height:200px;
display:flex;
align-items:center;
justify-content:center;
}

.circleWrap{
position:relative;
width:160px;
height:160px;
}

#timer{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
text-align:center;
}

.barContainer{
width:100%;
height:8px;
background:rgba(255,255,255,0.2);
border-radius:10px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
}

.buttons{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}

button{
height:45px;
border:none;
border-radius:10px;
color:white;
font-size:14px;
cursor:pointer;
}

.pause{background:#ff9800;}
.next{background:#4caf50;}
.sound{background:#607d8b;}
.back{background:#0e8f9b;}

#endScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1b5e20;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:22px;
text-align:center;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="container" id="main">

<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>

<img id="img">

<div class="timerZone">
<div class="circleWrap">
<svg width="160" height="160">
<circle cx="80" cy="80" r="70" stroke="rgba(255,255,255,0.2)" stroke-width="10" fill="none"/>
<circle id="progressCircle"
cx="80" cy="80" r="70"
stroke="#00e5ff"
stroke-width="10"
fill="none"
transform="rotate(-90 80 80)"
stroke-dasharray="440"
stroke-dashoffset="440"/>
</svg>
<div id="timer">0</div>
</div>
</div>

<div class="barContainer"><div id="bar"></div></div>

<div class="buttons">
<button id="pauseBtn" class="pause" onclick="togglePause()">⏸ Pause</button>
<button class="next" onclick="nextExercise()">⏭ Exercice</button>
<button id="soundBtn" class="sound" onclick="toggleSound()">🔊 Son</button>
<button class="back" onclick="back()">⚙️ Réglages</button>
</div>

</div>

<div id="endScreen">
<div>🎉 Bravo ! 🎉</div>
<div>👏 Avec les félicitations du kiné 👍</div>
</div>

<script>

/* RECUP PROGRAMME */
let p = JSON.parse(localStorage.getItem("programme_temp"));
if(!p){
window.location="config.html?v="+Date.now();
}

/* VARIABLES */
let exIndex=0, repIndex=1, serieIndex=1;
let phase="prep";
let t=3, totalTime=3;
let paused=false, finished=false;
let soundOn=true;

/* VOIX */
function speak(text){
if(!soundOn) return;
let u=new SpeechSynthesisUtterance(text);
u.lang="fr-FR";
speechSynthesis.speak(u);
}

/* BEEP */
function beep(){
if(!soundOn) return;
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.frequency.value=800;
o.connect(ctx.destination);
o.start();
setTimeout(()=>o.stop(),150);
}

/* UPDATE */
function update(){

if(finished) return;

let exo = p.exercices[exIndex];

progressCircle.style.strokeDashoffset=440*(1-(t/totalTime));
bar.style.width=(1-(t/totalTime))*100+"%";

/* COULEURS */
if(phase==="prep") document.body.style.background="#1b5e20";
if(phase==="ex") document.body.style.background="#b71c1c";
if(phase==="repos") document.body.style.background="#0d47a1";

/* TEXTE */
if(phase==="prep"){
timer.innerHTML="PRÉPAREZ-VOUS<br>"+t;
if(t===3) speak("Préparez vous");
}

if(phase==="ex"){
timer.innerHTML="EXERCICE<br>"+t;
}

if(phase==="repos"){
timer.innerHTML="REPOS<br>"+t;
}

/* INFOS */
exoInfo.innerText=exo.nom;
repInfo.innerText="Rép "+repIndex+"/"+exo.reps;
serieInfo.innerText="Série "+serieIndex+"/"+p.series;

/* IMAGE */
let patho=localStorage.getItem("pathologie");
if(patho && phase==="ex"){
img.src="images/"+patho+"/ex"+(exIndex+1)+".jpg";
}else{
img.src="";
}
}

/* LOGIQUE */
function next(){

let exo = p.exercices[exIndex];

if(phase==="prep"){
phase="ex";
t=exo.ex;
totalTime=exo.ex;
beep();
return;
}

if(phase==="ex"){
phase="repos";
t=exo.repos;
totalTime=exo.repos;
speak("repos");
return;
}

/* retour exercice */
phase="ex";
t=exo.ex;
totalTime=exo.ex;
beep();

repIndex++;

if(repIndex>exo.reps){
repIndex=1;
exIndex++;

if(exIndex>=p.exercices.length){
exIndex=0;
serieIndex++;
}
}

if(serieIndex>p.series){
endSession();
}
}

/* FIN */
function endSession(){
finished=true;
main.style.display="none";
endScreen.style.display="flex";
speak("Bravo");
}

/* CONTROLES */
function togglePause(){
paused=!paused;
pauseBtn.innerText=paused?"▶ Reprendre":"⏸ Pause";
}

function toggleSound(){
soundOn=!soundOn;
soundBtn.innerText=soundOn?"🔊 Son":"🔇 Son";
}

function nextExercise(){
repIndex=1;
exIndex++;
if(exIndex>=p.exercices.length) exIndex=0;
phase="ex";
t=p.exercices[exIndex].ex;
totalTime=t;
update();
}

function back(){
window.location="config.html?v="+Date.now();
}

/* LOOP */
function loop(){
if(paused||finished) return;
t--;
update();
if(t<=0) next();
}

update();
setInterval(loop,1000);

</script>

</body>
</html>
