<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

/* LAYOUT */
.container{
display:flex;
gap:40px;
align-items:center;
}

.left{
text-align:left;
}

.right{
display:flex;
flex-direction:column;
align-items:center;
}

/* TIMER CIRCLE */
.circle{
width:180px;
height:180px;
border-radius:50%;
border:10px solid rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
margin-top:20px;
}

/* GLOBAL CIRCLE */
.progress{
width:120px;
height:120px;
border-radius:50%;
border:8px solid #00e5ff;
margin-top:20px;
}

img{
max-width:250px;
border-radius:10px;
}

button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.pause{background:#ff9800;}
.back{background:#0e8f9b;}

@media(max-width:800px){
.container{flex-direction:column;}
.left{text-align:center;}
}
</style>
</head>

<body>

<div class="container">

<div class="left">
<h1 id="phase"></h1>
<h2 id="name"></h2>
<h3 id="info"></h3>
</div>

<div class="right">
<img id="img">

<div class="circle" id="timer">0</div>
<div class="progress" id="progress"></div>

<button class="pause" onclick="pause()">⏸ Pause</button>
<button class="back" onclick="back()">⚙️ Réglages</button>

</div>

</div>

<script>

// sécurité
if(!localStorage.getItem("programme_temp") && !localStorage.getItem("currentUser")){
window.location="index.html";
}

let data = localStorage.getItem("programme_temp");
if(!data){
let u = localStorage.getItem("currentUser");
if(u) data = localStorage.getItem("programme_"+u);
}

let p = JSON.parse(data);

let i=0, rep=1, serie=1;
let phase="prep";
let t=3;
let paused=false;

function speak(text){
let msg = new SpeechSynthesisUtterance(text);
speechSynthesis.speak(msg);
}

function update(){

timer.innerText=t;

if(phase==="prep"){
phaseEl.innerText="Préparation";
name.innerText="3,2,1...";
}
else{
name.innerText = phase==="ex"?p.exercices[i]:"Repos";
phaseEl.innerText = phase==="ex"?"Exercice":"Repos";
}

info.innerText="Série "+serie+" | Rép "+rep;

// image
if(phase==="ex"){
img.src="./tendinitedelacoiffe"+(i+1)+".jpg";
img.style.display="block";
}else{
img.style.display="none";
}
}

function next(){

if(phase==="prep"){
speak("C'est parti");
phase="ex";
t=p.tempsEx;
return;
}

if(phase==="ex"){
speak("Repos");
phase="repos";
t=p.tempsRepos;
}
else{
phase="ex";
i++;

if(i>=p.exercices.length){
i=0;
rep++;
if(rep>p.reps){
rep=1;
serie++;
}
}

if(serie>p.series){
phaseEl.innerText="Terminé 🎉";
timer.innerText="";
return;
}

speak("Exercice suivant");
t=p.tempsEx;
}
}

function loop(){
if(paused)return;

t--;
update();

if(t<=0) next();
}

function pause(){
paused=!paused;
}

function back(){
window.location="config.html";
}

let timer=document.getElementById("timer");
let phaseEl=document.getElementById("phase");

update();
setInterval(loop,1000);

</script>

</body>
</html>
