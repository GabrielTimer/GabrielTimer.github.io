<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100dvh;
overflow:hidden;
}

.container{
width:100%;
max-width:380px;
height:100%;
display:flex;
flex-direction:column;
padding:8px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.infoBox{font-size:15px;font-weight:bold;}

#img{
width:100%;
max-height:180px;
object-fit:contain;
}

.timerZone{
flex:1;
display:flex;
align-items:flex-end;
justify-content:center;
}

.timerValue{
font-size:42px;
font-weight:bold;
}

.barContainer{
height:4px;
background:rgba(255,255,255,0.2);
border-radius:10px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:6px;
}

button{
height:38px;
border:none;
border-radius:10px;
background:#d0d0d0;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>
</div>

<img id="img">

<div class="timerZone">
<div>
<div id="timerLabel">PRÉPAREZ VOUS</div>
<div class="timerValue" id="timerValue">0</div>
</div>
</div>

<div class="barContainer"><div id="bar"></div></div>

<div class="buttons">
<button onclick="togglePause()">⏸ Pause</button>
<button onclick="nextExercise()">⏭ Exercice</button>
<button onclick="back()">⚙️ Réglages</button>
</div>

</div>

<script>

let p = JSON.parse(localStorage.getItem("programme_temp"));
if(!p) location="config.html";

let exIndex=0, repIndex=1, serieIndex=1;
let phase="prep";
let t=3, totalTimePhase=3;
let paused=false;
let finished=false;

let totalSessionTime=0;
let elapsedTime=0;
let interval;

/* total */
p.exercices.forEach(e=>{
totalSessionTime+=(e.ex+e.repos)*e.reps;
});
totalSessionTime*=p.series;

/* LOOP CONTROL */
function startLoop(){
clearInterval(interval);
interval=setInterval(loop,1000);
}

/* UPDATE */
function update(){

timerValue.innerText=t;

timerLabel.innerText =
phase==="prep"?"PRÉPAREZ VOUS":
phase==="ex"?"EXERCICE":"REPOS";

let exo=p.exercices[exIndex];

exoInfo.innerText=exo.nom;
repInfo.innerText="Rép "+repIndex+"/"+exo.reps;
serieInfo.innerText="Série "+serieIndex+"/"+p.series;

bar.style.width=(elapsedTime/totalSessionTime*100)+"%";

/* image */
let patho = localStorage.getItem("pathologie");
if(patho){
img.src="images/"+patho+"/ex"+(exIndex+1)+".png";
}

}

/* NEXT LOGIC */
function next(){

let exo=p.exercices[exIndex];

if(phase==="prep"){
phase="ex";
t=exo.ex;
totalTimePhase=t;
update();
return;
}

if(phase==="ex"){
phase="repos";
t=exo.repos;
totalTimePhase=t;
update();
return;
}

phase="ex";
t=exo.ex;
totalTimePhase=t;

repIndex++;

if(repIndex>exo.reps){
repIndex=1;
exIndex++;

if(exIndex>=p.exercices.length){
exIndex=0;
serieIndex++;

if(serieIndex>p.series){
finished=true;
showEnd();
return;
}
}
}

update();
}

/* LOOP */
function loop(){
if(paused||finished)return;

t--;

if(t<=0){
next();
}else{
elapsedTime++;
update();
}
}

/* 🔥 FIX FINAL */
function nextExercise(){

repIndex=1;
exIndex++;

if(exIndex>=p.exercices.length){
exIndex=0;
serieIndex++;
}

/* RESET TOTAL */
phase="ex";
t=p.exercices[exIndex].ex;
totalTimePhase=t;

/* recalcul progression */
elapsedTime=0;

for(let s=1;s<serieIndex;s++){
p.exercices.forEach(e=>{
elapsedTime+=(e.ex+e.repos)*e.reps;
});
}

for(let i=0;i<exIndex;i++){
let e=p.exercices[i];
elapsedTime+=(e.ex+e.repos)*e.reps;
}

/* 🔥 RESET TIMER REEL */
update();
startLoop();

}

/* END */
function showEnd(){
timerLabel.innerText="TERMINÉ 🎉";
timerValue.innerText="✔";
exoInfo.innerText="Bravo 💪";
repInfo.innerText="Félicitations 👏";
serieInfo.innerText="Séance terminée";
bar.style.width="100%";
clearInterval(interval);
}

function togglePause(){paused=!paused;}
function back(){location="config.html";}

/* START */
update();
startLoop();

</script>

</body>
</html>
