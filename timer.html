<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
/* TON CSS INCHANGÉ */
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100dvh;
overflow:hidden;
transition:background 0.3s;
padding-bottom:env(safe-area-inset-bottom);
}

.container{
width:100%;
max-width:380px;
height:100%;
display:flex;
flex-direction:column;
padding:8px;
box-sizing:border-box;
}

.timerValue{font-size:42px;font-weight:bold;}
button{height:38px;border:none;border-radius:10px;background:#d0d0d0;}
</style>
</head>

<body>

<div class="container">
<div id="timerValue">0</div>
<button onclick="nextExercise()">⏭ Exercice</button>
</div>

<script>

let p = JSON.parse(localStorage.getItem("programme_temp"));
let exIndex=0;
let t=3;
let paused=false;
let interval;

/* 🔥 NOUVEAU */
let lock = false;

function startLoop(){
clearInterval(interval);
interval = setInterval(()=>{

if(paused || lock) return;

t--;

if(t<=0){
next();
}

document.getElementById("timerValue").innerText = t;

},1000);
}

function next(){
let exo = p.exercices[exIndex];
t = exo.ex;
}

/* 🔥 FIX FINAL */
function nextExercise(){

lock = true;

exIndex++;
if(exIndex >= p.exercices.length){
exIndex = 0;
}

let exo = p.exercices[exIndex];
t = exo.ex;

document.getElementById("timerValue").innerText = t;

/* 🔥 débloque après 1 tick */
setTimeout(()=>{
lock = false;
},1000);

}

startLoop();

</script>

</body>
</html>
