<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:100%;
max-width:380px;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
padding:10px;
box-sizing:border-box;
}

.infoBox{
text-align:center;
height:60px;
display:flex;
flex-direction:column;
justify-content:center;
}

#img{
width:100%;
max-height:140px;
object-fit:contain;
border-radius:10px;
}

.timerZone{
height:200px;
display:flex;
align-items:center;
justify-content:center;
}

.circleWrap{
position:relative;
width:160px;
height:160px;
}

#timer{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:bold;
}

.barContainer{
width:100%;
height:8px;
background:rgba(255,255,255,0.2);
border-radius:10px;
margin-top:10px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
}

.buttons{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}

button{
height:45px;
border:none;
border-radius:10px;
color:white;
font-size:14px;
cursor:pointer;
}

.pause{background:#ff9800;}
.next{background:#4caf50;}
.sound{background:#607d8b;}
.back{background:#0e8f9b;}

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh) rotate(360deg);}
}

#endScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1b5e20;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:22px;
text-align:center;
}
</style>
</head>

<body onclick="enableFullScreen()">

<div class="container" id="main">

<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>

<img id="img">

<div class="timerZone">
<div class="circleWrap">
<svg width="160" height="160">
<circle cx="80" cy="80" r="70" stroke="rgba(255,255,255,0.2)" stroke-width="10" fill="none"/>
<circle id="progressCircle"
cx="80" cy="80" r="70"
stroke="#00e5ff"
stroke-width="10"
fill="none"
transform="rotate(-90 80 80)"
stroke-dasharray="440"
stroke-dashoffset="440"/>
</svg>
<div id="timer">0</div>
</div>
</div>

<div class="barContainer"><div id="bar"></div></div>

<div class="buttons">
<button id="pauseBtn" class="pause" onclick="togglePause()">⏸ Pause</button>
<button class="next" onclick="nextExercise()">⏭ Exercice</button>
<button id="soundBtn" class="sound" onclick="toggleSound()">🔊 Son</button>
<button class="back" onclick="back()">⚙️ Réglages</button>
</div>

</div>

<div id="endScreen">
<div>🎉 Bravo ! 🎉</div>
<div>👏 Avec les félicitations du kiné 👍</div>
</div>

<script>

let p = JSON.parse(localStorage.getItem("programme_temp"));

let exIndex=0, repIndex=1, serieIndex=1;
let phase="prep";
let t=3, totalTime=3;
let paused=false, finished=false;
let soundOn=true;

/* AUDIO */
function speak(text){
if(!soundOn) return;
let msg=new SpeechSynthesisUtterance(text);
msg.lang="fr-FR";
speechSynthesis.speak(msg);
}

function beep(freq){
if(!soundOn) return;
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.frequency.value=freq;
o.connect(ctx.destination);
o.start();
setTimeout(()=>o.stop(),150);
}

/* TROMPETTE */
function trumpet(){
if(!soundOn) return;
beep(500);
setTimeout(()=>beep(700),150);
setTimeout(()=>beep(900),300);
}

/* CONFETTIS */
function confetti(){
for(let i=0;i<80;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
c.style.animationDuration=(Math.random()*2+2)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
}
}

/* UI */
function update(){
if(finished) return;

timer.innerText=t;

progressCircle.style.strokeDashoffset=440*(1-(t/totalTime));

let total=p.series*p.exercices.length*p.reps;
let current=(serieIndex-1)*p.exercices.length*p.reps+(exIndex)*p.reps+(repIndex-1);
bar.style.width=(current/total)*100+"%";

exoInfo.innerText="Exercice "+(exIndex+1)+" / "+p.exercices.length;
repInfo.innerText="Rép "+repIndex+" / "+p.reps;
serieInfo.innerText="Série "+serieIndex+" / "+p.series;

let patho=localStorage.getItem("pathologie");
img.src=(patho==="epaule" && phase==="ex")
? "tendinitedelacoiffe"+(exIndex+1)+".jpg"
: "";
}

/* LOGIQUE */
function next(){

if(phase==="prep"){
speak("Préparez-vous");
phase="ex";
t=p.tempsEx;
totalTime=p.tempsEx;
return;
}

if(phase==="ex"){
beep(500);
phase="repos";
t=p.tempsRepos;
totalTime=p.tempsRepos;
return;
}

beep(900);

repIndex++;

if(repIndex>p.reps){
repIndex=1;
exIndex++;

if(exIndex>=p.exercices.length){
exIndex=0;
serieIndex++;

if(serieIndex>p.series){
endSession();
return;
}
}
}

phase="ex";
t=p.tempsEx;
totalTime=p.tempsEx;
}

function nextExercise(){
repIndex=1;
exIndex++;

if(exIndex>=p.exercices.length){
exIndex=0;
serieIndex++;

if(serieIndex>p.series){
endSession();
return;
}
}

phase="ex";
t=p.tempsEx;
totalTime=p.tempsEx;

update();
}

function endSession(){
finished=true;
document.getElementById("main").style.display="none";
document.getElementById("endScreen").style.display="flex";
trumpet();
confetti();
}

/* CONTROLES */
function togglePause(){
paused=!paused;
pauseBtn.innerText=paused?"▶ Reprendre":"⏸ Pause";
}

function toggleSound(){
soundOn=!soundOn;
soundBtn.innerText=soundOn?"🔊 Son":"🔇 Son";
}

function back(){
window.location="config.html";
}

function enableFullScreen(){
document.documentElement.requestFullscreen?.();
}

/* LOOP */
function loop(){
if(paused||finished) return;
t--;
update();
if(t<=0) next();
}

/* INIT */
update();
setInterval(loop,1000);

</script>

</body>
</html>
