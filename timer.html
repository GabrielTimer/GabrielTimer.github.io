<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#f1f5f9;
color:#0f172a;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
height:100dvh;
overflow:hidden;
transition:background 0.3s;
}

.container{
width:100%;
height:100%;
display:flex;
flex-direction:column;
padding:10px;
box-sizing:border-box;
}

.inner{
max-width:380px;
width:100%;
margin:auto;
display:flex;
flex-direction:column;
height:100%;
}

.header{
text-align:center;
margin-bottom:5px;
}

.logo{
width:60px;
}

#img{
width:100%;
height:190px;
object-fit:contain;
margin:10px 0 10px 0;
display:none;
}

.timerZone{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:240px;
}

.circleWrap{
position:relative;
width:190px;
height:190px;
cursor:pointer;
}

#timer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.timerLabel{font-size:14px;opacity:0.8;}
.timerValue{
font-size:46px;
font-weight:bold;
}

#playIcon{
font-size:30px;
margin-top:5px;
}

.infoBottom{
text-align:center;
margin-top:12px;
font-size:15px;
font-weight:600;
opacity:0.95;
}

.circleWrap:hover #playIcon{transform:scale(1.2);}
.circleWrap:active #playIcon{transform:scale(0.9);}

@keyframes pulse {
0% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.3); opacity: 0.6; }
100% { transform: scale(1); opacity: 1; }
}
.pulse{animation: pulse 0.9s infinite;}

.bottomFixed{
position:sticky;
bottom:0;
padding-top:10px;
background:inherit;
}

.barContainer{
height:6px;
background:rgba(255,255,255,0.2);
border-radius:10px;
margin-bottom:6px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
}

#totalTime{
font-size:12px;
margin-bottom:4px;
text-align:center;
opacity:0.8;
}

/* 🔥 FIX GRID POUR 3 BOUTONS */
.buttons{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
}

button{
height:40px;
border:none;
border-radius:12px;
background:#e2e8f0;
color:#0f172a;
font-size:13px;
font-weight:600;
transition:0.2s;
}

button:hover{transform:scale(1.05);}
button:active{transform:scale(0.95);}
</style>
</head>

<body>

<div class="container">
<div class="inner">

<div class="header">
<img src="logo.png" class="logo">
</div>

<img id="img">

<div class="timerZone">

<div class="circleWrap" onclick="togglePause()">
<svg viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45" stroke="rgba(255,255,255,0.2)" stroke-width="6" fill="none"/>
<circle id="progressCircle" cx="50" cy="50" r="45" stroke="#00e5ff" stroke-width="6" fill="none" transform="rotate(-90 50 50)"/>
</svg>

<div id="timer">
<div class="timerLabel">PRÉPAREZ VOUS</div>
<div class="timerValue" id="timerValue">0</div>
<div id="playIcon">⏸</div>
</div>
</div>

<div class="infoBottom">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>

</div>

<div class="bottomFixed">

<div id="totalTime"></div>

<div class="barContainer">
<div id="bar"></div>
</div>

<div class="buttons">
<button id="soundBtn" onclick="toggleSound()">🔊 Son</button>
<button onclick="skipExo()">⏭</button>
<button onclick="back()">⚙️</button>
</div>

</div>

</div>
</div>

<script>

/* ===== CODE ORIGINAL INTACT ===== */

let p = JSON.parse(localStorage.getItem("programme_temp"));
if(!p){window.location="config.html";}

const timerLabel = document.querySelector(".timerLabel");

let exIndex=0, repIndex=1, serieIndex=1;
let phase="prep";
let PREP_TIME = 3;
let t=PREP_TIME, totalTimePhase=PREP_TIME;
let paused=false;
let soundOn=true;

let totalSessionTime=0;
let remainingTime=0;

let lastImage = "";

let radius=45;
let circumference=2*Math.PI*radius;
progressCircle.style.strokeDasharray=circumference;

function computeTotal(){
totalSessionTime = 0;

p.exercices.forEach((exo, index)=>{
for(let r=0; r<exo.reps; r++){
totalSessionTime += exo.ex;

let isLastExo = index === p.exercices.length - 1;
let isLastRep = r === exo.reps - 1;

if(!(isLastExo && isLastRep)){
totalSessionTime += exo.repos;
}
}
});

totalSessionTime *= p.series;
totalSessionTime += PREP_TIME;

remainingTime = totalSessionTime;
}
computeTotal();

function formatTime(s){
let m=Math.floor(s/60);
return m+":"+(s%60<10?"0":"")+s%60;
}

function updateTotal(){
totalTime.innerText="Durée : "+formatTime(remainingTime);
}
updateTotal();

function beep(){
if(!soundOn)return;
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.frequency.value=800;
o.connect(ctx.destination);
o.start();
setTimeout(()=>o.stop(),150);
}

function speak(t){
if(!soundOn)return;
let u=new SpeechSynthesisUtterance(t);
u.lang="fr-FR";
speechSynthesis.speak(u);
}

function toggleSound(){
soundOn=!soundOn;
soundBtn.innerHTML = soundOn ? "🔊 Son" : "🔇 Muet";
}

function togglePause(){
paused=!paused;
let icon = document.getElementById("playIcon");

if(paused){
icon.innerText = "▶️";
icon.classList.add("pulse");
}else{
icon.innerText = "⏸";
icon.classList.remove("pulse");
}
}

function update(){

let progress = 1 - (t / totalTimePhase);
progressCircle.style.strokeDashoffset = circumference * progress;

/* 🎨 VERSION COHÉRENTE AVEC TON SITE */
if(phase==="prep"){
    document.body.style.background="#f1f5f9";
    document.body.style.color="#0f172a";
}
if(phase==="ex"){
    document.body.style.background="#ef4444";
    document.body.style.color="#ffffff";
}
if(phase==="repos"){
    document.body.style.background="#2563eb";
    document.body.style.color="#ffffff";
}

timerValue.innerText=t;

if(phase==="prep") timerLabel.innerText="PRÉPAREZ VOUS";
if(phase==="ex") timerLabel.innerText="EXERCICE";
if(phase==="repos") timerLabel.innerText="REPOS";

bar.style.width=((totalSessionTime-remainingTime)/totalSessionTime*100)+"%";

let exo=p.exercices[exIndex];
exoInfo.innerText=exo.nom;
repInfo.innerText="Rép "+repIndex+"/"+exo.reps;
serieInfo.innerText="Série "+serieIndex+"/"+p.series;

let patho = localStorage.getItem("pathologie");

if(patho){
img.style.display="block";

let base = "images/"+patho+"/ex"+(exIndex+1);
let jpg = base + ".jpg";
let png = base + ".png";

if(lastImage !== jpg && lastImage !== png){

img.onerror = null;

img.src = jpg;
lastImage = jpg;

img.onerror = function(){
this.onerror = null;
this.src = png;
lastImage = png;
};

}

}else{
img.style.display="none";
}
}
/* ===== AJOUTS SAFE ===== */

function recomputeRemainingTime(){

let time = 0;

for(let s = serieIndex - 1; s < p.series; s++){

for(let e = (s === serieIndex - 1 ? exIndex : 0); e < p.exercices.length; e++){

let exo = p.exercices[e];

let startRep = (s === serieIndex - 1 && e === exIndex) ? repIndex : 1;

for(let r = startRep; r <= exo.reps; r++){

time += exo.ex;

let isLastSerie = s === p.series - 1;
let isLastExo = e === p.exercices.length - 1;
let isLastRep = r === exo.reps;

if(!(isLastSerie && isLastExo && isLastRep)){
time += exo.repos;
}

}

}

}

remainingTime = time + t;
updateTotal();
}

function skipExo(){

repIndex = 1;
exIndex++;

if(exIndex >= p.exercices.length){
exIndex = 0;
serieIndex++;
}

if(serieIndex > p.series){
window.location="fin.html";
return;
}

phase = "ex";
t = p.exercices[exIndex].ex;
totalTimePhase = t;

recomputeRemainingTime();
update();
}

/* ===== ORIGINAL ===== */

function next(){
let exo=p.exercices[exIndex];

if(phase==="prep"){
phase="ex";
t=exo.ex;
totalTimePhase=exo.ex;
beep();
update();
return;
}

if(phase==="ex"){
phase="repos";
t=exo.repos;
totalTimePhase=exo.repos;
speak("repos");
update();
return;
}

phase="ex";
t=exo.ex;
totalTimePhase=exo.ex;
beep();

repIndex++;

if(repIndex>exo.reps){
repIndex=1;
exIndex++;
if(exIndex>=p.exercices.length){
exIndex=0;
serieIndex++;
}
}

update();
}

function loop(){
if(paused) return;

t--;
remainingTime = Math.max(0, remainingTime - 1);

if(remainingTime <= 0){
window.location="fin.html";
return;
}

updateTotal();

if(t<=0){
next();
}else{
update();
}
}

function back(){window.location="config.html";}

update();
setInterval(loop,1000);

</script>
</body>
</html>
