<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100dvh;
overflow:hidden;
}

.container{
width:100%;
max-width:380px;
height:100%;
display:flex;
flex-direction:column;
padding:8px;
box-sizing:border-box;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.infoBox{font-size:15px;font-weight:bold;}

.logo{
width:65px;
filter:drop-shadow(0 0 6px white);
}

.imageZone{
flex:1;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

#img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

#restText{
position:absolute;
font-size:48px;
font-weight:bold;
display:none;
}

.timerZone{
flex:1;
display:flex;
align-items:flex-end;
justify-content:center;
margin-bottom:6px;
}

.circleWrap{
position:relative;
width:170px;
height:170px;
}

#timer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.timerLabel{font-size:13px;}
.timerValue{font-size:42px;font-weight:bold;}

.barContainer{
height:4px;
background:rgba(255,255,255,0.2);
border-radius:10px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:6px;
}

button{
height:38px;
border:none;
border-radius:10px;
background:#d0d0d0;
color:#222;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>
<img src="logo.png" class="logo">
</div>

<div class="imageZone">
<img id="img">
<div id="restText">REPOS</div>
</div>

<div class="timerZone">
<div class="circleWrap">

<svg viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45" stroke="rgba(255,255,255,0.2)" stroke-width="6" fill="none"/>
<circle id="progressCircle" cx="50" cy="50" r="45" stroke="#00e5ff" stroke-width="6" fill="none" transform="rotate(-90 50 50)"/>
</svg>

<div id="timer">
<div class="timerLabel"></div>
<div class="timerValue" id="timerValue"></div>
</div>

</div>
</div>

<div>
<div id="totalTime"></div>
<div class="barContainer"><div id="bar"></div></div>
</div>

<div class="buttons">
<button onclick="togglePause()">⏸</button>
<button onclick="nextExercise()">⏭</button>
<button onclick="toggleSound()">🔊</button>
<button onclick="back()">⚙️</button>
</div>

</div>

<script>

/* SAFE START */
window.onload = function(){

let p = JSON.parse(localStorage.getItem("programme_temp"));
if(!p){window.location="config.html";}

/* DOM */
const timerLabel = document.querySelector(".timerLabel");
const timerValue = document.getElementById("timerValue");
const progressCircle = document.getElementById("progressCircle");
const bar = document.getElementById("bar");
const img = document.getElementById("img");
const restText = document.getElementById("restText");
const exoInfo = document.getElementById("exoInfo");
const repInfo = document.getElementById("repInfo");
const serieInfo = document.getElementById("serieInfo");
const totalTime = document.getElementById("totalTime");

/* STATE */
let exIndex=0, repIndex=1, serieIndex=1;
let phase="prep";
let t=3, totalTimePhase=3;
let paused=false;
let soundOn=true;

let totalSessionTime=0;
let elapsedTime=0;

/* cercle */
let radius=45;
let circumference=2*Math.PI*radius;
progressCircle.style.strokeDasharray=circumference;

/* total */
p.exercices.forEach(exo=>{
totalSessionTime+=(exo.ex+exo.repos)*exo.reps;
});
totalSessionTime*=p.series;

totalTime.innerText="Durée : "+totalSessionTime+"s";

/* update */
function update(){

progressCircle.style.strokeDashoffset = circumference * (1 - t/totalTimePhase);

timerValue.innerText=t;

let exo=p.exercices[exIndex];
exoInfo.innerText=exo.nom;
repInfo.innerText="Rép "+repIndex+"/"+exo.reps;
serieInfo.innerText="Série "+serieIndex+"/"+p.series;

bar.style.width=(elapsedTime/totalSessionTime*100)+"%";

if(phase==="repos"){
img.style.display="none";
restText.style.display="block";
}else{
img.style.display="block";
restText.style.display="none";
img.src="images/ex"+(exIndex+1)+".jpg";
}
}

/* logique */
function next(){
let exo=p.exercices[exIndex];

if(phase==="prep"){phase="ex";t=exo.ex;return;}
if(phase==="ex"){phase="repos";t=exo.repos;return;}

phase="ex";
t=exo.ex;
repIndex++;

if(repIndex>exo.reps){
repIndex=1;
exIndex++;
}
}

/* FIX bouton */
window.nextExercise = function(){
exIndex++;
repIndex=1;
phase="ex";
t=p.exercices[exIndex].ex;
update();
}

/* loop */
function loop(){
if(paused)return;
t--;
elapsedTime++;
if(t<=0)next();
update();
}

window.togglePause = ()=>paused=!paused;
window.toggleSound = ()=>{};
window.back = ()=>window.location="config.html";

setInterval(loop,1000);
update();

}

</script>

</body>
</html>
