<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100dvh;
overflow:hidden;
transition:background 0.3s;
padding-bottom:env(safe-area-inset-bottom);
}

.container{
width:100%;
max-width:380px;
height:100%;
display:flex;
flex-direction:column;
padding:8px;
box-sizing:border-box;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.infoBox{
font-size:15px;
font-weight:bold;
}

.logo{
width:65px;
filter:drop-shadow(0 0 6px white);
}

.imageZone{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

#img{
max-width:85%;
max-height:150px;
object-fit:contain;
display:block;
}

.timerZone{
flex:1;
display:flex;
align-items:flex-end;
justify-content:center;
margin-bottom:12px;
}

.circleWrap{
position:relative;
width:170px;
height:170px;
}

#timer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.timerLabel{font-size:13px;}
.timerValue{
font-size:42px;
font-weight:bold;
transition:transform .15s;
}
.tick{transform:scale(1.15);}

.bottomBlock{
text-align:center;
}

#totalTime{
font-size:12px;
margin-bottom:2px;
}

.barContainer{
height:4px;
background:rgba(255,255,255,0.2);
border-radius:10px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:6px;
}

button{
height:38px;
border:none;
border-radius:10px;
background:#d0d0d0;
color:#222;
font-size:13px;
font-weight:bold;
}

button:active{transform:scale(0.95);}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>
<img src="logo.png" class="logo">
</div>

<div class="imageZone">
<img id="img">
</div>

<div class="timerZone">
<div class="circleWrap">

<svg viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45"
stroke="rgba(255,255,255,0.2)"
stroke-width="6"
fill="none"/>

<circle id="progressCircle"
cx="50" cy="50" r="45"
stroke="#00e5ff"
stroke-width="6"
fill="none"
transform="rotate(-90 50 50)"/>
</svg>

<div id="timer">
<div class="timerLabel">PRÉPAREZ VOUS</div>
<div class="timerValue" id="timerValue">0</div>
</div>

</div>
</div>

<div class="bottomBlock">
<div id="totalTime"></div>
<div class="barContainer"><div id="bar"></div></div>
</div>

<div class="buttons">
<button id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
<button onclick="nextExercise()">⏭ Exercice</button>
<button id="soundBtn" onclick="toggleSound()">🔊 Son</button>
<button onclick="back()">⚙️ Réglages</button>
</div>

</div>

<script>

let p = JSON.parse(localStorage.getItem("programme_temp"));
if(!p){window.location="config.html";}

const timerLabel = document.querySelector(".timerLabel");

let exIndex=0, repIndex=1, serieIndex=1;
let phase="prep";
let t=3, totalTimePhase=3;
let paused=false;
let soundOn=true;

let totalSessionTime=0;
let elapsedTime=0;

/* 🔥 NOUVEAU */
let waitingResume = false;
let countdownInterval = null;

let radius=45;
let circumference=2*Math.PI*radius;
progressCircle.style.strokeDasharray=circumference;

function computeTotal(){
p.exercices.forEach(exo=>{
totalSessionTime+=(exo.ex+exo.repos)*exo.reps;
});
totalSessionTime*=p.series;
totalSessionTime-=p.exercices[p.exercices.length-1].repos;
}
computeTotal();

function formatTime(s){
let m=Math.floor(s/60);
return m+":"+(s%60<10?"0":"")+s%60;
}

totalTime.innerText="Durée de ma séance : "+formatTime(totalSessionTime);

function beep(){
if(!soundOn)return;
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.frequency.value=800;
o.connect(ctx.destination);
o.start();
setTimeout(()=>o.stop(),150);
}

function toggleSound(){
soundOn=!soundOn;
soundBtn.innerHTML = soundOn ? "🔊 Son" : "🔇 Muet";
}

function togglePause(){

if(waitingResume){

let count = 3;
timerLabel.innerText = count;

countdownInterval = setInterval(()=>{
count--;

if(count > 0){
timerLabel.innerText = count;
}else{
clearInterval(countdownInterval);

waitingResume = false;
paused = false;

timerLabel.innerText = "EXERCICE";
beep();
}
},1000);

return;
}

paused = !paused;
pauseBtn.innerHTML = paused ? "▶️ Reprendre" : "⏸ Pause";
}

function update(){

let progress = 1 - (t / totalTimePhase);
progressCircle.style.strokeDashoffset = circumference * progress;

if(phase==="prep") document.body.style.background="#1b5e20";
if(phase==="ex") document.body.style.background="#b71c1c";
if(phase==="repos") document.body.style.background="#0d47a1";
if(phase==="pause") document.body.style.background="#6a1b9a";

timerValue.innerText=t;

if(phase==="prep") timerLabel.innerText="PRÉPAREZ VOUS";
if(phase==="ex") timerLabel.innerText="EXERCICE";
if(phase==="repos") timerLabel.innerText="REPOS";
if(phase==="pause") timerLabel.innerText="PRÊT ?";

bar.style.width=(elapsedTime/totalSessionTime*100)+"%";

let exo=p.exercices[exIndex];
exoInfo.innerText=exo.nom;
repInfo.innerText="Rép "+repIndex+"/"+exo.reps;
serieInfo.innerText="Série "+serieIndex+"/"+p.series;

let patho = localStorage.getItem("pathologie");

if(patho){
img.src = "images/"+patho+"/ex"+(exIndex+1)+".png";
}
}

function next(){
let exo=p.exercices[exIndex];

if(phase==="prep"){
phase="ex";
t=exo.ex;
totalTimePhase=exo.ex;
beep();
update();
return;
}

if(phase==="ex"){
phase="repos";
t=exo.repos;
totalTimePhase=exo.repos;
update();
return;
}

/* 🔥 PAUSE AUTO */
if(phase==="repos"){

repIndex++;

if(repIndex>exo.reps){
repIndex=1;
exIndex++;
if(exIndex>=p.exercices.length){
exIndex=0;
serieIndex++;
}
}

paused = true;
waitingResume = true;

phase="pause";
t=0;
totalTimePhase=1;

pauseBtn.innerHTML = "▶️ Reprendre";
update();
return;
}
}

function loop(){
if(paused)return;

t--;

if(t<=0){
next();
}else{
elapsedTime++;
update();
}
}

function nextExercise(){repIndex=1;exIndex++;phase="ex";}
function back(){window.location="config.html";}

update();
setInterval(loop,1000);

</script>

</body>
</html>
