<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Timer</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
transition:background 0.3s;
}

.phase{font-size:42px;margin-bottom:10px;}
.exerciseName{font-size:30px;}
.seriesInfo{font-size:20px;margin-bottom:20px;}

.timer{font-size:100px;}

svg{width:250px;height:250px;}
circle{fill:none;stroke-width:12;}
.bg{stroke:#333;}
.progress{
stroke:#00c6ff;
stroke-dasharray:880;
stroke-dashoffset:880;
transform:rotate(-90deg);
transform-origin:50% 50%;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#0e8f9b;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<div class="phase" id="phase"></div>
<div class="exerciseName" id="name"></div>
<div class="seriesInfo" id="info"></div>

<svg>
<circle class="bg" cx="125" cy="125" r="110"/>
<circle class="progress" id="progress" cx="125" cy="125" r="110"/>
</svg>

<div class="timer" id="timer"></div>

<div>
<button onclick="togglePause()" id="pauseBtn">Pause</button>
<button onclick="back()">Réglages</button>
</div>

<script>

// 🔹 récupération programme
let data = localStorage.getItem("programme_temp");

if(!data){
let u = localStorage.getItem("currentUser");
if(u){
data = localStorage.getItem("programme_"+u);
}
}

let p = JSON.parse(data);

// 🔹 variables
let i=0, rep=1, serie=1;
let phase="prep";
let t=5, total=5;
let paused=false;

let progress=document.getElementById("progress");
let circ=880;

// 🔊 voix
function speak(txt){
let msg=new SpeechSynthesisUtterance(txt);
msg.lang="fr-FR";
speechSynthesis.speak(msg);
}

// 🔁 changement phase
function next(){

if(phase==="prep"){
phase="ex";
t=p.tempsEx;
total=t;
speak("C'est parti");
document.body.style.background="#1b5e20";
}

else if(phase==="ex"){
phase="rest";
t=p.tempsRepos;
total=t;
speak("Repos");
document.body.style.background="#b71c1c";
}

else{
phase="ex";
i++;

if(i>=p.exercices.length){
i=0;
rep++;
if(rep>p.reps){
rep=1;
serie++;
}
}

if(serie>p.series){
phaseEl.innerText="Terminé 🎉";
timerEl.innerText="";
return;
}

t=p.tempsEx;
total=t;
speak("Exercice");
document.body.style.background="#1b5e20";
}

update();
}

// 🔄 affichage
function update(){

timerEl.innerText=t;

nameEl.innerText =
phase==="prep" ? "Préparez-vous" :
phase==="rest" ? "Repos" :
p.exercices[i];

phaseEl.innerText =
phase==="prep" ? "Préparation" :
phase==="rest" ? "Repos" :
"Exercice";

infoEl.innerText = "Série "+serie+" | Rép "+rep;

progress.style.strokeDashoffset = circ*(1-(t/total));
}

// 🔁 boucle timer
function loop(){

if(paused) return;

t--;
update();

if(t<=0){
next();
}
}

// ⏸️ pause
function togglePause(){

let btn = document.getElementById("pauseBtn");

paused = !paused;

if(paused){
btn.innerText="Reprendre";
}else{
btn.innerText="Pause";
}

}

// 🔙 retour config
function back(){
window.location="config.html";
}

// 🔹 éléments DOM
let timerEl=document.getElementById("timer");
let nameEl=document.getElementById("name");
let phaseEl=document.getElementById("phase");
let infoEl=document.getElementById("info");

// 🔁 lancement
update();
setInterval(loop,1000);

// 🔊 début
speak("Préparez-vous");

</script>

</body>
</html>
