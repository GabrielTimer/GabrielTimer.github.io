<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100dvh;
overflow:hidden;
}

.container{
width:100%;
max-width:380px;
text-align:center;
}

.timerValue{
font-size:60px;
font-weight:bold;
margin:20px 0;
}

button{
height:40px;
width:200px;
border:none;
border-radius:10px;
background:#d0d0d0;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<div id="timerValue">0</div>
<button onclick="nextExercise()">⏭ Exercice</button>
</div>

<script>

let p = JSON.parse(localStorage.getItem("programme_temp"));
let exIndex = 0;
let t = 3;

/* 🔥 TIMER CONTROLÉ */
let interval = null;

function startTimer(){
clearInterval(interval);
interval = setInterval(()=>{
t--;
update();

if(t<=0){
next();
}
},1000);
}

function update(){
document.getElementById("timerValue").innerText = t;
}

/* logique normale */
function next(){
let exo = p.exercices[exIndex];
t = exo.ex;
update();
}

/* 🔥 bouton FIXÉ */
function nextExercise(){

exIndex++;
if(exIndex >= p.exercices.length){
exIndex = 0;
}

let exo = p.exercices[exIndex];

/* reset propre */
t = exo.ex;
update();

/* 🔥 RELANCE TIMER = SOLUTION */
startTimer();

}

/* start */
startTimer();

</script>

</body>
</html>
