<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

.timer{
font-size:100px;
}

button{
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<h1 id="name"></h1>
<div id="timer" class="timer"></div>

<button onclick="back()">Retour</button>

<script>

let data = localStorage.getItem("programme_temp");

if(!data){
let u = localStorage.getItem("currentUser");
if(u) data = localStorage.getItem("programme_"+u);
}

let p = JSON.parse(data);

let i=0;
let t=p.tempsEx;

function loop(){

timer.innerText = t;
name.innerText = p.exercices[i];

t--;

if(t<0){
i++;
if(i>=p.exercices.length){
i=0;
}
t=p.tempsEx;
}

}

function back(){
window.location="config.html";
}

setInterval(loop,1000);

</script>

</body>
</html>
