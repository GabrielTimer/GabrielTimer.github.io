<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100dvh;
overflow:hidden;
transition:background 0.3s;
}

.container{
width:100%;
max-width:380px;
height:100%;
display:flex;
flex-direction:column;
padding:8px;
box-sizing:border-box;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.infoBox{
font-size:15px;
font-weight:bold;
}

.logo{
width:65px;
filter:drop-shadow(0 0 6px white);
}

#img{
width:100%;
max-height:180px;
object-fit:contain;
margin-top:5px;
}

.timerZone{
flex:1;
display:flex;
align-items:flex-end;
justify-content:center;
margin-bottom:12px;
}

.circleWrap{
position:relative;
width:170px;
height:170px;
cursor:pointer;
}

#timer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.timerLabel{font-size:13px;}
.timerValue{
font-size:42px;
font-weight:bold;
}

/* play */
#playIcon{
font-size:34px;
margin-top:5px;
display:inline-block;
transition:transform 0.2s;
}

.circleWrap:hover #playIcon{
transform:scale(1.2);
}

.circleWrap:active #playIcon{
transform:scale(0.9);
}

/* pulse */
@keyframes pulse {
0% { transform: scale(1); opacity:1;}
50% { transform: scale(1.35); opacity:0.6;}
100% { transform: scale(1); opacity:1;}
}

.pulse{
animation: pulse 0.9s infinite;
}

/* bas */
.bottomBlock{text-align:center;}

#totalTime{font-size:12px;margin-bottom:2px;}

.barContainer{
height:4px;
background:rgba(255,255,255,0.2);
border-radius:10px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
}

/* boutons */
.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:6px;
}

button{
height:38px;
border:none;
border-radius:10px;
background:#d0d0d0;
color:#222;
font-size:13px;
font-weight:bold;
transition:transform 0.2s;
}

button:hover{transform:scale(1.08);}
button:active{transform:scale(0.95);}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>
<img src="logo.png" class="logo">
</div>

<img id="img">

<div class="timerZone">
<div class="circleWrap" onclick="togglePause()">

<svg viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45"
stroke="rgba(255,255,255,0.2)"
stroke-width="6"
fill="none"/>

<circle id="progressCircle"
cx="50" cy="50" r="45"
stroke="#00e5ff"
stroke-width="6"
fill="none"
transform="rotate(-90 50 50)"/>
</svg>

<div id="timer">
<div class="timerLabel">PRÉPAREZ VOUS</div>
<div class="timerValue" id="timerValue">0</div>
<div id="playIcon">⏸</div>
</div>

</div>
</div>

<div class="bottomBlock">
<div id="totalTime"></div>
<div class="barContainer"><div id="bar"></div></div>
</div>

<div class="buttons">
<button id="soundBtn" onclick="toggleSound()">🔊 Son</button>
<button onclick="back()">⚙️ Réglages</button>
</div>

</div>

<script>

let p = JSON.parse(localStorage.getItem("programme_temp"));
if(!p){window.location="config.html";}

let exIndex=0, repIndex=1, serieIndex=1;
let phase="prep";
let t=3, totalTimePhase=3;
let paused=false;
let soundOn=true;
let finished=false;

let totalSessionTime=0;
let elapsedTime=0;

let radius=45;
let circumference=2*Math.PI*radius;
progressCircle.style.strokeDasharray=circumference;

function computeTotal(){
p.exercices.forEach(exo=>{
totalSessionTime+=(exo.ex+exo.repos)*exo.reps;
});
totalSessionTime*=p.series;
}
computeTotal();

function togglePause(){

if(finished) return;

paused=!paused;

let icon=document.getElementById("playIcon");

if(paused){
icon.innerText="▶️";
icon.classList.add("pulse");
}else{
icon.innerText="⏸";
icon.classList.remove("pulse");

/* 🔥 si on sort d'une pause → lancer exo */
if(phase==="pause"){
phase="ex";
let exo=p.exercices[exIndex];
t=exo.ex;
totalTimePhase=exo.ex;
}
}
}

function toggleSound(){
soundOn=!soundOn;
soundBtn.innerHTML = soundOn ? "🔊 Son" : "🔇 Muet";
}

function update(){

timerValue.innerText=t;

if(finished){
timerLabel.innerText="🎉 Bravo !\nFélicitations du kiné 💪👏";
return;
}

if(phase==="prep") timerLabel.innerText="PRÉPAREZ VOUS";
if(phase==="ex") timerLabel.innerText="EXERCICE";
if(phase==="repos") timerLabel.innerText="REPOS";
if(phase==="pause") timerLabel.innerText="Prêt pour l’exercice suivant ?";

let exo=p.exercices[exIndex];
exoInfo.innerText=exo.nom;
repInfo.innerText="Rép "+repIndex+"/"+exo.reps;
serieInfo.innerText="Série "+serieIndex+"/"+p.series;

/* IMAGE */
let patho = localStorage.getItem("pathologie");
if(patho){
let urlJpg="images/"+patho+"/ex"+(exIndex+1)+".jpg";
let urlPng="images/"+patho+"/ex"+(exIndex+1)+".png";
img.src=urlJpg;
img.onerror=function(){this.src=urlPng;}
}
}

function next(){
let exo=p.exercices[exIndex];

if(phase==="prep"){
phase="ex";
t=exo.ex;
return;
}

if(phase==="ex"){
repIndex++;

if(repIndex>exo.reps){

repIndex=1;
exIndex++;

if(exIndex>=p.exercices.length){
exIndex=0;
serieIndex++;

if(serieIndex>p.series){
finished=true;
paused=true;
return;
}
}

/* 🔥 PAUSE ENTRE EXOS */
phase="pause";
paused=true;
document.getElementById("playIcon").innerText="▶️";
document.getElementById("playIcon").classList.add("pulse");
return;
}

/* sinon repos interne */
phase="repos";
t=exo.repos;
return;
}
}

function loop(){
if(paused || finished)return;

t--;

if(t<=0){
next();
}else{
elapsedTime++;
}
update();
}

function back(){window.location="config.html";}

update();
setInterval(loop,1000);

</script>

</body>
</html>
