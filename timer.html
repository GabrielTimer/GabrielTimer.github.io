<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Timer</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#222;
color:white;
}

.timer{
font-size:80px;
margin:20px;
}

.exercise{
font-size:30px;
}

button{
padding:10px 20px;
margin-top:20px;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="exercise" id="exo"></div>
<div class="timer" id="timer"></div>

<button onclick="retour()">⬅ Retour</button>

<script>

// 🔹 récupération programme
let data = localStorage.getItem("programme_temp");

if(!data){
let user = localStorage.getItem("currentUser");
if(user){
data = localStorage.getItem("programme_"+user);
}
}

let p = data ? JSON.parse(data) : null;

if(!p){
document.getElementById("exo").innerText="Erreur : aucun programme";
throw new Error("No program");
}

// 🔹 variables
let i=0;
let rep=1;
let serie=1;
let phase="prep";
let temps=5;
let interval;

// 🔹 lancement
lancer();

function lancer(){

if(phase==="prep"){
temps=5;
exo.innerText="Préparation";
}else if(phase==="ex"){
temps=p.tempsEx;
exo.innerText=p.exercices[i];
}else{
temps=p.tempsRepos;
exo.innerText="Repos";
}

timer.innerText=temps;

interval=setInterval(()=>{
temps--;
timer.innerText=temps;

if(temps<=0){
clearInterval(interval);
changerPhase();
}
},1000);

}

// 🔹 changement de phase
function changerPhase(){

if(phase==="prep"){
phase="ex";
}else if(phase==="ex"){
phase="repos";
}else{
phase="ex";
i++;

if(i>=p.exercices.length){
i=0;
rep++;

if(rep>p.reps){
rep=1;
serie++;
}
}
}

// 🔹 fin programme
if(serie>p.series){
exo.innerText="Programme terminé 🎉";
timer.innerText="";
return;
}

lancer();
}

// 🔹 bouton retour
function retour(){
window.location="config.html";
}

</script>

</body>
</html>
