<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* LOGO */
.logo{
position:fixed;
top:10px;
right:10px;
width:45px;
opacity:0.8;
}

/* LAYOUT */
.container{
width:100%;
max-width:380px;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
padding:10px;
box-sizing:border-box;
}

.infoBox{
text-align:center;
height:60px;
display:flex;
flex-direction:column;
justify-content:center;
}

#img{
width:100%;
max-height:130px;
object-fit:contain;
}

.timerZone{
height:200px;
display:flex;
align-items:center;
justify-content:center;
}

.circleWrap{
position:relative;
width:160px;
height:160px;
}

#timer{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
}

.barContainer{
width:100%;
height:8px;
background:rgba(255,255,255,0.2);
border-radius:10px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
}

.buttons{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}

button{
height:45px;
border:none;
border-radius:10px;
color:white;
font-size:14px;
cursor:pointer;
}

.pause{background:#ff9800;}
.next{background:#4caf50;}
.sound{background:#607d8b;}
.back{background:#0e8f9b;}

/* FIN */
#endScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1b5e20;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:22px;
text-align:center;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="container" id="main">

<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>

<img id="img">

<div class="timerZone">
<div class="circleWrap">
<svg width="160" height="160">
<circle cx="80" cy="80" r="70" stroke="rgba(255,255,255,0.2)" stroke-width="10" fill="none"/>
<circle id="progressCircle"
cx="80" cy="80" r="70"
stroke="#00e5ff"
stroke-width="10"
fill="none"
transform="rotate(-90 80 80)"
stroke-dasharray="440"
stroke-dashoffset="440"/>
</svg>
<div id="timer">0</div>
</div>
</div>

<div class="barContainer"><div id="bar"></div></div>

<div class="buttons">
<button id="pauseBtn" class="pause" onclick="togglePause()">⏸ Pause</button>
<button class="next" onclick="nextExercise()">⏭ Exercice</button>
<button id="soundBtn" class="sound" onclick="toggleSound()">🔊 Son</button>
<button class="back" onclick="back()">⚙️ Réglages</button>
</div>

</div>

<div id="endScreen">
<div>🎉 Bravo ! 🎉</div>
<div>👏 Avec les félicitations du kiné 👍</div>
</div>

<script>

let p = JSON.parse(localStorage.getItem("programme_temp"));

if(!p || !p.exercices){
alert("Programme manquant !");
window.location="config.html";
}

/* VARIABLES */
let exIndex=0, repIndex=1, serieIndex=1;
let phase="prep";
let t=3, totalTime=3;
let paused=false, finished=false;
let soundOn=true;

/* SON */
function beep(freq){
if(!soundOn) return;
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.type="sine";
o.frequency.value=freq;
o.connect(ctx.destination);
o.start();
setTimeout(()=>o.stop(),120);
}

/* CONFETTI */
function confetti(){
for(let i=0;i<50;i++){
let d=document.createElement("div");
d.style.position="fixed";
d.style.width="6px";
d.style.height="6px";
d.style.background="hsl("+Math.random()*360+",100%,50%)";
d.style.left=Math.random()*100+"vw";
d.style.top="-10px";
d.style.transition="3s";
document.body.appendChild(d);
setTimeout(()=>d.style.top="100vh",50);
setTimeout(()=>d.remove(),3000);
}
}

/* UPDATE */
function update(){

if(finished) return;

timer.innerText = isNaN(t) ? 0 : t;

/* cercle */
progressCircle.style.strokeDashoffset = 440*(1-(t/totalTime));

/* progression globale */
let total = p.series * p.exercices.length;
let current = (serieIndex-1)*p.exercices.length + exIndex;
bar.style.width = (current/total)*100+"%";

/* infos */
let exo = p.exercices[exIndex];

exoInfo.innerText = exo.nom || ("Exercice "+(exIndex+1));
repInfo.innerText = "Rép "+repIndex+"/"+(exo.reps || 1);
serieInfo.innerText = "Série "+serieIndex+"/"+p.series;

/* image uniquement patho épaule */
let patho = localStorage.getItem("pathologie");
img.src = (patho==="epaule" && phase==="ex")
? "tendinitedelacoiffe"+(exIndex+1)+".jpg"
: "";
}

/* LOGIQUE */
function next(){

let exo = p.exercices[exIndex];

/* PREP */
if(phase==="prep"){
phase="ex";
t = exo.tempsEx || 10;
totalTime = t;
return;
}

/* EXERCICE */
if(phase==="ex"){

let last =
exIndex===p.exercices.length-1 &&
repIndex===exo.reps &&
serieIndex===p.series;

if(last){
endSession();
return;
}

beep(500);
phase="repos";
t = exo.tempsRepos || 5;
totalTime = t;
return;
}

/* REPOS */
beep(800);

repIndex++;

if(repIndex > (exo.reps || 1)){
repIndex = 1;
exIndex++;

if(exIndex >= p.exercices.length){
exIndex = 0;
serieIndex++;
}
}

phase="ex";
t = p.exercices[exIndex].tempsEx || 10;
totalTime = t;
}

/* FIN */
function endSession(){
finished=true;
main.style.display="none";
endScreen.style.display="flex";
beep(700);
setTimeout(()=>beep(900),150);
confetti();
}

/* CONTROLES */
function togglePause(){
paused=!paused;
pauseBtn.innerText = paused ? "▶ Reprendre" : "⏸ Pause";
}

function toggleSound(){
soundOn=!soundOn;
soundBtn.innerText = soundOn ? "🔊 Son" : "🔇 Son";
}

function nextExercise(){
repIndex=1;
exIndex++;

if(exIndex>=p.exercices.length){
exIndex=0;
serieIndex++;
}

phase="ex";
t = p.exercices[exIndex].tempsEx || 10;
totalTime = t;
update();
}

function back(){
window.location="config.html";
}

/* LOOP */
function loop(){
if(paused || finished) return;
t--;
update();
if(t<=0) next();
}

/* INIT */
update();
setInterval(loop,1000);

</script>

</body>
</html>
