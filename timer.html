<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
transition:background 0.4s;
}

.logo{
position:fixed;
top:10px;
right:10px;
width:45px;
opacity:0.8;
}

.container{
width:100%;
max-width:380px;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
padding:10px;
box-sizing:border-box;
}

.infoBox{text-align:center;height:60px;}

#img{
width:100%;
max-height:130px;
object-fit:contain;
}

#prepText{
font-size:26px;
font-weight:bold;
color:#ffeb3b;
}

#restText{
font-size:34px;
font-weight:bold;
display:none;
}

.timerZone{
height:200px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.circleWrap{
position:relative;
width:160px;
height:160px;
}

#timer{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:bold;
}

.buttons{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

button{
height:45px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.pause{background:#ff9800;}
.next{background:#4caf50;}
.sound{background:#607d8b;}
.back{background:#0e8f9b;}

#endScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1b5e20;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:22px;
text-align:center;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="container" id="main">

<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>

<img id="img">

<div class="timerZone">

<div id="prepText"></div>
<div id="restText">REPOS</div>

<div class="circleWrap">
<svg width="160" height="160">
<circle cx="80" cy="80" r="70" stroke="rgba(255,255,255,0.2)" stroke-width="10" fill="none"/>
<circle id="progressCircle"
cx="80" cy="80" r="70"
stroke="#00e5ff"
stroke-width="10"
fill="none"
transform="rotate(-90 80 80)"
stroke-dasharray="440"
stroke-dashoffset="440"/>
</svg>
<div id="timer">0</div>
</div>

</div>

<div class="buttons">
<button id="pauseBtn" class="pause" onclick="togglePause()">⏸ Pause</button>
<button class="next" onclick="nextExercise()">⏭ Exercice</button>
<button id="soundBtn" class="sound" onclick="toggleSound()">🔊 Son</button>
<button class="back" onclick="back()">⚙️ Réglages</button>
</div>

</div>

<div id="endScreen">
<div>🎉 Bravo ! 🎉</div>
<div>👏 Avec les félicitations du kiné 👍</div>
</div>

<script>

let p = JSON.parse(localStorage.getItem("programme_temp"));
let patho = localStorage.getItem("pathologie");

let exIndex=0, repIndex=1, serieIndex=1;
let phase="prep";

let t=3, totalTime=3;
let paused=false, finished=false, soundOn=true;

function speak(text){
if(!soundOn) return;
let u=new SpeechSynthesisUtterance(text);
u.lang="fr-FR";
speechSynthesis.cancel();
speechSynthesis.speak(u);
}

function update(){

let exo=p.exercices[exIndex];

timer.innerText = t;
prepText.innerText = phase==="prep" ? "PRÉPAREZ-VOUS !" : "";
restText.style.display = phase==="repos" ? "block" : "none";

exoInfo.innerText = exo.nom;
repInfo.innerText = "Rép "+repIndex+"/"+exo.reps;
serieInfo.innerText = "Série "+serieIndex+"/"+p.series;

/* couleur */
if(phase==="ex"){
document.body.style.background="#c62828";
}else if(phase==="repos"){
document.body.style.background="#1565c0";
}else{
document.body.style.background="#1b5e20";
}

/* image */
if(patho && phase==="ex"){
img.src = "images/" + patho + "/ex" + (exIndex+1) + ".jpg";
}else{
img.src = "";
}

/* cercle */
let percent = t / totalTime;
progressCircle.style.strokeDashoffset = 440*(1-percent);
}

function next(){

let exo=p.exercices[exIndex];

if(phase==="prep"){
phase="ex";
t=exo.tempsEx;
totalTime=t;
speak("C'est parti");
return;
}

if(phase==="ex"){

let last =
exIndex===p.exercices.length-1 &&
repIndex===exo.reps &&
serieIndex===p.series;

if(last){
endSession();
return;
}

phase="repos";
t=exo.tempsRepos;
totalTime=t;
speak("Repos");
return;
}

repIndex++;

if(repIndex>exo.reps){
repIndex=1;
exIndex++;
if(exIndex>=p.exercices.length){
exIndex=0;
serieIndex++;
}
}

phase="ex";
t=p.exercices[exIndex].tempsEx;
totalTime=t;
speak("C'est parti");
}

function endSession(){
finished=true;
main.style.display="none";
endScreen.style.display="flex";
speak("Bravo");
}

function togglePause(){
paused=!paused;
pauseBtn.innerText = paused ? "▶ Reprendre" : "⏸ Pause";
}

function toggleSound(){
soundOn=!soundOn;
soundBtn.innerText = soundOn ? "🔊 Son" : "🔇 Son";
}

function nextExercise(){
repIndex=1;
exIndex++;
if(exIndex>=p.exercices.length){
exIndex=0;
serieIndex++;
}
phase="ex";
t=p.exercices[exIndex].tempsEx;
totalTime=t;
update();
}

function back(){
window.location="config.html";
}

setInterval(()=>{
if(paused || finished) return;

t--;

if(phase==="prep" && t>0 && t<=3){
speak(String(t));
}

if(t<0){
next();
}else{
update();
}

},1000);

speak("Préparez-vous");
update();

</script>

</body>
</html>
