<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100dvh;
overflow:hidden;
transition:background 0.3s;
padding-bottom:env(safe-area-inset-bottom);
}

.container{
width:100%;
max-width:380px;
height:100%;
display:flex;
flex-direction:column;
padding:8px;
box-sizing:border-box;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.infoBox{
font-size:15px;
font-weight:bold;
}

.logo{
width:65px;
filter:drop-shadow(0 0 6px white);
}

.imageZone{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

#img{
max-width:85%;
max-height:150px;
object-fit:contain;
display:block;
}

.timerZone{
flex:1;
display:flex;
align-items:flex-end;
justify-content:center;
margin-bottom:12px;
}

.circleWrap{
position:relative;
width:170px;
height:170px;
}

#timer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.timerLabel{font-size:13px;}
.timerValue{
font-size:42px;
font-weight:bold;
}

.bottomBlock{
text-align:center;
}

#totalTime{
font-size:12px;
margin-bottom:2px;
}

.barContainer{
height:4px;
background:rgba(255,255,255,0.2);
border-radius:10px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:6px;
}

button{
height:38px;
border:none;
border-radius:10px;
background:#d0d0d0;
color:#222;
font-size:13px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>
<img src="logo.png" class="logo">
</div>

<div class="imageZone">
<img id="img">
</div>

<div class="timerZone">
<div class="circleWrap">

<svg viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45"
stroke="rgba(255,255,255,0.2)"
stroke-width="6"
fill="none"/>

<circle id="progressCircle"
cx="50" cy="50" r="45"
stroke="#00e5ff"
stroke-width="6"
fill="none"
transform="rotate(-90 50 50)"/>
</svg>

<div id="timer">
<div class="timerLabel">PRÉPAREZ VOUS</div>
<div class="timerValue" id="timerValue">0</div>
</div>

</div>
</div>

<div class="bottomBlock">
<div id="totalTime"></div>
<div class="barContainer"><div id="bar"></div></div>
</div>

<div class="buttons">
<button id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
<button onclick="nextExercise()">⏭ Exercice</button>
<button id="soundBtn" onclick="toggleSound()">🔊 Son</button>
<button onclick="back()">⚙️ Réglages</button>
</div>

</div>

<script>

let p = JSON.parse(localStorage.getItem("programme_temp"));
if(!p){window.location="config.html";}

const timerLabel = document.querySelector(".timerLabel");

let exIndex=0, repIndex=1, serieIndex=1;
let phase="prep";
let t=3, totalTimePhase=3;
let paused=false;
let soundOn=true;

let totalSessionTime=0;
let elapsedTime=0;

let waitingResume = false;

let radius=45;
let circumference=2*Math.PI*radius;
progressCircle.style.strokeDasharray=circumference;

function computeTotal(){
p.exercices.forEach(exo=>{
totalSessionTime+=(exo.ex+exo.repos)*exo.reps;
});
totalSessionTime*=p.series;
totalSessionTime-=p.exercices[p.exercices.length-1].repos;
}
computeTotal();

totalTime.innerText="Durée : "+totalSessionTime+"s";

function beep(){
if(!soundOn)return;
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.frequency.value=800;
o.connect(ctx.destination);
o.start();
setTimeout(()=>o.stop(),150);
}

function toggleSound(){
soundOn=!soundOn;
}

function togglePause(){

if(waitingResume){

let count = 3;
timerLabel.innerText = count;

let interval = setInterval(()=>{
count--;

if(count>0){
timerLabel.innerText = count;
}else{
clearInterval(interval);

waitingResume = false;
paused = false;

next();
}
},1000);

return;
}

paused = !paused;
}

function update(){

timerValue.innerText=t;

if(phase==="prep") timerLabel.innerText="PRÉPAREZ VOUS";
if(phase==="ex") timerLabel.innerText="EXERCICE";
if(phase==="repos") timerLabel.innerText="REPOS";
if(phase==="pause") timerLabel.innerText="PRÊT ?";

let exo=p.exercices[exIndex];
exoInfo.innerText=exo.nom;
repInfo.innerText="Rép "+repIndex+"/"+exo.reps;
serieInfo.innerText="Série "+serieIndex+"/"+p.series;

/* 🔥 IMAGE CORRIGÉE */
let patho = localStorage.getItem("pathologie");

if(patho){
let urlJpg = "images/"+patho+"/ex"+(exIndex+1)+".jpg";
let urlPng = "images/"+patho+"/ex"+(exIndex+1)+".png";

img.src = urlJpg;

img.onerror = function(){
this.onerror=null;
this.src = urlPng;
};
}

}

function next(){

let exo=p.exercices[exIndex];

if(phase==="prep"){
phase="ex";
t=exo.ex;
update();
return;
}

if(phase==="ex"){
phase="repos";
t=exo.repos;
update();
return;
}

if(phase==="repos"){

repIndex++;

if(repIndex>exo.reps){
repIndex=1;
exIndex++;
}

paused = true;
waitingResume = true;

phase="pause";
t=0;

update();
return;
}

if(phase==="pause"){
phase="ex";
t=p.exercices[exIndex].ex;
update();
return;
}

}

function loop(){
if(paused)return;

t--;

if(t<=0){
next();
}else{
update();
}
}

function nextExercise(){
repIndex=1;
exIndex++;
phase="ex";
t=p.exercices[exIndex].ex;
update();
}

function back(){window.location="config.html";}

setInterval(loop,1000);
update();

</script>

</body>
</html>
