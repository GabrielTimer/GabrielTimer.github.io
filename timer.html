<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
transition:background 0.3s;
}

.logo{
position:fixed;
top:10px;
right:10px;
width:45px;
opacity:0.8;
}

.container{
width:100%;
max-width:380px;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
padding:10px;
box-sizing:border-box;
}

.infoBox{
text-align:center;
height:60px;
display:flex;
flex-direction:column;
justify-content:center;
}

#img{
width:100%;
max-height:130px;
object-fit:contain;
}

.timerZone{
height:200px;
display:flex;
align-items:center;
justify-content:center;
}

.circleWrap{
position:relative;
width:160px;
height:160px;
}

#timer{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
text-align:center;
}

.barContainer{
width:100%;
height:8px;
background:rgba(255,255,255,0.2);
border-radius:10px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
}

#totalTime{
font-size:16px;
margin-top:5px;
opacity:0.8;
}

.buttons{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}

button{
height:45px;
border:none;
border-radius:10px;
color:white;
font-size:14px;
cursor:pointer;
}

.pause{background:#ff9800;}
.next{background:#4caf50;}
.sound{background:#607d8b;}
.back{background:#0e8f9b;}

#endScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1b5e20;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:22px;
text-align:center;
}

/* 📱 MOBILE */
@media (max-width:600px){

.container{
height:100dvh;
padding:8px;
justify-content:space-around;
}

.infoBox{
height:auto;
font-size:13px;
}

.timerZone{
height:auto;
}

.circleWrap{
width:110px;
height:110px;
}

#timer{
font-size:24px;
}

#img{
max-height:70px;
}

.buttons{
gap:6px;
}

button{
height:34px;
font-size:12px;
}

#totalTime{
font-size:13px;
margin-top:2px;
}

}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="container" id="main">

<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>

<img id="img">

<div class="timerZone">
<div class="circleWrap">

<!-- 🔥 SVG RESPONSIVE -->
<svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">

<circle id="bgCircle"
cx="50" cy="50" r="45"
stroke="rgba(255,255,255,0.2)"
stroke-width="6"
fill="none"/>

<circle id="progressCircle"
cx="50" cy="50" r="45"
stroke="#00e5ff"
stroke-width="6"
fill="none"
transform="rotate(-90 50 50)"/>

</svg>

<div id="timer">0</div>
</div>
</div>

<div class="barContainer"><div id="bar"></div></div>
<div id="totalTime"></div>

<div class="buttons">
<button id="pauseBtn" class="pause" onclick="togglePause()">⏸ Pause</button>
<button class="next" onclick="nextExercise()">⏭ Exercice</button>
<button id="soundBtn" class="sound" onclick="toggleSound()">🔊 Son</button>
<button class="back" onclick="back()">⚙️ Réglages</button>
</div>

</div>

<div id="endScreen">
<div>🎉 Bravo ! 🎉</div>
<div>👏 Avec les félicitations du kiné 👍</div>
</div>

<script>

/* RECUP */
let p = JSON.parse(localStorage.getItem("programme_temp"));
if(!p){
window.location="config.html?v="+Date.now();
}

/* VARIABLES */
let exIndex=0, repIndex=1, serieIndex=1;
let phase="prep";
let t=3, totalTimePhase=3;
let paused=false, finished=false;
let soundOn=true;

let totalSessionTime=0;
let elapsedTime=0;

/* 🔥 CERCLE FIX */
let radius = 45;
let circumference = 2 * Math.PI * radius;
progressCircle.style.strokeDasharray = circumference;
progressCircle.style.strokeDashoffset = circumference;

/* CALCUL */
function computeTotal(){
p.exercices.forEach(exo=>{
totalSessionTime += (exo.ex + exo.repos) * exo.reps;
});
totalSessionTime *= p.series;
let last = p.exercices[p.exercices.length-1];
totalSessionTime -= last.repos;
}
computeTotal();

function formatTime(sec){
let m = Math.floor(sec/60);
let s = sec%10<10?sec%60:"0"+sec%60;
return m+":"+(s<10?"0"+s:s);
}

totalTime.innerText = "Durée de ma séance : " + formatTime(totalSessionTime);

/* VOIX / BEEP */
function speak(t){
if(!soundOn) return;
let u=new SpeechSynthesisUtterance(t);
u.lang="fr-FR";
speechSynthesis.speak(u);
}

function beep(){
if(!soundOn) return;
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.frequency.value=800;
o.connect(ctx.destination);
o.start();
setTimeout(()=>o.stop(),150);
}

/* UPDATE */
function update(){

let exo = p.exercices[exIndex];

/* cercle */
let progressPhase = 1 - (t / totalTimePhase);
progressCircle.style.strokeDashoffset = circumference * (1 - progressPhase);

/* barre */
let progress = elapsedTime / totalSessionTime;
if(progress>1) progress=1;
bar.style.width = (progress*100)+"%";

/* couleurs */
if(phase==="prep") document.body.style.background="#1b5e20";
if(phase==="ex") document.body.style.background="#b71c1c";
if(phase==="repos") document.body.style.background="#0d47a1";

/* texte */
if(phase==="prep"){
timer.innerHTML="PRÉPAREZ-VOUS<br>"+t;
if(t===3) speak("Préparez vous");
}
if(phase==="ex"){timer.innerHTML="EXERCICE<br>"+t;}
if(phase==="repos"){timer.innerHTML="REPOS<br>"+t;}

/* infos */
exoInfo.innerText=exo.nom;
repInfo.innerText="Rép "+repIndex+"/"+exo.reps;
serieInfo.innerText="Série "+serieIndex+"/"+p.series;

let patho=localStorage.getItem("pathologie");
img.src=(patho && phase==="ex")?"images/"+patho+"/ex"+(exIndex+1)+".jpg":"";
}

/* logique */
function next(){
let exo = p.exercices[exIndex];

if(phase==="prep"){phase="ex";t=exo.ex;totalTimePhase=exo.ex;beep();return;}
if(phase==="ex"){phase="repos";t=exo.repos;totalTimePhase=exo.repos;speak("repos");return;}

phase="ex";t=exo.ex;totalTimePhase=exo.ex;beep();
repIndex++;

if(repIndex>exo.reps){repIndex=1;exIndex++;if(exIndex>=p.exercices.length){exIndex=0;serieIndex++;}}
if(serieIndex>p.series) endSession();
}

/* fin */
function endSession(){
finished=true;
main.style.display="none";
endScreen.style.display="flex";
speak("Bravo");
}

/* controls */
function togglePause(){paused=!paused;pauseBtn.innerText=paused?"▶ Reprendre":"⏸ Pause";}
function toggleSound(){soundOn=!soundOn;soundBtn.innerText=soundOn?"🔊 Son":"🔇 Son";}
function nextExercise(){repIndex=1;exIndex++;if(exIndex>=p.exercices.length) exIndex=0;phase="ex";t=p.exercices[exIndex].ex;totalTimePhase=t;update();}
function back(){window.location="config.html?v="+Date.now();}

/* loop */
function loop(){if(paused||finished) return;t--;elapsedTime++;update();if(t<=0) next();}
update();
setInterval(loop,1000);

</script>

</body>
</html>
