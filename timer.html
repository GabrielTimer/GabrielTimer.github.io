<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
}

.infoBox{
text-align:center;
margin-bottom:10px;
}

.infoBox div{
margin:3px 0;
font-size:18px;
}

#img{
max-width:250px;
border-radius:12px;
margin-bottom:15px;
display:none;
}

.circleWrap{
position:relative;
width:180px;
height:180px;
}

.circleWrap svg{
position:absolute;
top:0;
left:0;
}

#timer{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
font-weight:bold;
}

.barContainer{
width:200px;
height:8px;
background:rgba(255,255,255,0.2);
border-radius:10px;
margin-top:15px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
transition:0.3s;
}

button{
padding:12px 18px;
margin:6px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

button:hover{transform:scale(1.05);}
button:active{transform:scale(0.95);}

.pause{background:#ff9800;}
.next{background:#4caf50;}
.sound{background:#607d8b;}
.back{background:#0e8f9b;}
</style>
</head>

<body>

<div class="container">

<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>

<img id="img">

<div class="circleWrap">
<svg width="180" height="180">
<circle cx="90" cy="90" r="80" stroke="rgba(255,255,255,0.2)" stroke-width="10" fill="none"/>
<circle id="progressCircle"
cx="90" cy="90" r="80"
stroke="#00e5ff"
stroke-width="10"
fill="none"
stroke-linecap="round"
transform="rotate(-90 90 90)"
stroke-dasharray="502"
stroke-dashoffset="502"/>
</svg>
<div id="timer">0</div>
</div>

<div class="barContainer"><div id="bar"></div></div>

<button id="pauseBtn" class="pause" onclick="togglePause()">⏸ Pause</button>
<button class="next" onclick="nextExercise()">⏭ Exercice suivant</button>
<button id="soundBtn" class="sound" onclick="toggleSound()">🔊 Son</button>
<button class="back" onclick="back()">⚙️ Réglages</button>

</div>

<script>

let data = localStorage.getItem("programme_temp");
let p = JSON.parse(data);

let exIndex = 0;
let repIndex = 1;
let serieIndex = 1;

let phase="prep";
let t=3, totalTime=3;
let paused=false;

let soundOn = localStorage.getItem("sound") !== "off";

/* SONS */
function soundExerciceFin(){
if(!soundOn) return;
let ctx = new AudioContext();
let osc = ctx.createOscillator();
osc.frequency.value=600;
osc.connect(ctx.destination);
osc.start();
setTimeout(()=>osc.stop(),150);
}

function soundReposFin(){
if(!soundOn) return;
let ctx = new AudioContext();
let osc = ctx.createOscillator();
osc.frequency.value=900;
osc.connect(ctx.destination);
osc.start();
setTimeout(()=>osc.stop(),150);
}

/* IMAGE */
function updateImage(){
let patho = localStorage.getItem("pathologie");
if(patho==="epaule" && phase==="ex"){
img.src = "tendinitedelacoiffe"+(exIndex+1)+".jpg";
img.style.display="block";
}else{
img.style.display="none";
}
}

/* INFOS */
function updateInfos(){
exoInfo.innerText = "Exercice " + (exIndex+1) + " / " + p.exercices.length;
repInfo.innerText = "Répétition " + repIndex + " / " + p.reps;
serieInfo.innerText = "Série " + serieIndex + " / " + p.series;
}

/* CERCLE */
function updateCircle(){
let percent = t/totalTime;
progressCircle.style.strokeDashoffset = 502*(1-percent);
}

/* BARRE */
function updateBar(){
let total = p.series * p.exercices.length * p.reps;
let current =
(serieIndex-1)*p.exercices.length*p.reps +
(exIndex)*p.reps +
(repIndex-1);

bar.style.width = (current/total)*100+"%";
}

/* UPDATE */
function update(){
timer.innerText = t;
updateCircle();
updateBar();
updateImage();
updateInfos();
}

/* LOGIQUE NORMALE */
function next(){

if(phase==="prep"){
phase="ex";
t=p.tempsEx;
totalTime=p.tempsEx;
return;
}

if(phase==="ex"){
soundExerciceFin();
phase="repos";
t=p.tempsRepos;
totalTime=p.tempsRepos;
return;
}

soundReposFin();

repIndex++;

if(repIndex > p.reps){
repIndex = 1;
exIndex++;

if(exIndex >= p.exercices.length){
exIndex = 0;
serieIndex++;

if(serieIndex > p.series){
timer.innerText="✔";
return;
}
}
}

phase="ex";
t=p.tempsEx;
totalTime=p.tempsEx;
}

/* 🔥 NOUVEAU : EXERCICE SUIVANT DIRECT */
function nextExercise(){

repIndex = 1;
exIndex++;

if(exIndex >= p.exercices.length){
exIndex = 0;
serieIndex++;

if(serieIndex > p.series){
timer.innerText="✔";
return;
}
}

phase="ex";
t=p.tempsEx;
totalTime=p.tempsEx;

update();
}

/* CONTROLES */
function togglePause(){
paused=!paused;
pauseBtn.innerText = paused?"▶ Reprendre":"⏸ Pause";
}

function toggleSound(){
soundOn=!soundOn;
soundBtn.innerText = soundOn?"🔊 Son":"🔇 Son";
}

function loop(){
if(paused) return;
t--;
update();
if(t<=0) next();
}

function back(){
window.location="config.html";
}

/* INIT */
update();
setInterval(loop,1000);

</script>

</body>
</html>
