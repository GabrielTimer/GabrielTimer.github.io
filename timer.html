<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
body{
margin:0;
background:#1b5e20;
color:white;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
display:flex;
justify-content:center;
height:100dvh;
overflow:hidden;
transition:background 0.3s;
}

.container{
width:100%;
max-width:380px;
height:100%;
display:flex;
flex-direction:column;
padding:10px;
box-sizing:border-box;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.infoBox{
font-size:15px;
font-weight:600;
}

.logo{
width:60px;
}

/* IMAGE FIXE */
#img{
width:100%;
height:160px;
object-fit:contain;
margin:5px 0;
}

/* ZONE CENTRALE */
.timerZone{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

/* CERCLE */
.circleWrap{
position:relative;
width:190px;
height:190px;
cursor:pointer;
}

#timer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.timerLabel{font-size:14px;opacity:0.8;}
.timerValue{
font-size:46px;
font-weight:bold;
}

#playIcon{
font-size:30px;
margin-top:5px;
}

/* ANIMATIONS */
.circleWrap:hover #playIcon{transform:scale(1.2);}
.circleWrap:active #playIcon{transform:scale(0.9);}

@keyframes pulse {
0% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.3); opacity: 0.6; }
100% { transform: scale(1); opacity: 1; }
}
.pulse{animation: pulse 0.9s infinite;}

/* 🔥 BAS FIXE */
.bottomFixed{
position:sticky;
bottom:0;
padding-top:10px;
background:linear-gradient(to top, rgba(27,94,32,1) 80%, transparent);
}

/* BAR */
.barContainer{
height:6px;
background:rgba(255,255,255,0.2);
border-radius:10px;
margin-bottom:6px;
}

#bar{
height:100%;
width:0%;
background:#00e5ff;
border-radius:10px;
}

#totalTime{
font-size:12px;
margin-bottom:4px;
text-align:center;
opacity:0.8;
}

/* BOUTONS */
.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

button{
height:40px;
border:none;
border-radius:12px;
background:#e2e8f0;
color:#0f172a;
font-size:13px;
font-weight:600;
transition:0.2s;
}

button:hover{transform:scale(1.05);}
button:active{transform:scale(0.95);}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="infoBox">
<div id="exoInfo"></div>
<div id="repInfo"></div>
<div id="serieInfo"></div>
</div>
<img src="logo.png" class="logo">
</div>

<img id="img">

<div class="timerZone">
<div class="circleWrap" onclick="togglePause()">

<svg viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45" stroke="rgba(255,255,255,0.2)" stroke-width="6" fill="none"/>
<circle id="progressCircle" cx="50" cy="50" r="45" stroke="#00e5ff" stroke-width="6" fill="none" transform="rotate(-90 50 50)"/>
</svg>

<div id="timer">
<div class="timerLabel">PRÉPAREZ VOUS</div>
<div class="timerValue" id="timerValue">0</div>
<div id="playIcon">⏸</div>
</div>

</div>
</div>

<!-- 🔥 BAS FIXE -->
<div class="bottomFixed">

<div id="totalTime"></div>

<div class="barContainer">
<div id="bar"></div>
</div>

<div class="buttons">
<button id="soundBtn" onclick="toggleSound()">🔊 Son</button>
<button onclick="back()">⚙️ Réglages</button>
</div>

</div>

</div>

<script>

/* JS STRICTEMENT IDENTIQUE */

let p = JSON.parse(localStorage.getItem("programme_temp"));
if(!p){window.location="config.html";}

const timerLabel = document.querySelector(".timerLabel");

let exIndex=0, repIndex=1, serieIndex=1;
let phase="prep";
let PREP_TIME = 3;
let t=PREP_TIME, totalTimePhase=PREP_TIME;
let paused=false;
let soundOn=true;

let totalSessionTime=0;
let remainingTime=0;

let radius=45;
let circumference=2*Math.PI*radius;
progressCircle.style.strokeDasharray=circumference;

function computeTotal(){
totalSessionTime = 0;

p.exercices.forEach((exo, index)=>{
for(let r=0; r<exo.reps; r++){

totalSessionTime += exo.ex;

let isLastExo = index === p.exercices.length - 1;
let isLastRep = r === exo.reps - 1;

if(!(isLastExo && isLastRep)){
totalSessionTime += exo.repos;
}

}
});

totalSessionTime *= p.series;
totalSessionTime += PREP_TIME;

remainingTime = totalSessionTime;
}
computeTotal();

function formatTime(s){
let m=Math.floor(s/60);
return m+":"+(s%60<10?"0":"")+s%60;
}

function updateTotal(){
totalTime.innerText="Durée : "+formatTime(remainingTime);
}
updateTotal();

function beep(){
if(!soundOn)return;
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.frequency.value=800;
o.connect(ctx.destination);
o.start();
setTimeout(()=>o.stop(),150);
}

function speak(t){
if(!soundOn)return;
let u=new SpeechSynthesisUtterance(t);
u.lang="fr-FR";
speechSynthesis.speak(u);
}

function toggleSound(){
soundOn=!soundOn;
soundBtn.innerHTML = soundOn ? "🔊 Son" : "🔇 Muet";
}

function togglePause(){
paused=!paused;
let icon = document.getElementById("playIcon");

if(paused){
icon.innerText = "▶️";
icon.classList.add("pulse");
}else{
icon.innerText = "⏸";
icon.classList.remove("pulse");
}
}

function update(){

let progress = 1 - (t / totalTimePhase);
progressCircle.style.strokeDashoffset = circumference * progress;

if(phase==="prep") document.body.style.background="#1b5e20";
if(phase==="ex") document.body.style.background="#b71c1c";
if(phase==="repos") document.body.style.background="#0d47a1";

timerValue.innerText=t;

if(phase==="prep") timerLabel.innerText="PRÉPAREZ VOUS";
if(phase==="ex") timerLabel.innerText="EXERCICE";
if(phase==="repos") timerLabel.innerText="REPOS";

bar.style.width=((totalSessionTime-remainingTime)/totalSessionTime*100)+"%";

let exo=p.exercices[exIndex];
exoInfo.innerText=exo.nom;
repInfo.innerText="Rép "+repIndex+"/"+exo.reps;
serieInfo.innerText="Série "+serieIndex+"/"+p.series;

/* IMAGE */
let patho = localStorage.getItem("pathologie");

if(patho){
let urlJpg = "images/"+patho+"/ex"+(exIndex+1)+".jpg";
let urlPng = "images/"+patho+"/ex"+(exIndex+1)+".png";

img.src = urlJpg;
img.onerror = function(){
this.onerror=null;
this.src = urlPng;
};
}
}

function next(){
let exo=p.exercices[exIndex];

if(phase==="prep"){
phase="ex";
t=exo.ex;
totalTimePhase=exo.ex;
beep();
update();
return;
}

if(phase==="ex"){
phase="repos";
t=exo.repos;
totalTimePhase=exo.repos;
speak("repos");
update();
return;
}

phase="ex";
t=exo.ex;
totalTimePhase=exo.ex;
beep();

repIndex++;

if(repIndex>exo.reps){
repIndex=1;
exIndex++;
if(exIndex>=p.exercices.length){
exIndex=0;
serieIndex++;
}
}

update();
}

function loop(){
if(paused) return;

t--;
remainingTime = Math.max(0, remainingTime - 1);

if(remainingTime <= 0){
window.location="fin.html";
return;
}

updateTotal();

if(t<=0){
next();
}else{
update();
}
}

function back(){window.location="config.html";}

update();
setInterval(loop,1000);

</script>
</body>
</html>
