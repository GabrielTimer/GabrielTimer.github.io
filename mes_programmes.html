<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Programmes</title>

<style>

/* BASE IDENTIQUE */
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* TITRE */
h2{
font-size:28px;
margin-bottom:20px;
}

/* BOUTON HISTORIQUE */
.topbar{
margin-bottom:10px;
}

button.main{
padding:12px 18px;
border:none;
border-radius:12px;
background:#ddd;
font-size:14px;
cursor:pointer;
}

/* CARD STYLE HARMONISÉ */
.card{
width:85%;
max-width:360px;
margin:12px auto;
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
transition:transform 0.2s, box-shadow 0.2s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

/* TEXTE */
.left{
text-align:left;
font-size:14px;
}

.fav{
color:gold;
font-weight:bold;
}

/* ACTIONS */
.actions button{
margin-left:5px;
padding:6px 8px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.delete{background:#ff5252;color:white;}
.star{background:#ffd54f;}

/* BOUTON RETOUR */
button.back{
margin-top:20px;
padding:14px 20px;
border:none;
border-radius:12px;
background:#ccc;
font-size:16px;
cursor:pointer;
}

/* 📱 MOBILE */
@media (max-width:600px){

h2{
font-size:28px;
}

.card{
width:85%;
max-width:340px;
padding:16px;
}

.left{
font-size:15px;
}

button.main{
font-size:15px;
}

button.back{
font-size:17px;
padding:14px;
}

}

</style>
</head>

<body>

<h2>⭐ Mes Programmes</h2>

<div class="topbar">
<button class="main" onclick="goHist()">🕒 Historique</button>
</div>

<div id="list"></div>

<button class="back" onclick="back()">⬅ Retour</button>

<script>

let list = JSON.parse(localStorage.getItem("programmes")||[]);

/* FAVORIS UNIQUEMENT */
list = list.filter(p=>p.type==="favori");

let container=document.getElementById("list");

list.forEach((p,index)=>{

let div=document.createElement("div");
div.className="card";

let left=document.createElement("div");
left.className="left";

left.innerHTML=`
<div class="fav">⭐ Favori</div>
<b>${formatName(p.nom)}</b><br>${p.date}
`;

let actions=document.createElement("div");
actions.className="actions";

/* delete */
let del=document.createElement("button");
del.className="delete";
del.innerText="🗑";
del.onclick=(e)=>{
e.stopPropagation();
remove(index);
};

/* unfav */
let star=document.createElement("button");
star.className="star";
star.innerText="⭐";
star.onclick=(e)=>{
e.stopPropagation();
unfav(index);
};

actions.appendChild(star);
actions.appendChild(del);

div.onclick=()=>{
localStorage.setItem("programme_temp",JSON.stringify(p.data));
window.location="timer.html";
};

div.appendChild(left);
div.appendChild(actions);
container.appendChild(div);

});

/* supprimer */
function remove(i){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
let favs = all.filter(p=>p.type==="favori");

let target = favs[i];
all = all.filter(p=>p !== target);

localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

/* enlever favori */
function unfav(i){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
let favs = all.filter(p=>p.type==="favori");

let target = favs[i];
target.type="historique";

localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

function goHist(){
window.location="historique.html";
}

function back(){
window.location="index.html";
}

function formatName(n){
return n.replaceAll("_"," ").replace(/\b\w/g,l=>l.toUpperCase());
}

</script>

</body>
</html>
