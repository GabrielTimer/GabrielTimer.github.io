<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Programmes</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

h2{
font-size:28px;
margin-bottom:20px;
}

.topbar{margin-bottom:10px;}

button.main{
padding:12px 18px;
border:none;
border-radius:12px;
background:#ddd;
font-size:14px;
cursor:pointer;
}

.card{
width:85%;
max-width:360px;
margin:12px auto;
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
display:flex;
justify-content:space-between;
align-items:center;
transition:0.2s;
cursor:pointer;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

.left{
text-align:left;
font-size:14px;
}

.fav{
color:gold;
font-weight:bold;
}

/* INPUT RENOMMAGE */
.renameInput{
width:120px;
padding:4px;
border-radius:6px;
border:1px solid #ccc;
font-size:13px;
}

/* ACTIONS */
.actions button{
margin-left:5px;
padding:6px 8px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.delete{background:#ff5252;color:white;}
.edit{background:#4caf50;color:white;}

button.back{
margin-top:20px;
padding:14px 20px;
border:none;
border-radius:12px;
background:#ccc;
font-size:16px;
cursor:pointer;
}

@media (max-width:600px){
.card{max-width:340px;}
.left{font-size:15px;}
}

</style>
</head>

<body>

<h2>⭐ Mes Programmes</h2>

<div class="topbar">
<button class="main" onclick="goHist()">🕒 Historique</button>
</div>

<div id="list"></div>

<button class="back" onclick="back()">⬅ Retour</button>

<script>

let all = JSON.parse(localStorage.getItem("programmes")||[]);
let list = all.filter(p=>p.type==="favori");

let container=document.getElementById("list");

list.forEach((p,index)=>{

let div=document.createElement("div");
div.className="card";

let left=document.createElement("div");
left.className="left";

/* affichage nom */
let nameSpan=document.createElement("span");
nameSpan.innerHTML="<b>"+getName(p)+"</b>";

/* input caché */
let input=document.createElement("input");
input.className="renameInput";
input.style.display="none";
input.value=getName(p);

/* switch affichage */
left.innerHTML=`<div class="fav">⭐ Favori</div>`;
left.appendChild(nameSpan);
left.appendChild(input);

let date=document.createElement("div");
date.innerText=p.date;
left.appendChild(date);

let actions=document.createElement("div");

/* ✏️ rename */
let edit=document.createElement("button");
edit.className="edit";
edit.innerText="✏️";

edit.onclick=(e)=>{
e.stopPropagation();

/* toggle mode */
if(input.style.display==="none"){
input.style.display="block";
nameSpan.style.display="none";
input.focus();
}else{
saveName(index,input.value);
}
};

/* ENTER = save */
input.addEventListener("keypress",(e)=>{
if(e.key==="Enter"){
saveName(index,input.value);
}
});

/* 🗑 delete */
let del=document.createElement("button");
del.className="delete";
del.innerText="🗑";
del.onclick=(e)=>{e.stopPropagation();remove(index);};

actions.appendChild(edit);
actions.appendChild(del);

div.onclick=()=>{
localStorage.setItem("programme_temp",JSON.stringify(p.data));
window.location="timer.html";
};

div.appendChild(left);
div.appendChild(actions);
container.appendChild(div);

});

/* 🔥 NOM SAFE */
function getName(p){
if(p.nom && p.nom !== "undefined"){
return p.nom;
}
return "Séance";
}

/* 💾 SAVE NAME */
function saveName(i,newName){
if(!newName.trim()) return;

let all = JSON.parse(localStorage.getItem("programmes")||[]);
let favs = all.filter(p=>p.type==="favori");

let target = favs[i];
target.nom = newName;

localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

/* delete */
function remove(i){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
let favs = all.filter(p=>p.type==="favori");
let target = favs[i];
all = all.filter(p=>p !== target);
localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

function goHist(){window.location="historique.html";}
function back(){window.location="index.html";}

</script>

</body>
</html>
