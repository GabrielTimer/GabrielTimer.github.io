<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Programmes</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

h2{
font-size:28px;
margin-bottom:20px;
}

.topbar{margin-bottom:10px;}

button.main{
padding:12px 18px;
border:none;
border-radius:12px;
background:#ddd;
font-size:14px;
cursor:pointer;
}

/* CARD */
.card{
width:85%;
max-width:360px;
margin:12px auto;
background:white;
border-radius:20px;
padding:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
display:flex;
justify-content:space-between;
align-items:center;
transition:0.2s;
cursor:pointer;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

/* TEXTE */
.left{
display:flex;
flex-direction:column;
gap:4px;
}

.fav{
color:#fbc02d;
font-size:13px;
font-weight:bold;
}

.title{
font-size:16px;
font-weight:bold;
}

.date{
font-size:13px;
color:#777;
}

/* INPUT RENOMMAGE */
.renameInput{
width:130px;
padding:6px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

/* ACTIONS */
.actions{
display:flex;
gap:8px;
}

.iconBtn{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
border:none;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

/* ✏️ */
.edit{
background:#e8f5e9;
color:#2e7d32;
}
.edit:hover{
background:#c8e6c9;
transform:scale(1.1);
}

/* 🗑 */
.delete{
background:#ffebee;
color:#c62828;
}
.delete:hover{
background:#ffcdd2;
transform:scale(1.1);
}

button.back{
margin-top:20px;
padding:14px 20px;
border:none;
border-radius:12px;
background:#ccc;
font-size:16px;
cursor:pointer;
}

@media (max-width:600px){
.card{max-width:340px;}
}

</style>
</head>

<body>

<h2>⭐ Mes Programmes</h2>

<div class="topbar">
<button class="main" onclick="goHist()">🕒 Historique</button>
</div>

<div id="list"></div>

<button class="back" onclick="back()">⬅ Retour</button>

<script>

let all = JSON.parse(localStorage.getItem("programmes")||[]);
let list = all.filter(p=>p.type==="favori");

let container=document.getElementById("list");

list.forEach((p,index)=>{

let div=document.createElement("div");
div.className="card";

/* LEFT */
let left=document.createElement("div");
left.className="left";

let fav=document.createElement("div");
fav.className="fav";
fav.innerText="⭐ Favori";

/* titre */
let title=document.createElement("div");
title.className="title";
title.innerText=getName(p);

/* input */
let input=document.createElement("input");
input.className="renameInput";
input.style.display="none";
input.value=getName(p);

/* date */
let date=document.createElement("div");
date.className="date";
date.innerText=p.date;

/* toggle rename */
function enableEdit(){
title.style.display="none";
input.style.display="block";
input.focus();
}

function saveEdit(){
if(!input.value.trim()) return;
saveName(index,input.value);
}

input.addEventListener("keypress",(e)=>{
if(e.key==="Enter"){
saveEdit();
}
});

/* ACTIONS */
let actions=document.createElement("div");
actions.className="actions";

/* edit */
let edit=document.createElement("button");
edit.className="iconBtn edit";
edit.innerHTML="✏️";
edit.onclick=(e)=>{
e.stopPropagation();
if(input.style.display==="none"){
enableEdit();
}else{
saveEdit();
}
};

/* delete */
let del=document.createElement("button");
del.className="iconBtn delete";
del.innerHTML="🗑";
del.onclick=(e)=>{
e.stopPropagation();
remove(index);
};

/* BUILD */
left.appendChild(fav);
left.appendChild(title);
left.appendChild(input);
left.appendChild(date);

actions.appendChild(edit);
actions.appendChild(del);

div.appendChild(left);
div.appendChild(actions);

/* CLICK CARD */
div.onclick=()=>{
localStorage.setItem("programme_temp",JSON.stringify(p.data));
window.location="timer.html";
};

container.appendChild(div);

});

/* NOM SAFE */
function getName(p){
if(p.nom && p.nom !== "undefined"){
return p.nom;
}
return "Séance";
}

/* SAVE NAME */
function saveName(i,newName){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
let favs = all.filter(p=>p.type==="favori");
let target = favs[i];
target.nom = newName;
localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

/* DELETE */
function remove(i){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
let favs = all.filter(p=>p.type==="favori");
let target = favs[i];
all = all.filter(p=>p !== target);
localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

function goHist(){window.location="historique.html";}
function back(){window.location="index.html";}

</script>

</body>
</html>
