<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Programmes</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

h2{font-size:28px;margin-bottom:20px;}
.topbar{margin-bottom:10px;}

button.main{
padding:12px 18px;
border:none;
border-radius:12px;
background:#ddd;
cursor:pointer;
}

.card{
width:85%;
max-width:360px;
margin:12px auto;
background:white;
border-radius:20px;
padding:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

.left{
display:flex;
flex-direction:column;
gap:4px;
}

.fav{color:#fbc02d;font-size:13px;font-weight:bold;}
.title{font-size:16px;font-weight:bold;}
.date{font-size:13px;color:#777;}

.actions{
display:flex;
gap:8px;
}

.iconBtn{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
border:none;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

.edit{
background:#e8f5e9;
color:#2e7d32;
}
.edit:hover{background:#c8e6c9;transform:scale(1.1);}

.delete{
background:#ffebee;
color:#c62828;
}
.delete:hover{background:#ffcdd2;transform:scale(1.1);}

button.back{
margin-top:20px;
padding:14px 20px;
border:none;
border-radius:12px;
background:#ccc;
}

</style>
</head>

<body>

<h2>⭐ Mes Programmes</h2>

<div class="topbar">
<button class="main" onclick="goHist()">🕒 Historique</button>
</div>

<div id="list"></div>

<button class="back" onclick="back()">⬅ Retour</button>

<script>

let all = JSON.parse(localStorage.getItem("programmes")||[]);
let list = all.filter(p=>p.type==="favori");

let container=document.getElementById("list");

list.forEach((p,index)=>{

let div=document.createElement("div");
div.className="card";

/* LEFT */
let left=document.createElement("div");
left.className="left";

left.innerHTML=`
<div class="fav">⭐ Favori</div>
<div class="title">${getName(p)}</div>
<div class="date">${p.date}</div>
`;

/* ACTIONS */
let actions=document.createElement("div");
actions.className="actions";

/* ✏️ EDIT COMPLET */
let edit=document.createElement("button");
edit.className="iconBtn edit";
edit.innerHTML="✏️";
edit.onclick=(e)=>{
e.stopPropagation();

localStorage.setItem("edit_programme", JSON.stringify(p));
window.location="config.html?edit=1";
};

/* 🗑 DELETE */
let del=document.createElement("button");
del.className="iconBtn delete";
del.innerHTML="🗑";
del.onclick=(e)=>{
e.stopPropagation();
remove(index);
};

actions.appendChild(edit);
actions.appendChild(del);

div.appendChild(left);
div.appendChild(actions);

/* CLICK → lancer */
div.onclick=()=>{
localStorage.setItem("programme_temp",JSON.stringify(p.data));
window.location="timer.html";
};

container.appendChild(div);

});

/* NOM SAFE */
function getName(p){
if(p.nom && p.nom !== "undefined") return p.nom;
return "Séance";
}

/* DELETE */
function remove(i){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
let favs = all.filter(p=>p.type==="favori");
let target = favs[i];
all = all.filter(p=>p !== target);
localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

function goHist(){window.location="historique.html";}
function back(){window.location="index.html";}

</script>
</body>
</html>
