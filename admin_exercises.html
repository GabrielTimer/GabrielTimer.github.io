<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Exercises V1</title>

<style>

body{
  margin:0;
  padding:30px;
  background:#f5f7fb;
  font-family:Arial,sans-serif;
  color:#222;
}

.container{
  max-width:1200px;
  margin:auto;
}

h1{
  margin-bottom:10px;
}

.subtitle{
  color:#666;
  margin-bottom:30px;
}

.card{
  background:white;
  border-radius:20px;
  padding:24px;
  margin-bottom:24px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
}

label{
  display:block;
  margin-bottom:10px;
  font-weight:bold;
}

textarea{
  width:100%;
  min-height:180px;
  border:none;
  border-radius:16px;
  padding:18px;
  background:#f2f5fb;
  resize:vertical;
  font-size:15px;
  box-sizing:border-box;
}

#generatedJson{
  min-height:420px;
  font-family:monospace;
}

button{
  border:none;
  border-radius:14px;
  padding:14px 22px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
  margin-right:12px;
  margin-bottom:12px;
}

.primary{
  background:#2d6cdf;
  color:white;
}

.primary:hover{
  background:#1f56b8;
}

.secondary{
  background:#e9eefb;
  color:#2d6cdf;
}

.secondary:hover{
  background:#d9e4ff;
}

.success{
  background:#17b26a;
  color:white;
}

.success:hover{
  background:#119455;
}

.stats{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  margin-top:20px;
}

.stat{
  background:#f2f5fb;
  padding:14px 18px;
  border-radius:14px;
  font-weight:bold;
}

.small{
  color:#777;
  font-size:14px;
  margin-top:12px;
}

@media(max-width:768px){

  body{
    padding:14px;
  }

  .card{
    padding:16px;
  }

  button{
    width:100%;
  }

}

</style>
</head>
<body>

<div class="container">

<h1>Admin Exercises V1</h1>

<div class="subtitle">
Créer et fusionner rapidement des exercices/programmes JSON.
</div>

<div class="card">

<label>Prompt programme</label>

<textarea id="promptInput">
Tu es un kinésithérapeute expert.

Génère le JSON complet pour ce programme.

Respecte STRICTEMENT ce format :

{
  "id": "",
  "nom": "",
  "categorie": "",
  "niveau": 1,

  "tags": [],

  "objectif": "",

  "objectifs": [],

  "pathologies": [],

  "zones": [],

  "materiel": [],

  "image": "/exercises/images/placeholders/default.png",

  "video": "",

  "description": "",

  "consignes": [],

  "timer_config": {}
}

Le programme doit être :
- cohérent
- progressif
- réaliste
- adapté à la pathologie
- avec niveaux progressifs

Utilise PRIORITAIREMENT les exercices déjà existants lorsque c’est pertinent.

Ne crée un nouvel exercice QUE si aucun exercice existant ne correspond correctement.

Évite les doublons et les exercices quasi identiques.

Privilégie :
- la réutilisation
- les variantes de niveau
- les progressions
plutôt que créer de nouveaux exercices inutiles.

Programme :
</textarea>

<div class="small">
Tu écris ici le programme souhaité puis tu demandes à ChatGPT de générer le JSON.
</div>

</div>

<div class="card">

<h2>Gestion Exercices</h2>

<label>JSON exercices</label>

<textarea
id="exercisesJson"
placeholder='Colle ici les exercices JSON...'></textarea>

<div style="margin-top:20px;">

<button
class="secondary"
onclick="mergeExercisesOnly()">
Importer exercices
</button>

<button
class="success"
onclick="exportExercisesJson()">
Exporter exercises.json
</button>

</div>

<hr style="margin:40px 0;">

<h2>Gestion Programmes</h2>

<label>JSON programmes</label>

<textarea
id="programsJson"
placeholder='Colle ici les programmes JSON...'></textarea>

<div style="margin-top:20px;">

<button
class="primary"
onclick="mergeProgramsOnly()">
Importer programmes
</button>

<button
class="success"
onclick="exportProgramsJson()">
Exporter program_templates.json
</button>

</div>

<div style="margin-top:20px;">


</div>

<div class="stats">

<div class="stat">
Exercices actuels : <span id="currentCount">0</span>
</div>

<div class="stat">
Nouveaux exercices : <span id="newCount">0</span>
</div>

<div class="stat">
Total final : <span id="finalCount">0</span>
</div>

</div>

</div>

</div>

<script>

if(
  localStorage.getItem("admin_ok")
  !== "true"
){

  window.location.href =
  "login.html";

}

let currentExercises = [];
let mergedExercises = [];

let currentPrograms = [];
let mergedPrograms = [];

function updateStats(newExercises = []){

  document.getElementById('currentCount').textContent =
  currentExercises.length;

  document.getElementById('newCount').textContent =
  newExercises.length;

  document.getElementById('finalCount').textContent =
  mergedExercises.length;
}

function normalizeText(text){

  return (text || '')
  .toLowerCase()
  .normalize('NFD')
  .replace(/[\u0300-\u036f]/g, '')
  .replace(/[^a-z0-9]/g,'');

}

async function loadCurrentJson(){

  try{

    const exResponse =
    await fetch('./exercises/data/exercises.json');

    currentExercises =
    await exResponse.json();

    mergedExercises = [...currentExercises];

    const progResponse =
    await fetch('./exercises/data/program_templates.json');

    currentPrograms =
    await progResponse.json();

    mergedPrograms = [...currentPrograms];

    updateStats();



    alert('JSON chargés avec succès');

  } catch(error){

    console.error(error);

    alert('Erreur chargement JSON');

  }
}

function mergeExercisesOnly(){

  try{

    const jsonText =
    document.getElementById(
      'exercisesJson'
    ).value;

    if(!jsonText.trim()){

      alert('Aucun JSON exercices');

      return;
    }

    const parsed =
    JSON.parse(jsonText);

    const newExercises =
    Array.isArray(parsed)
    ? parsed
    : [parsed];

    let added = 0;

    newExercises.forEach(newEx => {

      const exists =
      mergedExercises.some(ex =>
        ex.id === newEx.id
      );

      if(!exists){

        mergedExercises.push(newEx);

        added++;

      }

    });

    updateStats(newExercises);

    alert(
      added +
      ' exercices ajoutés'
    );

  }catch(error){

    console.error(error);

    alert(
      'JSON exercices invalide'
    );

  }

}

function mergeProgramsOnly(){

  try{

    const jsonText =
    document.getElementById(
      'programsJson'
    ).value;

    if(!jsonText.trim()){

      alert('Aucun JSON programmes');

      return;
    }

    const parsed =
    JSON.parse(jsonText);

    const newPrograms =
    Array.isArray(parsed)
    ? parsed
    : [parsed];

    let added = 0;

    newPrograms.forEach(program => {

      const exists =
      mergedPrograms.some(p =>
        p.id === program.id
      );

      if(!exists){

        mergedPrograms.push(program);

        added++;

      }

    });

    validatePrograms();

    alert(
      added +
      ' programmes ajoutés'
    );

  }catch(error){

    console.error(error);

    alert(
      'JSON programmes invalide'
    );

  }

}

function validatePrograms(){

  let errors = [];

  mergedPrograms.forEach(program => {

    (program.exercices || [])
    .forEach(id => {

      const exists =
      mergedExercises.some(ex =>
        ex.id === id
      );

      if(!exists){

        errors.push(
          program.nom +
          ' -> exercice manquant : ' +
          id
        );

      }

    });

  });

  if(errors.length){

    console.error(errors);

    alert(
      'Erreurs programmes. Voir console.'
    );

  }

}

function exportExercisesJson(){

  if(!mergedExercises.length){

    alert('Aucun exercice');

    return;
  }

  const jsonString =
  JSON.stringify(mergedExercises, null, 2);

  downloadJson(
    jsonString,
    'exercises.json'
  );
}

function exportProgramsJson(){

  if(!mergedPrograms.length){

    alert('Aucun programme');

    return;
  }

  const jsonString =
  JSON.stringify(mergedPrograms, null, 2);

  downloadJson(
    jsonString,
    'program_templates.json'
  );
}

function downloadJson(jsonString, filename){

  const blob = new Blob(
    [jsonString],
    { type:'application/json' }
  );

  const url =
  URL.createObjectURL(blob);

  const a =
  document.createElement('a');

  a.href = url;

  a.download = filename;

  a.click();

  URL.revokeObjectURL(url);
}

</script>

</body>
</html>
