<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriel Timer</title>

<link rel="stylesheet" href="style.css?v=1">
<link rel="stylesheet" href="home.css?v=1">
<link rel="manifest" href="manifest.json">

</head>

<body>

<div class="card">

<img src="logo.png" class="logo" id="logo">

<div class="hero-title">Bonjour 👋</div>
<div class="hero-sub">
Comment allez-vous aujourd’hui ?
</div>

<div class="hero-banner">
<h3>Votre corps,<br>votre priorité.</h3>
<p>
Des programmes adaptés
à vos objectifs.
</p>
</div>

<h2>Gabriel Timer</h2>

<button class="primary" onclick="goProg()">⭐ Mes programmes</button>
<button class="secondary" onclick="modeLibre()">⚡ Mode libre</button>
<button class="patho" onclick="zones()">🩺 Pathologies</button>
<button class="respir" onclick="respir()">
🫁 RespiR
</button>

<button
id="adminExercisesBtn"
class="secondary"
onclick="adminExercises()"
style="display:none;"
>
🛠️ Admin Exercises
</button>

</div>

<script>
const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient");


const VERSION = "1.2";

function goProg(){

  if(patient){
    window.location =
    "cloud.html?patient=" + patient;
    return;
  }

  if(localStorage.getItem("admin_ok")==="true"){
    window.location = "patients.html";
    return;
  }

  alert(
    "Accès via lien envoyé par votre kinésithérapeute"
  );

}

function modeLibre(){

localStorage.removeItem("pathologie");

localStorage.removeItem("programme_temp");
localStorage.removeItem("current_programme");
localStorage.removeItem("patho_data");


if(patient){

window.location =
"config.html?patient="
+ patient +
"&v=" + Date.now();

}else{

window.location =
"config.html?v=" + Date.now();

}

}

if(patient){

localStorage.setItem(
"currentPatient",
patient
);

}

function openPatient(patient){

localStorage.setItem(
"currentPatient",
patient
);

window.location =
"cloud.html";

}

function zones(){

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient");

if(patient){

window.location =
"pathologies.html?patient="
+ patient +
"&v=" + VERSION;

}else{

window.location =
"pathologies.html?v=" + VERSION;

}

}

if(
localStorage.getItem("admin_ok")
==="true"
&&
!patient
){

document.getElementById(
"adminExercisesBtn"
).style.display =
"inline-block";

}

function adminExercises(){

window.open(
  "admin_exercises.html?v=" + VERSION,
  "_blank"
);

}

function respir(){

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient");

if(patient){

window.location =
"respir/index.html?patient="
+ patient +
"&v=" + VERSION;

}else{

window.location =
"respir/index.html?v=" + VERSION;

}

}
</script>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js?v=1.2');
}
</script>
<script type="module" src="exercises/js/cloud.js"></script>

<script>
const logo = document.getElementById("logo");

let tapCount = 0;
let tapTimer;

logo.addEventListener("click", () => {
  tapCount++;

  if (tapCount === 1) {
    tapTimer = setTimeout(() => {
      tapCount = 0;
    }, 800);
  }

  if (tapCount >= 3) {
    clearTimeout(tapTimer);
    tapCount = 0;
    window.location.href = "login.html";
  }
});
</script>

</body>
</html>
