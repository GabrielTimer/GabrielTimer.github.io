<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accueil</title>

<style>
body{
font-family:Arial;
background:#1b5e20;
color:white;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

/* LOGO */
.logo{
position:absolute;
top:10px;
right:10px;
width:50px;
opacity:0.8;
}

/* TITRE */
h1{
margin-bottom:30px;
}

/* BOUTONS */
.container{
display:flex;
flex-direction:column;
gap:15px;
width:250px;
}

button{
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

/* COULEURS */
.zones{background:#0e8f9b;color:white;}
.autre{background:#607d8b;color:white;}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<h1>Rééducation</h1>

<div class="container">

<button class="zones" onclick="window.location='config.html'">
ZONES
</button>

<!-- tu peux rajouter d'autres boutons ici -->
<button class="autre" onclick="alert('Fonction à venir')">
Autre fonctionnalité
</button>

</div>

</body>
</html>
