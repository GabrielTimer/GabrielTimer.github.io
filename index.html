<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriel Timer</title>

<link rel="stylesheet" href="style.css?v=1">
<link rel="stylesheet" href="home.css?v=2">
<link rel="manifest" href="manifest.json">

</head>

<body>

<div class="card home-card">

  <img src="logo.png" class="home-logo" id="logo">

<div class="home-title" id="homeTitle">
  Bonjour
</div>

<div class="home-wave">
  👋
</div>

  <div class="home-subtitle">
    Comment allez-vous aujourd’hui ?
  </div>

  <div class="home-banner">
    <h3>Votre corps,<br>votre priorité.</h3>
    <p>
      Des programmes adaptés
      à vos objectifs.
    </p>
  </div>

  <div class="home-grid">

    <button class="home-box" onclick="goProg()">
      <span>⭐</span>
      <strong>Mes programmes</strong>
    </button>

    <button class="home-box" onclick="modeLibre()">
      <span>⚡</span>
      <strong>Mode libre</strong>
    </button>

    <button class="home-box" onclick="zones()">
      <span>🩺</span>
      <strong>Pathologies</strong>
    </button>

    <button class="home-box respir" onclick="respir()">
      <span>🫁</span>
      <strong>RespiR</strong>
    </button>

  </div>

  <button
    id="adminExercisesBtn"
    class="home-admin"
    onclick="adminExercises()"
    style="display:none;"
  >
    🛠 Admin Exercises
  </button>

</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

let patient =
params.get("patient");

if(!patient){

patient =
localStorage.getItem(
"currentPatient"
);

}

const isAdmin =
localStorage.getItem("admin_ok")
==="true";

if(isAdmin){

  document.getElementById(
    "homeTitle"
  ).textContent =
  "Mode administrateur";

}else if(patient){

  const prenom =
  patient
  .split("_")[0]
  .charAt(0)
  .toUpperCase()
  +
  patient
  .split("_")[0]
  .slice(1);

  document.getElementById(
    "homeTitle"
  ).textContent =
  `Bonjour ${prenom}`;

}


const VERSION = "1.2";

function goProg(){

  if(isAdmin){

    window.location =
    "patients.html";

    return;
  }

  if(patient){

    window.location =
    "cloud.html?patient=" + patient;

    return;
  }

  alert(
    "Accès via lien envoyé par votre kinésithérapeute"
  );

}

function modeLibre(){

localStorage.removeItem("pathologie");

localStorage.removeItem("programme_temp");
localStorage.removeItem("current_programme");
localStorage.removeItem("patho_data");


if(patient){

window.location =
"config.html?patient="
+ patient +
"&v=" + Date.now();

}else{

window.location =
"config.html?v=" + Date.now();

}

}

if(patient){

localStorage.setItem(
"currentPatient",
patient
);

}

function openPatient(patient){

localStorage.setItem(
"currentPatient",
patient
);

window.location =
"cloud.html";

}

function zones(){

if(patient){

window.location =
"pathologies.html?patient="
+ patient +
"&v=" + VERSION;

}else{

window.location =
"pathologies.html?v=" + VERSION;

}

}


if(isAdmin){

document.getElementById(
"adminExercisesBtn"
).style.display =
"inline-block";

}

function adminExercises(){

window.open(
  "admin_exercises.html?v=" + VERSION,
  "_blank"
);

}

function respir(){

if(patient){

window.location =
"respir/index.html?patient="
+ patient +
"&v=" + VERSION;

}else{

window.location =
"respir/index.html?v=" + VERSION;

}

}

</script>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js?v=1.2');
}
</script>
<script type="module" src="exercises/js/cloud.js"></script>

<script>
const logo = document.getElementById("logo");

let tapCount = 0;
let tapTimer;

logo.addEventListener("click", () => {
  tapCount++;

  if (tapCount === 1) {
    tapTimer = setTimeout(() => {
      tapCount = 0;
    }, 800);
  }

  if (tapCount >= 3) {
    clearTimeout(tapTimer);
    tapCount = 0;
    window.location.href = "login.html";
  }
});
</script>

</body>
</html>
