<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Workout Timer</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e8f9b">
<link rel="apple-touch-icon" href="logo.png">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f6f9;
}

header{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
background:white;
padding:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.logo{
height:110px;
}

h1{
font-size:42px;
color:#0e8f9b;
}

.startSessionContainer{
display:flex;
justify-content:center;
margin:60px 0;
}

.startCircle{
width:200px;
height:200px;
border-radius:50%;
background:linear-gradient(135deg,#00c6ff,#0e8f9b);
display:flex;
align-items:center;
justify-content:center;
font-size:80px;
color:white;
cursor:pointer;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
transition:transform 0.2s;
}

.startCircle:hover{
transform:scale(1.05);
}

.startLabel{
text-align:center;
font-size:24px;
margin-top:20px;
font-weight:bold;
color:#0e8f9b;
}

</style>

</head>

<body>

<header>

<img class="logo" src="logo.png">
<h1>Workout Timer</h1>

</header>

<div class="startSessionContainer">

<div>

<div class="startCircle" onclick="startWorkout()">▶</div>

<div class="startLabel">Démarrer ma séance</div>

</div>

</div>

<script>

function startWorkout(){
window.location="timer.html";
}

/* SERVICE WORKER */

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
