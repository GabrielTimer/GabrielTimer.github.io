<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriel Timer</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#e0f7fa,#f4f6f9);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
width:90%;
max-width:350px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:16px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.primary{background:#0e8f9b;color:white;}
.secondary{background:#ff9800;color:white;}
.patho{background:#9c27b0;color:white;}
</style>
</head>

<body>

<div class="card">
<h2>Gabriel Timer</h2>

<input id="prenom" placeholder="Prénom">
<input id="nom" placeholder="Nom">

<button class="primary" onclick="acceder()">Accéder à mon programme</button>
<button class="secondary" onclick="modeLibre()">Mode libre</button>
<button class="patho" onclick="pathologies()">🩺 Pathologies</button>
</div>

<script>
let prenomEl=document.getElementById("prenom");
let nomEl=document.getElementById("nom");

function acceder(){
let prenom = prenomEl.value.trim();
let nom = nomEl.value.trim();

if(!prenom || !nom){
alert("Veuillez remplir les champs");
return;
}

let id = prenom.toLowerCase()+"_"+nom.toLowerCase();
localStorage.setItem("currentUser", id);

window.location = "config.html";
}

function modeLibre(){
localStorage.removeItem("currentUser");
window.location = "config.html";
}

function pathologies(){
window.location="pathologies.html";
}
</script>

</body>
</html>
