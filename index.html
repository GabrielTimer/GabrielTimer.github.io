<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriel Timer</title>

<link rel="stylesheet" href="style.css?v=1">
<link rel="stylesheet" href="home.css?v=2">
<link rel="manifest" href="manifest.json">

</head>

<body>

<div class="card home-card">

  <img src="logo.png" class="home-logo" id="logo">

<div class="home-title" id="homeTitle">
  Bonjour
</div>

<div class="home-wave">
  👋
</div>

  <div class="home-subtitle">
    Comment allez-vous aujourd’hui ?
  </div>

  <div class="home-banner" id="todayBanner">
    <h3>Votre corps,<br>votre priorité.</h3>
    <p>
      Des programmes adaptés
      à vos objectifs.
    </p>
  </div>

  <div class="home-grid">

    <button class="home-box" onclick="goProg()">
      <span>⭐</span>
      <strong>Mes programmes</strong>
    </button>

    <button class="home-box" onclick="modeLibre()">
      <span>⚡</span>
      <strong>Mode libre</strong>
    </button>

    <button class="home-box" onclick="zones()">
      <span>🩺</span>
      <strong>Pathologies</strong>
    </button>

    <button class="home-box respir" onclick="respir()">
      <span>🫁</span>
      <strong>RespiR</strong>
    </button>

  </div>

  <button
  id="adminToolsBtn"
  class="home-admin"
  onclick="adminTools()"
  style="display:none;"
>
  🛠 Outils administrateur
</button>

</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

let patient =
params.get("patient");

if(!patient){

patient =
localStorage.getItem(
"currentPatient"
);

}

const viewPatient =
params.get("viewPatient") === "1";

const isAdmin =
localStorage.getItem("admin_ok")
==="true";

if(isAdmin && !viewPatient){

  document.getElementById(
    "homeTitle"
  ).textContent =
  "Mode administrateur";

}else if(patient){
  const prenom =
  patient
  .split("_")[0]
  .charAt(0)
  .toUpperCase()
  +
  patient
  .split("_")[0]
  .slice(1);

  document.getElementById(
    "homeTitle"
  ).textContent =
  `Bonjour ${prenom}`;

}


const VERSION = "1.2";

function goProg(){

  if(isAdmin && !viewPatient){

    window.location =
    "patients.html";

    return;

  }

  if(patient){

    let url =
    "cloud.html?patient=" + patient;

    if(viewPatient){
      url += "&viewPatient=1";
    }

    window.location = url;

}else{

    window.location =
    "cloud.html";

  }

}

function modeLibre(){

localStorage.removeItem("pathologie");

localStorage.removeItem("programme_temp");
localStorage.removeItem("current_programme");
localStorage.removeItem("patho_data");


if(patient){

window.location =
"config.html?patient="
+ patient +
"&v=" + Date.now();

}else{

window.location =
"config.html?v=" + Date.now();

}

}

if(patient){

localStorage.setItem(
"currentPatient",
patient
);

}

function openPatient(patient){

localStorage.setItem(
"currentPatient",
patient
);

window.location =
"cloud.html";

}

function zones(){

if(patient){

window.location =
"pathologies.html?patient="
+ patient +
"&v=" + VERSION;

}else{

window.location =
"pathologies.html?v=" + VERSION;

}

}


if(isAdmin && !viewPatient){

document.getElementById(
"adminToolsBtn"
).style.display =
"inline-block";

}

function adminTools(){

window.location.href =
"admin_tools.html?v=" + VERSION;

}

function respir(){

if(patient){

window.location =
"respir/index.html?patient="
+ patient +
"&v=" + VERSION;

}else{

window.location =
"respir/index.html?v=" + VERSION;

}

}

</script>

<script>

async function loadTodayBanner(){

if(!patient) return;

if(
typeof loadProgramsFromCloud
=== "undefined"
){
return;
}

const programmes =
await loadProgramsFromCloud();

const aujourdHui = new Date();

const seances =
programmes
.filter(p =>
p.patientId === patient
&& p.programmeId
&& !p.terminee
)
.sort(
(a,b)=>
new Date(a.datePrevue)
-
new Date(b.datePrevue)
);

if(!seances.length){

const banner =
document.getElementById("todayBanner");

banner.innerHTML = `
<h3>🏆 Programme terminé</h3>
<p>Bravo ! Toutes les séances ont été réalisées.</p>
`;

return;
}

const prochaine = seances[0];

const dateSeance =
new Date(prochaine.datePrevue);

const aujourdHuiMinuit =
new Date();
aujourdHuiMinuit.setHours(0,0,0,0);

dateSeance.setHours(0,0,0,0);

const diffJours =
Math.round(
(dateSeance - aujourdHuiMinuit)
/
(1000*60*60*24)
);

let texteDate = "";

if(diffJours === 0){

texteDate = "Aujourd'hui";

}else if(diffJours === 1){

texteDate = "Demain";

}else if(diffJours > 1){

texteDate = `Dans ${diffJours} jours`;

}else{

texteDate = "En retard";

}

const dateLisible =
new Date(prochaine.datePrevue)
.toLocaleDateString(
"fr-FR",
{
weekday:"long",
day:"2-digit",
month:"2-digit"
}
);

const dateAffichee =
dateLisible.charAt(0).toUpperCase()
+
dateLisible.slice(1);


const totalProgramme =
programmes.filter(
s => s.programmeId === prochaine.programmeId
).length;

const faitesProgramme =
programmes.filter(
s =>
s.programmeId === prochaine.programmeId
&& s.terminee
).length;

const banner =
document.getElementById(
"todayBanner"
);

banner.innerHTML = `

<h3 style="margin-bottom:8px;">
🎯 Prochaine séance
</h3>

<p style="
margin-top:10px;
margin-bottom:0;
font-size:20px;
font-weight:700;
line-height:1.2;
">
${prochaine.programmeNom}
</p>

<div style="
margin-top:12px;
font-size:16px;
font-weight:600;
color:#334155;
line-height:1.5;
">

${prochaine.nom}
• ${texteDate}

</div>

<div style="
margin-top:10px;
font-size:17px;
color:#475569;
line-height:1.5;
">

📅 ${dateAffichee}<br>
📊 ${faitesProgramme}/${totalProgramme}

</div>

<button
style="
width:100%;
margin-top:14px;
border:none;
border-radius:14px;
padding:12px 18px;
cursor:pointer;

background:linear-gradient(
135deg,
#2563eb 0%,
#3b82f6 50%,
#60a5fa 100%
);

color:white;
font-size:15px;
font-weight:700;

box-shadow:
0 10px 25px rgba(37,99,235,.30);

transition:all .2s ease;
"
onclick="launchToday('${prochaine.firebaseId}')"
onmouseover="
this.style.transform='translateY(-2px)';
this.style.boxShadow='0 14px 30px rgba(37,99,235,.40)';
"
onmouseout="
this.style.transform='translateY(0)';
this.style.boxShadow='0 10px 25px rgba(37,99,235,.30)';
"
>
▶ Commencer ma séance
</button>
`;

}


</script>

<script>

window.launchToday = async function(id){

const programmes =
await loadProgramsFromCloud();

const prog =
programmes.find(
p => p.firebaseId === id
);

if(!prog){
alert("Programme introuvable");
return;
}

localStorage.setItem(
"programme_temp",
JSON.stringify(
prog.données || prog.data || prog
)
);

window.location =
"timer.html?cloud="
+ id
+ "&patient="
+ patient
+ "&v="
+ Date.now();

}

</script>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js?v=1.2');
}
</script>
<script type="module">

import {
loadProgramsFromCloud
} from "./exercises/js/cloud.js";

window.loadProgramsFromCloud =
loadProgramsFromCloud;

loadTodayBanner();

</script>
<script>
const logo = document.getElementById("logo");

let tapCount = 0;
let tapTimer;

logo.addEventListener("click", () => {
  tapCount++;

  if (tapCount === 1) {
    tapTimer = setTimeout(() => {
      tapCount = 0;
    }, 800);
  }

  if (tapCount >= 3) {
    clearTimeout(tapTimer);
    tapCount = 0;
    window.location.href = "login.html";
  }
});
</script>

</body>
</html>
