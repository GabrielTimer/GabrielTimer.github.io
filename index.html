<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriel Timer</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#e0f7fa,#f4f6f9);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
width:90%;
max-width:320px;
}

.logo{
width:120px;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
transition:0.15s;
}

button:hover{transform:scale(1.05);}
button:active{transform:scale(0.95);}

.primary{background:#0e8f9b;color:white;}
.secondary{background:#ff9800;color:white;}
.patho{background:#9c27b0;color:white;}
</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h2>Gabriel Timer</h2>

<button class="primary" onclick="goProg()">⭐ Mes programmes</button>
<button class="secondary" onclick="modeLibre()">⚡ Mode libre</button>
<button class="patho" onclick="zones()">🩺 Pathologies</button>

</div>

<script>
function goProg(){
window.location="mes_programmes.html";
}

function modeLibre(){
localStorage.removeItem("pathologie");
window.location="config.html";
}

function zones(){
window.location="pathologies.html";
}
</script>

</body>
</html>
