<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriel Timer</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#e0f7fa,#f4f6f9);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
width:90%;
max-width:320px;
}

.logo{
width:120px;
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
opacity:0.9;
}

.primary{background:#0e8f9b;color:white;}
.secondary{background:#ff9800;color:white;}
.patho{background:#9c27b0;color:white;}
</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h2>Gabriel Timer</h2>

<input id="prenom" placeholder="Prénom">
<input id="nom" placeholder="Nom">

<button class="primary" onclick="acceder()">📋 Accéder à mon programme</button>
<button class="secondary" onclick="modeLibre()">⚡ Mode libre</button>
<button class="patho" onclick="zones()">📍 ZONES</button>

</div>

<script>
function acceder(){
let p = prenom.value.trim();
let n = nom.value.trim();

if(!p || !n){
alert("Remplir les champs");
return;
}

let id = p.toLowerCase()+"_"+n.toLowerCase();
localStorage.setItem("currentUser", id);

window.location="config.html";
}

function modeLibre(){
localStorage.removeItem("currentUser");
localStorage.removeItem("pathologie");
window.location="config.html";
}

/* 🔥 CORRECTION ICI */
function zones(){
window.location="pathologies.html";
}
</script>

</body>
</html>
