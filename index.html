<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accueil</title>

<style>
body{
font-family:Arial;
background:#1b5e20;
color:white;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.logo{
position:absolute;
top:10px;
right:10px;
width:50px;
opacity:0.8;
}

h1{margin-bottom:20px;}

.container{
display:flex;
flex-direction:column;
gap:10px;
width:260px;
}

/* INPUT */
input{
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
text-align:center;
}

/* BOUTONS */
button{
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.zones{background:#0e8f9b;color:white;}
.libre{background:#ff9800;color:white;}
.autre{background:#607d8b;color:white;}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<h1>Rééducation</h1>

<div class="container">

<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">

<button class="zones" onclick="goZones()">
📍 ZONES
</button>

<button class="libre" onclick="goLibre()">
⏱ Mode libre
</button>

</div>

<script>

/* SAUVEGARDE */
function savePatient(){
let nom = document.getElementById("nom").value.trim();
let prenom = document.getElementById("prenom").value.trim();

if(nom && prenom){
let key = "patient_" + nom + "_" + prenom;
localStorage.setItem("patient_actuel", key);
}
}

/* NAVIGATION */
function goZones(){
savePatient();
window.location="config.html";
}

function goLibre(){
savePatient();
window.location="timer.html";
}

/* AUTO REMPLISSAGE */
let current = localStorage.getItem("patient_actuel");

if(current){
let parts = current.replace("patient_","").split("_");
if(parts.length===2){
document.getElementById("nom").value = parts[0];
document.getElementById("prenom").value = parts[1];
}
}

</script>

</body>
</html>
