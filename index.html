<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriel Timer</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#e0f7fa,#f4f6f9);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
width:90%;
max-width:320px;
}

.logo{
width:120px;
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.primary{background:#0e8f9b;color:white;}
.secondary{background:#ff9800;color:white;}
.patho{background:#9c27b0;color:white;}
</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h2>Gabriel Timer</h2>

<input id="prenom" placeholder="Prénom">
<input id="nom" placeholder="Nom">

<button class="primary" onclick="acceder()">📋 Accéder à mon programme</button>
<button class="secondary" onclick="modeLibre()">⚡ Mode libre</button>
<button class="patho" onclick="zones()">🩺 Pathologies</button>

</div>

<script>

function makeId(p,n){
return (p.trim().toLowerCase()+"_"+n.trim().toLowerCase()).replace(/\s+/g,"");
}

function acceder(){
let p = prenom.value;
let n = nom.value;

if(!p || !n){
alert("Remplir les champs");
return;
}

let id = makeId(p,n);
localStorage.setItem("currentUser", id);

window.location="config.html?v=" + Date.now();
}

function modeLibre(){
localStorage.removeItem("currentUser");
localStorage.removeItem("pathologie");

window.location="config.html?v=" + Date.now();
}

function zones(){
window.location="pathologies.html?v=" + Date.now();
}

</script>

</body>
</html>
