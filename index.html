<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriel Timer</title>

<link rel="stylesheet" href="style.css?v=1">
<link rel="manifest" href="manifest.json">

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h2>Gabriel Timer</h2>

<button class="primary" onclick="goProg()">⭐ Mes programmes</button>
<button class="secondary" onclick="modeLibre()">⚡ Mode libre</button>
<button class="patho" onclick="zones()">🩺 Pathologies</button>
<button class="respir" onclick="respir()">
🫁 RespiR
</button>

</div>

<script>

const VERSION = "1.2";

function goProg(){

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient");

/* 🔒 MODE PATIENT */
if(patient){

window.location =
"cloud.html?patient=" + patient;

return;

}

/* 👨‍⚕️ MODE ADMIN */
window.location =
"patients.html";

}

function modeLibre(){

localStorage.removeItem("pathologie");

localStorage.removeItem("programme_temp");
localStorage.removeItem("current_programme");
localStorage.removeItem("patho_data");

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient");

if(patient){

window.location =
"config.html?patient="
+ patient +
"&v=" + Date.now();

}else{

window.location =
"config.html?v=" + Date.now();

}

}
const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient");

if(patient){

localStorage.setItem(
"currentPatient",
patient
);

}

function openPatient(patient){

localStorage.setItem(
"currentPatient",
patient
);

window.location =
"cloud.html";

}

function zones(){

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient");

if(patient){

window.location =
"pathologies.html?patient="
+ patient +
"&v=" + VERSION;

}else{

window.location =
"pathologies.html?v=" + VERSION;

}

}

function respir(){

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient");

if(patient){

window.location =
"respir/index.html?patient="
+ patient +
"&v=" + VERSION;

}else{

window.location =
"respir/index.html?v=" + VERSION;

}

}
</script>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js?v=1.2');
}
</script>
<script type="module" src="exercises/js/cloud.js"></script>
</body>
</html>
