<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriel Timer</title>

<link rel="stylesheet" href="style.css?v=1">
<link rel="manifest" href="manifest.json">

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h2>Gabriel Timer</h2>

<button class="primary" onclick="goProg()">⭐ Mes programmes</button>
<button class="secondary" onclick="modeLibre()">⚡ Mode libre</button>
<button class="patho" onclick="zones()">🩺 Pathologies</button>
<button class="respir" onclick="respir()">
🫁 RespiR
</button>

</div>

<script>

const VERSION = "1.2";

function goProg(){
window.location="mes_programmes.html?v="+VERSION;
}

function modeLibre(){

localStorage.removeItem("pathologie");

localStorage.removeItem("programme_temp");
localStorage.removeItem("current_programme");
localStorage.removeItem("patho_data");

window.location="config.html?v="+Date.now();

}

function zones(){
window.location="pathologies.html?v="+VERSION;
}
function respir(){
window.location="respir/index.html?v="+VERSION;
}
</script>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js?v=1.2');
}
</script>

</body>
</html>
