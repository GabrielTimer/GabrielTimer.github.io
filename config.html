<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
margin-top:20px;
}

.exo{
background:#eee;
margin:8px 0;
padding:12px;
border-radius:10px;
cursor:pointer;
text-align:left;
}

.exo:hover{background:#ddd;}

.panel{
display:none;
padding:10px;
background:#fafafa;
border-radius:10px;
margin-top:5px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

/* 🔥 FIX largeur séries */
.smallInput{
width:120px;
margin:auto;
display:block;
text-align:center;
}

button{
padding:12px;
margin:5px;
border:none;
border-radius:10px;
width:100%;
cursor:pointer;
}

.add{background:#4caf50;color:white;}
.save{background:#2ecc71;color:white;}
.start{background:#0e8f9b;color:white;}
.home{background:#777;color:white;}
</style>
</head>

<body>

<div class="card">

<h2>Configurer la séance</h2>

<div id="exoList"></div>

<button class="add" onclick="addExo()">➕ Ajouter exercice</button>

<h3>Séries</h3>
<input type="number" id="series" class="smallInput" value="2">

<button class="save" onclick="save()">💾 Enregistrer</button>
<button class="start" onclick="start()">▶ Démarrer</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<script>

let exercices=[];

function addExo(){
exercices.push({
nom:"Exercice "+(exercices.length+1),
tempsEx:20,
tempsRepos:15,
reps:3
});
render();
}

function render(){
exoList.innerHTML="";

exercices.forEach((exo,i)=>{

let div=document.createElement("div");

div.innerHTML=`
<div class="exo" onclick="toggle(${i})">
${exo.nom} ▶
</div>

<div class="panel" id="panel${i}">
<input value="${exo.nom}" onchange="updateNom(${i},this.value)">
<input type="number" value="${exo.tempsEx}" onchange="update(${i},'tempsEx',this.value)" placeholder="Temps ex">
<input type="number" value="${exo.tempsRepos}" onchange="update(${i},'tempsRepos',this.value)" placeholder="Repos">
<input type="number" value="${exo.reps}" onchange="update(${i},'reps',this.value)" placeholder="Rép">
<button onclick="removeExo(${i})">❌ Supprimer</button>
</div>
`;

exoList.appendChild(div);
});
}

function toggle(i){
let p=document.getElementById("panel"+i);
p.style.display = p.style.display==="block" ? "none" : "block";
}

function update(i,key,val){
exercices[i][key]=+val;
}

function updateNom(i,val){
exercices[i].nom=val;
render();
}

function removeExo(i){
exercices.splice(i,1);
render();
}

function save(){
localStorage.setItem("programme_temp",JSON.stringify({
exercices,
series:+series.value
}));
alert("Enregistré");
}

function start(){
save();
window.location="timer.html";
}

function home(){
window.location="index.html";
}

/* INIT */
addExo();
addExo();
addExo();

</script>

</body>
</html>
