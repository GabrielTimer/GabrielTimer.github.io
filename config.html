<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;height:100vh;display:flex;flex-direction:column;}
.main{flex:1;overflow-y:auto;padding:10px;}
.card{background:white;padding:15px;border-radius:15px;max-width:420px;margin:auto;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
h2{text-align:center;}

.exoBloc{
background:#f9f9f9;
margin:10px 0;
border-radius:10px;
transition:0.2s;
}

.exoBloc.dragging{
opacity:0.5;
transform:scale(0.98);
}

.exoHeader{
background:#eee;
padding:12px;
display:flex;
align-items:center;
gap:8px;
cursor:grab;
}

.arrow{transition:0.25s;}
.arrow.open{transform:rotate(90deg);}

.deleteBtn{
margin-left:auto;
background:#e53935;
color:white;
border:none;
border-radius:50%;
width:24px;
height:24px;
cursor:pointer;
}

.exoContent{display:none;padding:10px;}

.addBtn{background:#4caf50;color:white;margin-top:10px;width:100%;padding:12px;border:none;border-radius:10px;}

</style>
</head>

<body>

<div class="main">
<div class="card">
<h2>Configurer</h2>
<div id="exo"></div>
<button class="addBtn" onclick="addExo()">➕ Ajouter</button>
</div>
</div>

<script>

let exercices = [];
let dragIndex = null;

/* SYNC */
function syncInputs(){
for(let i=0;i<exercices.length;i++){
exercices[i].nom = document.getElementById("nom"+i).value;
}
}

/* ADD */
function addExo(){
syncInputs();
exercices.push({nom:"Ex "+(exercices.length+1)});
render();
}

/* DELETE */
function removeExo(i){
syncInputs();
exercices.splice(i,1);
render();
}

/* RENDER */
function render(){
exo.innerHTML="";

exercices.forEach((e,i)=>{
exo.innerHTML+=`
<div class="exoBloc" 
onmousedown="startDrag(${i})" 
onmouseup="endDrag(${i})"
ontouchstart="startDrag(${i})"
ontouchend="endDrag(${i})">

<div class="exoHeader" onclick="toggle(${i})">
<span id="arrow${i}" class="arrow">▶</span>
<input id="nom${i}" value="${e.nom}">
<button class="deleteBtn" onclick="event.stopPropagation(); removeExo(${i})">−</button>
</div>

<div class="exoContent" id="c${i}">
Contenu
</div>

</div>`;
});
}

/* TOGGLE */
function toggle(i){
let c=document.getElementById("c"+i);
let a=document.getElementById("arrow"+i);

if(c.style.display==="block"){
c.style.display="none";
a.classList.remove("open");
}else{
c.style.display="block";
a.classList.add("open");
}
}

/* DRAG SIMPLE */
function startDrag(i){
dragIndex=i;
}

function endDrag(i){
if(dragIndex===null || dragIndex===i) return;

syncInputs();

let moved = exercices.splice(dragIndex,1)[0];
exercices.splice(i,0,moved);

dragIndex=null;
render();
}

/* INIT */
addExo();

</script>
</body>
</html>
