<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;text-align:center;}

.card{
background:white;
padding:20px;
border-radius:15px;
max-width:420px;
margin:auto;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.pathoCard{
background:#eee;
padding:10px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.pathoCard:hover{transform:scale(1.05);}

.pathoCard img{
width:100%;
height:80px;
object-fit:cover;
border-radius:8px;
}

.selected{
border:3px solid #0e8f9b;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

.smallInput{
width:120px;
margin:auto;
display:block;
}

button{
padding:12px;
margin:5px;
border:none;
border-radius:10px;
width:100%;
}

.start{background:#0e8f9b;color:white;}
</style>
</head>

<body>

<div class="card">

<h2>Choisir une pathologie</h2>

<div id="grid" class="grid"></div>

<h3>Séries</h3>
<input id="series" type="number" class="smallInput" value="2">

<button class="start" onclick="start()">▶ Démarrer</button>

</div>

<script>

let selectedPatho = null;

fetch("pathos.json")
.then(r=>r.json())
.then(data=>{

let grid = document.getElementById("grid");

data.forEach(p=>{

let div = document.createElement("div");
div.className = "pathoCard";

div.innerHTML = `
<img src="images/${p.id}/cover.jpg">
<div>${p.nom}</div>
`;

div.onclick = ()=>{
selectedPatho = p.id;
document.querySelectorAll(".pathoCard").forEach(c=>c.classList.remove("selected"));
div.classList.add("selected");
};

grid.appendChild(div);

});

});

function start(){

if(!selectedPatho){
alert("Choisir une pathologie");
return;
}

localStorage.setItem("pathologie", selectedPatho);

let exercices = Array.from({length:8}, (_,i)=>({
nom:"Exercice "+(i+1),
tempsEx:20,
tempsRepos:15,
reps:3
}));

localStorage.setItem("programme_temp", JSON.stringify({
exercices,
series:+series.value
}));

window.location="timer.html";
}

</script>

</body>
</html>
