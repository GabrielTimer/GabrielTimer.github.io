<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;height:100vh;display:flex;flex-direction:column;}
.main{flex:1;overflow-y:auto;padding:10px;}
.card{background:white;padding:15px;border-radius:15px;max-width:420px;margin:auto;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
h2{text-align:center;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;align-items:center;}

input{width:85%;max-width:140px;padding:8px;border-radius:8px;border:1px solid #ccc;}

.exoBloc{
background:#f9f9f9;
margin:10px 0;
border-radius:10px;
transition:transform 0.2s;
}

.exoHeader{
background:#eee;
padding:12px;
display:flex;
align-items:center;
gap:8px;
cursor:grab;
}

.arrow{transition:0.25s;}
.arrow.open{transform:rotate(90deg);}

.deleteBtn{
margin-left:auto;
background:#e53935;
color:white;
border:none;
border-radius:50%;
width:24px;
height:24px;
cursor:pointer;
}

.exoContent{display:none;padding:10px;}

.dragging{
opacity:0.7;
transform:scale(1.02);
z-index:10;
}

.addBtn{
background:#4caf50;
color:white;
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<div class="main">
<div class="card">
<h2>Configurer la séance</h2>

<div id="exo"></div>

<button class="addBtn" onclick="addExo()">➕ Ajouter un exercice</button>
</div>
</div>

<script>

let exercices = [];
let dragIndex = null;
let startY = 0;

/* SYNC */
function syncInputs(){
for(let i=0;i<exercices.length;i++){
exercices[i].nom = document.getElementById("nom"+i).value;
exercices[i].ex = +document.getElementById("ex"+i).value;
exercices[i].repos = +document.getElementById("repos"+i).value;
exercices[i].reps = +document.getElementById("rep"+i).value;
}
}

/* ADD */
function addExo(data=null){
syncInputs();
exercices.push(data || {nom:"Ex "+(exercices.length+1),ex:30,repos:10,reps:10});
render();
}

/* DELETE */
function removeExo(i){
syncInputs();
exercices.splice(i,1);
render();
}

/* RENDER */
function render(){
exo.innerHTML="";

exercices.forEach((e,i)=>{
exo.innerHTML+=`
<div class="exoBloc" 
onpointerdown="dragStart(${i}, event)"
onpointermove="dragMove(event)"
onpointerup="dragEnd()"
onpointerleave="dragEnd()">

<div class="exoHeader" onclick="toggle(${i})">
<span id="arrow${i}" class="arrow">▶</span>
Ex ${i+1}
<button class="deleteBtn" onclick="event.stopPropagation(); removeExo(${i})">−</button>
</div>

<div class="exoContent" id="c${i}">
<div class="grid2">
<div class="field"><label>🏷 Nom</label><input id="nom${i}" value="${e.nom}"></div>
<div class="field"><label>⏱ Exercice</label><input id="ex${i}" value="${e.ex}"></div>
<div class="field"><label>😌 Repos</label><input id="repos${i}" value="${e.repos}"></div>
<div class="field"><label>🔁 Répétitions</label><input id="rep${i}" value="${e.reps}"></div>
</div>
</div>

</div>`;
});
}

/* TOGGLE */
function toggle(i){
let c=document.getElementById("c"+i);
let a=document.getElementById("arrow"+i);

if(c.style.display==="block"){
c.style.display="none";
a.classList.remove("open");
}else{
c.style.display="block";
a.classList.add("open");
}
}

/* DRAG FLUIDE */
function dragStart(i,e){
dragIndex=i;
startY=e.clientY;
syncInputs();
document.querySelectorAll(".exoBloc")[i].classList.add("dragging");
}

function dragMove(e){
if(dragIndex===null) return;

let currentY=e.clientY;
let blocs=[...document.querySelectorAll(".exoBloc")];

for(let j=0;j<blocs.length;j++){
let rect=blocs[j].getBoundingClientRect();

if(currentY > rect.top && currentY < rect.bottom && j !== dragIndex){
let moved = exercices.splice(dragIndex,1)[0];
exercices.splice(j,0,moved);
dragIndex=j;
render();
break;
}
}
}

function dragEnd(){
let blocs=document.querySelectorAll(".exoBloc");
blocs.forEach(b=>b.classList.remove("dragging"));
dragIndex=null;
}

/* INIT */
addExo();

</script>

</body>
</html>
