<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;height:100vh;display:flex;flex-direction:column;}
.main{flex:1;overflow-y:auto;padding:10px;}
.card{background:white;padding:15px;border-radius:15px;max-width:420px;margin:auto;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
h2{text-align:center;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;align-items:center;}

input{width:85%;max-width:140px;padding:8px;border-radius:8px;border:1px solid #ccc;}

.exoBloc{background:#f9f9f9;margin:10px 0;border-radius:10px;}

.exoHeader{
background:#eee;
padding:12px;
display:flex;
align-items:center;
gap:8px;
min-height:44px;
}

.arrow{transition:0.25s;}
.arrow.open{transform:rotate(90deg);}

.actions{
margin-left:auto;
display:flex;
gap:6px;
}

.actionBtn{
background:#ddd;
border:none;
border-radius:6px;
width:26px;
height:26px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
padding:0;
}

.actionBtn:hover{background:#ccc;}

.deleteBtn{
background:#e53935;
border:none;
border-radius:50%;
width:26px;
height:26px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
padding:0;
}

.exoContent{display:none;padding:10px;}

.addBtn{
background:#4caf50;
color:white;
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
}

.footer{
position:sticky;
bottom:10px;
background:white;
max-width:420px;
margin:0 auto 10px auto;
padding:12px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.footerGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
}

button{
padding:14px;
margin:6px 0;
border:none;
border-radius:12px;
width:100%;
font-size:17px;
cursor:pointer;
}

.start{background:#0072ff;color:white;}
.fav{background:#ffd54f;}
.home{background:#777;color:white;}

#undoBar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%) translateY(100px);
background:#333;
color:white;
padding:12px 18px;
border-radius:12px;
display:flex;
gap:12px;
align-items:center;
opacity:0;
transition:0.3s;
}

#undoBar.show{
transform:translateX(-50%) translateY(0);
opacity:1;
}

#undoBar button{
background:none;
border:none;
color:#4caf50;
font-weight:bold;
cursor:pointer;
padding:0;
}
</style>
</head>

<body>

<div class="main">
<div class="card">

<h2>Configurer la séance</h2>

<div id="exo"></div>

<button class="addBtn" onclick="addExo()">➕ Ajouter un exercice</button>

</div>
</div>

<div class="footer">

<div class="footerGrid">
<div class="field">
<label>Séries</label>
<input id="series" type="number" value="2">
</div>

<div class="field">
<label>Nom</label>
<input id="sessionName">
</div>
</div>

<button class="fav" onclick="addFavori()">⭐ Sauvegarder</button>
<button class="start" onclick="start()">🚀 Lancer</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<div id="undoBar">
Exercice supprimé
<button onclick="undoDelete()">Annuler</button>
</div>

<script>

if(!localStorage.getItem("edit_programme") && !localStorage.getItem("pathologie")){
    localStorage.removeItem("patho_data");
}

let exercices = [];
let lastDeleted = null;
let undoTimer = null;

function syncInputs(){
for(let i=0;i<exercices.length;i++){
exercices[i].nom = document.getElementById("nom"+i).value;
exercices[i].ex = +document.getElementById("ex"+i).value;
exercices[i].repos = +document.getElementById("repos"+i).value;
exercices[i].reps = +document.getElementById("rep"+i).value;
}
}

function addExo(data=null){
syncInputs();
exercices.push(data || {nom:"Ex "+(exercices.length+1),ex:30,repos:10,reps:10});
render();
}

function removeExo(i){
syncInputs();
lastDeleted = {exo: JSON.parse(JSON.stringify(exercices[i])),index: i};
exercices.splice(i,1);
render();
showUndo();
if(navigator.vibrate) navigator.vibrate(30);
}

function undoDelete(){
if(!lastDeleted) return;
exercices.splice(lastDeleted.index,0,lastDeleted.exo);
lastDeleted = null;
render();
hideUndo();
}

function showUndo(){
let bar = document.getElementById("undoBar");
bar.classList.add("show");
clearTimeout(undoTimer);
undoTimer = setTimeout(()=>{hideUndo();lastDeleted=null;},4000);
}

function hideUndo(){
document.getElementById("undoBar").classList.remove("show");
}

function moveUp(i){
if(i===0) return;
syncInputs();
[exercices[i-1], exercices[i]] = [exercices[i], exercices[i-1]];
render();
}

function moveDown(i){
if(i===exercices.length-1) return;
syncInputs();
[exercices[i+1], exercices[i]] = [exercices[i], exercices[i+1]];
render();
}

function duplicateExo(i){
syncInputs();
let copy = JSON.parse(JSON.stringify(exercices[i]));
exercices.splice(i+1,0,copy);
render();
}

function render(){
exo.innerHTML="";
exercices.forEach((e,i)=>{
exo.innerHTML+=`
<div class="exoBloc">
<div class="exoHeader">
<span id="arrow${i}" class="arrow" onclick="toggle(${i})">▶</span>
<span onclick="toggle(${i})">Ex ${i+1}</span>
<div class="actions">

<button class="actionBtn" onclick="moveUp(${i})">⬆️</button>
<button class="actionBtn" onclick="moveDown(${i})">⬇️</button>
<button class="actionBtn" onclick="duplicateExo(${i})">📄</button>
<button class="deleteBtn" onclick="removeExo(${i})">−</button>

</div>
</div>

<div class="exoContent" id="c${i}">
<div class="grid2">
<div class="field"><label>🏷 Nom</label><input id="nom${i}" value="${e.nom}"></div>
<div class="field"><label>⏱ Exercice</label><input id="ex${i}" value="${e.ex}"></div>
<div class="field"><label>😌 Repos</label><input id="repos${i}" value="${e.repos}"></div>
<div class="field"><label>🔁 Répétitions</label><input id="rep${i}" value="${e.reps}"></div>
</div>
</div>
</div>`;
});
}

function toggle(i){
let c=document.getElementById("c"+i);
let a=document.getElementById("arrow"+i);
if(c.style.display==="block"){c.style.display="none";a.classList.remove("open");}
else{c.style.display="block";a.classList.add("open");}
}

/* 🔥 LOAD PATHO (FIX) */
function loadPatho(){
let data = localStorage.getItem("patho_data");
if(!data) return false;

let p = JSON.parse(data);

if(!p.exercices || p.exercices.length === 0) return false;

exercices = JSON.parse(JSON.stringify(p.exercices));
series.value = p.series || 1;

render();
return true;
}

/* INIT */
let isPatho = loadPatho();
if(!isPatho){
addExo();
}

</script>
</body>
</html>
