<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
text-align:center;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:15px;
max-width:400px;
width:90%;
margin:auto;
margin-top:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* IMAGE */
img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

/* BOUTONS */
button{
padding:14px;
margin:6px 0;
border:none;
border-radius:10px;
width:100%;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}

.save{background:#2ecc71;color:white;}
.start{background:#0e8f9b;color:white;}
.home{background:#777;color:white;}
.pdf{background:#9c27b0;color:white;}

@media(max-width:500px){
.card{
width:95%;
padding:15px;
}
}

/* PRINT */
@media print{
body *{visibility:hidden;}
#printZone, #printZone *{visibility:visible;}
#printZone{
position:absolute;
top:0;left:0;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
}
#printZone img{
max-width:100%;
max-height:100%;
object-fit:contain;
}
}
</style>
</head>

<body>

<div class="card">

<h2>Configurer la séance</h2>

<img id="pathoImage" style="display:none;">

<div id="imageButtons" style="display:none;">
<button class="pdf" onclick="printPDF()">📄 Télécharger PDF</button>
<button class="pdf" onclick="printPDF()">🖨️ Imprimer</button>
</div>

<div id="printZone" style="display:none;">
<img id="printImage">
</div>

<label>Nombre d'exercices</label>
<input type="number" id="nbEx" value="5" onchange="generer()">

<div id="exo"></div>

<label>Temps exercice (sec)</label>
<input id="tempsEx" type="number" value="20">

<label>Temps repos (sec)</label>
<input id="tempsRepos" type="number" value="15">

<label>Répétitions</label>
<input id="reps" type="number" value="3">

<label>Séries</label>
<input id="series" type="number" value="2">

<button class="save" onclick="save()">💾 Enregistrer</button>
<button class="start" onclick="start()">▶ Démarrer</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<script>

let exercices=[];

/* 🔹 générer exercices */
function generer(){
exo.innerHTML="";
exercices=[];

for(let i=0;i<nbEx.value;i++){
let input=document.createElement("input");
input.value="Exercice "+(i+1);
input.oninput=()=>exercices[i]=input.value;
exo.appendChild(input);
exercices.push(input.value);
}
}

/* 🔹 charger */
function charger(){

let patho = localStorage.getItem("pathologie");

let img = document.getElementById("pathoImage");
let printImg = document.getElementById("printImage");
let btns = document.getElementById("imageButtons");

/* MODE LIBRE */
if(!patho){
generer();
return;
}

/* EPAULE */
if(patho==="epaule"){

let src="tendinitedelacoiffe.jpg";

img.src=src;
printImg.src=src;

img.style.display="block";
btns.style.display="block";

/* 🔥 8 EXERCICES PAR DÉFAUT */
nbEx.value = 8;
generer();

}
}

/* PDF */
function printPDF(){
document.getElementById("printZone").style.display="flex";
window.print();

setTimeout(()=>{
document.getElementById("printZone").style.display="none";
},500);
}

/* SAVE */
function save(){

let user = localStorage.getItem("currentUser");

if(!user){
let p = prompt("Prénom");
let n = prompt("Nom");
if(!p || !n) return;

user = p+"_"+n;
localStorage.setItem("currentUser", user);
}

let prog={
exercices,
tempsEx:+tempsEx.value,
tempsRepos:+tempsRepos.value,
reps:+reps.value,
series:+series.value
};

localStorage.setItem("programme_"+user,JSON.stringify(prog));

alert("Programme enregistré !");
}

/* START */
function start(){

let prog={
exercices,
tempsEx:+tempsEx.value,
tempsRepos:+tempsRepos.value,
reps:+reps.value,
series:+series.value
};

localStorage.setItem("programme_temp",JSON.stringify(prog));

window.location="timer.html";
}

function home(){
window.location="index.html";
}

/* INIT */
charger();

</script>

</body>
</html>
