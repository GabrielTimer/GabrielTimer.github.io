<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:15px;
max-width:400px;
width:95%;
margin:auto;
margin-top:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:4px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
box-sizing:border-box;
}

label{
font-weight:bold;
margin-top:5px;
display:block;
}

button{
padding:14px;
margin:6px 0;
border:none;
border-radius:10px;
width:100%;
font-size:16px;
cursor:pointer;
}

.save{background:#2ecc71;color:white;}
.start{background:#0e8f9b;color:white;}
.home{background:#777;color:white;}

.exoBloc{
background:#f9f9f9;
margin:10px 0;
border-radius:10px;
overflow:hidden;
}

.exoHeader{
display:flex;
justify-content:space-between;
align-items:center;
background:#eee;
padding:10px;
cursor:pointer;
font-weight:bold;
gap:10px;
}

.exoContent{
display:none;
padding:10px;
}

.arrow{font-size:18px;}
.resume{font-size:12px;color:#555;}
</style>
</head>

<body>

<div class="card">

<h2>Configurer la séance</h2>

<label>Nombre d'exercices</label>
<input type="number" id="nbEx" value="5" onchange="generer()">

<div id="exo"></div>

<label>Séries</label>
<input id="series" type="number" value="2">

<button class="save" onclick="save()">💾 Enregistrer</button>
<button class="start" onclick="start()">▶ Démarrer</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<script>

function makeId(p,n){
return (p.trim().toLowerCase()+"_"+n.trim().toLowerCase()).replace(/\s+/g,"");
}

/* GENERATION */
function generer(){
exo.innerHTML="";
for(let i=0;i<nbEx.value;i++){
let bloc=document.createElement("div");
bloc.className="exoBloc";

bloc.innerHTML=`
<div class="exoHeader" onclick="toggle(${i})">
<div>
<span>▶ Exercice ${i+1}</span><br>
<span id="resume${i}" class="resume">20s / 15s / 3 reps</span>
</div>
<span id="arrow${i}" class="arrow">▶</span>
</div>

<div class="exoContent" id="content${i}">
<label>Nom</label>
<input id="nom${i}" value="Exercice ${i+1}" oninput="updateResume(${i})">

<label>Temps exercice</label>
<input id="ex${i}" type="number" value="20" oninput="updateResume(${i})">

<label>Temps repos</label>
<input id="repos${i}" type="number" value="15" oninput="updateResume(${i})">

<label>Répétitions</label>
<input id="rep${i}" type="number" value="3" oninput="updateResume(${i})">
</div>
`;

exo.appendChild(bloc);
}
}

function toggle(i){
for(let j=0;j<nbEx.value;j++){
document.getElementById("content"+j).style.display="none";
document.getElementById("arrow"+j).innerText="▶";
}
let c=document.getElementById("content"+i);
let a=document.getElementById("arrow"+i);
if(c.style.display==="block"){
c.style.display="none";
a.innerText="▶";
}else{
c.style.display="block";
a.innerText="▼";
}
}

function updateResume(i){
let ex=document.getElementById("ex"+i).value;
let repos=document.getElementById("repos"+i).value;
let rep=document.getElementById("rep"+i).value;
document.getElementById("resume"+i).innerText=ex+"s / "+repos+"s / "+rep+" reps";
}

/* 🔥 INIT ULTRA FIABLE */
function init(){

let user = localStorage.getItem("currentUser");

console.log("USER →", user);

if(user){
let data = localStorage.getItem("programme_"+user);

console.log("DATA →", data);

if(data){
let prog = JSON.parse(data);

series.value = prog.series;
nbEx.value = prog.exercices.length;

generer();

prog.exercices.forEach((e,i)=>{
document.getElementById("nom"+i).value=e.nom;
document.getElementById("ex"+i).value=e.ex;
document.getElementById("repos"+i).value=e.repos;
document.getElementById("rep"+i).value=e.reps;
updateResume(i);
});

return;
}
}

/* fallback */
generer();
}

/* SAVE */
function save(){

let user = localStorage.getItem("currentUser");

if(!user){
let p = prompt("Prénom");
let n = prompt("Nom");
if(!p || !n) return;

user = makeId(p,n);
localStorage.setItem("currentUser",user);
}

let prog = buildProgramme();

localStorage.setItem("programme_"+user,JSON.stringify(prog));

console.log("SAVE →", user, prog);

alert("Programme enregistré !");
}

function buildProgramme(){
let list=[];
for(let i=0;i<nbEx.value;i++){
list.push({
nom:document.getElementById("nom"+i).value,
ex:+document.getElementById("ex"+i).value,
repos:+document.getElementById("repos"+i).value,
reps:+document.getElementById("rep"+i).value
});
}
return {exercices:list,series:+series.value};
}

function start(){
localStorage.setItem("programme_temp",JSON.stringify(buildProgramme()));
window.location="timer.html";
}

function home(){
window.location="index.html";
}

init();

</script>

</body>
</html>
