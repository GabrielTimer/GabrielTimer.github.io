<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:15px;
max-width:400px;
width:90%;
margin:auto;
margin-top:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
margin:4px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

label{
font-weight:bold;
margin-top:5px;
display:block;
}

button{
padding:14px;
margin:6px 0;
border:none;
border-radius:10px;
width:100%;
font-size:16px;
cursor:pointer;
}

.save{background:#2ecc71;color:white;}
.start{background:#0e8f9b;color:white;}
.home{background:#777;color:white;}
.pdf{background:#9c27b0;color:white;}

.exoBloc{
background:#f9f9f9;
margin:10px 0;
border-radius:10px;
overflow:hidden;
}

.exoHeader{
display:flex;
justify-content:space-between;
align-items:center;
background:#eee;
padding:10px;
cursor:pointer;
font-weight:bold;
}

.exoContent{
display:none;
padding:10px;
}

.arrow{
font-size:18px;
}

.resume{
font-size:12px;
color:#555;
}
</style>
</head>

<body>

<div class="card">

<h2>Configurer la séance</h2>

<img id="pathoImage" style="display:none;">

<div id="imageButtons" style="display:none;">
<button class="pdf" onclick="printPDF()">📄 Télécharger PDF</button>
<button class="pdf" onclick="printPDF()">🖨️ Imprimer</button>
</div>

<div id="printZone" style="display:none;">
<img id="printImage">
</div>

<label>Nombre d'exercices</label>
<input type="number" id="nbEx" value="5" onchange="generer()">

<div id="exo"></div>

<label>Séries</label>
<input id="series" type="number" value="2">

<button class="save" onclick="save()">💾 Enregistrer</button>
<button class="start" onclick="start()">▶ Démarrer</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<script>

/* 🔥 GENERATION AVEC RESUME */
function generer(){

exo.innerHTML="";

for(let i=0;i<nbEx.value;i++){

let bloc=document.createElement("div");
bloc.className="exoBloc";

bloc.innerHTML=`

<div class="exoHeader" onclick="toggle(${i})">
<div>
<span id="title${i}">▶ Exercice ${i+1}</span><br>
<span id="resume${i}" class="resume">20s / 15s / 3 reps</span>
</div>
<span id="arrow${i}" class="arrow">▶</span>
</div>

<div class="exoContent" id="content${i}">
<label>Nom</label>
<input id="nom${i}" value="Exercice ${i+1}" oninput="updateResume(${i})">

<label>Temps exercice</label>
<input id="ex${i}" type="number" value="20" oninput="updateResume(${i})">

<label>Temps repos</label>
<input id="repos${i}" type="number" value="15" oninput="updateResume(${i})">

<label>Répétitions</label>
<input id="rep${i}" type="number" value="3" oninput="updateResume(${i})">
</div>

`;

exo.appendChild(bloc);
}
}

/* 🔽 toggle */
function toggle(i){

for(let j=0;j<nbEx.value;j++){
document.getElementById("content"+j).style.display="none";
document.getElementById("arrow"+j).innerText="▶";
}

let c=document.getElementById("content"+i);
let a=document.getElementById("arrow"+i);

if(c.style.display==="block"){
c.style.display="none";
a.innerText="▶";
}else{
c.style.display="block";
a.innerText="▼";
}
}

/* 🔥 MAJ RESUME */
function updateResume(i){

let ex=document.getElementById("ex"+i).value;
let repos=document.getElementById("repos"+i).value;
let rep=document.getElementById("rep"+i).value;

document.getElementById("resume"+i).innerText=
ex+"s / "+repos+"s / "+rep+" reps";
}

/* 🔹 charger */
function charger(){

let patho = localStorage.getItem("pathologie");

let img = document.getElementById("pathoImage");
let printImg = document.getElementById("printImage");
let btns = document.getElementById("imageButtons");

if(!patho){
generer();
return;
}

let src="images/"+patho+"/cover.jpg";

img.src=src;
printImg.src=src;

img.style.display="block";
btns.style.display="block";

nbEx.value=8;
generer();
}

/* PDF */
function printPDF(){
document.getElementById("printZone").style.display="flex";
window.print();
setTimeout(()=>document.getElementById("printZone").style.display="none",500);
}

/* BUILD PROGRAMME */
function buildProgramme(){

let list=[];

for(let i=0;i<nbEx.value;i++){
list.push({
nom:document.getElementById("nom"+i).value,
ex:+document.getElementById("ex"+i).value,
repos:+document.getElementById("repos"+i).value,
reps:+document.getElementById("rep"+i).value
});
}

return {
exercices:list,
series:+series.value
};
}

/* SAVE */
function save(){

let user = localStorage.getItem("currentUser");

if(!user){
let p = prompt("Prénom");
let n = prompt("Nom");
if(!p || !n) return;

user = p+"_"+n;
localStorage.setItem("currentUser", user);
}

let prog = buildProgramme();

localStorage.setItem("programme_"+user,JSON.stringify(prog));

alert("Programme enregistré !");
}

/* START */
function start(){

let prog = buildProgramme();

localStorage.setItem("programme_temp",JSON.stringify(prog));

window.location="timer.html";
}

function home(){
window.location="index.html";
}

/* INIT */
charger();

</script>

</body>
</html>
