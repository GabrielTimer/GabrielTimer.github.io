<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:15px;
max-width:400px;
width:95%;
margin:auto;
margin-top:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:4px 0;
border-radius:10px;
border:1px solid #ccc;
}

label{font-weight:bold;}

/* 🔥 BOUTONS GLOBAL */
button{
padding:14px;
margin:6px 0;
border:none;
border-radius:10px;
width:100%;
font-size:16px;
cursor:pointer;
transition:transform 0.15s, box-shadow 0.15s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:active{
transform:scale(0.95);
}

/* styles */
.save{background:#2ecc71;color:white;}

.start{
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
font-weight:bold;
letter-spacing:1px;
position:relative;
overflow:hidden;
}

.start:hover{
box-shadow:0 0 15px rgba(0,198,255,0.7);
}

.start::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
transition:0.4s;
}

.start:hover::after{
left:100%;
}

.home{background:#777;color:white;}

.exoBloc{background:#f9f9f9;margin:10px 0;border-radius:10px;}
.exoHeader{background:#eee;padding:10px;cursor:pointer;}
.exoContent{display:none;padding:10px;}
</style>
</head>

<body>

<div class="card">

<h2>Configurer la séance</h2>

<label>Nombre d'exercices</label>
<input type="number" id="nbEx" value="5" onchange="generer()">

<div id="exo"></div>

<label>Séries</label>
<input id="series" type="number" value="2">

<button class="save" onclick="save()">💾 Enregistrer</button>
<button class="start" onclick="start()">🚀 Lancer la séance</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<script>

let patho = localStorage.getItem("pathologie");

function applyDefault(){
if(patho === "tendinite_coiffe"){
nbEx.value = 8;
series.value = 2;
generer();
for(let i=0;i<8;i++){
document.getElementById("ex"+i).value = 90;
document.getElementById("repos"+i).value = 30;
document.getElementById("rep"+i).value = 1;
}
}
}

function makeId(p,n){
return (p.trim().toLowerCase()+"_"+n.trim().toLowerCase()).replace(/\s+/g,"");
}

function generer(){
exo.innerHTML="";
for(let i=0;i<nbEx.value;i++){
exo.innerHTML+=`
<div class="exoBloc">
<div class="exoHeader" onclick="toggle(${i})">▶ Exercice ${i+1}</div>
<div class="exoContent" id="c${i}">
Nom<input id="nom${i}" value="Exercice ${i+1}">
Ex<input id="ex${i}" type="number" value="20">
Repos<input id="repos${i}" type="number" value="15">
Rep<input id="rep${i}" type="number" value="3">
</div>
</div>`;
}
}

function toggle(i){
let c=document.getElementById("c"+i);
c.style.display=(c.style.display==="block")?"none":"block";
}

function build(){
let list=[];
for(let i=0;i<nbEx.value;i++){
list.push({
nom:document.getElementById("nom"+i).value,
ex:+document.getElementById("ex"+i).value,
repos:+document.getElementById("repos"+i).value,
reps:+document.getElementById("rep"+i).value
});
}
return {exercices:list,series:+series.value};
}

function save(){
let user = localStorage.getItem("currentUser");
if(!user){
let p = prompt("Prénom");
let n = prompt("Nom");
user = makeId(p,n);
localStorage.setItem("currentUser",user);
}
localStorage.setItem("programme_"+user,JSON.stringify(build()));
alert("Sauvegardé");
}

function start(){
localStorage.setItem("programme_temp",JSON.stringify(build()));
window.location="timer.html?v=" + Date.now();
}

function home(){
window.location="index.html?v=" + Date.now();
}

generer();
applyDefault();

</script>
</body>
</html>
