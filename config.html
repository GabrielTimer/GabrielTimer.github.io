<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{font-family:Arial;text-align:center;background:#f4f4f4;}
.card{background:white;padding:20px;border-radius:15px;max-width:400px;margin:auto;margin-top:20px;}
input{width:90%;padding:12px;margin:5px;}
button{padding:14px;margin:5px;border:none;border-radius:10px;width:90%;}
.save{background:#2ecc71;color:white;}
.start{background:#0e8f9b;color:white;}
.home{background:#777;color:white;}
</style>
</head>

<body>

<div class="card">

<h2>Configurer la séance</h2>

<input type="number" id="nbEx" value="3" onchange="generer()">
<div id="exo"></div>

<input id="tempsEx" type="number">
<input id="tempsRepos" type="number">
<input id="reps" type="number">
<input id="series" type="number">

<button class="save" onclick="save()">💾 Enregistrer</button>
<button class="start" onclick="start()">▶ Démarrer</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<script>

let exercices=[];

// 🔥 PROGRAMMES PAR PATHO
const programmes = {
epaule:{
exercices:["Rotation externe","Élévation latérale","Pendulaire"],
tempsEx:20,tempsRepos:15,reps:3,series:2
},
dos:{
exercices:["Gainage","Superman","Étirement dos"],
tempsEx:30,tempsRepos:20,reps:3,series:2
},
genou:{
exercices:["Squat léger","Chaise","Montée marche"],
tempsEx:25,tempsRepos:20,reps:3,series:2
}
};

function generer(){
exo.innerHTML="";
exercices=[];

for(let i=0;i<nbEx.value;i++){
let input=document.createElement("input");
input.value="Exercice "+(i+1);
input.oninput=()=>exercices[i]=input.value;
exo.appendChild(input);
exercices.push(input.value);
}
}

function charger(){

let user=localStorage.getItem("currentUser");
let patho=localStorage.getItem("pathologie");

// priorité patient
if(user){
let data=localStorage.getItem("programme_"+user);
if(data){
apply(JSON.parse(data));
return;
}
}

// sinon pathologie
if(patho && programmes[patho]){
apply(programmes[patho]);
return;
}

generer();
}

function apply(p){
tempsEx.value=p.tempsEx;
tempsRepos.value=p.tempsRepos;
reps.value=p.reps;
series.value=p.series;

nbEx.value=p.exercices.length;
generer();

setTimeout(()=>{
document.querySelectorAll("#exo input")
.forEach((i,idx)=>i.value=p.exercices[idx]);
},100);

exercices=p.exercices;
}

function save(){
let user=localStorage.getItem("currentUser");

let prog={exercices,tempsEx:+tempsEx.value,tempsRepos:+tempsRepos.value,reps:+reps.value,series:+series.value};

if(user){
localStorage.setItem("programme_"+user,JSON.stringify(prog));
alert("Enregistré !");
}
}

function start(){
let prog={exercices,tempsEx:+tempsEx.value,tempsRepos:+tempsRepos.value,reps:+reps.value,series:+series.value};
localStorage.setItem("programme_temp",JSON.stringify(prog));
window.location="timer.html";
}

function home(){window.location="index.html";}

charger();

</script>

</body>
</html>
