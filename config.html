<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>

/* BASE */
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
}

/* ZONE SCROLL */
.main{
flex:1;
overflow-y:auto;
padding:10px;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:15px;
max-width:420px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* TITRE */
h2{
font-size:22px;
margin-bottom:10px;
text-align:center;
}

/* LABEL */
label{
font-weight:bold;
font-size:13px;
}

/* INPUT */
input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

/* 🔥 GRID COMPACT */
.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px 10px;
margin-top:8px;
}

.field{
display:flex;
flex-direction:column;
}

/* EXERCICES */
.exoBloc{
background:#f9f9f9;
margin:10px 0;
border-radius:10px;
}

.exoHeader{
background:#eee;
padding:12px;
cursor:pointer;
font-size:15px;
}

.exoContent{
display:none;
padding:10px;
}

/* FOOTER */
.footer{
position:sticky;
bottom:10px;
background:white;
max-width:420px;
margin:0 auto 10px auto;
padding:12px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* BOUTONS */
button{
padding:14px;
margin:6px 0;
border:none;
border-radius:12px;
width:100%;
font-size:17px;
cursor:pointer;
}

.start{background:#0072ff;color:white;}
.fav{background:#ffd54f;}
.home{background:#777;color:white;}

</style>
</head>

<body>

<div class="main">

<div class="card">

<h2>Configurer la séance</h2>

<label>Nombre d'exercices</label>
<input type="number" id="nbEx" value="5" onchange="generer()">

<div id="exo"></div>

</div>

</div>

<div class="footer">

<label>Nombre de séries</label>
<input id="series" type="number" value="2">

<button class="fav" onclick="addFavori()">⭐ Ajouter aux favoris</button>
<button class="start" onclick="start()">🚀 Lancer</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<script>

/* CONFIG */
const PATHO_CONFIG = {
tendinite_coiffe:{
series:2,
exercices:Array(8).fill().map(()=>({ex:90,repos:30,rep:1}))
},
lombalgie_1:{
series:2,
exercices:[
{ex:30,repos:10,rep:3},
{ex:5,repos:5,rep:10},
{ex:3,repos:2,rep:15},
{ex:30,repos:5,rep:3},
{ex:30,repos:10,rep:4},
{ex:3,repos:3,rep:10},
{ex:30,repos:10,rep:3},
{ex:30,repos:10,rep:4}
]
}
};

let patho = localStorage.getItem("pathologie");

/* DEFAULT */
function applyDefault(){
if(!patho || !PATHO_CONFIG[patho]) return;

let cfg = PATHO_CONFIG[patho];

nbEx.value = cfg.exercices.length;
series.value = cfg.series;

generer();

cfg.exercices.forEach((exo,i)=>{
document.getElementById("ex"+i).value = exo.ex;
document.getElementById("repos"+i).value = exo.repos;
document.getElementById("rep"+i).value = exo.rep;
});
}

/* GENERATION */
function generer(){
exo.innerHTML="";
for(let i=0;i<nbEx.value;i++){
exo.innerHTML+=`
<div class="exoBloc">
<div class="exoHeader" onclick="toggle(${i})">▶ Ex ${i+1}</div>

<div class="exoContent" id="c${i}">

<div class="grid2">

<div class="field">
<label>Nom</label>
<input id="nom${i}" value="Ex ${i+1}">
</div>

<div class="field">
<label>Exercice</label>
<input id="ex${i}" value="20">
</div>

<div class="field">
<label>Repos</label>
<input id="repos${i}" value="15">
</div>

<div class="field">
<label>Répétitions</label>
<input id="rep${i}" value="3">
</div>

</div>

</div>
</div>`;
}
}

/* TOGGLE */
function toggle(i){
let c=document.getElementById("c"+i);
c.style.display=c.style.display==="block"?"none":"block";
}

/* BUILD */
function build(){
let list=[];
for(let i=0;i<nbEx.value;i++){
list.push({
nom:document.getElementById("nom"+i).value,
ex:+document.getElementById("ex"+i).value,
repos:+document.getElementById("repos"+i).value,
reps:+document.getElementById("rep"+i).value
});
}
return {exercices:list,series:+series.value};
}

/* SAVE */
function saveData(type){
let list=JSON.parse(localStorage.getItem("programmes")||[]);
list.push({
nom:patho||"Libre",
date:new Date().toLocaleDateString(),
type:type,
data:build()
});
localStorage.setItem("programmes",JSON.stringify(list));
}

/* ACTIONS */
function addFavori(){
saveData("favori");
alert("Ajouté ⭐");
}

function start(){
saveData("historique");
localStorage.setItem("programme_temp",JSON.stringify(build()));
window.location="timer.html";
}

function home(){
window.location="index.html";
}

/* INIT */
generer();
applyDefault();

</script>

</body>
</html>
