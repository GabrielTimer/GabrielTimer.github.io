<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<link rel="stylesheet" href="style.css?v=1">

<style>

/* 🔥 CORRECTION LAYOUT PRINCIPALE */
body{
display:flex;
flex-direction:column;
align-items:center;
height:auto;
}

/* CONTENEUR GLOBAL */
.main{
width:100%;
max-width:420px;
padding:20px 15px 10px;
}

/* CARD */
.card{
margin:0 auto 15px auto;
}

/* LOGO */
.logo{
display:block;
margin:0 auto 10px;
}

/* TITRE */
h2{
text-align:center;
margin-bottom:10px;
}

/* GRID */
.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.field{
display:flex;
flex-direction:column;
gap:4px;
}

/* INPUT */
input{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid var(--border);
background:rgba(255,255,255,0.6);
}

/* EXERCICES */
.exoBloc{
background:rgba(255,255,255,0.5);
border-radius:16px;
margin:12px 0;
border:1px solid var(--border);
overflow:hidden;
}

.exoHeader{
padding:12px;
display:flex;
align-items:center;
gap:8px;
}

/* ACTIONS */
.actions{
margin-left:auto;
display:flex;
gap:6px;
}

.actionBtn{
background:rgba(255,255,255,0.6);
border:1px solid var(--border);
border-radius:8px;
width:28px;
height:28px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.deleteBtn{
background:#ef4444;
color:white;
border:none;
border-radius:50%;
width:28px;
height:28px;
}

/* CONTENT */
.exoContent{
display:none;
padding:10px;
}

/* ADD BUTTON */
.addBtn{
background:var(--primary);
color:white;
margin-top:10px;
}

/* 🔥 FOOTER FIXÉ PROPREMENT */
.footer{
width:100%;
max-width:420px;
margin:0 auto 20px;
padding:14px;
border-radius:20px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
border:1px solid var(--border);
}

/* FOOTER GRID */
.footerGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:10px;
}

/* BOUTONS */
.start{
background:var(--primary);
color:white;
}

.fav,
.home{
background:rgba(255,255,255,0.6);
border:1px solid var(--border);
}

/* UNDO */
#undoBar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%) translateY(100px);
background:#0f172a;
color:white;
padding:12px 18px;
border-radius:12px;
display:flex;
gap:12px;
align-items:center;
opacity:0;
transition:0.3s;
}

#undoBar.show{
transform:translateX(-50%) translateY(0);
opacity:1;
}

#undoBar button{
background:none;
border:none;
color:#22c55e;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="main">
<div class="card">

<img src="logo.png" class="logo">

<h2 id="title">Configurer la séance</h2>

<div id="exo"></div>

<button class="addBtn" onclick="addExo()">➕ Ajouter un exercice</button>

</div>
</div>

<div class="footer">

<div class="footerGrid">
<div class="field">
<label>Séries</label>
<input id="series" type="number" value="2">
</div>

<div class="field">
<label>Nom</label>
<input id="sessionName">
</div>
</div>

<button class="fav" onclick="addFavori()">⭐ Sauvegarder</button>
<button class="start" onclick="start()">🚀 Lancer</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<div id="undoBar">
Exercice supprimé
<button onclick="undoDelete()">Annuler</button>
</div>

<!-- 🔥 JS STRICTEMENT IDENTIQUE -->
<script>
/* (ton JS inchangé ici) */
</script>

</body>
</html>
