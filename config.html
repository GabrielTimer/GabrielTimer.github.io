<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;height:100vh;display:flex;flex-direction:column;}
.main{flex:1;overflow-y:auto;padding:10px;}
.card{background:white;padding:15px;border-radius:15px;max-width:420px;margin:auto;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
h2{font-size:22px;margin-bottom:10px;text-align:center;}
label{font-weight:bold;font-size:12px;}
input{width:85%;max-width:140px;padding:8px;border-radius:8px;border:1px solid #ccc;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;align-items:center;}
.exoBloc{background:#f9f9f9;margin:10px 0;border-radius:10px;}
.exoHeader{background:#eee;padding:12px;cursor:pointer;}
.exoContent{display:none;padding:10px;}
.footer{position:sticky;bottom:10px;background:white;max-width:420px;margin:0 auto 10px auto;padding:12px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
.footerGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
button{padding:14px;margin:6px 0;border:none;border-radius:12px;width:100%;font-size:17px;cursor:pointer;}
.start{background:#0072ff;color:white;}
.fav{background:#ffd54f;}
.home{background:#777;color:white;}
</style>
</head>

<body>

<div class="main">
<div class="card">

<h2>Configurer la séance</h2>

<label>Nombre d'exercices</label>
<input type="number" id="nbEx" value="5" onchange="generer()">

<div id="exo"></div>

</div>
</div>

<div class="footer">

<div class="footerGrid">
<div class="field">
<label>Séries</label>
<input id="series" type="number" value="2">
</div>

<div class="field">
<label>Nom</label>
<input id="sessionName">
</div>
</div>

<button class="fav" onclick="addFavori()">⭐ Sauvegarder</button>
<button class="start" onclick="start()">🚀 Lancer</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<script>

/* GENERATION */
function generer(){
exo.innerHTML="";
for(let i=0;i<nbEx.value;i++){
exo.innerHTML+=`
<div class="exoBloc">
<div class="exoHeader" onclick="toggle(${i})">▶ Ex ${i+1}</div>
<div class="exoContent" id="c${i}">
<div class="grid2">
<div class="field"><label>🏷 Nom</label><input id="nom${i}" value="Ex ${i+1}"></div>
<div class="field"><label>⏱ Exercice</label><input id="ex${i}" value="20"></div>
<div class="field"><label>😌 Repos</label><input id="repos${i}" value="15"></div>
<div class="field"><label>🔁 Répétitions</label><input id="rep${i}" value="3"></div>
</div>
</div>
</div>`;
}
}

function toggle(i){
let c=document.getElementById("c"+i);
c.style.display=c.style.display==="block"?"none":"block";
}

/* BUILD */
function build(){
let list=[];
for(let i=0;i<nbEx.value;i++){
list.push({
nom:document.getElementById("nom"+i).value,
ex:+document.getElementById("ex"+i).value,
repos:+document.getElementById("repos"+i).value,
reps:+document.getElementById("rep"+i).value
});
}
return {exercices:list,series:+series.value};
}

/* SAVE */
function saveData(type){
let list=JSON.parse(localStorage.getItem("programmes")||"[]");

let editData = localStorage.getItem("edit_programme");
if(editData){
let old = JSON.parse(editData);
list = list.filter(p => JSON.stringify(p) !== JSON.stringify(old));
localStorage.removeItem("edit_programme");
}

list.push({
nom:sessionName.value || "Libre",
date:new Date().toLocaleDateString(),
type:type,
data:build()
});

localStorage.setItem("programmes",JSON.stringify(list));
}

function addFavori(){saveData("favori");alert("Sauvegardé");}
function start(){saveData("historique");localStorage.setItem("programme_temp",JSON.stringify(build()));window.location="timer.html";}
function home(){window.location="index.html";}

/* LOAD EDIT */
function loadEdit(){
let data = localStorage.getItem("edit_programme");
if(!data) return false;

let p = JSON.parse(data);

sessionName.value = p.nom;
series.value = p.data.series;
nbEx.value = p.data.exercices.length;

generer();

p.data.exercices.forEach((exo,i)=>{
document.getElementById("nom"+i).value = exo.nom;
document.getElementById("ex"+i).value = exo.ex;
document.getElementById("repos"+i).value = exo.repos;
document.getElementById("rep"+i).value = exo.reps;
});

return true;
}

/* LOAD PATHO */
function loadPatho(){

let data = localStorage.getItem("patho_data");
if(!data) return false;

let p = JSON.parse(data);

series.value = p.series;
nbEx.value = p.exercices.length;

generer();

p.exercices.forEach((exo,i)=>{
document.getElementById("nom"+i).value = exo.nom;
document.getElementById("ex"+i).value = exo.ex;
document.getElementById("repos"+i).value = exo.repos;
document.getElementById("rep"+i).value = exo.reps;
});

return true;
}

/* NOM */
function setDefaultName(){
let patho = localStorage.getItem("pathologie");

if(patho){
sessionName.value = patho.replaceAll("_"," ").replace(/\b\w/g,l=>l.toUpperCase());
}else{
sessionName.value = "Libre";
}
}

/* INIT */
generer();

let isEdit = loadEdit();
let isPatho = false;

if(!isEdit){
isPatho = loadPatho();
}

// 🔥 FIX ICI : toujours définir le nom si pas en édition
if(!isEdit){
setDefaultName();
}

</script>
</body>
</html>
