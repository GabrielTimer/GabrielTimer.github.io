<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;height:100vh;display:flex;flex-direction:column;}
.main{flex:1;overflow-y:auto;padding:10px;}
.card{background:white;padding:15px;border-radius:15px;max-width:420px;margin:auto;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
h2{text-align:center;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;align-items:center;}

input{width:85%;max-width:140px;padding:8px;border-radius:8px;border:1px solid #ccc;}

.exoBloc{background:#f9f9f9;margin:10px 0;border-radius:10px;}

.exoHeader{
background:#eee;
padding:12px;
display:flex;
align-items:center;
gap:8px;
min-height:44px;
}

/* flèche */
.arrow{transition:0.25s;}
.arrow.open{transform:rotate(90deg);}

/* actions */
.actions{
margin-left:auto;
display:flex;
gap:6px;
}

.actionBtn{
background:#ddd;
border:none;
border-radius:6px;
width:26px;
height:26px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
padding:0;
}

.actionBtn:hover{background:#ccc;}

.deleteBtn{
background:#e53935;
border:none;
border-radius:50%;
width:26px;
height:26px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
padding:0;
}

/* contenu */
.exoContent{display:none;padding:10px;}

.addBtn{
background:#4caf50;
color:white;
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
}

/* footer */
.footer{
position:sticky;
bottom:10px;
background:white;
max-width:420px;
margin:0 auto 10px auto;
padding:12px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.footerGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
}

button{
padding:14px;
margin:6px 0;
border:none;
border-radius:12px;
width:100%;
font-size:17px;
cursor:pointer;
}

.start{background:#0072ff;color:white;}
.fav{background:#ffd54f;}
.home{background:#777;color:white;}

/* 🔥 UNDO BAR */
#undoBar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%) translateY(100px);
background:#333;
color:white;
padding:12px 18px;
border-radius:12px;
display:flex;
gap:12px;
align-items:center;
opacity:0;
transition:0.3s;
}

#undoBar.show{
transform:translateX(-50%) translateY(0);
opacity:1;
}

#undoBar button{
background:none;
border:none;
color:#4caf50;
font-weight:bold;
cursor:pointer;
padding:0;
}
</style>
</head>

<body>

<div class="main">
<div class="card">

<h2>Configurer la séance</h2>

<div id="exo"></div>

<button class="addBtn" onclick="addExo()">➕ Ajouter un exercice</button>

</div>
</div>

<div class="footer">

<div class="footerGrid">
<div class="field">
<label>Séries</label>
<input id="series" type="number" value="2">
</div>

<div class="field">
<label>Nom</label>
<input id="sessionName">
</div>
</div>

<button class="fav" onclick="addFavori()">⭐ Sauvegarder</button>
<button class="start" onclick="start()">🚀 Lancer</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<!-- UNDO -->
<div id="undoBar">
Exercice supprimé
<button onclick="undoDelete()">Annuler</button>
</div>

<script>

/* CLEAN */
if(!localStorage.getItem("edit_programme") && !localStorage.getItem("pathologie")){
    localStorage.removeItem("patho_data");
}

let exercices = [];
let lastDeleted = null;
let undoTimer = null;

/* SYNC */
function syncInputs(){
for(let i=0;i<exercices.length;i++){
exercices[i].nom = document.getElementById("nom"+i).value;
exercices[i].ex = +document.getElementById("ex"+i).value;
exercices[i].repos = +document.getElementById("repos"+i).value;
exercices[i].reps = +document.getElementById("rep"+i).value;
}
}

/* ADD */
function addExo(data=null){
syncInputs();
exercices.push(data || {nom:"Ex "+(exercices.length+1),ex:30,repos:10,reps:10});
render();
}

/* DELETE + UNDO */
function removeExo(i){
syncInputs();

lastDeleted = {
exo: JSON.parse(JSON.stringify(exercices[i])),
index: i
};

exercices.splice(i,1);
render();

showUndo();

/* vibration mobile */
if(navigator.vibrate) navigator.vibrate(30);
}

/* UNDO */
function undoDelete(){
if(!lastDeleted) return;

exercices.splice(lastDeleted.index,0,lastDeleted.exo);
lastDeleted = null;

render();
hideUndo();
}

/* UNDO UI */
function showUndo(){
let bar = document.getElementById("undoBar");
bar.classList.add("show");

clearTimeout(undoTimer);
undoTimer = setTimeout(()=>{
hideUndo();
lastDeleted = null;
},4000);
}

function hideUndo(){
document.getElementById("undoBar").classList.remove("show");
}

/* MOVE */
function moveUp(i){
if(i===0) return;
syncInputs();
[exercices[i-1], exercices[i]] = [exercices[i], exercices[i-1]];
render();
}

function moveDown(i){
if(i===exercices.length-1) return;
syncInputs();
[exercices[i+1], exercices[i]] = [exercices[i], exercices[i+1]];
render();
}

/* DUPLICATE */
function duplicateExo(i){
syncInputs();
let copy = JSON.parse(JSON.stringify(exercices[i]));
exercices.splice(i+1,0,copy);
render();
}

/* RENDER (inchangé) */
function render(){
exo.innerHTML="";

exercices.forEach((e,i)=>{
exo.innerHTML+=`
<div class="exoBloc">

<div class="exoHeader">
<span id="arrow${i}" class="arrow" onclick="toggle(${i})">▶</span>
<span onclick="toggle(${i})">Ex ${i+1}</span>

<div class="actions">

<button class="actionBtn" onclick="moveUp(${i})">
<svg viewBox="0 0 24 24" width="14" height="14" stroke="black" fill="none">
  <polyline points="6 15 12 9 18 15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</button>

<button class="actionBtn" onclick="moveDown(${i})">
<svg viewBox="0 0 24 24" width="14" height="14" stroke="black" fill="none">
  <polyline points="6 9 12 15 18 9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</button>

<button class="actionBtn" onclick="duplicateExo(${i})">
<svg viewBox="0 0 24 24" width="14" height="14" stroke="black" fill="none">
  <rect x="9" y="9" width="10" height="10" stroke-width="2" rx="2"/>
  <rect x="5" y="5" width="10" height="10" stroke-width="2" rx="2"/>
</svg>
</button>

<button class="deleteBtn" onclick="removeExo(${i})">
<svg viewBox="0 0 24 24" width="14" height="14" stroke="white" fill="none">
  <line x1="5" y1="12" x2="19" y2="12" stroke-width="2.5" stroke-linecap="round"/>
</svg>
</button>

</div>
</div>

<div class="exoContent" id="c${i}">
<div class="grid2">

<div class="field">
<label>🏷 Nom</label>
<input id="nom${i}" value="${e.nom}">
</div>

<div class="field">
<label>⏱ Exercice</label>
<input id="ex${i}" value="${e.ex}">
</div>

<div class="field">
<label>😌 Repos</label>
<input id="repos${i}" value="${e.repos}">
</div>

<div class="field">
<label>🔁 Répétitions</label>
<input id="rep${i}" value="${e.reps}">
</div>

</div>
</div>

</div>`;
});
}

/* TOGGLE */
function toggle(i){
let c=document.getElementById("c"+i);
let a=document.getElementById("arrow"+i);

if(c.style.display==="block"){
c.style.display="none";
a.classList.remove("open");
}else{
c.style.display="block";
a.classList.add("open");
}
}

/* BUILD + SAVE (inchangé) */
function build(){/* inchangé */ return {exercices:exercices,series:+series.value};}

function saveData(type){/* inchangé */}

function addFavori(){saveData("favori");alert("Sauvegardé");}
function start(){saveData("historique");localStorage.setItem("programme_temp",JSON.stringify(build()));window.location="timer.html";}
function home(){window.location="index.html";}

/* LOAD (inchangé) */
function loadEdit(){return false;}
function loadPatho(){return false;}
function setDefaultName(){sessionName.value="Libre";}

/* INIT */
addExo();

</script>
</body>
</html>
