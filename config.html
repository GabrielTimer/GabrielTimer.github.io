<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Configuration</title>

<style>
body{font-family:Arial;background:#f4f4f4;text-align:center;margin:0;}

.card{
background:white;
padding:20px;
border-radius:15px;
max-width:400px;
margin:20px auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:4px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:14px;
margin:6px 0;
border:none;
border-radius:10px;
width:100%;
font-size:16px;
cursor:pointer;
transition:0.15s;
}

button:hover{transform:scale(1.05);}
button:active{transform:scale(0.95);}

.save{background:#2ecc71;color:white;}
.start{background:#0072ff;color:white;}
.fav{background:#ffd54f;}
.home{background:#777;color:white;}

.exoBloc{background:#f9f9f9;margin:10px 0;border-radius:10px;}
.exoHeader{background:#eee;padding:10px;cursor:pointer;}
.exoContent{display:none;padding:10px;}
</style>
</head>

<body>

<div class="card">

<h2>Configurer la séance</h2>

<input type="number" id="nbEx" value="5" onchange="generer()">
<div id="exo"></div>

<input id="series" type="number" value="2">

<button class="fav" onclick="addFavori()">⭐ Ajouter aux favoris</button>
<button class="start" onclick="start()">🚀 Lancer</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<script>

let patho = localStorage.getItem("pathologie");

/* 🔥 CONFIG AUTO */
function applyDefault(){

if(patho === "tendinite_coiffe"){

nbEx.value = 8;
series.value = 2;

generer();

/* appliquer valeurs */
for(let i=0;i<8;i++){
document.getElementById("ex"+i).value = 90;
document.getElementById("repos"+i).value = 30;
document.getElementById("rep"+i).value = 1;
}

}

}

/* GENERATION */
function generer(){
exo.innerHTML="";
for(let i=0;i<nbEx.value;i++){
exo.innerHTML+=`
<div class="exoBloc">
<div class="exoHeader" onclick="toggle(${i})">▶ Ex ${i+1}</div>
<div class="exoContent" id="c${i}">
Nom<input id="nom${i}" value="Ex ${i+1}">
Ex<input id="ex${i}" value="20">
Repos<input id="repos${i}" value="15">
Rep<input id="rep${i}" value="3">
</div></div>`;
}
}

/* toggle */
function toggle(i){
let c=document.getElementById("c"+i);
c.style.display=c.style.display==="block"?"none":"block";
}

/* build */
function build(){
let list=[];
for(let i=0;i<nbEx.value;i++){
list.push({
nom:document.getElementById("nom"+i).value,
ex:+document.getElementById("ex"+i).value,
repos:+document.getElementById("repos"+i).value,
reps:+document.getElementById("rep"+i).value
});
}
return {exercices:list,series:+series.value};
}

/* save */
function saveData(type){
let list=JSON.parse(localStorage.getItem("programmes")||"[]");

list.push({
nom:patho||"Libre",
date:new Date().toLocaleDateString(),
type:type,
data:build()
});

localStorage.setItem("programmes",JSON.stringify(list));
}

/* favoris */
function addFavori(){
saveData("favori");
alert("Ajouté ⭐");
}

/* start */
function start(){
saveData("historique");
localStorage.setItem("programme_temp",JSON.stringify(build()));
window.location="timer.html";
}

/* home */
function home(){
window.location="index.html";
}

/* INIT */
generer();
applyDefault();

</script>

</body>
</html>
