<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<link rel="stylesheet" href="style.css?v=1">

<style>

/* LAYOUT */
body{
display:flex;
flex-direction:column;
height:100vh;
}

.main{
flex:1;
overflow-y:auto;
padding:15px;
}

/* CARD adaptée */
.card{
max-width:420px;
margin:auto;
}

/* TITRE */
h2{
text-align:center;
margin-bottom:10px;
}

/* GRID */
.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.field{
display:flex;
flex-direction:column;
gap:4px;
}

/* INPUT */
input{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid var(--border);
background:rgba(255,255,255,0.6);
font-size:14px;
}

/* EXERCICES */
.exoBloc{
background:rgba(255,255,255,0.5);
border-radius:16px;
margin:12px 0;
border:1px solid var(--border);
overflow:hidden;
}

.exoHeader{
padding:12px;
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
}

.arrow{
font-size:14px;
}

.arrow.open{
transform:rotate(90deg);
}

/* ACTIONS */
.actions{
margin-left:auto;
display:flex;
gap:6px;
}

.actionBtn{
background:rgba(255,255,255,0.6);
border:1px solid var(--border);
border-radius:8px;
width:28px;
height:28px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.deleteBtn{
background:#ef4444;
color:white;
border:none;
border-radius:50%;
width:28px;
height:28px;
}

/* CONTENT */
.exoContent{
display:none;
padding:10px;
}

/* ADD BUTTON */
.addBtn{
margin-top:10px;
background:var(--primary);
color:white;
}

/* FOOTER */
.footer{
position:sticky;
bottom:10px;
max-width:420px;
margin:0 auto 10px auto;
padding:14px;
border-radius:20px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
border:1px solid var(--border);
}

/* FOOTER GRID */
.footerGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:10px;
}

/* BOUTONS FOOTER */
.start{
background:var(--primary);
color:white;
}

.fav{
background:rgba(255,255,255,0.6);
border:1px solid var(--border);
}

.home{
background:rgba(255,255,255,0.6);
border:1px solid var(--border);
}

/* UNDO */
#undoBar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%) translateY(100px);
background:#0f172a;
color:white;
padding:12px 18px;
border-radius:12px;
display:flex;
gap:12px;
align-items:center;
opacity:0;
transition:0.3s;
}

#undoBar.show{
transform:translateX(-50%) translateY(0);
opacity:1;
}

#undoBar button{
background:none;
border:none;
color:#22c55e;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="main">
<div class="card">

<h2 id="title">Configurer la séance</h2>

<div id="exo"></div>

<button class="addBtn" onclick="addExo()">➕ Ajouter un exercice</button>

</div>
</div>

<div class="footer">

<div class="footerGrid">
<div class="field">
<label>Séries</label>
<input id="series" type="number" value="2">
</div>

<div class="field">
<label>Nom</label>
<input id="sessionName">
</div>
</div>

<button class="fav" onclick="addFavori()">⭐ Sauvegarder</button>
<button class="start" onclick="start()">🚀 Lancer</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<div id="undoBar">
Exercice supprimé
<button onclick="undoDelete()">Annuler</button>
</div>
