<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
background:#f1f5f9;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
}

.main{flex:1;overflow-y:auto;padding:10px;}

.card{
background:white;
padding:15px;
border-radius:15px;
max-width:420px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.logo{
width:65px;
display:block;
margin:0 auto 8px;
opacity:0.95;
}

h2{text-align:center;font-weight:600;margin-bottom:10px;}

.grid3{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.field{
display:flex;
flex-direction:column;
align-items:center;
}

input{
width:90%;
padding:10px;
border-radius:10px;
border:1px solid #e2e8f0;
background:#f8fafc;
}

/* 🔥 FIX MOBILE (SEUL AJOUT) */
@media (max-width:480px){

.grid3{
gap:5px;
}

.grid3 > .field{
min-width:0;
}

.grid3 input{
width:100%;
padding:6px;
font-size:14px;
box-sizing:border-box;
}

.field label{
font-size:12px;
line-height:1.1;
}

}

/* 🔵 TRIANGLE */
.arrow{
transition:0.25s;
font-size:18px;
color:#2563eb;
cursor:pointer;
}
.arrow.open{transform:rotate(90deg);}

.exoBloc{
background:#f8fafc;
margin:10px 0;
border-radius:12px;
border:1px solid #e2e8f0;
}

.exoHeader{
padding:12px;
display:flex;
align-items:center;
gap:8px;
min-height:44px;
}

.actions{
margin-left:auto;
display:flex;
gap:6px;
}

.actionBtn, .deleteBtn{
display:flex;
align-items:center;
justify-content:center;
transition:0.2s;
}

.actionBtn:hover{
background:#e2e8f0;
transform:scale(1.05);
}

.actionBtn{
background:#f1f5f9;
border:1px solid #e2e8f0;
border-radius:8px;
width:28px;
height:28px;
cursor:pointer;
}

.deleteBtn{
background:#ef4444;
border:none;
border-radius:50%;
width:28px;
height:28px;
color:white;
cursor:pointer;
font-size:14px;
}

.deleteBtn:hover{
background:#dc2626;
transform:scale(1.08);
}

button:active, .actionBtn:active, .deleteBtn:active{
transform:scale(0.95);
}

.exoContent{display:none;padding:10px;}

.exoNameInput{
display:none;
margin-bottom:8px;
width:95%;
}

.open .exoNameInput{
display:block;
}

.addBtn{
background:#2563eb;
color:white;
margin-top:10px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:600;
transition:0.2s;
}

.addBtn:hover{
background:#1d4ed8;
transform:scale(1.02);
}

.footer{
position:sticky;
bottom:10px;
background:white;
max-width:420px;
margin:0 auto 10px auto;
padding:12px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.footerGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
}

button{
padding:14px;
margin:6px 0;
border:none;
border-radius:12px;
width:100%;
font-size:16px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.start{background:#2563eb;color:white;}
.start:hover{background:#1d4ed8;transform:scale(1.02);}

.fav, .home{
background:#f1f5f9;
border:1px solid #e2e8f0;
}

.fav:hover, .home:hover{background:#e2e8f0;}

#undoBar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%) translateY(100px);
background:#0f172a;
color:white;
padding:12px 18px;
border-radius:12px;
display:flex;
gap:12px;
align-items:center;
opacity:0;
transition:0.3s;
}

#undoBar.show{
transform:translateX(-50%) translateY(0);
opacity:1;
}

#undoBar button{
background:none;
border:none;
color:#22c55e;
font-weight:bold;
cursor:pointer;
padding:0;
}
</style>
</head>

<body>

<!-- 🔒 HTML IDENTIQUE -->

<div class="main">
<div class="card">

<img src="logo.png" class="logo">
<h2 id="title">Configurer la séance</h2>

<div id="exo"></div>

<button class="addBtn" onclick="addExo()">➕ Ajouter un exercice</button>

</div>
</div>

<div class="footer">

<div class="footerGrid">
<div class="field">
<label>Séries</label>
<input id="series" type="number" value="2">
</div>

<div class="field">
<label>Nom</label>
<input id="sessionName" value="Libre">
</div>
</div>

<button class="fav" onclick="addFavori()">⭐ Sauvegarder</button>
<button class="start" onclick="start()">🚀 Lancer</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<div id="undoBar">
Exercice supprimé
<button onclick="undoDelete()">Annuler</button>
</div>

<script>

/* 🔒 JS STRICTEMENT IDENTIQUE */

let exercices = [];
let lastDeleted = null;
let undoTimer = null;

window.addEventListener("DOMContentLoaded", ()=>{
let edit = localStorage.getItem("edit_programme");

if(edit){
let data = JSON.parse(edit);

exercices = data.exercices || [];
document.getElementById("series").value = data.series || 1;

document.getElementById("sessionName").value = data.nom || "Séance";
document.getElementById("title").innerText = data.nom || "Modifier";

localStorage.removeItem("edit_programme"); // 🔥 évite bug retour
render();
return;
}
let pathoData = localStorage.getItem("patho_data");
let patho = localStorage.getItem("pathologie");

if(patho){

// 👉 MODE PATHO (inchangé)
let data = JSON.parse(pathoData || "{}");

exercices = data.exercices || [];
document.getElementById("series").value = data.series || 1;

document.getElementById("sessionName").value = patho;
document.getElementById("title").innerText = patho;

}else{

// 👉 MODE LIBRE (RESET PROPRE)
exercices = [
{nom:"Ex 1", ex:30, repos:10, reps:10}
];

document.getElementById("series").value = 3;
document.getElementById("sessionName").value = "Libre";
document.getElementById("title").innerText = "Libre";

}

render();
});

function syncInputs(){
for(let i=0;i<exercices.length;i++){
let input = document.getElementById("nom"+i);
if(input && input.value.trim() !== ""){
exercices[i].nom = input.value;
}
exercices[i].ex = +document.getElementById("ex"+i).value;
exercices[i].repos = +document.getElementById("repos"+i).value;
exercices[i].reps = +document.getElementById("rep"+i).value;
}
}

function addExo(data=null){
syncInputs();
exercices.push(data || {nom:"Ex "+(exercices.length+1),ex:30,repos:10,reps:10});
render();
}

function removeExo(i){
syncInputs();
lastDeleted = {exo: JSON.parse(JSON.stringify(exercices[i])),index: i};
exercices.splice(i,1);
render();
if(navigator.vibrate) navigator.vibrate(30);
}

function render(){
exo.innerHTML="";
exercices.forEach((e,i)=>{

let title = e.nom || "Ex "+(i+1);

exo.innerHTML+=`
<div class="exoBloc" id="exoBloc${i}">
<div class="exoHeader">
<span id="arrow${i}" class="arrow" onclick="toggle(${i})">▶</span>
<span onclick="toggle(${i})" id="title${i}">${title}</span>

<div class="actions">
<button class="actionBtn" onclick="moveUp(${i})">⬆️</button>
<button class="actionBtn" onclick="moveDown(${i})">⬇️</button>
<button class="actionBtn" onclick="duplicateExo(${i})">📄</button>
<button class="deleteBtn" onclick="removeExo(${i})">🗑️</button>
</div>
</div>

<div class="exoContent" id="c${i}">
<input class="exoNameInput" id="nom${i}" value="${e.nom}">

<div class="grid3">
<div class="field"><label>⏱ Exercice</label><input id="ex${i}" value="${e.ex}"></div>
<div class="field"><label>😌 Repos</label><input id="repos${i}" value="${e.repos}"></div>
<div class="field"><label>🔁 Répétitions</label><input id="rep${i}" value="${e.reps}"></div>
</div>
</div>
</div>`;
});
}

/* 🔥 toggle SAFE */
function toggle(i){

let c=document.getElementById("c"+i);
let a=document.getElementById("arrow"+i);
let bloc=document.getElementById("exoBloc"+i);

if(!c) return;

for(let j=0;j<exercices.length;j++){
if(j!==i){
let c2=document.getElementById("c"+j);
if(c2 && c2.style.display==="block"){
c2.style.display="none";
let a2=document.getElementById("arrow"+j);
let b2=document.getElementById("exoBloc"+j);
if(a2) a2.classList.remove("open");
if(b2) b2.classList.remove("open");
}
}
}

if(c.style.display==="block"){
c.style.display="none";
a.classList.remove("open");
bloc.classList.remove("open");
}else{
c.style.display="block";
a.classList.add("open");
bloc.classList.add("open");
}
}

function moveUp(i){
if(i===0) return;
syncInputs();
[exercices[i-1], exercices[i]] = [exercices[i], exercices[i-1]];
render();
}

function moveDown(i){
if(i===exercices.length-1) return;
syncInputs();
[exercices[i+1], exercices[i]] = [exercices[i], exercices[i+1]];
render();
}

function duplicateExo(i){
syncInputs();
let copy = JSON.parse(JSON.stringify(exercices[i]));
exercices.splice(i+1,0,copy);
render();
}

function build(){
let list=[];
for(let i=0;i<exercices.length;i++){
list.push({
nom:exercices[i].nom,
ex:+document.getElementById("ex"+i).value,
repos:+document.getElementById("repos"+i).value,
reps:+document.getElementById("rep"+i).value
});
}
return {
nom: document.getElementById("sessionName").value,
exercices:list,
series:+document.getElementById("series").value
};
}
function addFavori(){

let all = JSON.parse(localStorage.getItem("programmes") || "[]");

let programme = {
type: "favori",
nom: document.getElementById("sessionName").value,
date: new Date().toLocaleDateString(),
data: build()
};

/* éviter doublons */
let exists = all.some(p => JSON.stringify(p.data) === JSON.stringify(programme.data));

if(!exists){
all.push(programme);
localStorage.setItem("programmes", JSON.stringify(all));
}

alert("Sauvegardé");

}

function start(){

let all = JSON.parse(localStorage.getItem("programmes") || "[]");

let programme = {
type: "historique",
nom: document.getElementById("sessionName").value,
date: new Date().toLocaleString(),
data: build()
};

// 🔥 ajouter en premier
all.unshift(programme);

// 🔥 garder seulement 30 historiques
let historiques = all.filter(p => p.type === "historique").slice(0,30);
let autres = all.filter(p => p.type !== "historique");

localStorage.setItem("programmes", JSON.stringify([...historiques, ...autres]));

// 🔥 lancement normal
localStorage.setItem("programme_temp", JSON.stringify(programme.data));
window.location="timer.html";
}

function home(){
window.location="index.html";
}

</script>
</body>
</html>
