<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zones</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;text-align:center;}

.card{
background:white;
padding:20px;
border-radius:15px;
max-width:420px;
margin:auto;
margin-top:20px;
}

/* GRID ZONES */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.zone{
background:#eee;
padding:10px;
border-radius:10px;
cursor:pointer;
}

.zone img{
width:100%;
height:90px;
object-fit:cover;
border-radius:8px;
}

/* CONFIG */
#configZone{display:none;}

#cover{
width:100%;
border-radius:10px;
margin:10px 0;
}

/* EXOS */
.exo{
background:#eee;
margin:8px 0;
padding:12px;
border-radius:10px;
cursor:pointer;
text-align:left;
}

.panel{
display:none;
padding:10px;
background:#fafafa;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

.smallInput{
width:120px;
margin:auto;
display:block;
}

button{
padding:12px;
margin:5px;
border:none;
border-radius:10px;
width:100%;
cursor:pointer;
}

.add{background:#4caf50;color:white;}
.start{background:#0e8f9b;color:white;}
.print{background:#ff9800;color:white;}
.pdf{background:#9c27b0;color:white;}
.back{background:#777;color:white;}
</style>
</head>

<body>

<div class="card">

<h2 id="title">ZONES</h2>

<!-- 🔥 ZONES -->
<div id="grid" class="grid">

<div class="zone" onclick="select('tendinite_coiffe','Membre supérieur')">
<img src="images/tendinite_coiffe/cover.jpg">
<p>Membre supérieur</p>
</div>

<div class="zone" onclick="select('lombalgie','Dos')">
<img src="images/lombalgie/cover.jpg">
<p>Dos</p>
</div>

<div class="zone" onclick="select('syndrome_rotulien','Membre inférieur')">
<img src="images/syndrome_rotulien/cover.jpg">
<p>Membre inférieur</p>
</div>

<div class="zone" onclick="select('cervicales','Cervicales')">
<img src="images/cervicales/cover.jpg">
<p>Cervicales</p>
</div>

<div class="zone" onclick="select('autres','Autres')">
<img src="images/autres/cover.jpg">
<p>Autres</p>
</div>

</div>

<!-- 🔥 CONFIG -->
<div id="configZone">

<img id="cover">

<button class="pdf" onclick="window.print()">📄 PDF</button>
<button class="print" onclick="window.print()">🖨 Imprimer</button>

<h2>Exercices</h2>
<div id="exoList"></div>

<button class="add" onclick="addExo()">➕ Ajouter exercice</button>

<h3>Séries</h3>
<input id="series" type="number" class="smallInput" value="2">

<button class="start" onclick="start()">▶ Démarrer</button>
<button class="back" onclick="back()">⬅ Retour</button>

</div>

</div>

<script>

let patho=null;
let exercices=[];

/* SELECT ZONE */
function select(id,nom){

patho=id;
localStorage.setItem("pathologie",id);

grid.style.display="none";
configZone.style.display="block";

title.innerText=nom;
cover.src="images/"+id+"/cover.jpg";

/* reset */
exercices=[];
addExo();addExo();addExo();
}

/* EXOS */
function addExo(){
exercices.push({
nom:"Exercice "+(exercices.length+1),
tempsEx:20,
tempsRepos:15,
reps:3
});
render();
}

function render(){
exoList.innerHTML="";

exercices.forEach((exo,i)=>{
let div=document.createElement("div");

div.innerHTML=`
<div class="exo" onclick="toggle(${i})">${exo.nom}</div>

<div class="panel" id="p${i}">
<input value="${exo.nom}" onchange="updateNom(${i},this.value)">
<input type="number" value="${exo.tempsEx}" onchange="update(${i},'tempsEx',this.value)">
<input type="number" value="${exo.tempsRepos}" onchange="update(${i},'tempsRepos',this.value)">
<input type="number" value="${exo.reps}" onchange="update(${i},'reps',this.value)">
<button onclick="removeExo(${i})">❌ Supprimer</button>
</div>
`;

exoList.appendChild(div);
});
}

function toggle(i){
let p=document.getElementById("p"+i);
p.style.display = p.style.display==="block" ? "none":"block";
}

function update(i,key,val){exercices[i][key]=+val;}
function updateNom(i,val){exercices[i].nom=val;render();}
function removeExo(i){exercices.splice(i,1);render();}

/* START */
function start(){
localStorage.setItem("programme_temp",JSON.stringify({
exercices,
series:+series.value
}));
window.location="timer.html";
}

/* BACK */
function back(){
grid.style.display="grid";
configZone.style.display="none";
title.innerText="ZONES";
}

/* INIT */
addExo();addExo();addExo();

</script>

</body>
</html>
