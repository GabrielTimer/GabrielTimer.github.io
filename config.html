<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;height:100vh;display:flex;flex-direction:column;}
.main{flex:1;overflow-y:auto;padding:10px;}
.card{background:white;padding:15px;border-radius:15px;max-width:420px;margin:auto;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
h2{text-align:center;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;align-items:center;}

input{width:85%;max-width:140px;padding:8px;border-radius:8px;border:1px solid #ccc;}

.exoBloc{
background:#f9f9f9;
margin:10px 0;
border-radius:10px;
transition:transform 0.25s ease;
}

.exoHeader{
background:#eee;
padding:12px;
display:flex;
align-items:center;
gap:10px;
}

/* poignée */
.dragHandle{
cursor:grab;
font-size:18px;
padding:4px;
}

.dragHandle:active{
cursor:grabbing;
}

/* flèche */
.arrow{transition:0.25s;}
.arrow.open{transform:rotate(90deg);}

/* delete */
.deleteBtn{
margin-left:auto;
background:#e53935;
color:white;
border:none;
border-radius:50%;
width:24px;
height:24px;
cursor:pointer;
}

/* contenu */
.exoContent{display:none;padding:10px;}

/* drag */
.dragging{
position:relative;
z-index:1000;
pointer-events:none;
opacity:0.9;
transform:scale(1.03);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* animation des autres */
.moving{
transition:transform 0.25s ease;
}

.addBtn{
background:#4caf50;
color:white;
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<div class="main">
<div class="card">
<h2>Configurer la séance</h2>

<div id="exo"></div>

<button class="addBtn" onclick="addExo()">➕ Ajouter un exercice</button>
</div>
</div>

<script>

let exercices = [];
let dragEl = null;
let startY = 0;
let currentIndex = null;

/* SYNC */
function syncInputs(){
for(let i=0;i<exercices.length;i++){
exercices[i].nom = document.getElementById("nom"+i).value;
exercices[i].ex = +document.getElementById("ex"+i).value;
exercices[i].repos = +document.getElementById("repos"+i).value;
exercices[i].reps = +document.getElementById("rep"+i).value;
}
}

/* ADD */
function addExo(data=null){
syncInputs();
exercices.push(data || {nom:"Ex "+(exercices.length+1),ex:30,repos:10,reps:10});
render();
}

/* DELETE */
function removeExo(i){
syncInputs();
exercices.splice(i,1);
render();
}

/* RENDER */
function render(){
exo.innerHTML="";

exercices.forEach((e,i)=>{
exo.innerHTML+=`
<div class="exoBloc" data-index="${i}">

<div class="exoHeader">

<span class="dragHandle"
onpointerdown="dragStart(event, ${i})">≡</span>

<span id="arrow${i}" class="arrow" onclick="toggle(${i})">▶</span>
<span onclick="toggle(${i})">Ex ${i+1}</span>

<button class="deleteBtn" onclick="removeExo(${i})">−</button>
</div>

<div class="exoContent" id="c${i}">
<div class="grid2">
<div class="field"><label>🏷 Nom</label><input id="nom${i}" value="${e.nom}"></div>
<div class="field"><label>⏱ Exercice</label><input id="ex${i}" value="${e.ex}"></div>
<div class="field"><label>😌 Repos</label><input id="repos${i}" value="${e.repos}"></div>
<div class="field"><label>🔁 Répétitions</label><input id="rep${i}" value="${e.reps}"></div>
</div>
</div>

</div>`;
});
}

/* TOGGLE */
function toggle(i){
let c=document.getElementById("c"+i);
let a=document.getElementById("arrow"+i);

if(c.style.display==="block"){
c.style.display="none";
a.classList.remove("open");
}else{
c.style.display="block";
a.classList.add("open");
}
}

/* DRAG START */
function dragStart(e,i){
syncInputs();

dragEl = e.target.closest(".exoBloc");
currentIndex = i;
startY = e.clientY;

dragEl.classList.add("dragging");

document.addEventListener("pointermove", dragMove);
document.addEventListener("pointerup", dragEnd);
}

/* DRAG MOVE */
function dragMove(e){
if(!dragEl) return;

let dy = e.clientY - startY;
dragEl.style.transform = `translateY(${dy}px)`;

let blocs = [...document.querySelectorAll(".exoBloc")];

blocs.forEach((b, index)=>{
if(b===dragEl) return;

let rect = b.getBoundingClientRect();

if(e.clientY > rect.top && e.clientY < rect.bottom){
if(index !== currentIndex){

let moved = exercices.splice(currentIndex,1)[0];
exercices.splice(index,0,moved);
currentIndex = index;

render();

/* relancer drag */
dragEl = document.querySelectorAll(".exoBloc")[currentIndex];
dragEl.classList.add("dragging");
startY = e.clientY;
}
}
});
}

/* DRAG END */
function dragEnd(){
if(!dragEl) return;

dragEl.classList.remove("dragging");
dragEl.style.transform = "";

dragEl = null;

document.removeEventListener("pointermove", dragMove);
document.removeEventListener("pointerup", dragEnd);
}

/* INIT */
addExo();

</script>

</body>
</html>
