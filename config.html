<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
/* TON CSS INTACT */

body{
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
background:#f1f5f9;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
}

.main{flex:1;overflow-y:auto;padding:10px;}

.card{
background:white;
padding:15px;
border-radius:15px;
max-width:420px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.logo{
width:65px;
display:block;
margin:0 auto 8px;
opacity:0.95;
}

h2{text-align:center;font-weight:600;margin-bottom:10px;}

.grid3{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.field{
display:flex;
flex-direction:column;
align-items:center;
}

input{
width:90%;
padding:10px;
border-radius:10px;
border:1px solid #e2e8f0;
background:#f8fafc;
}

/* FIX MOBILE */
@media (max-width:480px){
.grid3{gap:6px;}
.grid3 .field{width:100%;}
.grid3 input{width:100%;padding:8px;}
.field label{font-size:13px;}
}

/* 🔥 TRIANGLE AMÉLIORÉ */
.arrow{
transition:0.25s;
font-size:18px;
color:#2563eb;
cursor:pointer;
}

.arrow.open{
transform:rotate(90deg);
color:#1d4ed8;
}

/* reste inchangé */

.actions{
margin-left:auto;
display:flex;
gap:6px;
}

.actionBtn, .deleteBtn{
display:flex;
align-items:center;
justify-content:center;
transition:0.2s;
}

.actionBtn:hover{
background:#e2e8f0;
transform:scale(1.05);
}

.actionBtn{
background:#f1f5f9;
border:1px solid #e2e8f0;
border-radius:8px;
width:28px;
height:28px;
cursor:pointer;
}

.deleteBtn{
background:#ef4444;
border:none;
border-radius:50%;
width:28px;
height:28px;
color:white;
cursor:pointer;
font-size:14px;
}

.deleteBtn:hover{
background:#dc2626;
transform:scale(1.08);
}

button:active, .actionBtn:active, .deleteBtn:active{
transform:scale(0.95);
}

.exoContent{display:none;padding:10px;}

.exoNameInput{
display:none;
margin-bottom:8px;
width:95%;
}

.open .exoNameInput{
display:block;
}

.addBtn{
background:#2563eb;
color:white;
margin-top:10px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:600;
transition:0.2s;
}

.addBtn:hover{
background:#1d4ed8;
transform:scale(1.02);
}

.footer{
position:sticky;
bottom:10px;
background:white;
max-width:420px;
margin:0 auto 10px auto;
padding:12px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.footerGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
}

button{
padding:14px;
margin:6px 0;
border:none;
border-radius:12px;
width:100%;
font-size:16px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.start{background:#2563eb;color:white;}
.start:hover{background:#1d4ed8;transform:scale(1.02);}

.fav, .home{
background:#f1f5f9;
border:1px solid #e2e8f0;
}

.fav:hover, .home:hover{background:#e2e8f0;}

#undoBar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%) translateY(100px);
background:#0f172a;
color:white;
padding:12px 18px;
border-radius:12px;
display:flex;
gap:12px;
align-items:center;
opacity:0;
transition:0.3s;
}

#undoBar.show{
transform:translateX(-50%) translateY(0);
opacity:1;
}

#undoBar button{
background:none;
border:none;
color:#22c55e;
font-weight:bold;
cursor:pointer;
padding:0;
}
</style>
</head>

<body>

<!-- HTML identique -->

<div class="main">
<div class="card">

<img src="logo.png" class="logo">
<h2 id="title">Configurer la séance</h2>

<div id="exo"></div>

<button class="addBtn" onclick="addExo()">➕ Ajouter un exercice</button>

</div>
</div>

<div class="footer">

<div class="footerGrid">
<div class="field">
<label>Séries</label>
<input id="series" type="number" value="2">
</div>

<div class="field">
<label>Nom</label>
<input id="sessionName" value="Libre">
</div>
</div>

<button class="fav" onclick="addFavori()">⭐ Sauvegarder</button>
<button class="start" onclick="start()">🚀 Lancer</button>
<button class="home" onclick="home()">🏠 Accueil</button>

</div>

<div id="undoBar">
Exercice supprimé
<button onclick="undoDelete()">Annuler</button>
</div>

<script>

/* TON JS ORIGINAL + FIX toggle uniquement */

function toggle(i){

let c = document.getElementById("c"+i);
let a = document.getElementById("arrow"+i);
let bloc = document.getElementById("exoBloc"+i);

if(!c) return;

/* fermer les autres proprement */
document.querySelectorAll(".exoContent").forEach((el, index)=>{
if(index !== i && el.style.display === "block"){

el.style.display = "none";

let arrow = document.getElementById("arrow"+index);
let bloc2 = document.getElementById("exoBloc"+index);

if(arrow) arrow.classList.remove("open");
if(bloc2) bloc2.classList.remove("open");

/* sauvegarde nom */
let input = document.getElementById("nom"+index);
if(input && input.value.trim() !== ""){
let title = document.getElementById("title"+index);
if(title) title.innerText = input.value;
exercices[index].nom = input.value;
}

}
});

/* toggle normal */
if(c.style.display === "block"){
c.style.display = "none";
a.classList.remove("open");
bloc.classList.remove("open");
}else{
c.style.display = "block";
a.classList.add("open");
bloc.classList.add("open");
}

}

</script>

</body>
</html>
