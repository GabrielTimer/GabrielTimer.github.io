<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration</title>

<style>
body{
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
background:#f1f5f9;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
}

.main{flex:1;overflow-y:auto;padding:10px;}

.card{
background:white;
padding:15px;
border-radius:15px;
max-width:420px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.logo{
width:65px;
display:block;
margin:0 auto 8px;
opacity:0.95;
}

h2{text-align:center;font-weight:600;margin-bottom:10px;}

.grid3{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.field{
display:flex;
flex-direction:column;
align-items:center;
}

input{
width:90%;
padding:10px;
border-radius:10px;
border:1px solid #e2e8f0;
background:#f8fafc;
}

/* 🔥 FIX MOBILE (SEUL AJOUT) */
@media (max-width:480px){

.grid3{
gap:5px;
}

.grid3 > .field{
min-width:0;
}

.grid3 input{
width:100%;
padding:6px;
font-size:14px;
box-sizing:border-box;
}

.field label{
font-size:12px;
line-height:1.1;
}

}

/* 🔵 TRIANGLE */
.arrow{
transition:0.25s;
font-size:18px;
color:#2563eb;
cursor:pointer;
}
.arrow.open{transform:rotate(90deg);}

.exoBloc{
background:#f8fafc;
margin:10px 0;
border-radius:12px;
border:1px solid #e2e8f0;
}

.exoHeader{
padding:12px;
display:flex;
align-items:center;
gap:8px;
min-height:44px;
}

.actions{
margin-left:auto;
display:flex;
gap:6px;
}

.actionBtn, .deleteBtn{
display:flex;
align-items:center;
justify-content:center;
transition:0.2s;
}

.actionBtn:hover{
background:#e2e8f0;
transform:scale(1.05);
}

.actionBtn{
background:#f1f5f9;
border:1px solid #e2e8f0;
border-radius:8px;
width:28px;
height:28px;
cursor:pointer;
}

.deleteBtn{
background:#ef4444;
border:none;
border-radius:50%;
width:28px;
height:28px;
color:white;
cursor:pointer;
font-size:14px;
}

.deleteBtn:hover{
background:#dc2626;
transform:scale(1.08);
}

button:active, .actionBtn:active, .deleteBtn:active{
transform:scale(0.95);
}

.exoContent{display:none;padding:10px;}

.exoNameInput{
display:none;
margin-bottom:8px;
width:95%;
}

.open .exoNameInput{
display:block;
}

.addBtn{
background:#2563eb;
color:white;
margin-top:10px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:600;
transition:0.2s;
}

.addBtn:hover{
background:#1d4ed8;
transform:scale(1.02);
}

.footer{
position:sticky;
bottom:10px;
background:white;
max-width:420px;
margin:0 auto 10px auto;
padding:12px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.footerGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
align-items:end;
}

button{
padding:14px;
margin:6px 0;
border:none;
border-radius:12px;
width:100%;
font-size:16px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.start{background:#2563eb;color:white;}
.start:hover{background:#1d4ed8;transform:scale(1.02);}

.fav, .home{
background:#f1f5f9;
border:1px solid #e2e8f0;
}

.fav:hover, .home:hover{background:#e2e8f0;}

#undoBar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%) translateY(100px);
background:#0f172a;
color:white;
padding:12px 18px;
border-radius:12px;
display:flex;
gap:12px;
align-items:center;
opacity:0;
transition:0.3s;
}

#undoBar.show{
transform:translateX(-50%) translateY(0);
opacity:1;
}

#undoBar button{
background:none;
border:none;
color:#22c55e;
font-weight:bold;
cursor:pointer;
padding:0;
}
</style>
</head>

<body>

<!-- 🔒 HTML IDENTIQUE -->

<div class="main">
<div class="card">

<img src="logo.png" class="logo">
<h2 id="title">Configurer la séance</h2>

<div id="exo"></div>
<button
id="addExoBtn"
class="addBtn"
onclick="addExo()">
➕ Ajouter un exercice
</button>
<button
id="glossaireBtn"
class="addBtn"
onclick="openGlossaire()">

📚 Bibliothèque exercices

</button>

</div>
</div>

<div class="footer">

<!-- Séries -->

<div
style="
margin-bottom:15px;
padding:12px;
background:#f8fafc;
border:1px solid #e2e8f0;
border-radius:12px;
text-align:center;
"
>

<label
style="
display:block;
font-weight:600;
margin-bottom:8px;
"
>
🏋️ Séries
</label>

<input
id="series"
type="number"
value="2"
style="
width:100px;
text-align:center;
">

</div>

<!-- Patient + Nom -->

<div class="footerGrid">

<div class="field">

<label>Patient</label>

<input
id="patientId"
list="patientsList"
placeholder="Rechercher un patient..."
autocomplete="off">

<datalist id="patientsList"></datalist>

<div
id="patientStatus"
style="
font-size:12px;
margin-top:4px;
color:#64748b;
">
</div>

</div>

<div class="field">

<label>Nom</label>

<input
id="sessionName"
value="Libre">

</div>

</div>
<div
id="prescriptionBlock"
style="
margin:12px 0;
padding:14px;
background:#f8fafc;
border:1px solid #e2e8f0;
border-radius:12px;
">

<div style="
font-weight:600;
font-size:15px;
margin-bottom:12px;
text-align:center;
">
📅 Prescription
</div>

<div style="
display:flex;
justify-content:center;
gap:25px;
margin-bottom:15px;
">

<label style="cursor:pointer">
<input
type="radio"
name="prescriptionType"
value="unique"
checked>
 Séance unique
</label>

<label style="cursor:pointer">
<input
type="radio"
name="prescriptionType"
value="programme">
 Programme
</label>

</div>

<div class="footerGrid">

<div class="field">
<label>Semaines</label>
<input
id="nbSemaines"
type="number"
min="1"
value="4">
</div>

<div class="field">
<label>Séances / semaine</label>
<input
id="nbSeancesSemaine"
type="number"
min="1"
value="3">
</div>

</div>
<div id="joursProgrammeBlock" style="
margin-top:15px;
padding-top:12px;
border-top:1px solid #e2e8f0;
">

<label style="
display:block;
font-weight:600;
margin-bottom:10px;
text-align:center;
">
📅 Jours des séances
</label>

<div style="
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
font-size:14px;
">

<label><input type="checkbox" class="jourProgramme" value="lundi"> Lundi</label>
<label><input type="checkbox" class="jourProgramme" value="mardi"> Mardi</label>

<label><input type="checkbox" class="jourProgramme" value="mercredi"> Mercredi</label>
<label><input type="checkbox" class="jourProgramme" value="jeudi"> Jeudi</label>

<label><input type="checkbox" class="jourProgramme" value="vendredi"> Vendredi</label>
<label><input type="checkbox" class="jourProgramme" value="samedi"> Samedi</label>

<label><input type="checkbox" class="jourProgramme" value="dimanche"> Dimanche</label>

</div>

</div>

</div>

<div class="field" style="margin-top:12px;">
<label>Date début</label>
<input
id="dateDebut"
type="date">
</div>

<button
type="button"
class="fav"
onclick="addFavori()">

⭐ Sauvegarder

</button>

<button
type="button"
class="fav"
onclick="saveCloud()">

☁️ Envoyer cloud

</button>

<button
type="button"
class="start"
onclick="start()">

🚀 Lancer

</button>

<button
type="button"
class="home"
onclick="home()">

🏠 Accueil

</button>

</div>

<div id="undoBar">
Exercice supprimé
<button onclick="undoDelete()">Annuler</button>
</div>

<script type="module">

import {
saveProgramToCloud,
loadProgramsFromCloud
} from "./exercises/js/cloud.js";

/* 🔒 JS STRICTEMENT IDENTIQUE */

const params =
new URLSearchParams(
window.location.search
);

const patientMode = !!params.get("patient");
let exercices = [];
let lastDeleted = null;
let undoTimer = null;
const cloudId =
params.get("cloud");

window.addEventListener("DOMContentLoaded", ()=>{

loadPatients();

const today = new Date();

initJoursProgramme();

document.getElementById("dateDebut").value =
today.toISOString().split("T")[0];

if(
  localStorage.getItem("admin_ok")
  !== "true"
){
  const bloc =
  document.getElementById(
    "prescriptionBlock"
  );

  if(bloc){
    bloc.style.display = "none";
  }
}

if(cloudId){

  localStorage.setItem(
    "editCloudId",
    cloudId
  );

}


let edit = localStorage.getItem("edit_programme");

let pathoData = localStorage.getItem("patho_data");
let patho = localStorage.getItem("pathologie");
let pathoNom = localStorage.getItem("pathologie_nom");

/* =========================
   MODE ÉDITION PROGRAMME
========================= */

if(edit){

let data = JSON.parse(edit);

exercices = data.exercices || [];

document.getElementById("series").value =
data.series || 1;

document.getElementById("sessionName").value =
data.nom || "Séance";

document.getElementById("title").innerText =
data.nom || "Modifier";

document.getElementById("patientId").value =
data.patientId
||
data.patient
||
"";

localStorage.removeItem("edit_programme");

render();

return;

}

/* =========================
   MODE LIBRE TEMP
========================= */

let temp = localStorage.getItem("programme_temp");

if(temp){

let data = JSON.parse(temp);

exercices = data.exercices || [];

document.getElementById("series").value =
data.series || 1;

document.getElementById("sessionName").value =
data.nom || "Libre";

document.getElementById("title").innerText =
data.nom || "Libre";

document.getElementById("patientId").value =
data.patientId
||
data.patient
||
"";



render();

return;

}

/* =========================
   MODE PATHOLOGIE
========================= */

if(patho){

let data = JSON.parse(pathoData || "{}");

exercices = data.exercices || [];

document.getElementById("series").value =
data.series || 1;

document.getElementById("sessionName").value =
pathoNom || patho;

document.getElementById("title").innerText =
pathoNom || patho;

render();

return;

}

/* =========================
   MODE LIBRE VIDE
========================= */

exercices = [
{nom:"Ex 1", ex:30, repos:10, reps:10}
];

document.getElementById("series").value = 3;

document.getElementById("sessionName").value =
"Libre";

document.getElementById("title").innerText =
"Libre";

if(
  localStorage.getItem("admin_ok")
  === "true"
){
  document.getElementById(
    "patientId"
  ).value = "admin";
}


render();

});

function syncInputs(){
for(let i=0;i<exercices.length;i++){
let input = document.getElementById("nom"+i);
if(input && input.value.trim() !== ""){
exercices[i].nom = input.value;
}
exercices[i].ex = +document.getElementById("ex"+i).value;
exercices[i].repos = +document.getElementById("repos"+i).value;
exercices[i].reps = +document.getElementById("rep"+i).value;
}
}

function addExo(data=null){
syncInputs();
exercices.push(data || {nom:"Ex "+(exercices.length+1),ex:30,repos:10,reps:10});
render();
}

function removeExo(i){
syncInputs();
lastDeleted = {exo: JSON.parse(JSON.stringify(exercices[i])),index: i};
exercices.splice(i,1);
render();
if(navigator.vibrate) navigator.vibrate(30);
}

function render(){
exo.innerHTML="";
exercices.forEach((e,i)=>{

let title = e.nom || "Ex "+(i+1);

exo.innerHTML+=`
<div class="exoBloc" id="exoBloc${i}">
<div class="exoHeader">
<span id="arrow${i}" class="arrow" onclick="toggle(${i})">▶</span>
<span onclick="toggle(${i})" id="title${i}">${title}</span>
${e.image ? `<img src="${e.image}" style="width:40px;height:40px;object-fit:contain;">` : ""}

<div class="actions">
<button class="actionBtn" onclick="moveUp(${i})">⬆️</button>
<button class="actionBtn" onclick="moveDown(${i})">⬇️</button>
<button class="actionBtn" onclick="duplicateExo(${i})">📄</button>
<button class="deleteBtn" onclick="removeExo(${i})">🗑️</button>
</div>
</div>

<div class="exoContent" id="c${i}">
<input class="exoNameInput" id="nom${i}" value="${e.nom}">

<div class="grid3">
<div class="field"><label>⏱ Exercice</label><input id="ex${i}" value="${e.ex}"></div>
<div class="field"><label>😌 Repos</label><input id="repos${i}" value="${e.repos}"></div>
<div class="field"><label>🔁 Répétitions</label><input id="rep${i}" value="${e.reps}"></div>
</div>
</div>
</div>`;
});
}

/* 🔥 toggle SAFE */
function toggle(i){

let c=document.getElementById("c"+i);
let a=document.getElementById("arrow"+i);
let bloc=document.getElementById("exoBloc"+i);

if(!c) return;

for(let j=0;j<exercices.length;j++){
if(j!==i){
let c2=document.getElementById("c"+j);
if(c2 && c2.style.display==="block"){
c2.style.display="none";
let a2=document.getElementById("arrow"+j);
let b2=document.getElementById("exoBloc"+j);
if(a2) a2.classList.remove("open");
if(b2) b2.classList.remove("open");
}
}
}

if(c.style.display==="block"){
c.style.display="none";
a.classList.remove("open");
bloc.classList.remove("open");
}else{
c.style.display="block";
a.classList.add("open");
bloc.classList.add("open");
}
}

function moveUp(i){
if(i===0) return;
syncInputs();
[exercices[i-1], exercices[i]] = [exercices[i], exercices[i-1]];
render();
}

function moveDown(i){
if(i===exercices.length-1) return;
syncInputs();
[exercices[i+1], exercices[i]] = [exercices[i], exercices[i+1]];
render();
}

function duplicateExo(i){
syncInputs();
let copy = JSON.parse(JSON.stringify(exercices[i]));
exercices.splice(i+1,0,copy);
render();
}

function build(){

let list=[];

for(let i=0;i<exercices.length;i++){

list.push({

id: exercices[i].id || "",

type: exercices[i].type || "timer",

nom: exercices[i].nom,

image: exercices[i].image || "",

conseil: exercices[i].conseil || "",

conseil_posture:
exercices[i].conseil_posture || [],

erreurs_frequentes:
exercices[i].erreurs_frequentes || [],

respiration:
exercices[i].respiration || [],

version_facile:
exercices[i].version_facile || [],

version_avancee:
exercices[i].version_avancee || [],

videos:
exercices[i].videos || [],

ex: +document.getElementById("ex"+i).value,

repos: +document.getElementById("repos"+i).value,

reps: +document.getElementById("rep"+i).value

});

}

return {

nom: document.getElementById("sessionName").value,

series: +document.getElementById("series").value,

exercices: list

};

}
function addFavori(){

let all = JSON.parse(localStorage.getItem("programmes") || "[]");

let programme = {
type: "favori",
patientId:
patientMode
? params.get("patient")
: "admin",
nom: document.getElementById("sessionName").value,
date: new Date().toLocaleDateString(),
data: build()
};

let editIndex = localStorage.getItem("edit_index");

if(editIndex !== null){

// 🔥 on récupère les favoris
let favs = all.filter(p => p.type === "favori");
let target = favs[editIndex];

// 🔥 on retrouve le vrai index dans "all"
let realIndex = all.findIndex(p => p === target);

// 🔥 remplacement
if(realIndex !== -1){
all[realIndex] = programme;
}

// nettoyage
localStorage.removeItem("edit_index");

}else{

// 🔥 ajout normal
let exists = all.some(p => JSON.stringify(p.data) === JSON.stringify(programme.data));

if(!exists){
all.push(programme);
}

}

localStorage.setItem("programmes", JSON.stringify(all));

alert("Sauvegardé");

}

function initJoursProgramme(){

const input =
document.getElementById(
"nbSeancesSemaine"
);

if(!input) return;

input.addEventListener(
"change",
applyJoursParDefaut
);

applyJoursParDefaut();

}

function applyJoursParDefaut(){

const nb =
parseInt(
document.getElementById(
"nbSeancesSemaine"
).value || 1
);

const map = {
1:["mercredi"],
2:["mardi","vendredi"],
3:["lundi","mercredi","vendredi"],
4:["lundi","mardi","jeudi","vendredi"],
5:["lundi","mardi","mercredi","jeudi","vendredi"],
6:["lundi","mardi","mercredi","jeudi","vendredi","samedi"],
7:["lundi","mardi","mercredi","jeudi","vendredi","samedi","dimanche"]
};

document
.querySelectorAll(".jourProgramme")
.forEach(cb=>cb.checked=false);

(map[nb] || [])
.forEach(jour=>{

const cb =
document.querySelector(
`.jourProgramme[value="${jour}"]`
);

if(cb) cb.checked = true;

});

}

function start(){

let all = JSON.parse(localStorage.getItem("programmes") || "[]");

let eva = parseInt(localStorage.getItem("eva_temp") || 0);
let programme = {
type: "historique",
patientId:
patientMode
? params.get("patient")
: "admin",
nom: document.getElementById("sessionName").value,
date: new Date().toLocaleString(),
data: {
...build(),
eva: eva}
};

/* ❌ SUPPRIMÉ : enregistrement ici (trop tôt) */

/* 🔥 lancement normal */
localStorage.removeItem("eva_temp");

localStorage.setItem(
"programme_temp",
JSON.stringify(programme.data)
);

localStorage.removeItem(
"return_to_config"
);


const patient =
params.get("patient");

if(cloudId){

window.location =
"timer.html?cloud="
+ cloudId +
"&patient="
+ patient +
"&v=" +
Date.now();

}else if(patient){

window.location =
"timer.html?patient="
+ patient +
"&v=" +
Date.now();

}else{

window.location =
"timer.html?v=" +
Date.now();

}

}

function openGlossaire(){

localStorage.setItem(
"return_to_config",
"1"
);

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient");

if(patient){

window.location =
"exercises/glossary.html?patient="
+ patient +
"&v=1.3";

}else{

window.location =
"exercises/glossary.html?v=1.3";

}

}
if(patientMode){

const patientName =
params.get("patient");

if(patientName){

document.getElementById(
"patientId"
).value = patientName;

}

const glossaireBtn =
document.getElementById(
"glossaireBtn"
);

if(glossaireBtn){
glossaireBtn.style.display = "none";
}

const cloudButtons =
document.querySelectorAll(
".fav"
);

cloudButtons.forEach(btn=>{

if(
btn.innerText.includes("☁️")
){
btn.style.display = "none";
}

});

const patientInput =
document.getElementById(
"patientId"
);

if(patientInput){

patientInput.disabled = true;

}

}
function home(){

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient");

if(patient){

window.location.href =
"index.html?patient="
+ patient +
"&v=" + Date.now();

}else{

window.location.href =
"index.html?v=" + Date.now();

}

}

async function loadPatients(){

try{

const programmes =
await loadProgramsFromCloud();

const patients =
[
...new Set(
programmes
.map(p => p.patientId)
.filter(Boolean)
)
]
.sort();

const list =
document.getElementById(
"patientsList"
);

list.innerHTML = patients
.map(p =>
`<option value="${p}">`
)
.join("");

const input =
document.getElementById(
"patientId"
);

const status =
document.getElementById(
"patientStatus"
);

input.addEventListener(
"input",
()=>{

const exists =
patients.includes(
input.value
);

if(exists){

status.innerHTML =
"🟢 Patient existant";

status.style.color =
"#16a34a";

}else if(input.value){

status.innerHTML =
"🟠 Nouveau patient";

status.style.color =
"#f97316";

}else{

status.innerHTML = "";

}

});

}catch(e){

console.error(
"Erreur chargement patients",
e
);

}

}

const joursMap = {
  "dimanche": 0,
  "lundi": 1,
  "mardi": 2,
  "mercredi": 3,
  "jeudi": 4,
  "vendredi": 5,
  "samedi": 6
};

window.saveCloud = async function(){

const editId =
localStorage.getItem(
"editCloudId"
);

const isAdmin =
localStorage.getItem("admin_ok")
=== "true";

const patientId =
document.getElementById(
"patientId"
).value.trim();

if(
patientId.toLowerCase() === "admin"
&&
!isAdmin
){
alert(
"Programme admin réservé à l'administrateur"
);
return;
}

const typePrescription =
document.querySelector(
'input[name="prescriptionType"]:checked'
)?.value || "unique";

const nomProgramme =
document.getElementById(
"sessionName"
).value;

const semaines =
parseInt(
document.getElementById(
"nbSemaines"
)?.value || 1
);

const seancesParSemaine =
parseInt(
document.getElementById(
"nbSeancesSemaine"
)?.value || 1
);

const joursProgramme =
[
...document.querySelectorAll(
".jourProgramme:checked"
)
].map(cb => cb.value);

const dateDebut =
document.getElementById(
"dateDebut"
)?.value;

joursProgramme.sort((a,b)=>{

const debut =
new Date(dateDebut);

const jourDepart =
debut.getDay();

let da =
joursMap[a] - jourDepart;

let db =
joursMap[b] - jourDepart;

if(da < 0) da += 7;
if(db < 0) db += 7;

return da - db;

});

if(joursProgramme.length !== seancesParSemaine){
  alert(
    `Veuillez sélectionner ${seancesParSemaine} jour(s)`
  );
  return;
}

||

);

);

}

========================= */

crypto.randomUUID();

const lettres =
["A","B","C","D","E","F","G"];

for(let semaine=1; semaine<=semaines; semaine++){

for(
let s=0;
s<seancesParSemaine;
s++
){


const dateSeance = new Date(dateDebut);

const jourProgramme =
joursProgramme[s];

const jourCible =
joursMap[jourProgramme];

const debut =
new Date(dateDebut);

const jourDepart =
debut.getDay();

let decalagePremier =
jourCible - jourDepart;

if(decalagePremier < 0){
  decalagePremier += 7;
}

dateSeance.setDate(
  debut.getDate()
  + decalagePremier
  + ((semaine - 1) * 7)
);

const lundiReference = new Date(dateSeance);

const jour =
lundiReference.getDay();

const decalageLundi =
jour === 0
? -6
: 1 - jour;

lundiReference.setDate(
  lundiReference.getDate()
  + decalageLundi
);

const numeroSemaine =
Math.floor(
(
lundiReference -
new Date(dateDebut)
)
/
(1000 * 60 * 60 * 24 * 7)
) + 1;

dateSeance.toISOString(),

dateSeance.toLocaleDateString(
"fr-FR"
),

terminee:false,

data:{
  ...build(),
  categorie:"kine"


}

};


await saveProgramToCloud(
programme
);

}
