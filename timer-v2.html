<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Workout Timer V2</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

.timer-circle{

width:260px;
height:260px;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:60px;
font-weight:bold;

background:conic-gradient(#0e8f9b 0%, #333 0%);

transition:background 0.2s linear;

}

.phase{

font-size:28px;
margin-bottom:20px;

}

.progress{

width:80%;
height:20px;
background:#333;
border-radius:20px;
margin-top:40px;
overflow:hidden;

}

.progress-bar{

height:100%;
width:0%;
background:#0e8f9b;
transition:width 1s linear;

}

button{

margin-top:40px;
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#0e8f9b;
color:white;
cursor:pointer;

}

</style>

</head>

<body>

<div class="phase" id="phase">Prêt</div>

<div class="timer-circle" id="circle">
<span id="time">5</span>
</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<button onclick="start()">Démarrer</button>

<script>

let prepTime=5;
let exerciseTime=30;
let restTime=15;

let phase="prep";
let timeLeft=prepTime;

let totalTime=prepTime+exerciseTime+restTime;
let elapsed=0;

let timer;

function speak(text){

let msg=new SpeechSynthesisUtterance(text);
msg.lang="fr-FR";
speechSynthesis.speak(msg);

}

function updateCircle(){

let percent=(elapsed/totalTime)*100;

circle.style.background=
`conic-gradient(#0e8f9b ${percent}%, #333 ${percent}%)`;

progressBar.style.width=percent+"%";

}

function start(){

phase="prep";
timeLeft=prepTime;
elapsed=0;

speak("Préparation");

clearInterval(timer);

timer=setInterval(()=>{

time.innerText=timeLeft;

updateCircle();

timeLeft--;
elapsed++;

if(timeLeft<0){

if(phase==="prep"){

phase="exercise";
timeLeft=exerciseTime;

phaseText.innerText="Exercice";

speak("3");
setTimeout(()=>speak("2"),800);
setTimeout(()=>speak("1"),1600);
setTimeout(()=>speak("C'est parti"),2400);

}

else if(phase==="exercise"){

phase="rest";
timeLeft=restTime;

phaseText.innerText="Repos";

speak("Repos");

}

else{

clearInterval(timer);

phaseText.innerText="Terminé";

speak("Séance terminée");

}

}

},1000);

}

let phaseText=document.getElementById("phase");
let circle=document.getElementById("circle");
let progressBar=document.getElementById("progressBar");
let time=document.getElementById("time");

</script>

</body>
</html>
