<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathologies</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

h2{font-size:28px;margin-bottom:25px;}

.card{
display:flex;
align-items:center;
gap:12px;
width:85%;
max-width:360px;
margin:12px auto;
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

.card img{
width:80px;
height:80px;
object-fit:cover;
border-radius:12px;
}

.info{flex:1;}

.titleRow{
display:flex;
justify-content:space-between;
align-items:center;
}

h3{margin:0;font-size:16px;}

.pdfBtn{
background:#00e5ff;
border:none;
padding:6px 10px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
font-size:12px;
}

button{
margin-top:20px;
padding:14px 20px;
border:none;
border-radius:12px;
background:#ccc;
}

</style>
</head>

<body>

<h2>Choisir une pathologie</h2>

<div id="list"></div>

<button onclick="back()">⬅ Retour</button>

<script>

/* 🔥 BASE PATHO */
const PATHO_DATA = {

lombalgie_1:{
series:2,
exercices:[
{nom:"Gainage", ex:30, repos:10, reps:3},
{nom:"Pont fessier", ex:5, repos:5, reps:10},
{nom:"Bird dog", ex:30, repos:10, reps:4}
]
},

tendinite_coiffe:{
series:2,
exercices:[
{nom:"Rotation externe", ex:20, repos:10, reps:10},
{nom:"Élévation bras", ex:15, repos:10, reps:8},
{nom:"Abduction", ex:15, repos:10, reps:8}
]
}

};

/* CONFIG AFFICHAGE */
const data = {
epaule:[{nom:"Tendinite coiffe", dossier:"tendinite_coiffe"}],
dos:[{nom:"Lombalgie 1", dossier:"lombalgie_1"}]
};

let zone = localStorage.getItem("zone");
let container = document.getElementById("list");

if(!zone){
window.location="pathologies.html";
}

/* AFFICHAGE */
data[zone].forEach(p=>{

let div=document.createElement("div");
div.className="card";

let img=document.createElement("img");
img.src="images/"+p.dossier+"/cover.png?v="+Date.now();

let info=document.createElement("div");
info.className="info";

let row=document.createElement("div");
row.className="titleRow";

let title=document.createElement("h3");
title.innerText=p.nom;

let btn=document.createElement("button");
btn.className="pdfBtn";
btn.innerText="🖨️ PDF";

btn.onclick=(e)=>{
e.stopPropagation();
window.open("images/"+p.dossier+"/fiche.pdf");
};

row.appendChild(title);
row.appendChild(btn);
info.appendChild(row);

/* 🔥 CLICK */
div.onclick=()=>{

localStorage.removeItem("edit_programme");

/* 🔥 récupération config */
let config = PATHO_DATA[p.dossier];

/* fallback si pas encore défini */
if(!config){
config={
series:2,
exercices:[
{nom:"Ex 1", ex:30, repos:10, reps:3}
]
};
}

localStorage.setItem("patho_data", JSON.stringify(config));
localStorage.setItem("pathologie", p.dossier);

window.location="config.html?v="+Date.now();
};

div.appendChild(img);
div.appendChild(info);
container.appendChild(div);

});

function back(){
window.location="pathologies.html";
}

</script>

</body>
</html>
