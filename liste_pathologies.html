<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pathologies</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
}

h2{
margin-top:20px;
}

/* CARD */
.card{
display:flex;
align-items:center;
justify-content:space-between;
width:90%;
max-width:420px;
margin:15px auto;
background:white;
border-radius:15px;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
transition:transform 0.2s, box-shadow 0.2s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* zone image + titre */
.content{
flex:1;
}

.content img{
width:100%;
border-radius:10px;
}

h3{
margin-top:8px;
}

/* bouton PDF */
.pdfBtn{
margin-left:10px;
background:#00e5ff;
border:none;
padding:10px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
white-space:nowrap;
}

.pdfBtn:hover{
background:#00c4dd;
}

/* fallback image */
.img-error{
background:#ddd;
height:180px;
display:flex;
align-items:center;
justify-content:center;
color:#666;
font-weight:bold;
border-radius:10px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ccc;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Choisir une pathologie</h2>

<div id="list"></div>

<button onclick="back()">⬅ Retour</button>

<script>

/* CONFIG */
const data = {

epaule: [
{nom:"Tendinite coiffe", dossier:"tendinite_coiffe"}
],

dos: [
{nom:"Lombalgie 1", dossier:"lombalgie_1"}
]

};

let zone = localStorage.getItem("zone");
let container = document.getElementById("list");

if(!zone){
window.location="pathologies.html";
}

/* AFFICHAGE */
data[zone].forEach(p=>{

let div = document.createElement("div");
div.className = "card";

/* CONTENU */
let content = document.createElement("div");
content.className = "content";

/* IMAGE */
let img = document.createElement("img");
img.src = "images/"+p.dossier+"/cover.png?v="+Date.now();

/* fallback */
img.onerror = function(){
this.style.display="none";
let err = document.createElement("div");
err.className="img-error";
err.innerText="Image indisponible";
content.appendChild(err);
};

content.appendChild(img);

/* TITRE */
let title = document.createElement("h3");
title.innerText = p.nom;
content.appendChild(title);

/* BOUTON PDF */
let btn = document.createElement("button");
btn.className = "pdfBtn";
btn.innerText = "📄 PDF";

btn.onclick = function(e){
e.stopPropagation();
window.open("images/"+p.dossier+"/fiche.pdf");
};

/* CLICK CARD = séance */
div.onclick = ()=>{
localStorage.setItem("pathologie", p.dossier);
window.location = "config.html?v="+Date.now();
};

/* STRUCTURE */
div.appendChild(content);
div.appendChild(btn);

container.appendChild(div);

});

/* RETOUR */
function back(){
window.location="pathologies.html?v="+Date.now();
}

</script>

</body>
</html>
