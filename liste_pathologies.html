<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pathologies</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
}

h2{
margin-top:20px;
}

.card{
width:90%;
max-width:350px;
margin:15px auto;
background:white;
border-radius:15px;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
transition:transform 0.15s;
}

.card:active{
transform:scale(0.97);
}

img{
width:100%;
border-radius:10px;
}

/* image par défaut si erreur */
.img-error{
background:#ddd;
height:180px;
display:flex;
align-items:center;
justify-content:center;
color:#666;
font-weight:bold;
border-radius:10px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ccc;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Choisir une pathologie</h2>

<div id="list"></div>

<button onclick="back()">⬅ Retour</button>

<script>

/* 🔥 CONFIG PATHOS */
const data = {

epaule: [
{nom:"Tendinite coiffe", dossier:"tendinite_coiffe"}
],

dos: [
{nom:"Lombalgie 1", dossier:"lombalgie_1"}
]

};

let zone = localStorage.getItem("zone");
let container = document.getElementById("list");

/* 🔥 sécurité : si pas de zone → retour */
if(!zone){
window.location="pathologies.html";
}

/* 🔥 affichage */
if(data[zone]){

data[zone].forEach(p=>{

let div=document.createElement("div");
div.className="card";

/* création image */
let img = document.createElement("img");
img.src = "images/"+p.dossier+"/cover.png";

/* fallback si image cassée */
img.onerror = function(){
this.style.display="none";
let err = document.createElement("div");
err.className="img-error";
err.innerText = "Image indisponible";
div.prepend(err);
};

let title = document.createElement("h3");
title.innerText = p.nom;

div.appendChild(img);
div.appendChild(title);

div.onclick=()=>{
localStorage.setItem("pathologie", p.dossier);
window.location="config.html?v="+Date.now();
};

container.appendChild(div);

});

}else{
container.innerHTML = "<p>Aucune pathologie trouvée</p>";
}

/* retour */
function back(){
window.location="pathologies.html?v="+Date.now();
}

</script>

</body>
</html>
