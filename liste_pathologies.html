<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathologies</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

h2{font-size:28px;margin-bottom:25px;}

.card{
display:flex;
align-items:center;
gap:12px;
width:85%;
max-width:360px;
margin:12px auto;
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

.card img{
width:80px;
height:80px;
object-fit:cover;
border-radius:12px;
}

.info{flex:1;}

.titleRow{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

h3{
margin:0;
font-size:16px;
flex:1;
min-width:0;
}

.actionBtn{
background:#1976d2;
color:white;
border:none;
padding:8px 12px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
font-size:13px;
transition:0.2s;
width:80px;
text-align:center;
flex-shrink:0;
}

.actionBtn:hover{
transform:scale(1.05);
background:#1565c0;
}

.actionBtn:active{
transform:scale(0.95);
}

button{
margin-top:20px;
padding:14px 20px;
border:none;
border-radius:12px;
background:#ccc;
}
</style>
</head>

e.stopPropagation();
window.open("exercises/images/pathologies/"+p.dossier+"/fiche.pdf");
};

row.appendChild(title);
row.appendChild(btn);
info.appendChild(row);

div.onclick=()=>{

config={
series:2,
exercices:[{nom:"Ex 1", ex:30, repos:10, reps:3}]
};
}

localStorage.setItem("patho_data",JSON.stringify(config));
localStorage.setItem("pathologie", p.dossier);
localStorage.setItem("pathologie_nom", p.nom);

window.location="config.html?v="+VERSION;
};

div.appendChild(img);
div.appendChild(info);
container.appendChild(div);
