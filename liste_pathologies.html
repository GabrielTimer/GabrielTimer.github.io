<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathologies</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

h2{font-size:28px;margin-bottom:25px;}

.card{
display:flex;
align-items:center;
gap:12px;
width:85%;
max-width:360px;
margin:12px auto;
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

.card img{
width:80px;
height:80px;
object-fit:cover;
border-radius:12px;
}

.info{flex:1;}

.titleRow{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

h3{
margin:0;
font-size:16px;
flex:1;
min-width:0;
}

.actionBtn{
background:#1976d2;
color:white;
border:none;
padding:8px 12px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
font-size:13px;
transition:0.2s;
width:80px;
text-align:center;
flex-shrink:0;
}

.actionBtn:hover{
transform:scale(1.05);
background:#1565c0;
}

.actionBtn:active{
transform:scale(0.95);
}

button{
margin-top:20px;
padding:14px 20px;
border:none;
border-radius:12px;
background:#ccc;
}
</style>
</head>

<body>

<h2>Choisir une pathologie</h2>

<div id="list"></div>

<button onclick="back()">⬅ Retour</button>

<script>

/* 🔥 BASE PATHO */
const PATHO_DATA = {

lombalgie_1:{
series:1,
exercices:[
{nom:"Étirement de prière", ex:30, repos:10, reps:3},
{nom:"Chat Chien Étirement", ex:5, repos:5, reps:10},
{nom:"Pontage", ex:5, repos:5, reps:10},
{nom:"Double genou à la poitrine", ex:30, repos:5, reps:3},
{nom:"Étirement des ischio-jambiers", ex:30, repos:10, reps:4},
{nom:"Glissement du nerf sciatique", ex:5, repos:5, reps:10},
{nom:"Étirement du piriforme", ex:30, repos:10, reps:3},
{nom:"Étirement du bas du dos", ex:30, repos:10, reps:4}
]
},

tendinite_coiffe:{
series:1,
exercices:[
{nom:"Écarter les bras", ex:10, repos:5, reps:10},
{nom:"Taper des mains", ex:10, repos:5, reps:10},
{nom:"Lever les bras", ex:10, repos:5, reps:10},
{nom:"Lever les épaules", ex:10, repos:5, reps:5},
{nom:"Avancer le bras", ex:10, repos:5, reps:10},
{nom:"Pivoter les bras", ex:10, repos:5, reps:10},
{nom:"Lever le coude", ex:10, repos:5, reps:10},
{nom:"Rapprocher les omoplates", ex:10, repos:5, reps:10}
]
},

"nevralgie_cervico_brachiale":{
series:1,
exercices:[
{nom:"Inclinaison latérale assistée", ex:30, repos:10, reps:3},
{nom:"Rotation + main épaule", ex:30, repos:10, reps:3},
{nom:"Extension cervicale", ex:30, repos:10, reps:3},
{nom:"Neuro C6", ex:20, repos:10, reps:10},
{nom:"Neuro C7", ex:20, repos:10, reps:10},
{nom:"Neuro C8", ex:20, repos:10, reps:10}
]
},

"capsulite":{
series:2,
exercices:[
{nom:"Pendulaire", ex:30, repos:10, reps:3},
{nom:"Flexion assistée", ex:30, repos:10, reps:3},
{nom:"Abduction assistée", ex:30, repos:10, reps:3},
{nom:"Rotation externe coude au corps", ex:30, repos:10, reps:3},
{nom:"Montée murale", ex:30, repos:10, reps:3}
]
},

/* 🔥 NOUVELLE PATHO */
"hernie_discale":{
series:2,
exercices:[
{nom:"Extension lombaire allongé (McKenzie)", ex:30, repos:10, reps:5},
{nom:"Extension debout", ex:20, repos:10, reps:5},
{nom:"Gainage abdominal", ex:20, repos:10, reps:5},
{nom:"Pont fessier", ex:20, repos:10, reps:5},
{nom:"Étirement ischio-jambiers", ex:30, repos:10, reps:3},
{nom:"Mobilisation lombaire douce", ex:20, repos:10, reps:5}
]
}

};

/* CONFIG AFFICHAGE */
const data = {
epaule:[
{nom:"Tendinite coiffe", dossier:"tendinite_coiffe"},
{nom:"Névralgie cervico-brachiale", dossier:"nevralgie_cervico_brachiale"},
{nom:"Capsulite Rétractile", dossier:"capsulite"}
],
dos:[
{nom:"Lombalgie 1", dossier:"lombalgie_1"},
{nom:"Hernie discale", dossier:"hernie_discale"}
]
};

let zone = localStorage.getItem("zone");
let container = document.getElementById("list");

if(!zone){
window.location="pathologies.html";
}

/* AFFICHAGE */
data[zone].forEach(p=>{

let div=document.createElement("div");
div.className="card";

let img=document.createElement("img");
img.src="images/"+p.dossier+"/cover.png?v="+Date.now();

img.onerror=function(){
this.onerror=null;
this.src="images/"+p.dossier+"/cover.jpg?v="+Date.now();
};

let info=document.createElement("div");
info.className="info";

let row=document.createElement("div");
row.className="titleRow";

let title=document.createElement("h3");
title.innerText=p.nom;

let btn=document.createElement("button");
btn.className="actionBtn";
btn.innerText="🖨️ PDF";

btn.onclick=(e)=>{
e.stopPropagation();
window.open("images/"+p.dossier+"/fiche.pdf");
};

row.appendChild(title);
row.appendChild(btn);
info.appendChild(row);

div.onclick=()=>{
localStorage.removeItem("edit_programme");

let config=PATHO_DATA[p.dossier];

if(!config){
config={
series:2,
exercices:[{nom:"Ex 1", ex:30, repos:10, reps:3}]
};
}

localStorage.setItem("patho_data",JSON.stringify(config));
localStorage.setItem("pathologie", p.dossier);
localStorage.setItem("pathologie_nom", p.nom);

window.location="config.html?v="+Date.now();
};

div.appendChild(img);
div.appendChild(info);
container.appendChild(div);

});

function back(){
window.location="pathologies.html";
}

</script>

</body>
</html>
