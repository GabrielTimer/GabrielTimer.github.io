<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathologies</title>

<style>

/* BASE IDENTIQUE À ZONE */
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* TITRE */
h2{
font-size:28px;
margin-bottom:25px;
}

/* CARD (harmonisée) */
.card{
display:flex;
align-items:center;
gap:12px;
width:85%;
max-width:360px;
margin:12px auto;
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
cursor:pointer;
transition:transform 0.2s, box-shadow 0.2s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

/* IMAGE */
.card img{
width:80px;
height:80px;
object-fit:cover;
border-radius:12px;
}

/* TEXTE */
.info{
flex:1;
text-align:left;
}

.titleRow{
display:flex;
justify-content:space-between;
align-items:center;
}

h3{
margin:0;
font-size:16px;
}

/* BOUTON PDF */
.pdfBtn{
background:#00e5ff;
border:none;
padding:6px 10px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
font-size:12px;
}

/* FALLBACK */
.img-error{
width:80px;
height:80px;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
border-radius:10px;
}

/* BOUTON RETOUR */
button{
margin-top:20px;
padding:14px 20px;
border:none;
border-radius:12px;
background:#ccc;
font-size:16px;
cursor:pointer;
}

/* 📱 MOBILE */
@media (max-width:600px){

h2{
font-size:28px;
}

.card{
width:85%;
max-width:340px;
padding:16px;
}

.card img{
width:70px;
height:70px;
}

h3{
font-size:17px;
}

button{
font-size:17px;
padding:14px;
}

}

</style>
</head>

<body>

<h2>Choisir une pathologie</h2>

<div id="list"></div>

<button onclick="back()">⬅ Retour</button>

<script>

/* CONFIG */
const data = {
epaule: [
{nom:"Tendinite coiffe", dossier:"tendinite_coiffe"}
],
dos: [
{nom:"Lombalgie 1", dossier:"lombalgie_1"}
]
};

let zone = localStorage.getItem("zone");
let container = document.getElementById("list");

if(!zone){
window.location="pathologies.html";
}

/* AFFICHAGE */
data[zone].forEach(p=>{

let div = document.createElement("div");
div.className = "card";

/* IMAGE */
let img = document.createElement("img");
img.src = "images/"+p.dossier+"/cover.png?v="+Date.now();

img.onerror = function(){
this.style.display="none";
let err = document.createElement("div");
err.className="img-error";
err.innerText="Image";
div.prepend(err);
};

/* INFOS */
let info = document.createElement("div");
info.className="info";

/* ligne titre */
let row = document.createElement("div");
row.className="titleRow";

let title = document.createElement("h3");
title.innerText = p.nom;

/* bouton PDF */
let btn = document.createElement("button");
btn.className = "pdfBtn";
btn.innerText = "🖨️ PDF";

btn.onclick = function(e){
e.stopPropagation();
window.open("images/"+p.dossier+"/fiche.pdf");
};

row.appendChild(title);
row.appendChild(btn);
info.appendChild(row);

/* CLICK CARD */
div.onclick = ()=>{
localStorage.setItem("pathologie", p.dossier);
window.location = "config.html?v="+Date.now();
};

div.appendChild(img);
div.appendChild(info);

container.appendChild(div);

});

/* RETOUR */
function back(){
window.location="pathologies.html?v="+Date.now();
}

</script>

</body>
</html>
