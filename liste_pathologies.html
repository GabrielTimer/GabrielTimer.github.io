<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pathologies</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
}

h2{
margin-top:20px;
}

/* CARD */
.card{
display:flex;
align-items:center;
gap:12px;
width:90%;
max-width:420px;
margin:12px auto;
background:white;
border-radius:15px;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
transition:transform 0.2s, box-shadow 0.2s;
}

.card:hover{
transform:scale(1.02);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* IMAGE (petite !) */
.card img{
width:90px;
height:90px;
object-fit:cover;
border-radius:10px;
}

/* bloc texte */
.info{
flex:1;
text-align:left;
}

/* ligne titre + bouton */
.titleRow{
display:flex;
justify-content:space-between;
align-items:center;
}

h3{
margin:0;
font-size:16px;
}

/* bouton */
.pdfBtn{
background:#00e5ff;
border:none;
padding:6px 10px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
font-size:12px;
}

.pdfBtn:hover{
background:#00c4dd;
}

/* fallback */
.img-error{
width:90px;
height:90px;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
border-radius:10px;
}

/* bouton retour */
button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ccc;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Choisir une pathologie</h2>

<div id="list"></div>

<button onclick="back()">⬅ Retour</button>

<script>

/* CONFIG */
const data = {
epaule: [
{nom:"Tendinite coiffe", dossier:"tendinite_coiffe"}
],
dos: [
{nom:"Lombalgie 1", dossier:"lombalgie_1"}
]
};

let zone = localStorage.getItem("zone");
let container = document.getElementById("list");

if(!zone){
window.location="pathologies.html";
}

/* AFFICHAGE */
data[zone].forEach(p=>{

let div = document.createElement("div");
div.className = "card";

/* IMAGE */
let img = document.createElement("img");
img.src = "images/"+p.dossier+"/cover.png?v="+Date.now();

img.onerror = function(){
this.style.display="none";
let err = document.createElement("div");
err.className="img-error";
err.innerText="Image";
div.prepend(err);
};

/* INFOS */
let info = document.createElement("div");
info.className="info";

/* ligne titre */
let row = document.createElement("div");
row.className="titleRow";

let title = document.createElement("h3");
title.innerText = p.nom;

/* bouton */
let btn = document.createElement("button");
btn.className = "pdfBtn";
btn.innerText = "🖨️ Télécharger";

btn.onclick = function(e){
e.stopPropagation();
window.open("images/"+p.dossier+"/fiche.pdf");
};

row.appendChild(title);
row.appendChild(btn);
info.appendChild(row);

/* CLICK CARD */
div.onclick = ()=>{
localStorage.setItem("pathologie", p.dossier);
window.location = "config.html?v="+Date.now();
};

/* STRUCTURE */
div.appendChild(img);
div.appendChild(info);

container.appendChild(div);

});

/* RETOUR */
function back(){
window.location="pathologies.html?v="+Date.now();
}

</script>

</body>
</html>
