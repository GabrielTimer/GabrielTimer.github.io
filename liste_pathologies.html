<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pathologies</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
}

h2{
margin-top:20px;
}

/* CARD */
.card{
position:relative;
width:90%;
max-width:350px;
margin:15px auto;
background:white;
border-radius:15px;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
transition:transform 0.2s, box-shadow 0.2s;
overflow:hidden;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card:active{
transform:scale(0.97);
}

img{
width:100%;
border-radius:10px;
}

/* overlay bouton */
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
transition:opacity 0.2s;
}

.card:hover .overlay{
opacity:1;
}

.overlay button{
background:white;
border:none;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.overlay button:hover{
background:#00e5ff;
}

/* fallback image */
.img-error{
background:#ddd;
height:180px;
display:flex;
align-items:center;
justify-content:center;
color:#666;
font-weight:bold;
border-radius:10px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ccc;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Choisir une pathologie</h2>

<div id="list"></div>

<button onclick="back()">⬅ Retour</button>

<script>

/* CONFIG PATHOS */
const data = {

epaule: [
{nom:"Tendinite coiffe", dossier:"tendinite_coiffe"}
],

dos: [
{nom:"Lombalgie 1", dossier:"lombalgie_1"}
]

};

let zone = localStorage.getItem("zone");
let container = document.getElementById("list");

/* sécurité */
if(!zone){
window.location="pathologies.html";
}

/* affichage */
if(data[zone]){

data[zone].forEach(p=>{

let div=document.createElement("div");
div.className="card";

/* IMAGE */
let img = document.createElement("img");
img.src = "images/"+p.dossier+"/cover.png?v="+Date.now();

/* fallback image */
img.onerror = function(){
this.style.display="none";
let err = document.createElement("div");
err.className="img-error";
err.innerText = "Image indisponible";
div.prepend(err);
};

/* OVERLAY */
let overlay = document.createElement("div");
overlay.className = "overlay";

let btn = document.createElement("button");
btn.innerText = "🖨️ Imprimer / Enregistrer";

btn.onclick = function(e){
e.stopPropagation();
printCard(p.dossier);
};

overlay.appendChild(btn);

/* TITRE */
let title = document.createElement("h3");
title.innerText = p.nom;

/* CLICK CARD */
div.onclick=()=>{
localStorage.setItem("pathologie", p.dossier);
window.location="config.html?v="+Date.now();
};

/* APPEND */
div.appendChild(img);
div.appendChild(overlay);
div.appendChild(title);

container.appendChild(div);

});

}else{
container.innerHTML = "<p>Aucune pathologie trouvée</p>";
}

/* IMPRESSION */
function printCard(dossier){

let url = "images/"+dossier+"/cover.png";

let win = window.open("");

win.document.write(`
<html>
<head>
<title>Impression</title>
</head>
<body style="text-align:center;">
<img src="${url}" style="max-width:100%;">
<script>
window.onload = function(){
window.print();
}
<\/script>
</body>
</html>
`);
}

/* retour */
function back(){
window.location="pathologies.html?v="+Date.now();
}

</script>

</body>
</html>
