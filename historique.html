<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

h2{
font-size:28px;
margin-bottom:20px;
}

.topbar{margin-bottom:10px;}

button.main{
padding:12px 18px;
border:none;
border-radius:12px;
background:#ddd;
cursor:pointer;
}

/* CARD */
.card{
width:85%;
max-width:360px;
margin:12px auto;
background:white;
border-radius:20px;
padding:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

/* TEXTE */
.left{
display:flex;
flex-direction:column;
gap:4px;
}

.hist{
color:#777;
font-size:13px;
}

.title{
font-size:16px;
font-weight:bold;
}

.date{
font-size:13px;
color:#999;
}

/* ACTIONS */
.actions{
display:flex;
gap:8px;
align-items:center;
}

.iconBtn{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
border:none;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

/* ⭐ */
.star{
background:#fff8e1;
color:#f9a825;
}
.star:hover{
background:#ffecb3;
transform:scale(1.1);
}

/* 🗑 */
.delete{
background:#ffebee;
color:#c62828;
}
.delete:hover{
background:#ffcdd2;
transform:scale(1.1);
}

/* 🔵 EVA DOT */
.evaDot{
width:18px;
height:18px;
border-radius:50%;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

button.back{
margin-top:20px;
padding:14px;
border:none;
border-radius:12px;
background:#ccc;
}

</style>
</head>

<body>

<h2>🕒 Historique</h2>

<div class="topbar">
<button class="main" onclick="clearHist()">🧹 Effacer</button>
</div>

<div id="list"></div>

<button class="back" onclick="back()">⬅ Retour</button>

<script>

let all = localStorage.getItem("programmes");
all = all ? JSON.parse(all) : [];
if(!Array.isArray(all)) all = [];

let hist = all.filter(p=>p.type==="historique").slice(0,30);

/* GROUP BY NOM */
let grouped = {};
hist.forEach(p=>{
let name = p.nom || "Séance";
if(!grouped[name]) grouped[name]=[];
grouped[name].push(p);
});

let container=document.getElementById("list");

/* DISPLAY */
Object.keys(grouped)
.sort((a,b)=>{
let da = new Date(grouped[a][0].date);
let db = new Date(grouped[b][0].date);
return db - da;
})
.forEach(name=>{

let group = grouped[name];

if(group.length >=2){
renderFolder(name, group);
}else{
renderCard(group[0], name);
}

});

/* ---------- CARD ---------- */

function renderCard(p, name){

let index = hist.indexOf(p);

let div=document.createElement("div");
div.className="card";

let left=document.createElement("div");
left.className="left";

let histDiv=document.createElement("div");
histDiv.className="hist";
histDiv.innerText="🕒 Historique";

let title=document.createElement("div");
title.className="title";
title.innerText=name;

let date=document.createElement("div");
date.className="date";
date.innerText=p.date;

/* ACTIONS */
let actions=document.createElement("div");
actions.className="actions";

/* ⭐ */
let star=document.createElement("button");
star.className="iconBtn star";
star.innerHTML="⭐";
star.onclick=(e)=>{
e.stopPropagation();
addFav(index);
};

/* EVA */
let evaDot=document.createElement("div");
evaDot.className="evaDot";

let eva = p.data?.eva || 0;
let step = Math.floor(eva/2);
if(step < 0) step = 0;
if(step > 5) step = 5;
let colors=["#16a34a","#84cc16","#eab308","#f97316","#ef4444","#b91c1c"];
evaDot.style.background = colors[step];

/* 🗑 */
let del=document.createElement("button");
del.className="iconBtn delete";
del.innerHTML="🗑";
del.onclick=(e)=>{
e.stopPropagation();
remove(index);
};

/* BUILD */
left.appendChild(histDiv);
left.appendChild(title);
left.appendChild(date);

actions.appendChild(star);
actions.appendChild(evaDot);
actions.appendChild(del);

div.appendChild(left);
div.appendChild(actions);

/* CLICK */
div.onclick=()=>{
localStorage.setItem("programme_temp",JSON.stringify(p.data));
window.location="timer.html";
};

container.appendChild(div);
}

/* ---------- FOLDER ---------- */

function renderFolder(name, group){

let div=document.createElement("div");
div.className="card";

/* EVA MOYENNE */
let avg = 0;
group.forEach(p=>{
avg += p.data?.eva || 0;
});
avg = Math.round(avg / group.length);

let step = Math.floor(avg/2);
if(step < 0) step = 0;
if(step > 5) step = 5;
let colors=["#16a34a","#84cc16","#eab308","#f97316","#ef4444","#b91c1c"];

let left=document.createElement("div");
left.className="left";

left.innerHTML=`
<div class="hist">📁 Dossier</div>
<div class="title">${name}</div>
<div class="date">${group.length} séances</div>
`;

let actions=document.createElement("div");
actions.className="actions";

/* EVA DOT */
let evaDot=document.createElement("div");
evaDot.className="evaDot";
evaDot.style.background = colors[step];

/* DELETE */
let del=document.createElement("button");
del.className="iconBtn delete";
del.innerHTML="🗑";
del.onclick=(e)=>{
e.stopPropagation();
if(!confirm("Supprimer tout le dossier ?")) return;

let all = JSON.parse(localStorage.getItem("programmes")||[]);
all = all.filter(p=>!(p.nom===name && p.type==="historique"));

localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
};

actions.appendChild(evaDot);
actions.appendChild(del);

div.appendChild(left);
div.appendChild(actions);

/* CLICK */
div.onclick=()=>{
localStorage.setItem("folder_name", name);
window.location="folder.html";
};

container.appendChild(div);
}

/* ---------- ACTIONS ---------- */

function remove(i){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
let hist = all.filter(p=>p.type==="historique");
let target = hist[i];
all = all.filter(p=>p !== target);
localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

function addFav(i){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
let hist = all.filter(p=>p.type==="historique");
let target = hist[i];
target.type="favori";
localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

function clearHist(){
if(confirm("Supprimer tout l'historique ?")){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
all = all.filter(p=>p.type==="favori");
localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}
}

function back(){window.location="mes_programmes.html";}

</script>

</body>
</html>
