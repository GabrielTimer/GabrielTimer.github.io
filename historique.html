<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

h2{
font-size:28px;
margin-bottom:20px;
}

.topbar{margin-bottom:10px;}

button.main{
padding:12px 18px;
border:none;
border-radius:12px;
background:#ddd;
cursor:pointer;
}

/* CARD */
.card{
width:85%;
max-width:360px;
margin:12px auto;
background:white;
border-radius:20px;
padding:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

/* TEXTE */
.left{
display:flex;
flex-direction:column;
gap:4px;
}

.hist{
color:#777;
font-size:13px;
}

.title{
font-size:16px;
font-weight:bold;
}

.date{
font-size:13px;
color:#999;
}

/* ACTIONS */
.actions{
display:flex;
gap:8px;
align-items:center;
}

.iconBtn{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
border:none;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

/* ⭐ */
.star{
background:#fff8e1;
color:#f9a825;
}
.star:hover{
background:#ffecb3;
transform:scale(1.1);
}

/* 🗑 */
.delete{
background:#ffebee;
color:#c62828;
}
.delete:hover{
background:#ffcdd2;
transform:scale(1.1);
}

/* 🔵 EVA DOT CORRIGÉ */
.evaDot{
width:18px;
height:18px;
border-radius:50%;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

button.back{
margin-top:20px;
padding:14px;
border:none;
border-radius:12px;
background:#ccc;
}

@media (max-width:600px){
.card{max-width:340px;}
}

</style>
</head>

<body>

<h2>🕒 Historique</h2>

<div class="topbar">
<button class="main" onclick="clearHist()">🧹 Effacer</button>
</div>

<div id="list"></div>

<button class="back" onclick="back()">⬅ Retour</button>

<script>

let list = localStorage.getItem("programmes");
list = list ? JSON.parse(list) : [];

if(!Array.isArray(list)) list = [];

list = list.filter(p=>p.type==="historique").slice(0,30);

let container=document.getElementById("list");

list.forEach((p,index)=>{

let div=document.createElement("div");
div.className="card";

/* LEFT */
let left=document.createElement("div");
left.className="left";

let hist=document.createElement("div");
hist.className="hist";
hist.innerText="🕒 Historique";

let title=document.createElement("div");
title.className="title";
title.innerText=getName(p);

let date=document.createElement("div");
date.className="date";
date.innerText=p.date;

/* ACTIONS */
let actions=document.createElement("div");
actions.className="actions";

/* ⭐ */
let star=document.createElement("button");
star.className="iconBtn star";
star.innerHTML="⭐";
star.onclick=(e)=>{
e.stopPropagation();
addFav(index);
};

/* 🔵 EVA DOT CORRIGÉ */
let evaDot=document.createElement("div");
evaDot.className="evaDot";

let eva = (p.data && p.data.eva !== undefined) ? p.data.eva : 0;

let step;
if(eva <=1) step = 0;
else if(eva <=3) step = 1;
else if(eva <=5) step = 2;
else if(eva <=7) step = 3;
else if(eva <=9) step = 4;
else step = 5;

let colors = [
"#16a34a",
"#84cc16",
"#eab308",
"#f97316",
"#ef4444",
"#b91c1c"
];

evaDot.style.background = colors[step];

/* 🗑 */
let del=document.createElement("button");
del.className="iconBtn delete";
del.innerHTML="🗑";
del.onclick=(e)=>{
e.stopPropagation();
remove(index);
};

/* BUILD */
left.appendChild(hist);
left.appendChild(title);
left.appendChild(date);

actions.appendChild(star);
actions.appendChild(evaDot);
actions.appendChild(del);

div.appendChild(left);
div.appendChild(actions);

/* CLICK */
div.onclick=()=>{
localStorage.setItem("programme_temp",JSON.stringify(p.data));
window.location="timer.html";
};

container.appendChild(div);

});

/* NOM */
function getName(p){
if(p.nom && p.nom !== "undefined"){
return p.nom;
}
return "Séance";
}

/* DELETE */
function remove(i){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
let hist = all.filter(p=>p.type==="historique");
let target = hist[i];
all = all.filter(p=>p !== target);
localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

/* FAVORI */
function addFav(i){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
let hist = all.filter(p=>p.type==="historique");
let target = hist[i];
target.type="favori";
localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

/* CLEAR */
function clearHist(){
if(confirm("Supprimer tout l'historique ?")){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
all = all.filter(p=>p.type==="favori");
localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}
}

function back(){window.location="mes_programmes.html";}

</script>

</body>
</html>
