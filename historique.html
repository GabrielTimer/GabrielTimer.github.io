<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

h2{font-size:28px;margin-bottom:20px;}
.topbar{margin-bottom:10px;}

button.main{
padding:12px 18px;
border:none;
border-radius:12px;
background:#ddd;
cursor:pointer;
}

.card{
width:85%;
max-width:360px;
margin:12px auto;
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

.left{text-align:left;font-size:14px;}
.hist{color:#666;}

.actions button{
margin-left:5px;
padding:6px 8px;
border:none;
border-radius:8px;
cursor:pointer;
}

.delete{background:#ff5252;color:white;}
.star{background:#ffd54f;}

button.back{
margin-top:20px;
padding:14px;
border:none;
border-radius:12px;
background:#ccc;
}

</style>
</head>

<body>

<h2>🕒 Historique</h2>

<div class="topbar">
<button class="main" onclick="clearHist()">🧹 Effacer</button>
</div>

<div id="list"></div>

<button class="back" onclick="back()">⬅ Retour</button>

<script>

let list = JSON.parse(localStorage.getItem("programmes")||[]);
list = list.filter(p=>p.type==="historique");

let container=document.getElementById("list");

list.forEach((p,index)=>{

let div=document.createElement("div");
div.className="card";

let left=document.createElement("div");
left.className="left";

left.innerHTML=`
<div class="hist">🕒 Historique</div>
<b>${getName(p)}</b><br>${p.date}
`;

let actions=document.createElement("div");

/* delete */
let del=document.createElement("button");
del.className="delete";
del.innerText="🗑";
del.onclick=(e)=>{e.stopPropagation();remove(index);};

/* fav */
let star=document.createElement("button");
star.className="star";
star.innerText="⭐";
star.onclick=(e)=>{e.stopPropagation();addFav(index);};

actions.appendChild(star);
actions.appendChild(del);

div.onclick=()=>{
localStorage.setItem("programme_temp",JSON.stringify(p.data));
window.location="timer.html";
};

div.appendChild(left);
div.appendChild(actions);
container.appendChild(div);

});

/* 🔥 NOM SÉCURISÉ */
function getName(p){
if(p.nom && p.nom !== "undefined"){
return p.nom;
}
return "Séance";
}

/* delete */
function remove(i){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
let hist = all.filter(p=>p.type==="historique");
let target = hist[i];
all = all.filter(p=>p !== target);
localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

/* fav */
function addFav(i){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
let hist = all.filter(p=>p.type==="historique");
let target = hist[i];
target.type="favori";
localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

function clearHist(){
if(confirm("Supprimer tout l'historique ?")){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
all = all.filter(p=>p.type==="favori");
localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}
}

function back(){window.location="mes_programmes.html";}

</script>
</body>
</html>
