<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Historique</title>

<style>
body{font-family:Arial;background:#f4f4f4;text-align:center;margin:0;}

.card{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.left{text-align:left;}
.hist{color:#666;}

.actions button{
margin-left:5px;
padding:5px 8px;
border:none;
border-radius:8px;
cursor:pointer;
}

.delete{background:#ff5252;color:white;}
.star{background:#ffd54f;}

</style>
</head>

<body>

<h2>🕒 Historique</h2>

<div id="list"></div>

<button onclick="back()">⬅ Retour</button>

<script>

let list = JSON.parse(localStorage.getItem("programmes")||[]);

/* 🔥 UNIQUEMENT HISTORIQUE */
list = list.filter(p=>p.type==="historique");

let container=document.getElementById("list");

list.forEach((p,index)=>{

let div=document.createElement("div");
div.className="card";

let left=document.createElement("div");
left.className="left";

left.innerHTML=`
<div class="hist">🕒 Historique</div>
<b>${formatName(p.nom)}</b><br>${p.date}
`;

let actions=document.createElement("div");
actions.className="actions";

/* delete */
let del=document.createElement("button");
del.className="delete";
del.innerText="🗑";
del.onclick=(e)=>{
e.stopPropagation();
remove(index);
};

/* add fav */
let star=document.createElement("button");
star.className="star";
star.innerText="⭐";
star.onclick=(e)=>{
e.stopPropagation();
addFav(index);
};

actions.appendChild(star);
actions.appendChild(del);

div.onclick=()=>{
localStorage.setItem("programme_temp",JSON.stringify(p.data));
window.location="timer.html";
};

div.appendChild(left);
div.appendChild(actions);
container.appendChild(div);

});

/* supprimer */
function remove(i){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
let hist = all.filter(p=>p.type==="historique");

let target = hist[i];
all = all.filter(p=>p !== target);

localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

/* ajouter favori */
function addFav(i){
let all = JSON.parse(localStorage.getItem("programmes")||[]);
let hist = all.filter(p=>p.type==="historique");

let target = hist[i];
target.type="favori";

localStorage.setItem("programmes",JSON.stringify(all));
location.reload();
}

function back(){
window.location="mes_programmes.html";
}

function formatName(n){
return n.replaceAll("_"," ").replace(/\b\w/g,l=>l.toUpperCase());
}

</script>

</body>
</html>
