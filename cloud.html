<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Cloud</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#f1f5f9;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

button{
  background:#2563eb;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
  margin-right:4px;
  margin-bottom:4px;
}

#homeBtn{
margin-bottom:20px;
padding:12px 18px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

#homeBtn:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<h2>☁️ Programmes Cloud</h2>

<button id="homeBtn" onclick="goHome()">
🏠 Retour menu
</button>

<button onclick="openFavs()">
⭐ Favoris
</button>

<button onclick="openHistory()">
🕘 Historique
</button>

<button
id="activatePatientBtn"
onclick="activatePatient()"
style="display:none;background:#16a34a;">
🔑 Activer mon accès patient
</button>

<div id="list"></div>

<script type="module">

import {
loadProgramsFromCloud,
deleteProgramFromCloud,
saveProgramToCloud
} from "./exercises/js/cloud.js";

async function init(){

const programmes =
await loadProgramsFromCloud();

const params =
new URLSearchParams(
window.location.search
);

const isAdmin =
params.get("admin") === "true";

const viewPatient =
params.get("viewPatient") === "1";

const launchLabel =
(isAdmin && !viewPatient)
? "🧪 Tester"
: "🚀 Lancer";

let currentPatient =
params.get("patient");

if(!currentPatient){

currentPatient =
localStorage.getItem(
"currentPatient"
);

}

const list =
document.getElementById("list");

if(!currentPatient){

document.getElementById(
"activatePatientBtn"
).style.display = "inline-block";

}

list.innerHTML = "";

const programmesFiltres =
programmes
.sort((a,b)=>(
(b.updatedAt || 0)
-
(a.updatedAt || 0)
))

.filter(p => {

const hasExercises =

(p.données && p.données.exercices)
||
(p.data && p.data.exercices);

if(!hasExercises) return false;

if(isAdmin && !currentPatient){
return true;
}

const pid = (
p.patientId
||
p.data?.patientId
||
p.données?.patientId
||
""
)
.toString()
.trim()
.toLowerCase();

const cp =
(currentPatient || "")
.trim()
.toLowerCase();

return pid === cp;

});

const groupes = {};

programmesFiltres.forEach(p=>{

if(
p.programmeId
){

if(!groupes[p.programmeId]){

groupes[p.programmeId] = [];

}

groupes[p.programmeId].push(p);

}

});

console.log("GROUPES", groupes);
// ===== DOSSIERS PROGRAMMES COURSE =====

Object.values(groupes).forEach(seances=>{

console.log(
"TEST SEMAINES",
seances.map(s => ({
  nom: s.nom,
  semaine: s.semaine,
  dataSemaine: s.data?.semaine
}))
);

const total = seances.length;

const faites =
seances.filter(s => {
  console.log(
    s.nom,
    s.terminee
  );
  return s.terminee;
}).length;

const nom =
seances[0].programmeNom
||
"Programme";

const evas =
seances
.filter(s =>
  s.terminee &&
  s.eva != null
)
.map(s => Number(s.eva))
.filter(e => !isNaN(e));

const evaMoyenne =
evas.length
? (
evas.reduce((a,b)=>a+b,0)
/
evas.length
).toFixed(1)
: "-";

const historique =
seances
.filter(s => s.terminee)
.map(s => {

const date =
s.dateValidation
? new Date(s.dateValidation)
.toLocaleDateString("fr-FR")
: "-";

return `${date} • ${s.nom} • EVA ${s.eva ?? "-"} /10`;

})
.join("\n");

const programmeTermine =
faites === total;

const semaines = {};

seances.forEach(s => {

console.log("SEANCE COMPLETE", s);

if(!semaines[s.semaine]){
semaines[s.semaine] = [];
}

semaines[s.semaine].push(s);

Object.values(semaines)
.forEach(arr=>{

arr.sort(
(a,b)=>
new Date(a.datePrevue)
-
new Date(b.datePrevue)
);

arr.forEach((s,index)=>{

const lettres =
["A","B","C","D","E","F","G"];

s.nom =
`S${s.semaine}${lettres[index]}`;

});

});

});

const premiereSemaineIncomplete =
Object.entries(semaines)
.sort((a,b)=>Number(a[0])-Number(b[0]))
.find(([_,s]) =>
s.filter(x => x.terminee).length < s.length
)?.[0];

list.innerHTML += `

<div class="card">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
">

<h3 style="margin:0">
📁 ${nom}
</h3>


</div>

<div>
📊 Progression :
<b>${faites}/${total}</b>
séances
(${Math.round(faites*100/total)}%)
</div>

${
(isAdmin && !viewPatient)
? `
<button
onclick="copyProgramme('${seances[0].programmeId}')">
📋 Créer une copie patient
</button>
`
: ""
}

${
seances[0].pdfData
? `
<button
style="
background:#0ea5e9;
margin:0;
"
onclick="openPdf('${seances[0].programmeId}')">
📄 PDF
</button>
`
: ""
}


${
(isAdmin && !viewPatient)
? `
<div style="margin:12px 0">
<button
style="
background:#dc2626;
font-weight:600;
padding:12px 18px;
"
onclick="deleteProgramme('${seances[0].programmeId}')">
🗑️ Supprimer le programme
</button>
</div>`
: ""
}

<div style="
background:#e5e7eb;
height:10px;
border-radius:999px;
margin:10px 0;
overflow:hidden;
">

<div style="
width:${Math.round(faites*100/total)}%;
height:100%;
background:#16a34a;
">
</div>

</div>

${
programmeTermine
? `
<div style="
margin:15px 0;
padding:15px;
background:#ecfdf5;
border:2px solid #16a34a;
border-radius:12px;
">

<h3 style="margin-top:0">
🏆 Programme terminé
</h3>

<p>
Bravo pour votre régularité !
</p>

<p>
Vous avez terminé l'ensemble des séances prévues.
</p>

<p>
✅ Séances réalisées : ${faites}/${total}
</p>

<p>
🩹 EVA moyenne : ${evaMoyenne}/10
</p>

<p style="margin-top:15px;font-weight:600;">
📅 Séances effectuées
</p>

<div style="
font-size:14px;
background:white;
padding:10px;
border-radius:8px;
margin-bottom:12px;
">

${seances
.filter(s => s.terminee)
.map(s => {

const date =
s.dateValidation
? new Date(s.dateValidation)
.toLocaleDateString("fr-FR")
: "-";

return `
<div>
${date} • ${s.nom} • EVA ${s.eva ?? "-"} /10
</div>
`;

})
.join("")}

</div>


</div>
`
: ""
}

${Object.entries(semaines)
.sort((a,b)=>Number(a[0])-Number(b[0]))
.map(([num,seancesSemaine])=>{

const faitesSemaine =
seancesSemaine.filter(s=>s.terminee).length;

const totalSemaine =
seancesSemaine.length;

const ouverte =
String(num)
===
String(premiereSemaineIncomplete);

let icone = "⚪";
let couleur = "#94a3b8";

if(faitesSemaine === totalSemaine){
  icone = "✅";
  couleur = "#16a34a";
}
else if(
  String(num)
  ===
  String(premiereSemaineIncomplete)
){
  icone = "🟠";
  couleur = "#f97316";
}
else if(faitesSemaine > 0){
  icone = "🟡";
  couleur = "#eab308";
}
return `

<details ${ouverte ? "open" : ""}>

<summary
style="
cursor:pointer;
font-weight:bold;
margin-top:10px;
color:${couleur};
">
Semaine ${num}
${icone}
(${faitesSemaine}/${totalSemaine})
</summary>

${seancesSemaine
.sort(
(a,b)=>
new Date(a.datePrevue)
-
new Date(b.datePrevue)
)
.map(p=>`

<div style="
margin-top:12px;
padding:12px;
border:1px solid #e5e7eb;
border-radius:10px;
">

<b>${p.nom}</b><br>

${p.datePrevueTexte
? `📅 ${p.datePrevueTexte}<br>`
: ""}

${
p.terminee
? "✅ Séance validée"
: "⭕ Non validée"
}

<br><br>

<button onclick="launch('${p.firebaseId}')">
${launchLabel}
</button>



${
(isAdmin && !viewPatient)
? `
<button
style="background:#0ea5e9;"
onclick="viewPatient('${p.patientId}')">
👁 Vue patient
</button>
`
: ""
}

${
(isAdmin && !viewPatient)
? `
${p.patientId && p.patientId !== "admin" ? `
<button onclick="sendMail('${p.patientId}','${p.firebaseId}')">
📧 Envoyer au patient
</button>
` : ""}

<button onclick="editProgram('${p.firebaseId}')">
✏️ Modifier le modèle
</button>

<button onclick="deleteProgram('${p.firebaseId}')">
🗑️ Supprimer
</button>
`
: ""
}

${
!p.terminee
? `
<button
style="
background:#eab308;
color:#111827;
"
onclick="validateSession('${p.firebaseId}')">
🟠 À valider
</button>
`
: `
<button
style="background:#16a34a">
✅ Validée
</button>
`
}

</div>

`).join("")}

</details>

`;

}).join("")}


</div>

`;


});

// ===== SEANCES HORS PROGRAMME =====

programmesFiltres
.filter(p => !p.programmeId)
.forEach((p)=>{

list.innerHTML += `

<div class="card">

<h3>${p.nom}</h3>

<div>
Patient : ${p.patientId || "?"}
</div>

<div>
Auteur : ${p.auteur}
</div>

<div>
Exercices :
${
p.données?.exercices?.length
||
p.data?.exercices?.length
||
0
}
</div>

<button onclick="launch('${p.firebaseId}')">
${launchLabel}
</button>

${
(isAdmin && !viewPatient)
? `
<button
style="background:#0ea5e9;"
onclick="viewPatient('${p.patientId}')">
👁 Vue patient
</button>
`
: ""
}

${
(isAdmin && !viewPatient)
? `
<button onclick="copySimpleProgram('${p.firebaseId}')">
📋 Créer une copie patient
</button>
`
: ""
}

${
(isAdmin && !viewPatient)
? `
${p.patientId && p.patientId !== "admin" ? `
<button onclick="sendMail('${p.patientId}','${p.firebaseId}')">
📧 Envoyer au patient
</button>
` : ""}

<button onclick="editProgram('${p.firebaseId}')">
✏️ Modifier le modèle
</button>

<button onclick="deleteProgram('${p.firebaseId}')">
🗑️ Supprimer
</button>
`
: ""
}

</div>

`;



});

window.viewPatient = function(patient){

if(!patient){
  alert("Aucun patient associé");
  return;
}

window.open(
  "index.html?patient=" +
  encodeURIComponent(patient) +
  "&viewPatient=1",
  "_blank"
);

}

window.launch = function(id){

const prog =
programmes.find(
p => p.firebaseId === id
);

const data =
prog.données || prog.data;

const exos =
data.exercices || [];

if(
    exos.length === 1 &&
    (
        exos[0].id === "RESP_DEBUTER" ||
        exos[0].id === "RESP_APAISER" ||
        exos[0].id === "RESP_EQUILIBRER"
    )
){

    let mode = "beginner";

    if(exos[0].id === "RESP_APAISER"){
        mode = "calm";
    }

    if(exos[0].id === "RESP_EQUILIBRER"){
        mode = "balance";
    }

    window.location =
    "respir/index.html?mode="
    + mode
    + "&duree="
    + exos[0].ex
    + "&fromProgram=1"
    + "&autostart=1";

    return;
}

localStorage.setItem(
"programme_temp",
JSON.stringify(
prog.données || prog.data
)
);

localStorage.setItem(
"currentCloudId",
id
);

localStorage.setItem(
"currentProgrammeId",
prog.programmeId || ""
);

console.log(
"LANCEMENT",
id,
prog.programmeId
);

const params =
new URLSearchParams(
window.location.search
);

let patient =
params.get("patient");

if(!patient){

patient =
localStorage.getItem(
"currentPatient"
);

}

if(patient){

setTimeout(()=>{

window.location =
"timer.html?cloud="
+ id +
"&patient="
+ patient +
"&v=" + Date.now();

},80);

}

else{

setTimeout(()=>{

window.location =
"timer.html?cloud="
+ id +
"&v=" +
Date.now();

},80);

}

}

window.validateSession = function(id){

const ok = confirm(
"Êtes-vous sûr de vouloir valider cette séance ?"
);

if(!ok) return;

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient")
||
localStorage.getItem(
"currentPatient"
)
||
"";

window.location =
"fin.html?validation=1"
+ "&cloud=" + id
+ "&patient=" + patient
+ "&v=" + Date.now();

}

window.copyProgramme = async function(programmeId){

const aCopier =
programmes.filter(
p => p.programmeId === programmeId
);

if(!aCopier.length){
alert("Programme introuvable");
return;
}

const copie =
JSON.parse(
JSON.stringify(aCopier)
);

localStorage.setItem(
"programmeCopie",
JSON.stringify(copie)
);

window.location =
"config.html?copieProgramme=1&v="
+ Date.now();

}

window.copySimpleProgram = function(id){

const prog =
programmes.find(
p => p.firebaseId === id
);

if(!prog){
alert("Programme introuvable");
return;
}

localStorage.setItem(
"programme_temp",
JSON.stringify(
prog.data || prog.données
)
);

localStorage.removeItem(
"editCloudId"
);

window.location =
"config.html?copie=1&v="
+ Date.now();

}

window.addFav = function(id){

const prog =
programmes.find(
p => p.firebaseId === id
);

if(!prog)return;

let all =
JSON.parse(
localStorage.getItem("programmes")
|| "[]"
);

const data =
prog.données || prog.data;

/* éviter doublons */

const exists =
all.some(p =>

p.type === "favori"

&&

p.nom === data.nom

&&

(p.patientId || "admin")
=== (currentPatient || "admin")

);

if(exists){

alert("Déjà en favoris");
return;

}

/* ajout vrai favori */

all.push({

type:"favori",

patientId:
currentPatient || "admin",

nom:
data.nom || "Programme",

date:
new Date()
.toLocaleDateString(),

data:data

});

localStorage.setItem(
"programmes",
JSON.stringify(all)
);

alert(
"Ajouté aux favoris ⭐"
);

}

window.sendProgrammeReport = function(
programmeNom,
faites,
total,
evaMoyenne,
historique,
patientNom

){

const nomPatient =
(patientNom || "")
.replace(/_/g," ")
.replace(/\b\w/g, l => l.toUpperCase());

const remarques = prompt(
"Souhaitez-vous ajouter une remarque pour votre kinésithérapeute ?"
) || "";

const sujet =
`Programme terminé - ${programmeNom}`;

const message =
`Bonjour Gabriel,

Je vous informe avoir terminé mon programme :

${programmeNom}

✅ Séances réalisées : ${faites}/${total}
🩹 EVA moyenne : ${evaMoyenne}/10

📅 Historique des séances

${historique}

📝 REMARQUES

${remarques || "Aucune remarque"}

Cordialement,

${nomPatient}`;

window.location =
`mailto:kine.laveau@gmail.com?subject=${encodeURIComponent(sujet)}&body=${encodeURIComponent(message)}`;

}

window.sendMail = function(patient,id){

if(!patient){

alert(
"Aucun patient associé"
);

return;

}

const lien =
`https://gabrieltimer.github.io/timer.html?cloud=${id}&patient=${patient}`;

const sujet =
"Votre programme de rééducation";

const message =
`Bonjour,

Cliquez directement sur ce lien pour lancer votre séance :

${lien}

Gabriel Laveau - Masseur-Kinésithérapeute`;

window.location =
`mailto:?subject=${encodeURIComponent(sujet)}&body=${encodeURIComponent(message)}`;

}

window.editProgram = async function(id){

const module =
await import(
"./exercises/js/cloud.js"
);

const programmes =
await module.loadProgramsFromCloud();

const prog =
programmes.find(
p => p.firebaseId === id
);

if(!prog){

alert(
"Programme introuvable"
);

return;

}

const data =
prog.données || prog.data;

/* sauvegarde programme */

localStorage.setItem(
"programme_temp",
JSON.stringify(data)
);

/* mode édition */

localStorage.setItem(
"editCloudId",
id
);

/* garder patient */

const patient =
data.patient
||
data.patientId
||
"";

window.location =
"config.html?cloud="
+ id +
"&patient="
+ patient +
"&admin=true"
+ "&edit=1&v="
+ Date.now();

}

window.deleteProgram =
async function(id){

const confirmDelete =
confirm(
"Supprimer définitivement ce programme ?"
);

if(!confirmDelete) return;

await deleteProgramFromCloud(id);

init();

}

window.deleteProgramme =
async function(programmeId){

const ok = confirm(
"Êtes-vous sûr de vouloir supprimer ce programme ?\n\nToutes les séances associées seront supprimées définitivement."
);

if(!ok) return;

const tous =
await loadProgramsFromCloud();

const aSupprimer =
tous.filter(
p => p.programmeId === programmeId
);

for(const p of aSupprimer){

await deleteProgramFromCloud(
p.firebaseId
);

}

alert(
"Programme supprimé."
);

init();

}

window.openPdf = async function(programmeId){

const seancesProgramme =
programmes.filter(
p => p.programmeId === programmeId
);

if(!seancesProgramme.length){
alert("Programme introuvable");
return;
}

const p =
seancesProgramme.reduce(
(a,b)=>
(a.pdfData?.length || 0)
>
(b.pdfData?.length || 0)
? a
: b
);

if(!p.pdfData){
alert(
"Ce programme a été créé avant l'ajout du PDF Cloud."
);
return;
}

sessionStorage.setItem(
"coursePdfData",
JSON.stringify({

patient:
p.patientId,

objectif:
p.objectif,

niveau:
p.niveau,

pathologie:
p.pathologie,

semaines:
p.semainesProgramme,

modeAffichage:
p.modeAffichage || "temps",

pdfData:
p.pdfData

})
);

window.open(
"coursepdf.html?v=" + Date.now(),
"_blank"
);

}

window.openFavs = function(){

if(currentPatient){

window.location =
"mes_programmes.html?patient="
+ currentPatient;

}else{

window.location =
"mes_programmes.html?admin=true";

}

}

window.openHistory = function(){

if(currentPatient){

window.location =
"historique.html?patient="
+ currentPatient;

}else{

window.location =
"historique.html?admin=true";

}

}

window.goHome = function(){

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient");

const admin =
params.get("admin");

if(admin && patient){

window.location =
"patients.html";

return;

}

const viewPatient =
params.get("viewPatient") === "1";

if(patient){

let url =
"index.html?patient=" + patient;

if(viewPatient){
  url += "&viewPatient=1";
}

window.location = url;
return;

}

window.location =
"index.html?admin=true";

}

}

window.activatePatient = function(){

const code = prompt(
"Entrez votre identifiant patient (ex : Gabriel_Laveau)");

if(!code) return;

localStorage.setItem(
"currentPatient",
code.trim()
);


location.reload();

}

init();

</script>

</body>
</html>
