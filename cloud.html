<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Cloud</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#f1f5f9;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

#homeBtn{
margin-bottom:20px;
padding:12px 18px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

#homeBtn:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<h2>☁️ Programmes Cloud</h2>

<button id="homeBtn" onclick="goHome()">
🏠 Retour menu
</button>

<div id="list"></div>

<script type="module">

import {
loadProgramsFromCloud
} from "./exercises/js/cloud.js";

async function init(){

const programmes =
await loadProgramsFromCloud();

const params =
new URLSearchParams(
window.location.search
);

const isAdmin =
params.get("admin") === "true";

const currentPatient =
params.get("patient");
const list =
document.getElementById("list");

list.innerHTML = "";
programmes
.sort((a,b)=>(
(b.updatedAt || 0)
-
(a.updatedAt || 0)
))

.filter(p => {

const hasExercises =

(p.données && p.données.exercices)
||
(p.data && p.data.exercices);

if(!hasExercises) return false;

if(isAdmin) return true;

const pid = (
p.patientId
||
p.data?.patientId
||
p.données?.patientId
||
""
)
.toString()
.trim()
.toLowerCase();

const cp =
(currentPatient || "")
.trim()
.toLowerCase();

return pid === cp;

})
.forEach((p)=>{

list.innerHTML += `

<div class="card">

<h3>${p.nom}</h3>

<div>
Patient : ${p.patientId || "?"}
</div>

<div>
Auteur : ${p.auteur}
</div>

<div>
Exercices :
${
p.données?.exercices?.length
||
p.data?.exercices?.length
||
0
}
</div>

<button onclick="launch('${p.firebaseId}')">
Lancer
</button>

<button onclick="addFav('${p.firebaseId}')">
⭐ Favori
</button>

</div>

`;

});

window.launch = function(id){

const prog =
programmes.find(
p => p.firebaseId === id
);

localStorage.setItem(
"programme_temp",
JSON.stringify(
prog.données || prog.data
)
);

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient");

if(patient){

window.location =
"timer.html?patient="
+ patient;

}else{

window.location =
"timer.html";

}

}

window.addFav = function(id){

const prog =
programmes.find(
p => p.firebaseId === id
);

if(!prog)return;

let favs =
JSON.parse(
localStorage.getItem(
"favorites"
) || "[]"
);

/* éviter doublons */

const already =
favs.some(f =>

f.nom ===
(prog.données?.nom
||
prog.data?.nom)

);

if(already){

alert(
"Déjà en favoris"
);

return;

}

/* sauvegarde locale */

favs.push(
prog.données || prog.data
);

localStorage.setItem(
"favorites",
JSON.stringify(favs)
);

alert(
"Ajouté aux favoris ⭐"
);

}
}

window.goHome = function(){

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient");

if(patient){

window.location =
"index.html?patient=" + patient;

}else{

window.location =
"index.html";

}

}
}

init();

</script>

</body>
</html>
