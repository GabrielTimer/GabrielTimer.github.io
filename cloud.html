<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Cloud</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#f1f5f9;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

#homeBtn{
margin-bottom:20px;
padding:12px 18px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

#homeBtn:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<h2>☁️ Programmes Cloud</h2>

<button id="homeBtn" onclick="goHome()">
🏠 Retour menu
</button>

<button onclick="openFavs()">
⭐ Favoris
</button>

<button onclick="openHistory()">
🕘 Historique
</button>

<button
id="activatePatientBtn"
onclick="activatePatient()"
style="display:none;background:#16a34a;">
🔑 Activer mon accès patient
</button>

<div id="list"></div>

<script type="module">

import {
loadProgramsFromCloud,
deleteProgramFromCloud
} from "./exercises/js/cloud.js";

async function init(){

const programmes =
await loadProgramsFromCloud();

const params =
new URLSearchParams(
window.location.search
);

const isAdmin =
params.get("admin") === "true";

let currentPatient =
params.get("patient");

if(!currentPatient){

currentPatient =
localStorage.getItem(
"currentPatient"
);

}

const list =
document.getElementById("list");

if(!currentPatient){

document.getElementById(
"activatePatientBtn"
).style.display = "inline-block";

}

list.innerHTML = "";

const programmesFiltres =
programmes
.sort((a,b)=>(
(b.updatedAt || 0)
-
(a.updatedAt || 0)
))

.filter(p => {

const hasExercises =

(p.données && p.données.exercices)
||
(p.data && p.data.exercices);

if(!hasExercises) return false;

if(isAdmin && !currentPatient){
return true;
}

const pid = (
p.patientId
||
p.data?.patientId
||
p.données?.patientId
||
""
)
.toString()
.trim()
.toLowerCase();

const cp =
(currentPatient || "")
.trim()
.toLowerCase();

return pid === cp;

});

const groupes = {};

programmesFiltres.forEach(p=>{

if(
p.categorie === "course"
&&
p.programmeId
){

if(!groupes[p.programmeId]){

groupes[p.programmeId] = [];

}

groupes[p.programmeId].push(p);

}

});

console.log("GROUPES", groupes);
// ===== DOSSIERS PROGRAMMES COURSE =====

Object.values(groupes).forEach(seances=>{

const total = seances.length;

const faites =
seances.filter(
s => s.terminee
).length;

const nom =
seances[0].programmeNom
||
"Programme course";

list.innerHTML += `

<div class="card">

<h3>📁 ${nom}</h3>

<div>
📊 Progression :
<b>${faites}/${total}</b>
séances
(${Math.round(faites*100/total)}%)
</div>

${
isAdmin
? `
<div style="margin:12px 0">
<button
style="
background:#dc2626;
font-weight:600;
padding:12px 18px;
"
onclick="deleteProgramme('${seances[0].programmeId}')">
🗑️ Supprimer le programme
</button>
</div>`
: ""
}

<div style="
background:#e5e7eb;
height:10px;
border-radius:999px;
margin:10px 0;
overflow:hidden;
">

<div style="
width:${Math.round(faites*100/total)}%;
height:100%;
background:#16a34a;
">
</div>

</div>

<details>

<summary
style="
cursor:pointer;
font-weight:bold;
margin-top:10px;
">
Voir les séances
</summary>

${seances.map(p=>`

<div style="
margin-top:12px;
padding:12px;
border:1px solid #e5e7eb;
border-radius:10px;
">

<b>${p.nom}</b><br>

${
p.terminee
? "✅ Séance validée"
: "⭕ Non validée"
}

<br><br>

<button onclick="launch('${p.firebaseId}')">
▶ Lancer
</button>

${
!p.terminee
? `
<button
style="
background:#eab308;
color:#111827;
"
onclick="validateSession('${p.firebaseId}')">
🟠 À valider
</button>
`
: `
<button
style="background:#16a34a">
✅ Validée
</button>
`
}

</div>

`).join("")}

</details>

</div>

`;

});

// ===== PROGRAMMES KINE =====

programmesFiltres
.filter(p => p.categorie !== "course")
.forEach((p)=>{

list.innerHTML += `

<div class="card">

<h3>${p.nom}</h3>

<div>
Patient : ${p.patientId || "?"}
</div>

<div>
Auteur : ${p.auteur}
</div>

<div>
Exercices :
${
p.données?.exercices?.length
||
p.data?.exercices?.length
||
0
}
</div>

<button onclick="launch('${p.firebaseId}')">
▶ Lancer
</button>

<button onclick="addFav('${p.firebaseId}')">
⭐ Favori
</button>

${
isAdmin
? `
<button onclick="sendMail('${p.patientId || ""}','${p.firebaseId}')">
✉️ Envoyer
</button>

<button onclick="editProgram('${p.firebaseId}')">
✏️ Modifier
</button>

<button onclick="deleteProgram('${p.firebaseId}')">
🗑️ Supprimer
</button>
`
: ""
}

</div>

`;

});

window.launch = function(id){

const prog =
programmes.find(
p => p.firebaseId === id
);

localStorage.setItem(
"programme_temp",
JSON.stringify(
prog.données || prog.data
)
);

const params =
new URLSearchParams(
window.location.search
);

let patient =
params.get("patient");

if(!patient){

patient =
localStorage.getItem(
"currentPatient"
);

}

if(patient){

setTimeout(()=>{

window.location =
"timer.html?cloud="
+ id +
"&patient="
+ patient +
"&admin=true"
+ "&v=" + Date.now();

},80);

}else{

setTimeout(()=>{

window.location =
"timer.html?cloud="
+ id +
"&v=" +
Date.now();

},80);

}

}

window.validateSession = function(id){

const ok = confirm(
"Êtes-vous sûr de vouloir valider cette séance ?"
);

if(!ok) return;

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient")
||
localStorage.getItem(
"currentPatient"
)
||
"";

window.location =
"fin.html?validation=1"
+ "&cloud=" + id
+ "&patient=" + patient
+ "&v=" + Date.now();

}

window.addFav = function(id){

const prog =
programmes.find(
p => p.firebaseId === id
);

if(!prog)return;

let all =
JSON.parse(
localStorage.getItem("programmes")
|| "[]"
);

const data =
prog.données || prog.data;

/* éviter doublons */

const exists =
all.some(p =>

p.type === "favori"

&&

p.nom === data.nom

&&

(p.patientId || "admin")
=== (currentPatient || "admin")

);

if(exists){

alert("Déjà en favoris");
return;

}

/* ajout vrai favori */

all.push({

type:"favori",

patientId:
currentPatient || "admin",

nom:
data.nom || "Programme",

date:
new Date()
.toLocaleDateString(),

data:data

});

localStorage.setItem(
"programmes",
JSON.stringify(all)
);

alert(
"Ajouté aux favoris ⭐"
);

}
window.sendMail = function(patient,id){

if(!patient){

alert(
"Aucun patient associé"
);

return;

}

const lien =
`https://gabrieltimer.github.io/timer.html?cloud=${id}&patient=${patient}`;

const sujet =
"Votre programme de rééducation";

const message =
`Bonjour,

Cliquez directement sur ce lien pour lancer votre séance :

${lien}

Gabriel Laveau - Masseur-Kinésithérapeute`;

window.location =
`mailto:?subject=${encodeURIComponent(sujet)}&body=${encodeURIComponent(message)}`;

}

window.editProgram = async function(id){

const module =
await import(
"./exercises/js/cloud.js"
);

const programmes =
await module.loadProgramsFromCloud();

const prog =
programmes.find(
p => p.firebaseId === id
);

if(!prog){

alert(
"Programme introuvable"
);

return;

}

const data =
prog.données || prog.data;

/* sauvegarde programme */

localStorage.setItem(
"programme_temp",
JSON.stringify(data)
);

/* mode édition */

localStorage.setItem(
"editCloudId",
id
);

/* garder patient */

const patient =
data.patient
||
data.patientId
||
"";

window.location =
"config.html?cloud="
+ id +
"&patient="
+ patient +
"&admin=true"
+ "&edit=1&v="
+ Date.now();

}

window.deleteProgram =
async function(id){

const confirmDelete =
confirm(
"Supprimer définitivement ce programme ?"
);

if(!confirmDelete) return;

await deleteProgramFromCloud(id);

init();

}

window.deleteProgramme =
async function(programmeId){

const ok = confirm(
"Êtes-vous sûr de vouloir supprimer ce programme ?\n\nToutes les séances associées seront supprimées définitivement."
);

if(!ok) return;

const tous =
await loadProgramsFromCloud();

const aSupprimer =
tous.filter(
p => p.programmeId === programmeId
);

for(const p of aSupprimer){

await deleteProgramFromCloud(
p.firebaseId
);

}

alert(
"Programme supprimé."
);

init();

}

window.openFavs = function(){

if(currentPatient){

window.location =
"mes_programmes.html?patient="
+ currentPatient +
"&admin=true";

}else{

window.location =
"mes_programmes.html?admin=true";

}

}

window.openHistory = function(){

if(currentPatient){

window.location =
"historique.html?patient="
+ currentPatient +
"&admin=true";

}else{

window.location =
"historique.html?admin=true";

}

}

window.goHome = function(){

const params =
new URLSearchParams(
window.location.search
);

const patient =
params.get("patient");

if(patient && !params.get("admin")){

window.location =
"index.html?patient="
+ patient;

}else{

window.location =
"index.html?admin=true";

}

}

}

window.activatePatient = function(){

const code = prompt(
"Entrez votre identifiant patient (ex : Gabriel_Laveau)");

if(!code) return;

localStorage.setItem(
"currentPatient",
code.trim()
);


location.reload();

}

init();

</script>

</body>
</html>
