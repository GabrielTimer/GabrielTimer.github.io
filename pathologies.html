<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zones</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
margin:0;
}

/* TITRE */
h1{
margin-top:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
max-width:500px;
margin:auto;
}

/* CARTE */
.card{
background:white;
border-radius:15px;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

/* IMAGE */
.card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:10px;
}

/* TEXTE */
.card p{
margin:8px 0 0;
font-weight:bold;
}

/* BOUTON RETOUR */
.back{
background:#777;
color:white;
border:none;
padding:15px;
margin:20px;
border-radius:10px;
width:90%;
max-width:400px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>ZONES</h1>

<div class="grid">

<div class="card" onclick="go('tendinite_coiffe')">
<img src="images/tendinite_coiffe/cover.jpg">
<p>Membre supérieur</p>
</div>

<div class="card" onclick="go('lombalgie')">
<img src="images/lombalgie/cover.jpg">
<p>Dos</p>
</div>

<div class="card" onclick="go('syndrome_rotulien')">
<img src="images/syndrome_rotulien/cover.jpg">
<p>Membre inférieur</p>
</div>

<div class="card" onclick="go('cervicales')">
<img src="images/cervicales/cover.jpg">
<p>Cervicales</p>
</div>

<div class="card" onclick="go('autres')">
<img src="images/autres/cover.jpg">
<p>Autres</p>
</div>

</div>

<button class="back" onclick="window.location='index.html'">⬅ Retour</button>

<script>
function go(patho){
localStorage.setItem("pathologie", patho);
window.location="config.html";
}
</script>

</body>
</html>
