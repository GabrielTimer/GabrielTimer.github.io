<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathologies</title>

<style>
body{font-family:Arial;background:#f4f4f4;text-align:center;}

button{
width:90%;
padding:15px;
margin:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
background:#0e8f9b;
color:white;
}

.add{background:#2ecc71;}
.back{background:#777;}

.form{
display:none;
background:white;
padding:15px;
margin:10px;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:5px;
}
</style>
</head>

<body>

<h2>Pathologies</h2>

<div id="list"></div>

<button class="add" onclick="showForm()">➕ Ajouter une pathologie</button>
<button class="back" onclick="back()">⬅ Retour</button>

<!-- FORMULAIRE -->
<div class="form" id="form">

<h3>Nouvelle pathologie</h3>

<input id="nom" placeholder="Nom (ex: Épaule)">
<input id="tempsEx" placeholder="Temps exercice">
<input id="tempsRepos" placeholder="Temps repos">
<input id="reps" placeholder="Répétitions">
<input id="series" placeholder="Séries">

<button onclick="save()">💾 Enregistrer</button>

</div>

<script>

// 🔹 PATHOS PAR DÉFAUT
let basePathos = [
{nom:"Coiffe des rotateurs", id:"epaule"},
{nom:"Lombalgie", id:"dos"},
{nom:"Syndrome rotulien", id:"genou"}
];

// 🔹 charger
function load(){

let list=document.getElementById("list");
list.innerHTML="";

// base
basePathos.forEach(p=>{
createBtn(p.nom,p.id);
});

// ajoutées
let custom = JSON.parse(localStorage.getItem("customPathos")) || [];

custom.forEach(p=>{
createBtn(p.nom,p.nom);
});

}

function createBtn(name,id){

let btn=document.createElement("button");
btn.innerText=name;

btn.onclick=()=>{
localStorage.setItem("pathologie", id);
window.location="config.html";
};

list.appendChild(btn);
}

// 🔹 afficher form
function showForm(){
document.getElementById("form").style.display="block";
}

// 🔹 sauvegarde
function save(){

let p={
nom:nom.value,
tempsEx:+tempsEx.value,
tempsRepos:+tempsRepos.value,
reps:+reps.value,
series:+series.value,
exercices:["Exercice 1","Exercice 2"]
};

let custom = JSON.parse(localStorage.getItem("customPathos")) || [];
custom.push(p);

localStorage.setItem("customPathos", JSON.stringify(custom));

alert("Pathologie ajoutée !");
location.reload();
}

// 🔹 retour
function back(){
window.location="index.html";
}

load();

</script>

</body>
</html>
