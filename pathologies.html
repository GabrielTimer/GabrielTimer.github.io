<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zones</title>

<style>

/* BASE */
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* TITRE */
h2{
font-size:28px;
margin-bottom:25px;
}

/* CARD */
.card{
width:85%; /* 🔥 réduit pour créer marge visible */
max-width:360px;
margin:12px auto; /* 🔥 centre propre */
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
cursor:pointer;
font-size:20px;
font-weight:bold;
transition:transform 0.15s, box-shadow 0.15s;
}

.card:hover{
transform:scale(1.04);
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

/* BOUTON */
button{
margin-top:25px;
padding:14px 20px;
border:none;
border-radius:12px;
background:#ccc;
font-size:16px;
cursor:pointer;
transition:transform 0.15s;
}

button:hover{transform:scale(1.05);}

/* 📱 MODE SMARTPHONE */
@media (max-width:600px){

h2{
font-size:28px;
}

/* 🔥 marge bien visible */
.card{
width:85%;
max-width:340px;
font-size:22px;
padding:22px;
border-radius:22px;
}

button{
font-size:17px;
padding:14px;
border-radius:14px;
}

}

</style>
</head>

<body>

<h2>Choisir une zone</h2>

<div class="card" onclick="go('epaule')">💪 Épaule</div>
<div class="card" onclick="go('dos')">🧍 Dos</div>

<button onclick="back()">⬅ Retour</button>

<script>
function go(zone){
localStorage.setItem("zone", zone);
window.location="liste_pathologies.html?v="+Date.now();
}

function back(){
window.location="index.html";
}
</script>

</body>
</html>
