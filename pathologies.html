<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZONES</title>

<style>
body{font-family:Arial;background:#f4f4f4;text-align:center;}
button{
width:90%;
padding:15px;
margin:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
background:#0e8f9b;
color:white;
}
</style>
</head>

<body>

<h2>Choisir une zone</h2>

<button onclick="goZone('epaule')">💪 Membre supérieur</button>
<button onclick="goZone('dos')">🦴 Dos</button>
<button onclick="goZone('genou')">🦵 Membre inférieur</button>
<button onclick="goZone('cervical')">🧠 Cervicales</button>
<button onclick="goZone('autre')">➕ Autres</button>

<button onclick="back()">⬅ Retour</button>

<script>
function goZone(z){
localStorage.setItem("zone", z);
window.location="liste_pathologies.html";
}
function back(){
window.location="index.html";
}
</script>

</body>
</html>
