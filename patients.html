<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Patients</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#f1f5f9;
display:flex;
justify-content:center;
padding:20px;
}

.card{
background:white;
width:100%;
max-width:420px;
border-radius:20px;
padding:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:20px;
}

button{
width:100%;
padding:16px;
margin:10px 0;
border:none;
border-radius:14px;
font-size:18px;
font-weight:600;
cursor:pointer;
background:#2563eb;
color:white;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<div class="card">

<h1>Mes programmes</h1>

<button onclick="openPatient('gab')">
Gab
</button>

<button onclick="openPatient('luc')">
Luc
</button>

<button onclick="openPatient('marie')">
Marie
</button>

</div>

<script>

function openPatient(patient){

localStorage.setItem(
"currentPatient",
patient
);

window.location =
"cloud.html";

}

</script>

</body>
</html>
