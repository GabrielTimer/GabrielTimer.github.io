<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fin</title>

<style>
*{
box-sizing:border-box;
}

html{
height:100%;
}

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;

min-height:100dvh;
height:auto;

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
font-family:Arial,sans-serif;
text-align:center;

overflow-x:hidden;
overflow-y:auto;

padding:
max(16px, env(safe-area-inset-top))
16px
max(24px, env(safe-area-inset-bottom));
}

.container{
z-index:2;
padding:20px;
max-width:350px;
width:100%;
margin:auto;
}

h1{
font-size:38px;
margin-bottom:10px;
animation:pop 0.6s ease;
}

.message{
font-size:22px;
margin:10px 0;
}

.small{
font-size:18px;
opacity:0.9;
margin-top:10px;
}

.stats{
margin-top:15px;
font-size:18px;
line-height:1.6;
background:rgba(255,255,255,0.1);
padding:12px;
border-radius:12px;
}

@keyframes pulseBtn{
0%{transform:scale(1);}
50%{transform:scale(1.06);}
100%{transform:scale(1);}
}

button{
margin-top:20px;
padding:16px 24px;
border:none;
border-radius:12px;
background:#1976d2;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
box-shadow:0 6px 18px rgba(0,0,0,0.25);
animation:pulseBtn 2.5s infinite;
}

button:hover{
transform:scale(1.1);
background:#1565c0;
animation:none;
}

button:active{
transform:scale(0.95);
}

button.disabled{
opacity:0.4;
pointer-events:none;
animation:none;
}

.emoji{
font-size:48px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall linear infinite;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

#evaBloc{
margin-top:25px;
text-align:center;
}

#evaImg{
width:90px;
height:90px;
object-fit:contain;
margin:10px auto;
display:block;
}

#evaSlider{
width:80%;
margin-top:10px;
}

#evaLabel{
margin-top:8px;
font-weight:bold;
}

@keyframes blinkSoft{
0%{opacity:1;}
50%{opacity:0.6;}
100%{opacity:1;}
}

#evaBloc h3{
animation:blinkSoft 2s infinite;
}

@keyframes unlockPop{
0%{transform:scale(0.7);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

button.unlock{
animation:unlockPop 0.4s ease;
}

/* petits téléphones */
@media (max-height:750px){

.container{
padding:16px;
}

h1{
font-size:30px;
margin-bottom:8px;
}

.message{
font-size:20px;
}

.small{
font-size:16px;
margin-top:8px;
}

.stats{
font-size:16px;
padding:10px;
margin-top:12px;
}

#evaBloc{
margin-top:16px;
}

#evaImg{
width:74px;
height:74px;
}

button{
margin-top:16px;
padding:14px 22px;
font-size:17px;
}

}

/* iPad / tablettes */
@media (min-width:768px){

.container{
max-width:420px;
}

}
</style>
</head>

<body>

<script>
for(let i=0;i<80;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(Math.random()*3+2)+"s";
c.style.background=["#ff0","#0ff","#f0f","#0f0","#fff"][Math.floor(Math.random()*5)];
document.body.appendChild(c);
}

setTimeout(()=>{
document.querySelectorAll(".confetti").forEach(c=>{
c.style.transition="opacity 1s";
c.style.opacity="0";
});
},3000);

setTimeout(()=>{
document.querySelectorAll(".confetti").forEach(c=>c.remove());
},4000);
</script>

<script>
let messages=[
"Excellent travail 💪",
"Très bonne séance 👏",
"Continue comme ça 🔥",
"Objectif atteint 🎯"
];

let randomMessage=messages[Math.floor(Math.random()*messages.length)];

let prog=JSON.parse(localStorage.getItem("programme_temp"));

let totalTime=0;
let exCount=0;
let series=0;

if(prog){
series=prog.series||1;
exCount=prog.exercices.length;

prog.exercices.forEach(ex=>{
totalTime+=(ex.ex+ex.repos)*ex.reps;
});
totalTime*=series;
}

function formatTime(s){
let m=Math.floor(s/60);
return m+" min "+(s%60)+" s";
}
</script>

<div class="container">

<div class="emoji">✨👏✨</div>

<h1>🎉 Séance terminée !</h1>

<div class="message" id="msg"></div>

<div class="stats" id="stats"></div>

<p class="small">Avec les félicitations du kiné !</p>

<div id="evaBloc">
<h3>👉 Merci d’indiquer votre ressenti</h3>
<img id="evaImg" src="/images/eva/0.png">
<input type="range" min="0" max="10" value="0" id="evaSlider">
<div id="evaLabel">Très bien</div>
</div>

<button id="btnRetour">🏠 Retour accueil</button>

</div>

<script>
document.getElementById("msg").innerText=randomMessage;

const params =
new URLSearchParams(
window.location.search
);

const validationMode =
params.get("validation") === "1";

if(validationMode){

document.querySelector("h1").innerText =
"🎉 Séance enregistrée";

document.getElementById("stats")
.style.display = "none";

}

if(!validationMode){

document.getElementById("stats").innerHTML=
"⏱ "+formatTime(totalTime)+"<br>"+
"🏋️ "+exCount+" exercices<br>"+
"🔁 "+series+" séries";

}

const evaImages=[];
for(let i=0;i<6;i++){
let im=new Image();
im.src="/images/eva/"+i+".png";
evaImages.push(im);
}

const slider=document.getElementById("evaSlider");
const img=document.getElementById("evaImg");
const label=document.getElementById("evaLabel");
const btn=document.getElementById("btnRetour");

let evaValue=null;

btn.classList.add("disabled");

function updateEva(val){

val=parseInt(val);

let step=Math.floor(val/2);
if(step<0)step=0;
if(step>5)step=5;

img.src=evaImages[step].src;

if(val<=1)label.innerText="Très bien";
else if(val<=3)label.innerText="Bénigne";
else if(val<=5)label.innerText="Inconfort modéré";
else if(val<=7)label.innerText="Douleur intense";
else if(val<=9)label.innerText="Douleur très intense";
else label.innerText="Le plus de douleur possible";

label.innerText+=" ("+val+"/10)";

localStorage.setItem("eva_temp",val);

if(evaValue===null){

btn.classList.remove("disabled");
btn.classList.add("unlock");

if(navigator.vibrate){
navigator.vibrate(50);
}

setTimeout(()=>btn.classList.remove("unlock"),400);
}

evaValue=val;
}

slider.addEventListener("input",e=>{
updateEva(e.target.value);
});

img.src=evaImages[0].src;
label.innerText="Très bien";

btn.onclick=()=>{

if(evaValue===null){
label.innerText="👉 Merci d’indiquer votre ressenti";
return;
}

saveAndExit();
};
</script>

<script>
const VERSION="1.2";

async function saveAndExit(){

const params=new URLSearchParams(window.location.search);


const validationMode =
params.get("validation") === "1";

const cloudId =
params.get("cloud");

const patient=params.get("patient");



let all=localStorage.getItem("programmes");
all=all?JSON.parse(all):[];
if(!Array.isArray(all))all=[];

let eva=parseInt(localStorage.getItem("eva_temp")||0);
let prog=JSON.parse(localStorage.getItem("programme_temp")||"{}");

let programme={
type:"historique",
patientId:patient||"admin",
nom:prog.nom||"Séance",
date:new Date().toLocaleString(),

categorie:
prog.categorie
||
"kine",

data:{
...prog,
eva:eva
}
};
all.unshift(programme);

let historiques=all.filter(p=>p.type==="historique").slice(0,30);
let autres=all.filter(p=>p.type!=="historique");

localStorage.setItem("programmes",JSON.stringify([...historiques,...autres]));

localStorage.removeItem("eva_temp");

if(validationMode && cloudId){

const module =
await import(
"./exercises/js/cloud.js"
);

console.log("VALIDATION MODE =", validationMode);
console.log("CLOUD ID =", cloudId);
console.log("EVA =", eva);

await module.validateProgram(
cloudId,
eva
);

}

if(patient){
window.location="index.html?patient="+patient+"&v="+VERSION;
}else{
window.location="index.html?v="+VERSION;
}
}
</script>

</body>
</html>
