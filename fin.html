<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fin</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

.container{
z-index:2;
padding:20px;
}

h1{
font-size:42px;
margin-bottom:10px;
animation:pop 0.6s ease;
}

p{
font-size:22px;
margin:5px 0;
}

.small{
font-size:18px;
opacity:0.9;
margin-top:10px;
}

button{
margin-top:20px;
padding:16px 24px;
border:none;
border-radius:12px;
background:#00e5ff;
color:#111;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{transform:scale(1.1);}
button:active{transform:scale(0.95);}

/* 🎉 animation titre */
@keyframes pop{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

/* 👏 pulse emoji */
.emoji{
font-size:50px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

/* 🎊 confettis */
.confetti{
position:absolute;
width:8px;
height:8px;
background:red;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}
</style>
</head>

<body>

<!-- 🎊 confettis -->
<script>
for(let i=0;i<80;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(Math.random()*3+2)+"s";
c.style.background=["#ff0","#0ff","#f0f","#0f0","#fff"][Math.floor(Math.random()*5)];
document.body.appendChild(c);
}
</script>

<div class="container">

<div class="emoji">👏🎉👏</div>

<h1>🎉 Séance terminée !</h1>

<p>Bravo 💪</p>

<p class="small">Avec les félicitations du kiné !</p>

<button onclick="window.location='index.html'">🏠 Retour accueil</button>

</div>

</body>
</html>
