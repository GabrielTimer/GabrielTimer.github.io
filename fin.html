<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fin</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

.container{
z-index:2;
padding:20px;
max-width:350px;
}

h1{
font-size:38px;
margin-bottom:10px;
animation:pop 0.6s ease;
}

.message{
font-size:22px;
margin:10px 0;
}

.small{
font-size:18px;
opacity:0.9;
margin-top:10px;
}

.stats{
margin-top:15px;
font-size:18px;
line-height:1.6;
background:rgba(255,255,255,0.1);
padding:12px;
border-radius:12px;
}

@keyframes pulseBtn{
0%{transform:scale(1);}
50%{transform:scale(1.06);}
100%{transform:scale(1);}
}

button{
margin-top:20px;
padding:16px 24px;
border:none;
border-radius:12px;
background:#1976d2;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
box-shadow:0 6px 18px rgba(0,0,0,0.25);
animation:pulseBtn 2.5s infinite;
}

button:hover{
transform:scale(1.1);
background:#1565c0;
animation:none;
}

button:active{
transform:scale(0.95);
}

/* 🔒 bouton bloqué */
button.disabled{
opacity:0.4;
pointer-events:none;
animation:none;
}

.emoji{
font-size:48px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

.confetti{
position:absolute;
width:8px;
height:8px;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* EVA */
#evaBloc{
margin-top:25px;
text-align:center;
}

#evaImg{
width:90px;
height:90px;
object-fit:contain;
margin:10px auto;
display:block;
}

#evaSlider{
width:80%;
margin-top:10px;
}

#evaLabel{
margin-top:8px;
font-weight:bold;
}
</style>
</head>

<body>

<script>
for(let i=0;i<80;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(Math.random()*3+2)+"s";
c.style.background=["#ff0","#0ff","#f0f","#0f0","#fff"][Math.floor(Math.random()*5)];
document.body.appendChild(c);
}

setTimeout(()=>{
document.querySelectorAll(".confetti").forEach(c=>{
c.style.transition="opacity 1s";
c.style.opacity="0";
});
}, 3000);

setTimeout(()=>{
document.querySelectorAll(".confetti").forEach(c=>c.remove());
}, 4000);
</script>

<script>
let messages = [
"Excellent travail 💪",
"Très bonne séance 👏",
"Continue comme ça 🔥",
"Objectif atteint 🎯"
];

let randomMessage = messages[Math.floor(Math.random()*messages.length)];

let prog = JSON.parse(localStorage.getItem("programme_temp"));

let totalTime = 0;
let exCount = 0;
let series = 0;

if(prog){
series = prog.series || 1;
exCount = prog.exercices.length;

prog.exercices.forEach(ex=>{
totalTime += (ex.ex + ex.repos) * ex.reps;
});
totalTime *= series;
}

function formatTime(s){
let m=Math.floor(s/60);
return m+" min "+(s%60)+" s";
}
</script>

<div class="container">

<div class="emoji">✨👏✨</div>

<h1>🎉 Séance terminée !</h1>

<div class="message" id="msg"></div>

<div class="stats" id="stats"></div>

<p class="small">Avec les félicitations du kiné !</p>

<div id="evaBloc">

<h3>Avez-vous ressenti des douleurs pendant la séance ?</h3>

<img id="evaImg" src="/images/eva/0.png">

<input type="range" min="0" max="10" value="0" id="evaSlider">

<div id="evaLabel">Très bien</div>

</div>

<button id="btnRetour">🏠 Retour accueil</button>

</div>

<script>
document.getElementById("msg").innerText = randomMessage;

document.getElementById("stats").innerHTML =
"⏱ "+formatTime(totalTime)+"<br>" +
"🏋️ "+exCount+" exercices<br>" +
"🔁 "+series+" séries";

/* PRELOAD */
const evaImages = [];
for(let i=0;i<6;i++){
let im = new Image();
im.src = "/images/eva/"+i+".png";
evaImages.push(im);
}

/* EVA */
const slider = document.getElementById("evaSlider");
const img = document.getElementById("evaImg");
const label = document.getElementById("evaLabel");
const btn = document.getElementById("btnRetour");

let evaValue = null;

/* bouton bloqué au départ */
btn.classList.add("disabled");

function updateEva(val){

val = parseInt(val);
let step = Math.floor(val / 2);

img.src = evaImages[step].src;

if(step === 0) label.innerText="Très bien";
else if(step === 1) label.innerText="Bénigne";
else if(step === 2) label.innerText="Inconfort modéré";
else if(step === 3) label.innerText="Douleur intense";
else if(step === 4) label.innerText="Douleur très intense";
else label.innerText="Le plus de douleur possible";

/* sauvegarde */
localStorage.setItem("eva_temp", val);

/* 🔥 activation bouton */
evaValue = val;
btn.classList.remove("disabled");
}

slider.addEventListener("input", e=>{
updateEva(e.target.value);
});

/* IMPORTANT : pas d'activation automatique */
updateEva(0);

/* clic bouton sécurisé */
btn.onclick = () => {

if(evaValue === null){
alert("Veuillez évaluer votre douleur avant de continuer");
return;
}

saveAndExit();
};

</script>

<script>
function saveAndExit(){

let all = localStorage.getItem("programmes");
all = all ? JSON.parse(all) : [];
if(!Array.isArray(all)) all = [];

let eva = parseInt(localStorage.getItem("eva_temp") || 0);
let prog = JSON.parse(localStorage.getItem("programme_temp") || "{}");

let programme = {
type: "historique",
nom: prog.nom || "Séance",
date: new Date().toLocaleString(),
data: {
...prog,
eva: eva
}
};

all.unshift(programme);

let historiques = all.filter(p => p.type === "historique").slice(0,30);
let autres = all.filter(p => p.type !== "historique");

localStorage.setItem("programmes", JSON.stringify([...historiques, ...autres]));

localStorage.removeItem("eva_temp");

window.location="index.html";
}
</script>

</body>
</html>
