<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Timer</title>

<style>
body{font-family:Arial;text-align:center;background:#222;color:white;}
.timer{font-size:80px;margin:20px;}
.exercise{font-size:30px;}
</style>
</head>

<body>

<div class="exercise" id="exo"></div>
<div class="timer" id="timer"></div>

<script>

let data = localStorage.getItem("programme_temp");

if(!data){
let user = localStorage.getItem("currentUser");
if(user){
data = localStorage.getItem("programme_"+user);
}
}

let p = data ? JSON.parse(data) : null;

let i=0, rep=1, serie=1, phase="ex";
let t;

function startPhase(){

if(serie>p.series){
exo.innerText="FIN 🎉";
timer.innerText="";
return;
}

if(phase==="ex"){
t=p.tempsEx;
exo.innerText=p.exercices[i];
}else{
t=p.tempsRepos;
exo.innerText="Repos";
}

timer.innerText=t;

let inter=setInterval(()=>{
t--;
timer.innerText=t;

if(t<=0){
clearInterval(inter);
next();
}
},1000);
}

function next(){
if(phase==="ex"){
phase="repos";
}else{
phase="ex";
i++;
if(i>=p.exercices.length){
i=0;
rep++;
if(rep>p.reps){
rep=1;
serie++;
}
}
}
startPhase();
}

startPhase();

</script>

</body>
</html>
