<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Connexion Admin</title>

<style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f4f4f4;
font-family:Arial;
}

.card{
width:320px;
background:white;
padding:30px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
display:flex;
flex-direction:column;
gap:16px;
}

.logo{
font-size:42px;
text-align:center;
}

h1{
margin:0;
text-align:center;
font-size:28px;
}

input{
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
padding:14px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.error{
color:red;
font-size:14px;
text-align:center;
min-height:20px;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">🔒</div>

<h1>Admin</h1>

<input
type="password"
id="pwd"
placeholder="Mot de passe"
>

<button onclick="login()">
Connexion
</button>

<div class="error" id="error"></div>

</div>

<script>

const PASSWORD = "gab123";

function login(){

const value =
document.getElementById("pwd")
.value;

if(value === PASSWORD){

sessionStorage.setItem(
  "admin_ok",
  "true"
);

window.location =
"index.html?v=1.2";

}else{

document.getElementById(
"error"
).innerText =
"Mot de passe incorrect";

}

}

</script>

</body>
</html>
