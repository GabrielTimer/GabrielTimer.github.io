<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Respir</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    font-family:"Segoe UI",sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:radial-gradient(circle at top,#00115f 0%,#00083a 45%,#000428 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(circle at center,rgba(30,90,255,0.15),transparent 60%);
    animation:bgMove 12s ease-in-out infinite alternate;
    pointer-events:none;
}

@keyframes bgMove{
    from{ transform:scale(1); }
    to{ transform:scale(1.08); }
}

.app{
    width:100%;
    max-width:520px;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    padding:30px 20px;
}

.mode-selector,
.bottom-zone{
    width:100%;
    transition:opacity .4s ease;
}

.session-active .mode-selector,
.session-active .bottom-zone{
    opacity:0;
    pointer-events:none;
}

.mode-track{
    display:flex;
    gap:12px;
    overflow:auto;
    scrollbar-width:none;
}

.mode-track::-webkit-scrollbar{
    display:none;
}

.mode{
    flex:0 0 auto;
    padding:12px 20px;
    border-radius:999px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.08);
    color:rgba(255,255,255,0.7);
    cursor:pointer;
    transition:.25s;
}

.mode.active{
    background:rgba(255,255,255,0.18);
    color:white;
}

.center-zone{
    flex:1;
    padding-top:35px;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.track-container{
    width:170px;
    height:620px;
    border-radius:999px;
    position:relative;
    overflow:hidden;
    background:linear-gradient(180deg,rgba(60,90,255,0.18),rgba(25,45,180,0.28));
    border:2px solid rgba(120,170,255,0.38);
    box-shadow:inset 0 0 22px rgba(255,255,255,0.04),0 0 22px rgba(60,120,255,0.12);
}

.bubble{
    position:absolute;
    left:50%;
    transform:translateX(-50%) translateY(465px);
    width:150px;
    height:150px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.92),rgba(180,220,255,0.30) 26%,rgba(40,90,255,0.96) 100%);
    box-shadow:inset 0 0 22px rgba(255,255,255,0.18),0 0 25px rgba(90,180,255,0.22),0 0 45px rgba(50,120,255,0.12);
}

.bubble::after{
    content:"";
    position:absolute;
    width:35%;
    height:35%;
    border-radius:50%;
    top:18%;
    left:18%;
    background:rgba(255,255,255,0.5);
    filter:blur(8px);
}

.breath-text{
    margin-top:38px;
    font-size:3rem;
    font-weight:700;
    letter-spacing:.5px;
    text-shadow:0 0 18px rgba(255,255,255,0.18);
}

.bottom-zone{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.duration-container{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.duration-label{
    opacity:.75;
}

input[type="range"]{
    width:100%;
    appearance:none;
    height:6px;
    border-radius:999px;
    background:rgba(255,255,255,0.12);
}

input[type="range"]::-webkit-slider-thumb{
    appearance:none;
    width:24px;
    height:24px;
    border-radius:50%;
    background:white;
}

.main-button{
    border:none;
    padding:18px;
    border-radius:999px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:1.1rem;
    cursor:pointer;
}

.popup{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(10px);
    z-index:999;
    padding:20px;
}

.popup-content{
    width:100%;
    max-width:420px;
    background:rgba(10,18,50,0.96);
    border-radius:28px;
    padding:28px;
    border:1px solid rgba(255,255,255,0.08);
}

.popup-content h2{
    text-align:center;
    margin-bottom:25px;
    font-weight:500;
}

.setting{
    margin-bottom:22px;
}

.setting label{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
}

.popup-buttons{
    display:flex;
    gap:12px;
    margin-top:20px;
}

.popup-buttons button{
    flex:1;
    border:none;
    padding:14px;
    border-radius:16px;
    color:white;
    cursor:pointer;
}

.cancel-btn{
    background:rgba(255,255,255,0.08);
}

.save-btn{
    background:rgba(70,140,255,0.5);
}

.overlay-controls{
    position:fixed;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    width:calc(100% - 20px);
    max-width:760px;
    background:linear-gradient(180deg,rgba(8,15,55,0.96),rgba(5,10,40,0.96));
    border-radius:30px;
    padding:22px;
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    z-index:999;
    opacity:0;
    pointer-events:none;
    transition:.3s;
}

.overlay-controls.visible{
    opacity:1;
    pointer-events:auto;
}

.drag-bar{
    width:70px;
    height:8px;
    border-radius:999px;
    background:rgba(255,255,255,0.5);
    margin:0 auto 22px;
}

.info-box{
    background:rgba(255,255,255,0.05);
    border-radius:22px;
    padding:18px;
    line-height:1.4;
    margin-bottom:24px;
}

.control-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:28px;
    margin-bottom:22px;
}

.circle-btn{
    width:82px;
    height:82px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    font-size:2rem;
}

.play-btn{
    width:110px;
    height:110px;
    background:white;
    color:black;
}

.secondary-btn{
    background:rgba(255,255,255,0.08);
    color:white;
}

.progress{
    width:100%;
    height:8px;
    border-radius:999px;
    background:rgba(255,255,255,0.15);
    overflow:hidden;
    margin-bottom:12px;
}

.progress-fill{
    width:0%;
    height:100%;
    background:white;
}

.time-row{
    display:flex;
    justify-content:space-between;
    opacity:.8;
    margin-bottom:22px;
}

.return-btn{
    width:100%;
    border:none;
    padding:20px;
    border-radius:22px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:1.15rem;
    cursor:pointer;
}

@media(max-width:480px){

    .track-container{
        width:170px;
    }

    .bubble{
        width:150px;
        height:150px;
    }

    .breath-text{
        font-size:2.5rem;
    }

}

</style>
</head>

<body>

<div class="app">

    <div class="mode-selector">

        <div class="mode-track">

            <div class="mode active" data-mode="beginner">
                Débuter
            </div>

            <div class="mode" data-mode="balance">
                Équilibrer
            </div>

            <div class="mode" data-mode="calm">
                Apaiser
            </div>

            <div class="mode" data-mode="custom">
                Personnalisé
            </div>

        </div>

    </div>

    <div class="center-zone">

        <div class="track-container">
            <div class="bubble" id="bubble"></div>
        </div>

        <div class="breath-text" id="breathText">
            Inspirez...
        </div>

    </div>

    <div class="bottom-zone">

        <div class="duration-container">

            <div class="duration-label">
                Durée : <span id="durationText">5</span> min
            </div>

            <input type="range" min="1" max="20" value="5" id="durationSlider">

        </div>

        <button class="main-button" id="startBtn">
            Lancer la séance
        </button>

    </div>

</div>

<div class="overlay-controls" id="overlayControls">

    <div class="drag-bar"></div>

    <div class="info-box">
        <b>Conseil :</b>
        Pour de meilleurs résultats, nous vous conseillons de reprendre votre séance depuis le début.
    </div>

    <div class="control-row">

        <button class="circle-btn secondary-btn">
            ♪
        </button>

        <button class="circle-btn play-btn" id="pauseBtn">
            ❚❚
        </button>

        <button class="circle-btn secondary-btn" id="soundBtn">
            🔊
        </button>

    </div>

    <div class="progress">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="time-row">
        <span id="currentTime">00:00</span>
        <span id="totalTime">05:00</span>
    </div>

    <button class="return-btn" id="returnBtn">
        ← Retour
    </button>

</div>

<div class="popup" id="customPopup">

    <div class="popup-content">

        <h2>Mode personnalisé</h2>

        <div class="setting">
            <label>
                <span>Inspiration</span>
                <span id="inhaleValue">4 sec</span>
            </label>
            <input type="range" min="1" max="20" value="4" id="inhaleSlider">
        </div>

        <div class="setting">
            <label>
                <span>Expiration</span>
                <span id="exhaleValue">6 sec</span>
            </label>
            <input type="range" min="1" max="20" value="6" id="exhaleSlider">
        </div>

        <div class="setting">
            <label>
                <span>Apnée</span>
                <span id="holdValue">0 sec</span>
            </label>
            <input type="range" min="0" max="20" value="0" id="holdSlider">
        </div>

        <div class="popup-buttons">
            <button class="cancel-btn" id="cancelCustom">Annuler</button>
            <button class="save-btn" id="saveCustom">Valider</button>
        </div>

    </div>

</div>

<script>

const modes = {

    beginner:{
        inhale:3,
        exhale:5,
        hold:0
    },

    balance:{
        inhale:5,
        exhale:5,
        hold:0
    },

    calm:{
        inhale:4,
        exhale:8,
        hold:0
    },

    custom:{
        inhale:4,
        exhale:6,
        hold:0
    }

};

let currentMode = "beginner";
let running = false;
let paused = false;
let sessionMinutes = 5;
let remainingSeconds = 0;
let soundEnabled = true;
let breathTimeout = null;
let sessionTimer = null;
let overlayOpened = false;

const bubble = document.getElementById("bubble");
const breathText = document.getElementById("breathText");
const durationSlider = document.getElementById("durationSlider");
const durationText = document.getElementById("durationText");
const startBtn = document.getElementById("startBtn");
const overlayControls = document.getElementById("overlayControls");
const pauseBtn = document.getElementById("pauseBtn");
const currentTime = document.getElementById("currentTime");
const totalTime = document.getElementById("totalTime");
const progressFill = document.getElementById("progressFill");
const popup = document.getElementById("customPopup");
const soundBtn = document.getElementById("soundBtn");

function animateBubble(position,duration){

    bubble.style.transition = `transform ${duration}s ease-in-out`;
    bubble.style.transform = `translateX(-50%) translateY(${position}px)`;

}

function playGong(freq=432,duration=2){

    if(!soundEnabled) return;

    const audioCtx = new(window.AudioContext || window.webkitAudioContext)();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.001,audioCtx.currentTime);

    gain.gain.exponentialRampToValueAtTime(
        0.2,
        audioCtx.currentTime + 0.02
    );

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audioCtx.currentTime + duration
    );

    osc.start();
    osc.stop(audioCtx.currentTime + duration);

}

function updateProgress(){

    const total = sessionMinutes * 60;
    const done = total - remainingSeconds;
    const percent = (done / total) * 100;

    progressFill.style.width = percent + "%";

    const min = String(Math.floor(remainingSeconds / 60)).padStart(2,"0");
    const sec = String(remainingSeconds % 60).padStart(2,"0");

    currentTime.textContent = `${min}:${sec}`;

}

function runBreathingCycle(){

    if(!running || paused) return;

    const settings = modes[currentMode];

    breathText.textContent = "Inspirez...";

    animateBubble(0,settings.inhale);

    breathTimeout = setTimeout(()=>{

        if(!running || paused) return;

        if(settings.hold > 0){

            breathText.textContent = "Apnée...";

            breathTimeout = setTimeout(()=>{
                startExhale();
            },settings.hold * 1000);

        }else{

            startExhale();

        }

    },settings.inhale * 1000);

    function startExhale(){

        if(!running || paused) return;

        breathText.textContent = "Expirez...";

        animateBubble(465,settings.exhale);

        breathTimeout = setTimeout(()=>{
            runBreathingCycle();
        },settings.exhale * 1000);

    }

}

function stopSession(){

    running = false;
    paused = false;

    clearTimeout(breathTimeout);
    clearInterval(sessionTimer);

    overlayOpened = false;

    overlayControls.classList.remove("visible");

    playGong(320,3);

    animateBubble(465,2);

    breathText.textContent = "Terminé";

    document.body.classList.remove("session-active");

    setTimeout(()=>{
        breathText.textContent = "Prêt";
    },2500);

}

durationSlider.addEventListener("input",()=>{

    sessionMinutes = durationSlider.value;

    durationText.textContent = sessionMinutes;

    totalTime.textContent =
        String(sessionMinutes).padStart(2,"0") + ":00";

});

soundBtn.addEventListener("click",(e)=>{

    e.stopPropagation();

    soundEnabled = !soundEnabled;

    soundBtn.style.opacity = soundEnabled ? "1" : "0.4";

});

document.querySelectorAll(".mode").forEach(mode=>{

    mode.addEventListener("click",()=>{

        document.querySelectorAll(".mode")
        .forEach(m=>m.classList.remove("active"));

        mode.classList.add("active");

        currentMode = mode.dataset.mode;

        if(currentMode === "custom"){
            popup.style.display = "flex";
        }

    });

});

document.getElementById("cancelCustom")
.addEventListener("click",()=>{
    popup.style.display = "none";
});

document.getElementById("saveCustom")
.addEventListener("click",()=>{

    modes.custom.inhale =
        parseInt(document.getElementById("inhaleSlider").value);

    modes.custom.exhale =
        parseInt(document.getElementById("exhaleSlider").value);

    modes.custom.hold =
        parseInt(document.getElementById("holdSlider").value);

    popup.style.display = "none";

});

function updateCustomLabels(){

    document.getElementById("inhaleValue").textContent =
        document.getElementById("inhaleSlider").value + " sec";

    document.getElementById("exhaleValue").textContent =
        document.getElementById("exhaleSlider").value + " sec";

    document.getElementById("holdValue").textContent =
        document.getElementById("holdSlider").value + " sec";

}

document.getElementById("inhaleSlider")
.addEventListener("input",updateCustomLabels);

document.getElementById("exhaleSlider")
.addEventListener("input",updateCustomLabels);

document.getElementById("holdSlider")
.addEventListener("input",updateCustomLabels);

startBtn.addEventListener("click",()=>{

    if(running) return;

    running = true;
    paused = false;

    overlayOpened = false;

    pauseBtn.innerHTML = "❚❚";

    document.body.classList.add("session-active");

    playGong();

    remainingSeconds = sessionMinutes * 60;

    totalTime.textContent =
        String(sessionMinutes).padStart(2,"0") + ":00";

    updateProgress();

    sessionTimer = setInterval(()=>{

        if(!running || paused) return;

        remainingSeconds--;

        updateProgress();

        if(remainingSeconds <= 0){
            stopSession();
        }

    },1000);

    runBreathingCycle();

});

pauseBtn.addEventListener("click",(e)=>{

    e.stopPropagation();

    if(!running) return;

    paused = !paused;

    if(paused){

        clearTimeout(breathTimeout);

        pauseBtn.innerHTML = "▶";

    }else{

        pauseBtn.innerHTML = "❚❚";

        runBreathingCycle();

    }

});

document.body.addEventListener("click",(e)=>{

    if(!running) return;

    if(e.target.closest(".overlay-controls")) return;

    if(
        e.target.closest("#startBtn") ||
        e.target.closest(".mode") ||
        e.target.closest(".popup")
    ){
        return;
    }

    overlayOpened = !overlayOpened;

    if(overlayOpened){

        overlayControls.classList.add("visible");

    }else{

        overlayControls.classList.remove("visible");

    }

});
document.getElementById("returnBtn")
.addEventListener("click",(e)=>{

    e.stopPropagation();

    stopSession();

});

</script>

</body>
</html>
