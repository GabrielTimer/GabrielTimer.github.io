<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Glossaire Exercices</title>

  <link rel="stylesheet" href="css/glossary.css?v=999">
</head>

<body>

<h1>Glossaire Exercices</h1>

<div class="toolbar">

  <input
    type="text"
    id="searchInput"
    placeholder="Rechercher un exercice..."
  >

  <div class="source-selector">

    <button
      class="source-btn active"
      data-source="all">
      Tous
    </button>

    <button
      class="source-btn"
      data-source="CABINET">
      Cabinet
    </button>

    <button
      class="source-btn"
      data-source="HEP">
      HEP
    </button>

  </div>

  <div id="filters"></div>

  <button id="resetFilters">
    Réinitialiser
  </button>

</div>

<div id="activeFilters"></div>

<div id="resultsCount"></div>

<div id="exercise-container"></div>

  <script src="js/glossary.js?v=999"></script>

</body>
</html>
