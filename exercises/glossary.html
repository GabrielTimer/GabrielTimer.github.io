<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Glossaire Exercices</title>

  <link rel="stylesheet" href="css/glossary.css">
</head>

<body>

  <h1>Glossaire Exercices</h1>

  <div id="exercise-container"></div>
<div id="exercise-modal" class="modal">

  <div class="modal-content">

    <span class="close-modal">&times;</span>

    <img id="modal-image">

    <h2 id="modal-title"></h2>

    <p id="modal-duration"></p>

    <div class="modal-section">
      <h3>Consignes</h3>
      <ul id="modal-consignes"></ul>
    </div>

    <div class="modal-section">
      <h3>Précautions</h3>
      <ul id="modal-precautions"></ul>
    </div>

    <button id="modal-launch">
      Lancer l'exercice
    </button>

  </div>

</div>

  <script src="js/glossary.js"></script>

</body>
</html>
